<!DOCTYPE html>
<html>
<head>
    <title>繪製貓龍 | Raingod</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; background-color: #f0f0f0; }
        button { position: fixed; top: 10px; left: 10px; z-index: 10; }
    </style>
</head>
<body>
    <link rel="stylesheet" href="menu.css">
<div id="nav_bar"></div>
<script src="menu.js"></script>
    <canvas id="myCanvas"></canvas>

    <script>
        const canvas = document.getElementById("myCanvas");
        const ctx = canvas.getContext("2d");
        const S = 10; 

        // 讓畫布自動填滿螢幕
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function Go() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 擴大迴圈範圍至 -100 到 100，確保在任何解析度下都能填滿全螢幕
            for (let j = -100; j < 100; j++) { 
                for (let i = -100; i < 100; i++) {
                    
                    // 核心座標邏輯：結合兩個向量的位移
                    let targetX = (i * 4 * S) + (j * -1 * S);
                    let targetY = (i * 4 * S) + (j * 6 * S);
                    drawCD(targetX, targetY);
                }
            }
        }

        function drawCD(x, y) {
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + 2 * S, y);
            ctx.lineTo(x + 3 * S, y + 1 * S);
            ctx.lineTo(x + 4 * S, y + 0 * S);
            ctx.lineTo(x + 5 * S, y + 1 * S);
            ctx.lineTo(x + 5 * S, y + 4 * S);
            ctx.lineTo(x + 4 * S, y + 4 * S);
            ctx.lineTo(x + 4 * S, y + 7 * S);
            ctx.lineTo(x + 3 * S, y + 6 * S);
            ctx.lineTo(x + 2 * S, y + 7 * S);
            ctx.lineTo(x + 1 * S, y + 6 * S);
            ctx.lineTo(x + 0 * S, y + 6 * S);
            ctx.lineTo(x + 0 * S, y + 0 * S);
            ctx.closePath();

            ctx.fillStyle = "#28FF28";
            ctx.fill();
            ctx.strokeStyle = "black";
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(x + 2 * S, y + 0 * S);
            ctx.lineTo(x + 1 * S, y + 1 * S);
            ctx.lineTo(x + 1 * S, y + 5 * S);
            ctx.moveTo(x + 1 * S, y + 4 * S);
            ctx.lineTo(x + 4 * S, y + 4 * S);
            ctx.stroke();

            ctx.fillStyle = "black";
            ctx.fillRect(x + 3 * S, y + 2 * S, S, S);
        }
        Go()
    </script>
</body>
</html>

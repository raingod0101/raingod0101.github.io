<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Chatroom - Firebase</title>
    <style>
        :root { --primary: #4285f4; --bg: #f0f2f5; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* 登入介面 */
        #auth-view { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; text-align: center; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-google { background: white; border: 1px solid #dadce0; padding: 10px 20px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 16px; transition: background 0.2s; }
        .btn-google:hover { background: #f8f9fa; }

        /* 聊天介面 */
        #chat-view { display: none; flex-direction: column; height: 100%; max-width: 900px; margin: 0 auto; width: 100%; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        header { background: var(--primary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        #logout-btn { background: none; border: 1px solid white; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #e5ddd5; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 10px; font-size: 15px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg.mine { align-self: flex-end; background: #dcf8c6; }
        .msg.others { align-self: flex-start; background: white; }
        .msg-name { font-size: 11px; color: #666; margin-bottom: 3px; font-weight: bold; }

        .input-bar { padding: 15px; display: flex; gap: 10px; background: #f0f0f0; }
        #msg-input { flex: 1; border: none; padding: 12px 15px; border-radius: 20px; outline: none; }
        #send-btn { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-view">
        <div class="login-card">
            <h1>歡迎使用聊天室</h1>
            <p>請先登入以開始對話</p>
            <button class="btn-google" id="login-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                透過 Google 登入
            </button>
        </div>
    </div>

    <div id="chat-view">
        <header>
            <span id="display-name">載入中...</span>
            <button id="logout-btn">登出</button>
        </header>
        <div id="messages"></div>
        <div class="input-bar">
            <input type="text" id="msg-input" placeholder="輸入訊息..." autocomplete="off">
            <button id="send-btn">傳送</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, set, onChildAdded, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- 1. 請在此填入你的 Firebase 配置 ---
        const firebaseConfig = {
            apiKey: "你的_API_KEY",
            authDomain: "chat-73802.firebaseapp.com",
            databaseURL: "https://chat-73802-default-rtdb.firebaseio.com",
            projectId: "chat-73802",
            storageBucket: "chat-73802.appspot.com",
            messagingSenderId: "你的_SENDER_ID",
            appId: "你的_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        const authView = document.getElementById('auth-view');
        const chatView = document.getElementById('chat-view');
        const msgList = document.getElementById('messages');
        const msgInput = document.getElementById('msg-input');

        // --- 2. 處理登入邏輯 ---
        document.getElementById('login-btn').onclick = () => signInWithRedirect(auth, provider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authView.style.display = 'none';
                chatView.style.display = 'flex';
                document.getElementById('display-name').innerText = `👋 ${user.displayName}`;
                initChat();
            } else {
                authView.style.display = 'flex';
                chatView.style.display = 'none';
            }
        });

        // --- 3. 聊天功能 ---
        function initChat() {
            msgList.innerHTML = '';
            const msgRef = query(ref(db, 'messages'), limitToLast(50));
            onChildAdded(msgRef, (snap) => {
                const data = snap.val();
                render(data);
            });
        }

        document.getElementById('send-btn').onclick = send;
        msgInput.onkeypress = (e) => { if(e.key === 'Enter') send(); };

        function send() {
            const text = msgInput.value.trim();
            if(!text || !auth.currentUser) return;
            const newMsg = push(ref(db, 'messages'));
            set(newMsg, {
                uid: auth.currentUser.uid,
                name: auth.currentUser.displayName,
                text: text,
                time: serverTimestamp()
            });
            msgInput.value = '';
        }

        function render(data) {
            const isMine = data.uid === auth.currentUser?.uid;
            const div = document.createElement('div');
            div.className = `msg ${isMine ? 'mine' : 'others'}`;
            div.innerHTML = `<div class="msg-name">${data.name}</div><div>${escape(data.text)}</div>`;
            msgList.appendChild(div);
            msgList.scrollTop = msgList.scrollHeight;
        }

        function escape(s) {
            let t = document.createElement('p');
            t.textContent = s;
            return t.innerHTML;
        }
    </script>
</body>
</html>

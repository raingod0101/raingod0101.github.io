<!DOCTYPE html>
<html>
<head>
    <title>Avoid GO! | Raingod</title>
    <link rel="stylesheet" href="menu.css">
    <style>
        body { background: #000; color: #fff; overflow: hidden; cursor: none; }
        #game-info { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); font-family: 'Arial Black'; font-size: 2rem; color: rgba(255,255,255,0.2); }
        canvas { display: block; filter: contrast(1.2) brightness(1.2); }
    </style>
</head>
<body>
    <div id="nav_bar"></div>
    <div id="game-info">TIME: <span id="timer">0.00</span>s</div>
    <canvas id="gameCanvas"></canvas>

    <script src="loadMenu.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let player = { x: canvas.width/2, y: canvas.height/2, r: 8 };
        let bullets = [], startTime = Date.now(), particles = [];

        function spawnBullet() {
            const side = Math.floor(Math.random()*4);
            let x, y, vx, vy;
            const speed = 3 + (Date.now() - startTime)/5000; // 隨時間變快
            if(side===0){x=Math.random()*canvas.width; y=-20; vx=(Math.random()-0.5)*2; vy=speed;}
            else if(side===1){x=Math.random()*canvas.width; y=canvas.height+20; vx=(Math.random()-0.5)*2; vy=-speed;}
            else if(side===2){x=-20; y=Math.random()*canvas.height; vx=speed; vy=(Math.random()-0.5)*2;}
            else {x=canvas.width+20; y=Math.random()*canvas.height; vx=-speed; vy=(Math.random()-0.5)*2;}
            bullets.push({x, y, vx, vy, r: 4});
        }

        function update() {
            const timeElapsed = (Date.now() - startTime)/1000;
            document.getElementById('timer').innerText = timeElapsed.toFixed(2);
            
            if(Math.random() < 0.1) spawnBullet();

            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                // 碰撞檢測
                const dist = Math.hypot(player.x - b.x, player.y - b.y);
                if(dist < player.r + b.r) {
                    alert("你被擊中了！生存時間: " + timeElapsed.toFixed(2) + "秒");
                    location.reload();
                }
                if(b.x< -50 || b.x > canvas.width+50 || b.y < -50 || b.y > canvas.height+50) bullets.splice(i, 1);
            });
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; // 拖尾效果
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 繪製玩家 (藍光)
            ctx.shadowBlur = 20; ctx.shadowColor = '#007aff';
            ctx.fillStyle = '#007aff';
            ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();

            // 繪製子彈 (紅雷射)
            ctx.shadowBlur = 10; ctx.shadowColor = '#ff3b30';
            ctx.fillStyle = '#ff3b30';
            bullets.forEach(b => {
                ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
            });
        }

        window.onmousemove = e => {
            player.x = e.clientX;
            player.y = e.clientY;
        };

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>

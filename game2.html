<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時聊天室 | GitHub 版</title>
    <style>
        :root { --primary: #4285f4; --bg: #f8f9fa; --chat-bg: #e5ddd5; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; height: 100vh; display: flex; flex-direction: column; }
        
        /* 登入視窗 */
        #auth-view { display: flex; flex: 1; justify-content: center; align-items: center; background: white; }
        .login-box { text-align: center; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-google { background: white; border: 1px solid #dadce0; padding: 12px 24px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 16px; transition: 0.2s; margin: 0 auto; }
        .btn-google:hover { background: #f1f3f4; }

        /* 聊天視窗 */
        #chat-view { display: none; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; width: 100%; background: white; }
        header { background: var(--primary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #logout-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; }

        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: var(--chat-bg); }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; position: relative; word-wrap: break-word; font-size: 15px; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg.mine { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 2px; }
        .msg.others { align-self: flex-start; background: white; border-bottom-left-radius: 2px; }
        .msg-info { font-size: 10px; color: #777; margin-bottom: 3px; font-weight: bold; }

        .input-area { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; align-items: center; }
        #msg-input { flex: 1; border: none; padding: 12px 20px; border-radius: 25px; outline: none; font-size: 16px; }
        #send-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-view">
        <div class="login-box">
            <h2 style="color:#444">💬 Firebase 聊天室</h2>
            <p style="color:#666; margin-bottom: 30px;">請使用 Google 帳號登入</p>
            <button class="btn-google" id="login-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                使用 Google 登入
            </button>
        </div>
    </div>

    <div id="chat-view">
        <header>
            <span id="user-display">驗證中...</span>
            <button id="logout-btn">登出</button>
        </header>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="說點什麼吧..." autocomplete="off">
            <button id="send-btn">傳送</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, set, onChildAdded, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- 1. 請在此替換為你的 Firebase 配置 ---
        const firebaseConfig = {
            apiKey: "你的_API_KEY",
            authDomain: "chat-73802.firebaseapp.com",
            databaseURL: "https://chat-73802-default-rtdb.firebaseio.com",
            projectId: "chat-73802",
            storageBucket: "chat-73802.appspot.com",
            messagingSenderId: "你的_SENDER_ID",
            appId: "你的_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        const authView = document.getElementById('auth-view');
        const chatView = document.getElementById('chat-view');
        const msgList = document.getElementById('messages');
        const msgInput = document.getElementById('msg-input');
        const userDisplay = document.getElementById('user-display');

        // --- 2. 登入邏輯 (Redirect 模式) ---
        document.getElementById('login-btn').onclick = () => {
            signInWithRedirect(auth, provider);
        };

        document.getElementById('logout-btn').onclick = () => {
            signOut(auth).then(() => location.reload());
        };

        // 監聽登入狀態改變
        onAuthStateChanged(auth, (user) => {
            if (user) {
                authView.style.display = 'none';
                chatView.style.display = 'flex';
                userDisplay.innerText = `👤 ${user.displayName}`;
                startChat(); // 登入成功後開始讀取訊息
            } else {
                authView.style.display = 'flex';
                chatView.style.display = 'none';
            }
        });

        // --- 3. 聊天功能 ---
        function startChat() {
            msgList.innerHTML = ''; // 清空舊內容
            const messagesRef = query(ref(db, 'messages'), limitToLast(100));
            
            // 監聽新訊息加入
            onChildAdded(messagesRef, (snapshot) => {
                const data = snapshot.val();
                renderMessage(data);
            });
        }

        function send() {
            const text = msgInput.value.trim();
            if (!text || !auth.currentUser) return;

            const newMsgRef = push(ref(db, 'messages'));
            set(newMsgRef, {
                uid: auth.currentUser.uid,
                name: auth.currentUser.displayName,
                text: text,
                timestamp: serverTimestamp()
            });
            msgInput.value = '';
        }

        document.getElementById('send-btn').onclick = send;
        msgInput.onkeypress = (e) => { if (e.key === 'Enter') send(); };

        function renderMessage(data) {
            const isMine = data.uid === auth.currentUser.uid;
            const div = document.createElement('div');
            div.className = `msg ${isMine ? 'mine' : 'others'}`;
            
            // 使用 textContent 防止 XSS 攻擊
            const nameDiv = document.createElement('div');
            nameDiv.className = 'msg-info';
            nameDiv.textContent = data.name;
            
            const textDiv = document.createElement('div');
            textDiv.textContent = data.text;

            div.appendChild(nameDiv);
            div.appendChild(textDiv);
            msgList.appendChild(div);
            
            // 自動捲動到底部
            msgList.scrollTop = msgList.scrollHeight;
        }
    </script>
</body>
</html>

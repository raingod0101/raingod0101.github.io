<!DOCTYPE html>
<html>
<head>
    <title>質數查詢 | Raingod</title>
    <link rel="stylesheet" href="menu.css">
</head>
<body>
    <div id="nav_bar"></div>
    <div class="container">
        <div class="card">
            <h1>質數快速查詢</h1>
            <p>找出指定範圍內的所有質數。</p>
            <input type="number" id="limit" placeholder="上限 (例如 100)">
            <button onclick="findPrimes()">生成列表</button>
            <div id="list" style="margin-top:20px; display:flex; flex-wrap:wrap; gap:10px;"></div>
        </div>
    </div>
    <script src="loadMenu.js"></script>
    <script>
        function findPrimes() {
            let limit = document.getElementById('limit').value;
            let primes = [];
            for (let i = 2; i <= limit; i++) {
                let isP = true;
                for (let j = 2; j <= Math.sqrt(i); j++) {
                    if (i % j === 0) { isP = false; break; }
                }
                if (isP) primes.push(i);
            }
            document.getElementById('list').innerHTML = primes.map(p => `<span style="background:#e3f2fd; padding:5px 10px; border-radius:5px;">${p}</span>`).join('');
        }
    </script>
</body>
</html>

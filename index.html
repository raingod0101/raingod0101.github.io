<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raingod | Lab | Blue Rain</title>
    <style>
        :root {
            --sky-blue: #d1e9ff;    /* 淺天藍背景 */
            --deep-blue: #1e3a5f;   /* 深藍色文字 */
            --rain-blue: #5d8aa8;   /* 雨滴藍 */
            --glass-white: rgba(255, 255, 255, 0.25);
        }

        body, html {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #e3f2fd 0%, var(--sky-blue) 100%);
            color: var(--deep-blue);
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* 讓雨絲 Canvas 稍微帶點模糊感，增加雨天的濕潤氣息 */
        #canvas-bg {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            filter: blur(0.5px);
        }

        .hero-section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        /* 標題區域：增加毛玻璃質感，模擬窗戶霧氣 */
        .title-container {
            padding: 3rem 5rem;
            background: var(--glass-white);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(30, 58, 95, 0.05);
            text-align: center;
        }

        .raingod-title {
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            margin: 0;
            background: linear-gradient(to bottom, var(--deep-blue), #4a90e2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tech-line {
            width: 80px; height: 1px;
            background: var(--deep-blue);
            margin: 2rem auto 0;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <section class="hero-section">
        <div class="title-container">
            <h1 class="raingod-title">RAINGOD</h1>
            <div class="tech-line"></div>
        </div>
    </section>

    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const rainCount = 100;
        const rains = [];

        class Rain {
            constructor() {
                this.init();
            }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.length = Math.random() * 30 + 20; // 增長的雨絲更清晰
                this.speed = Math.random() * 10 + 10;  // 穩定中速
                this.opacity = Math.random() * 0.4 + 0.3; // 較高透明度確保藍色顯現
            }
            draw() {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(93, 138, 168, ${this.opacity})`; // 使用雨滴藍
                ctx.lineWidth = 1.5;
                ctx.lineCap = 'round';
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x, this.y + this.length);
                ctx.stroke();
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) this.init();
                this.draw();
            }
        }

        for (let i = 0; i < rainCount; i++) {
            rains.push(new Rain());
        }

        function animate() {
            // 使用淺色刷掉背景，保留適度殘影
            ctx.fillStyle = "rgba(209, 233, 255, 0.5)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            rains.forEach(r => r.update());
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>

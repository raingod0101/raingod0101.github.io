<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raingod0101 | 質感工具站</title>
    <link rel="stylesheet" href="menu.css">
    <style>
        /* 讓主畫面看起來很高級的背景 */
        .hero-section {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at top right, #e3f2fd, #ffffff);
        }
        h1 { font-size: 3.5rem; color: #1d1d1f; margin-bottom: 1rem; }
        p { color: #86868b; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="nav_placeholder"></div>

    <section class="hero-section">
        <h1>探索數學與遊戲的奧秘</h1>
        <p>這是一個專為效率與體驗設計的實驗空間。</p>
    </section>

    <script>
        // 為了讓你本地測試也能看到（解決 fetch 失敗問題）
        // 如果 fetch 失敗，我們手動定義一個內容作為備份
        fetch('menu.html')
            .then(res => res.text())
            .then(html => document.getElementById('nav_placeholder').innerHTML = html)
            .catch(() => {
                console.log("偵測到本地開啟，改用手動注入...");
                // 這裡可以放備份的 HTML 字符串，或是提示部署
            });
    </script>
</body>
</html>

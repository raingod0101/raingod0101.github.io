<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raingod | Lab</title>
    
    <link rel="stylesheet" href="menu.css">

    <style>
        :root {
            --tech-cyan: #00d2ff;
            --bg-black: #050505;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-black);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* 這裡原本的 #nav_placeholder 樣式已刪除，改用 menu.css 控制 */

        #canvas-bg {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            filter: blur(1.5px);
            opacity: 0.3;
        }

        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .raingod-title {
            font-size: clamp(3rem, 12vw, 7rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            background: linear-gradient(to bottom, #fff 40%, var(--tech-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: soft-glow 4s ease-in-out infinite alternate;
        }

        .tech-line {
            width: 150px;
            height: 1px;
            background: var(--tech-cyan);
            box-shadow: 0 0 10px var(--tech-cyan);
            margin-top: 10px;
            opacity: 0.6;
        }

        @keyframes soft-glow {
            from { filter: drop-shadow(0 0 5px rgba(0, 210, 255, 0.2)); }
            to { filter: drop-shadow(0 0 20px rgba(0, 210, 255, 0.5)); }
        }
    </style>
</head>
<body>

    <div id="nav_bar"></div>

    <canvas id="canvas-bg"></canvas>

    <section class="hero-section">
        <h1 class="raingod-title">RAINGOD</h1>
        <div class="tech-line"></div>
    </section>

    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const alphabet = "01";
        const fontSize = 20;
        const columns = canvas.width / fontSize;
        const drops = Array.from({ length: Math.floor(columns) }).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(5, 5, 5, 0.1)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0, 210, 255, 0.2)";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.98) {
                    drops[i] = 0;
                }
                drops[i] += 0.4;
            }
        }
        setInterval(draw, 40);
    </script>

    <script src="menu.js"></script>
</body>
</html>

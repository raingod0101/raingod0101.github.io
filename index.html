<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的網站</title>
    <link rel="stylesheet" href="menu.css">
</head>
<body>

    <div id="nav_bar">正在載入導覽列...</div>

    <main style="padding: 20px;">
        <h2>主內容區</h2>
        <p>這是一個乾淨的載入範例，導覽列會從 menu.html 抓取。</p>
    </main>

    <script>
        // 載入函數
        function includeMenu() {
            fetch('menu.html')
                .then(response => {
                    if (response.ok) return response.text();
                    throw new Error('找不到 menu.html 檔案');
                })
                .then(data => {
                    document.getElementById('nav_bar').innerHTML = data;
                })
                .catch(error => {
                    console.error('錯誤:', error);
                    document.getElementById('nav_bar').innerHTML = 
                        `<div style="background:red; color:white; padding:10px;">
                            導覽列載入失敗！請確保您是透過伺服器（如 GitHub Pages）開啟網頁。
                         </div>`;
                });
        }

        // 執行載入
        includeMenu();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raingod | 影片</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h2 {
            color: #333;
        }
        .video-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background: #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border-radius: 8px;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .status-bar {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
<link rel="stylesheet" href="menu.css">

<div id="nav_bar"></div>

<script src="menu.js"></script>
    <h2>YouTube 播放進度自動儲存</h2>
    
    <div class="video-container">
        <div id="player"></div>
    </div>

    <div class="status-bar" id="status">正在載入影片...</div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // 從您提供的網址中提取出的 YouTube 影片 ID
        const videoId = 'uc4IVwtGkTc'; 
        const storageKey = `yt_progress_${videoId}`;
        let player;
        let progressTimer;

        // 1. 當 YouTube API 準備就緒時會自動觸發此函式
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: videoId,
                playerVars: {
                    'playsinline': 1,
                    'rel': 0,
                    'modestbranding': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // 2. 影片準備好時觸發
        function onPlayerReady(event) {
            // 檢查本地端是否有上一次的觀看紀錄
            const savedTime = localStorage.getItem(storageKey);
            const statusDiv = document.getElementById('status');

            if (savedTime) {
                const timeInSeconds = parseFloat(savedTime);
                // 跳轉到記錄的時間（但先不自動播放，讓使用者自己點擊）
                player.seekTo(timeInSeconds, true);
                
                // 格式化時間顯示
                const minutes = Math.floor(timeInSeconds / 60);
                const seconds = Math.floor(timeInSeconds % 60);
                statusDiv.innerText = `已恢復至上次觀看進度：${minutes}分${seconds}秒`;
            } else {
                statusDiv.innerText = `影片已準備就緒（尚無觀看紀錄）`;
            }
        }

        // 3. 監聽播放狀態改變（播放中、暫停、結束）
        function onPlayerStateChange(event) {
            const statusDiv = document.getElementById('status');
            
            if (event.data == YT.PlayerState.PLAYING) {
                statusDiv.innerText = "影片播放中，正在即時記錄進度...";
                // 當影片在播放時，每秒鐘自動儲存一次進度
                progressTimer = setInterval(() => {
                    if (player && player.getCurrentTime) {
                        const currentTime = player.getCurrentTime();
                        localStorage.setItem(storageKey, currentTime);
                    }
                }, 1000);
            } else {
                // 如果暫停、快轉或結束，停止定時器
                clearInterval(progressTimer);
                
                if (event.data == YT.PlayerState.PAUSED) {
                    const currentTime = player.getCurrentTime();
                    localStorage.setItem(storageKey, currentTime);
                    statusDiv.innerText = "影片已暫停，進度已儲存。";
                }
                
                if (event.data == YT.PlayerState.ENDED) {
                    // 影片看完了，清除紀錄
                    localStorage.removeItem(storageKey);
                    statusDiv.innerText = "影片已看完，觀看紀錄已清除。";
                }
            }
        }
    </script>
</body>
</html>

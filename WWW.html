<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raingod Pro | 進階通訊版</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #e9e9eb; --danger: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; height: 100vh; }
        .hidden { display: none !important; }
        
        /* Header */
        .header { height: 60px; padding: 0 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        
        /* Chat Box */
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        .msg-row { display: flex; flex-direction: column; width: 100%; }
        .msg-row.me { align-items: flex-end; }
        .msg-row.other { align-items: flex-start; }
        .name-tag { font-size: 11px; color: #888; margin-bottom: 2px; }
        .bubble-group { display: flex; align-items: flex-end; gap: 6px; max-width: 85%; }
        .me .bubble-group { flex-direction: row-reverse; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; word-break: break-all; cursor: pointer; }
        .me .bubble { background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }
        .info-tag { font-size: 9px; color: #aaa; display: flex; flex-direction: column; min-width: 45px; }
        .me .info-tag { align-items: flex-end; }
        .read-status { color: #007aff; font-weight: bold; }

        /* Input */
        .input-area { padding: 10px 15px 30px; border-top: 1px solid #eee; display: flex; gap: 8px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        .btn-icon { font-size: 20px; cursor: pointer; background: none; border: none; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-view" style="padding: 40px 25px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center;">
        <h2 style="color: var(--me-bg);">Raingod Pro</h2>
        <input type="text" id="room-input" placeholder="房號" style="margin-bottom:10px; border-radius:10px; border:1px solid #ddd; padding:12px;">
        <input type="text" id="nick-input" placeholder="暱稱" style="margin-bottom:10px; border-radius:10px; border:1px solid #ddd; padding:12px;">
        <input type="password" id="admin-pass" placeholder="管理員密碼 (創多房用)" style="margin-bottom:20px; border-radius:10px; border:1px solid #ddd; padding:12px;">
        <button onclick="handleJoin()" style="padding:15px; background: var(--me-bg); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">進入房間</button>
        <p id="status" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <b id="room-title">ROOM</b>
            <button id="del-btn" class="hidden" onclick="destroyRoom()" style="color:red; border:none; background:none; font-weight:bold;">銷毀房間</button>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="file" id="file-selector" class="hidden" onchange="sendFile(this)">
            <button class="btn-icon" onclick="document.getElementById('file-selector').click()">📎</button>
            <input type="text" id="msg-input" placeholder="說點什麼..." onkeypress="if(event.key==='Enter') doSend()">
            <button onclick="doSend()" style="color:var(--me-bg); font-weight:bold; border:none; background:none;">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk",
        databaseURL: "https://chat-73802-default-rtdb.firebaseio.com",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);

    let roomID = ""; let myName = "";
    let msgCount = []; // 訊息時間紀錄

    window.handleJoin = async function() {
        roomID = document.getElementById('room-input').value.trim().toUpperCase();
        myName = document.getElementById('nick-input').value.trim() || "User";
        const pass = document.getElementById('admin-pass').value;
        if(!roomID) return;

        const roomRef = ref(db, `rooms/${roomID}`);
        const snap = await get(roomRef);

        if (!snap.exists()) {
            const ownerSnap = await get(ref(db, `owners/${uid}`));
            if(ownerSnap.exists() && pass !== "你的超級密碼") {
                document.getElementById('status').innerText = "你已佔用房號: " + ownerSnap.val();
                return;
            }
            try {
                await set(ref(db, `owners/${uid}`), roomID);
                await set(ref(db, `rooms/${roomID}/meta`), { owner: uid, admin_key: pass });
            } catch(e) { return; }
        }

        // 在線人數邏輯
        const userRef = ref(db, `rooms/${roomID}/users/${uid}`);
        set(userRef, true);
        onDisconnect(userRef).remove();

        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = roomID;
        startChat();
    };

    async function sendMessage(payload) {
        const now = Date.now();
        msgCount = msgCount.filter(t => now - t < 30000);
        if (msgCount.length >= 10) return alert("太快了！30秒內限發10則。");
        
        msgCount.push(now);
        const newMsgRef = push(ref(db, `rooms/${roomID}/msgs`));
        set(newMsgRef, { ...payload, uid, name: myName, ts: serverTimestamp() });
    }

    window.doSend = () => {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        sendMessage({ type: 'text', content: inp.value });
        inp.value = "";
    };

    window.sendFile = (el) => {
        const file = el.files[0];
        if (!file || file.size > 5 * 1024 * 1024) return alert("檔案需小於 5MB");
        const reader = new FileReader();
        reader.onload = (e) => sendMessage({ type: 'file', content: e.target.result, fileName: file.name });
        reader.readAsDataURL(file);
        el.value = "";
    };

    window.recallMsg = (id) => {
        if(confirm("收回此訊息？")) remove(ref(db, `rooms/${roomID}/msgs/${id}`));
    };

    function startChat() {
        let onlineCount = 0;
        onValue(ref(db, `rooms/${roomID}/users`), s => onlineCount = s.size || 0);
        onValue(ref(db, `rooms/${roomID}/meta`), s => {
            if(!s.exists()) location.reload();
            if(s.val()?.owner === uid) document.getElementById('del-btn').classList.remove('hidden');
        });

        onValue(ref(db, `rooms/${roomID}/msgs`), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                const isMe = d.uid === uid;
                const time = d.ts ? new Date(d.ts).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";
                const row = document.createElement('div');
                row.className = `msg-row ${isMe ? 'me' : 'other'}`;
                
                let html = d.type === 'text' ? d.content : `<a href="${d.content}" download="${d.fileName}" style="color:inherit;text-decoration:none;">📁 ${d.fileName}</a>`;
                
                row.innerHTML = `
                    <div class="name-tag">${d.name}</div>
                    <div class="bubble-group">
                        <div class="bubble" onclick="${isMe ? `recallMsg('${c.key}')` : ''}">${html}</div>
                        <div class="info-tag">
                            ${isMe ? `<span class="read-status">已讀 ${onlineCount - 1 > 0 ? onlineCount - 1 : 0}</span>` : ''}
                            <span>${time}</span>
                        </div>
                    </div>`;
                box.appendChild(row);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.destroyRoom = async () => {
        if(confirm("銷毀房間？")) {
            await remove(ref(db, `rooms/${roomID}`));
            await remove(ref(db, `owners/${uid}`));
            location.reload();
        }
    };
</script>
</body>
</html>

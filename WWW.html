<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房號聊天室 (支援圖片)</title>
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; height: 100vh; }
        #app { width: 100%; max-width: 450px; background: white; display: flex; flex-direction: column; shadow: 0 0 20px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        
        /* 聊天區 */
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #f9f9fb; }
        .msg { padding: 10px; border-radius: 15px; max-width: 80%; word-wrap: break-word; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; }
        .msg.other { align-self: flex-start; background: #eee; color: #000; }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; cursor: pointer; }
        .msg-name { font-size: 11px; opacity: 0.7; margin-bottom: 3px; }

        /* 輸入區 */
        .input-area { padding: 10px; border-top: 1px solid #ddd; display: flex; gap: 8px; align-items: center; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        .btn-icon { background: #eee; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 20px; }
        .btn-send { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-view" style="padding: 20px;">
        <h2>🚪 進入房間</h2>
        <input type="text" id="room-input" placeholder="房號">
        <input type="text" id="nick-input" placeholder="暱稱">
        <button onclick="handleJoin()" style="width:100%; padding:10px; margin-top:10px; background:var(--primary); color:white; border:none; border-radius:5px;">進入</button>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div style="padding:10px; background:#fff; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
            <b id="room-title"></b>
            <button onclick="destroyRoom()" id="owner-btn" class="hidden" style="color:red; border:none; background:none; cursor:pointer;">銷毀</button>
        </div>
        
        <div id="chat-box"></div>

        <div class="input-area">
            <input type="file" id="img-input" class="hidden" accept="image/*" onchange="sendImage(this)">
            <button class="btn-icon" onclick="document.getElementById('img-input').click()">📷</button>
            
            <input type="text" id="msg-input" placeholder="輸入訊息..." onkeypress="if(event.key==='Enter') doSend()">
            <button class="btn-send" onclick="doSend()">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, onDisconnect, serverTimestamp, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- 請確保這裡是你自己的 Config ---
    const firebaseConfig = {
        apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk",
        authDomain: "chat-73802.firebaseapp.com",
        databaseURL: "https://chat-73802-default-rtdb.firebaseio.com",
        projectId: "chat-73802",
        storageBucket: "chat-73802.firebasestorage.app",
        messagingSenderId: "274628413625",
        appId: "1:274628413625:web:77499e0bdeab18104bf368",
        measurementId: "G-BP7YV746WV"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);
    let roomID = ""; let myName = "";

    window.handleJoin = async function() {
        roomID = document.getElementById('room-input').value.trim().toUpperCase();
        myName = document.getElementById('nick-input').value.trim();
        if(!roomID || !myName) return alert("請填寫完整");

        const roomRef = ref(db, `rooms/${roomID}`);
        const snap = await get(roomRef);
        if(!snap.exists()) await set(ref(db, `rooms/${roomID}/meta`), { owner: uid });

        const metaSnap = await get(ref(db, `rooms/${roomID}/meta`));
        if(metaSnap.val()?.owner === uid) document.getElementById('owner-btn').classList.remove('hidden');

        set(ref(db, `rooms/${roomID}/users/${uid}`), { name: myName });
        onDisconnect(ref(db, `rooms/${roomID}/users/${uid}`)).remove();

        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = "房號: " + roomID;
        startChat();
    };

    function startChat() {
        onValue(ref(db, `rooms/${roomID}/msgs`), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(child => {
                const d = child.val();
                const div = document.createElement('div');
                div.className = `msg ${d.uid === uid ? 'me' : 'other'}`;
                let content = d.type === 'image' ? `<img src="${d.text}" onclick="window.open(this.src)">` : d.text;
                div.innerHTML = `<div class="msg-name">${d.name}</div>${content}`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
        onValue(ref(db, `rooms/${roomID}/meta`), (s) => { if(!s.exists()) location.reload(); });
    }

    // 傳送文字
    window.doSend = function() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        push(ref(db, `rooms/${roomID}/msgs`), {
            uid, name: myName, text: inp.value, type: 'text', ts: serverTimestamp()
        });
        inp.value = "";
    };

    // 傳送圖片 (Base64)
    window.sendImage = function(input) {
        const file = input.files[0];
        if (!file) return;
        if (file.size > 500000) return alert("圖片太大囉！請選擇小於 500KB 的圖片。");

        const reader = new FileReader();
        reader.onload = function(e) {
            push(ref(db, `rooms/${roomID}/msgs`), {
                uid, name: myName, text: e.target.result, type: 'image', ts: serverTimestamp()
            });
        };
        reader.readAsDataURL(file);
        input.value = ""; // 清空，讓下次選同一張也能觸發
    };

    window.destroyRoom = function() {
        if(confirm("確定銷毀？")) remove(ref(db, `rooms/${roomID}`));
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 放大版播放器</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        /* 調整容器：放大至 1200px，適應大螢幕但限制最大寬度，避免全螢幕 */
        .video-container {
            position: relative;
            width: 90%;
            max-width: 1200px; 
            aspect-ratio: 16 / 9;
            background: #000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-radius: 12px;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .status-bar {
            margin-top: 15px;
            font-size: 16px;
            color: #666;
        }
    </style>
</head>
<body>
<link rel="stylesheet" href="menu.css">

<div id="nav_bar"></div>

<script src="menu.js"></script>
    <h2>YouTube 影片播放</h2>
    
    <div class="video-container">
        <div id="player"></div>
    </div>

    <div class="status-bar" id="status">正在載入影片...</div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const videoId = 'uc4IVwtGkTc'; 
        let player;

        // 1. 當 YouTube API 準備就緒時會自動觸發此函式
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: videoId,
                playerVars: {
                    'playsinline': 1,
                    'rel': 0,
                    'modestbranding': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // 2. 影片準備好時觸發
        function onPlayerReady(event) {
            document.getElementById('status').innerText = `影片已準備就緒`;
        }

        // 3. 監聽播放狀態改變（純粹更新文字狀態，不儲存任何進度）
        function onPlayerStateChange(event) {
            const statusDiv = document.getElementById('status');
            
            if (event.data == YT.PlayerState.PLAYING) {
                statusDiv.innerText = "影片播放中...";
            } else if (event.data == YT.PlayerState.PAUSED) {
                statusDiv.innerText = "影片已暫停。";
            } else if (event.data == YT.PlayerState.ENDED) {
                statusDiv.innerText = "影片已播放完畢。";
            }
        }
    </script>
</body>
</html>

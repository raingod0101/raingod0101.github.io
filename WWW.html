<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房號聊天室 - 高畫質原圖版</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #e9e9eb; }
        body { font-family: sans-serif; background: #f2f2f7; margin: 0; display: flex; justify-content: center; height: 100vh; }
        #app { width: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        .msg-wrapper { display: flex; flex-direction: column; width: 100%; }
        .msg-wrapper.me { align-items: flex-end; }
        .msg-wrapper.other { align-items: flex-start; }
        .bubble { padding: 10px 14px; border-radius: 18px; max-width: 85%; font-size: 15px; word-wrap: break-word; }
        .me .bubble { background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }
        /* 圖片預覽優化 */
        .bubble img { max-width: 100%; border-radius: 10px; display: block; cursor: zoom-in; transition: transform 0.2s; }
        .bubble img:active { transform: scale(0.98); }
        .input-area { padding: 10px; border-top: 1px solid #eee; display: flex; gap: 8px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        .btn-circle { background: #eee; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        /* 上傳進度條簡易暗示 */
        #loading-toast { position: fixed; top: 20px; background: rgba(0,0,0,0.7); color: white; padding: 10px 20px; border-radius: 20px; display: none; }
    </style>
</head>
<body>

<div id="loading-toast" id="toast">圖片處理中，請稍候...</div>

<div id="app">
    <div id="login-view" style="padding: 40px 20px; text-align: center;">
        <h2>📸 原圖房號聊天室</h2>
        <input type="text" id="room-input" placeholder="房號">
        <input type="text" id="nick-input" placeholder="暱稱">
        <button onclick="handleJoin()" style="width:100%; padding:12px; margin-top:10px; background:var(--me-bg); color:white; border:none; border-radius:8px;">進入</button>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
            <b id="room-title"></b>
            <button onclick="destroyRoom()" id="owner-btn" class="hidden" style="color:red; background:none; border:none;">銷毀</button>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="file" id="img-input" class="hidden" accept="image/*" onchange="sendLargeImage(this)">
            <button class="btn-circle" onclick="document.getElementById('img-input').click()">📷</button>
            <input type="text" id="msg-input" placeholder="輸入訊息..." onkeypress="if(event.key==='Enter') doSend()">
            <button onclick="doSend()" style="background:var(--me-bg); color:white; border:none; padding:10px 20px; border-radius:20px;">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, onDisconnect, serverTimestamp, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk",
        authDomain: "chat-73802.firebaseapp.com",
        databaseURL: "https://chat-73802-default-rtdb.firebaseio.com",
        projectId: "chat-73802",
        storageBucket: "chat-73802.firebasestorage.app",
        messagingSenderId: "274628413625",
        appId: "1:274628413625:web:77499e0bdeab18104bf368",
        measurementId: "G-BP7YV746WV"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);
    let roomID = ""; let myName = "";

    window.handleJoin = async function() {
        roomID = document.getElementById('room-input').value.trim().toUpperCase();
        myName = document.getElementById('nick-input').value.trim() || "匿名";
        if(!roomID) return;

        const roomRef = ref(db, `rooms/${roomID}`);
        const snap = await get(roomRef);
        if(!snap.exists()) await set(ref(db, `rooms/${roomID}/meta`), { owner: uid });
        
        const metaSnap = await get(ref(db, `rooms/${roomID}/meta`));
        if(metaSnap.val()?.owner === uid) document.getElementById('owner-btn').classList.remove('hidden');

        set(ref(db, `rooms/${roomID}/users/${uid}`), { name: myName });
        onDisconnect(ref(db, `rooms/${roomID}/users/${uid}`)).remove();

        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = roomID;
        startChat();
    };

    function startChat() {
        onValue(ref(db, `rooms/${roomID}/msgs`), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(child => {
                const d = child.val();
                const isMe = d.uid === uid;
                const wrapper = document.createElement('div');
                wrapper.className = `msg-wrapper ${isMe ? 'me' : 'other'}`;
                let content = d.type === 'image' ? `<img src="${d.text}" onclick="window.open(this.src)">` : d.text;
                wrapper.innerHTML = `<div style="font-size:11px; color:#888; margin-bottom:2px;">${d.name}</div><div class="bubble">${content}</div>`;
                box.appendChild(wrapper);
            });
            box.scrollTop = box.scrollHeight;
        });
        onValue(ref(db, `rooms/${roomID}/meta`), (s) => { if(!s.exists() && roomID) location.reload(); });
    }

    window.doSend = function() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        push(ref(db, `rooms/${roomID}/msgs`), { uid, name: myName, text: inp.value, type: 'text', ts: serverTimestamp() });
        inp.value = "";
    };

    // --- 核心：傳送大圖邏輯 ---
    window.sendLargeImage = function(input) {
        const file = input.files[0];
        if (!file) return;

        // 限制 10MB，再大 RTDB 真的會炸掉
        if (file.size > 10 * 1024 * 1024) {
            alert("檔案超過 10MB！RTDB 無法承載過大的 Base64 字串，請稍微縮小檔案。");
            return;
        }

        const toast = document.getElementById('loading-toast');
        toast.style.display = 'block';

        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Data = e.target.result;
            
            push(ref(db, `rooms/${roomID}/msgs`), {
                uid, 
                name: myName, 
                text: base64Data, 
                type: 'image', 
                ts: serverTimestamp()
            }).then(() => {
                toast.style.display = 'none';
            }).catch((err) => {
                toast.style.display = 'none';
                alert("傳送失敗：可能是檔案太大超出了 Firebase 單筆資料限制。");
                console.error(err);
            });
        };
        reader.readAsDataURL(file);
        input.value = "";
    };

    window.destroyRoom = function() { if(confirm("銷毀？")) remove(ref(db, `rooms/${roomID}`)); };
</script>
</body>
</html>

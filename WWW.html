<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAINGOD | NBA LIVE TRACKER</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #111111;
            --neon-cyan: #00f2ff;
            --neon-pink: #ff00ff;
            --neon-green: #39ff14;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Orbitron', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: linear-gradient(180deg, #1a1a1a 0%, transparent 100%);
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 2rem;
            color: var(--neon-cyan);
        }

        .status-bar {
            font-size: 0.9rem;
            margin-top: 10px;
            color: #888;
        }

        #score-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1200px;
            padding-bottom: 50px;
        }

        /* 比分卡片樣式 */
        .game-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            position: relative;
            transition: 0.3s;
            overflow: hidden;
        }

        .game-card.live {
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
            animation: breathe 2s infinite;
        }

        @keyframes breathe {
            0% { box-shadow: 0 0 5px var(--neon-green); }
            50% { box-shadow: 0 0 20px var(--neon-green); }
            100% { box-shadow: 0 0 5px var(--neon-green); }
        }

        .game-status {
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .live-tag {
            color: var(--neon-green);
            font-weight: bold;
        }

        .team-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }

        .team-name {
            font-size: 1.2rem;
            font-weight: 500;
        }

        .score {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            color: var(--neon-pink);
        }

        .winner-score {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .loading {
            font-size: 1.5rem;
            color: var(--neon-cyan);
            margin-top: 100px;
        }
    </style>
</head>
<body>

<header>
    <h1>Raingod | NBA Live</h1>
    <div class="status-bar" id="update-timer">數據每 60 秒自動更新一次</div>
</header>

<div id="score-grid">
    <div class="loading">正在連線至 NBA 數據中心...</div>
</div>

<script>
    const API_KEY = "c196fcea75msha9cde45474f6836p1a194cjsn5206adf8fa5d";
    const API_HOST = "api-nba-v1.p.rapidapi.com";

    async function fetchScores() {
        // 抓取今天的比賽 (2026-04-27)
        const today = "2026-04-27"; 
        const url = `https://api-nba-v1.p.rapidapi.com/games?date=${today}`;

        try {
            const response = await fetch(url, {
                method: 'GET',
                headers: {
                    'X-RapidAPI-Key': API_KEY,
                    'X-RapidAPI-Host': API_HOST
                }
            });

            const data = await response.json();
            renderGames(data.response);
            document.getElementById('update-timer').innerText = `最後更新時間: ${new Date().toLocaleTimeString()}`;
        } catch (error) {
            console.error("Fetch Error:", error);
            document.getElementById('score-grid').innerHTML = '<div class="loading">API 抓取失敗，請檢查 Key 額度</div>';
        }
    }

    function renderGames(games) {
        const grid = document.getElementById('score-grid');
        grid.innerHTML = '';

        if (games.length === 0) {
            grid.innerHTML = '<div class="loading">今日暫無賽事</div>';
            return;
        }

        games.forEach(game => {
            const isFinished = game.status.short === "3"; // "3" 通常代表 Finished
            const isLive = game.status.short === "2"; // "2" 通常代表 In Play
            
            const homeScore = game.scores.home.points || 0;
            const visitorScore = game.scores.visitors.points || 0;

            const card = document.createElement('div');
            card.className = `game-card ${isLive ? 'live' : ''}`;

            card.innerHTML = `
                <div class="game-status">
                    <span>${game.status.long}</span>
                    ${isLive ? '<span class="live-tag">● LIVE</span>' : ''}
                </div>
                <div class="team-container">
                    <span class="team-name">${game.teams.visitors.nickname}</span>
                    <span class="score ${visitorScore > homeScore && isFinished ? 'winner-score' : ''}">${visitorScore}</span>
                </div>
                <div class="team-container">
                    <span class="team-name">${game.teams.home.nickname}</span>
                    <span class="score ${homeScore > visitorScore && isFinished ? 'winner-score' : ''}">${homeScore}</span>
                </div>
                <div style="font-size: 0.7rem; color: #555; margin-top: 10px; text-align: right;">
                    Game ID: ${game.id}
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // 初始化與循環
    fetchScores();
    setInterval(fetchScores, 60000); // 1分鐘更新一次
</script>

</body>
</html>

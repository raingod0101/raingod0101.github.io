<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raingod Chat | 核心加密版</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #e9e9eb; --header-h: 60px; }
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; height: 100vh; }
        .hidden { display: none !important; }
        .header { height: var(--header-h); padding: 0 15px; background: #fff; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #fff; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; max-width: 80%; word-wrap: break-word; }
        .me { align-self: flex-end; background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other { align-self: flex-start; background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }
        .input-area { padding: 10px 15px 30px; border-top: 1px solid #eee; display: flex; gap: 8px; background: #fff; }
        input[type="text"], input[type="password"] { padding: 12px; border: 1px solid #ddd; border-radius: 10px; }
    </style>
</head>
<body>
<div id="app">
    <div id="login-view" style="padding: 40px 25px; text-align: center;">
        <h2 style="color: var(--me-bg);">Raingod</h2>
        <input type="text" id="room-input" placeholder="房號" style="width:100%; margin-bottom:10px;">
        <input type="text" id="nick-input" placeholder="暱稱" style="width:100%; margin-bottom:10px;">
        <input type="password" id="admin-pass" placeholder="管理員密碼 (創多房用)" style="width:100%; margin-bottom:20px;">
        <button onclick="handleJoin()" style="width:100%; padding:15px; background:var(--me-bg); color:white; border:none; border-radius:10px; font-weight:bold;">進入/建立房間</button>
        <p id="status" style="font-size:12px; color:red; margin-top:10px;"></p>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <b id="room-title"></b>
            <button onclick="location.reload()" style="border:none; background:none; color:#999;">結束</button>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="輸入訊息..." style="flex:1;">
            <button onclick="doSend()" style="background:var(--me-bg); color:white; border:none; border-radius:10px; padding:0 15px;">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, get, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk",
        authDomain: "chat-73802.firebaseapp.com",
        databaseURL: "https://chat-73802-default-rtdb.firebaseio.com",
        projectId: "chat-73802",
        storageBucket: "chat-73802.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);

    let roomID = ""; let myName = "";

    window.handleJoin = async function() {
        roomID = document.getElementById('room-input').value.trim().toUpperCase();
        myName = document.getElementById('nick-input').value.trim() || "匿名";
        const pass = document.getElementById('admin-pass').value;
        const status = document.getElementById('status');

        if(!roomID) return;

        const roomRef = ref(db, `rooms/${roomID}`);
        const snap = await get(roomRef);

        if(!snap.exists()) {
            // 檢查是否已經創過房 (本地檢查防君子)
            const hasCreated = localStorage.getItem('has_created_room');
            const isFirstRoom = !hasCreated;

            try {
                await set(ref(db, `rooms/${roomID}/meta`), {
                    owner: uid,
                    admin_key: pass, // 交給後端 Rules 比對
                    is_first_room: isFirstRoom
                });
                if(!pass) localStorage.setItem('has_created_room', roomID);
            } catch (e) {
                status.innerText = "權限不足：你已創過房間或密碼錯誤！";
                return;
            }
        }

        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = "房號: " + roomID;
        startChat();
    };

    function startChat() {
        const q = query(ref(db, `rooms/${roomID}/msgs`), limitToLast(50));
        onValue(q, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                const div = document.createElement('div');
                div.className = `bubble ${d.uid === uid ? 'me' : 'other'}`;
                div.innerText = `${d.name}: ${d.text}`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.doSend = function() {
        const inp = document.getElementById('msg-input');
        if(!inp.value) return;
        push(ref(db, `rooms/${roomID}/msgs`), {
            uid, name: myName, text: inp.value, ts: Date.now()
        });
        inp.value = "";
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>除錯模式</title>
</head>
<body>
    <input type="file" id="debug-file" onchange="testUpload(this)">
    <div id="status">狀態：等待上傳...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // 請確保這裡的設定是正確的
        const firebaseConfig = { 
            databaseURL: "https://chat-73802-default-rtdb.firebaseio.com" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.testUpload = (el) => {
            const file = el.files[0];
            const status = document.getElementById('status');
            
            if (!file) return;
            status.innerText = "狀態：正在讀取檔案 " + file.name + " (" + (file.size/1024).toFixed(2) + " KB)";

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    status.innerText = "狀態：嘗試寫入資料庫...";
                    push(ref(db, 'debug_test'), {
                        name: file.name,
                        size: file.size,
                        content: e.target.result // 這一步如果失敗，就是 Base64 太大
                    }).then(() => {
                        status.innerText = "狀態：成功！";
                        alert("傳送成功！");
                    }).catch((err) => {
                        status.innerText = "狀態：Firebase 錯誤 - " + err.message;
                        console.error(err);
                    });
                } catch (err) {
                    status.innerText = "狀態：程式錯誤 - " + err.message;
                }
            };
            reader.readAsDataURL(file);
        };
    </script>
</body>
</html>

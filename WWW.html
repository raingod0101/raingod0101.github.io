<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極速多人蛇 - Firebase 版</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        .ui { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        #score { font-size: 28px; color: #00ff88; }
    </style>
</head>
<body>

    <div class="ui">
        <div id="score">分數: 0</div>
        <div id="status" style="color: #666;">同步中...</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // --- Firebase 配置 ---
        const firebaseConfig = { databaseURL: "https://game-24b43-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 玩家初始化 ---
        let playerName = localStorage.getItem("snakePlayerName") || ("蛇" + Math.floor(Math.random()*1000));
        const myId = Math.random().toString(36).substring(2, 9);
        const myRef = db.ref(`players/${myId}`);
        myRef.onDisconnect().remove(); // 離線立即刪除

        // --- 遊戲設定 ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const WORLD_SIZE = 3000;
        
        let score = 0;
        let otherPlayers = {};
        let snake = {
            x: Math.random() * 2000 + 500,
            y: Math.random() * 2000 + 500,
            angle: Math.random() * Math.PI * 2,
            speed: 4.5,
            radius: 12,
            history: [],
            length: 30,
            color: `hsl(${Math.random() * 360}, 100%, 60%)`
        };

        // --- 監聽遠端玩家 ---
        db.ref("players").on("value", (snapshot) => {
            otherPlayers = snapshot.val() || {};
        });

        // --- 操作與縮放 ---
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let isDragging = false, startX = 0, startY = 0;
        const startInput = (e) => { isDragging = true; startX = e.touches ? e.touches[0].clientX : e.clientX; startY = e.touches ? e.touches[0].clientY : e.clientY; };
        const handleInput = (e) => {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            snake.angle = Math.atan2(clientY - startY, clientX - startX);
        };
        window.addEventListener("mousedown", startInput);
        window.addEventListener("mousemove", handleInput);
        window.addEventListener("mouseup", () => isDragging = false);
        window.addEventListener("touchstart", startInput, {passive: false});
        window.addEventListener("touchmove", (e) => { if(isDragging) e.preventDefault(); handleInput(e); }, {passive: false});

        // --- 核心邏輯 ---
        function resetGame() {
            myRef.remove(); // 死了「立即」從資料庫刪除
            alert("遊戲結束！ 分數: " + score);
            location.reload(); // 重新整理是最快重置所有變數的方法
        }

        // 優化：限制上傳頻率 (節流)
        let lastUpload = 0;
        const UPLOAD_INTERVAL = 50; // 每 50ms 上傳一次 (每秒 20 次)

        function update() {
            snake.x += Math.cos(snake.angle) * snake.speed;
            snake.y += Math.sin(snake.angle) * snake.speed;

            if (snake.x < 0 || snake.x > WORLD_SIZE || snake.y < 0 || snake.y > WORLD_SIZE) {
                resetGame();
                return;
            }

            snake.history.unshift({x: snake.x, y: snake.y});
            if (snake.history.length > snake.length) snake.history.pop();

            // 只在間隔到達時才上傳，且只上傳必要資訊
            const now = Date.now();
            if (now - lastUpload > UPLOAD_INTERVAL) {
                myRef.set({
                    n: playerName,
                    x: Math.round(snake.x), // 取整數減少封包大小
                    y: Math.round(snake.y),
                    a: snake.angle,
                    c: snake.color,
                    h: snake.history.filter((_,i) => i % 2 === 0), // 隔點採樣，身體資料減半
                    s: score
                });
                lastUpload = now;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const offsetX = canvas.width / 2 - snake.x;
            const offsetY = canvas.height / 2 - snake.y;
            ctx.save();
            ctx.translate(offsetX, offsetY);

            // 邊框
            ctx.strokeStyle = "#444";
            ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

            // 畫其他玩家
            for (let id in otherPlayers) {
                if (id === myId) continue;
                const p = otherPlayers[id];
                if (!p.h) continue;

                ctx.strokeStyle = p.c;
                ctx.lineWidth = snake.radius * 1.8;
                ctx.lineCap = "round";
                ctx.globalAlpha = 0.7;
                ctx.beginPath();
                ctx.moveTo(p.h[0].x, p.h[0].y);
                p.h.forEach(pt => ctx.lineTo(pt.x, pt.y));
                ctx.stroke();
                
                ctx.globalAlpha = 1;
                ctx.fillStyle = "white";
                ctx.fillText(p.n, p.x - 10, p.y - 20);
            }

            // 畫自己的蛇
            ctx.strokeStyle = snake.color;
            ctx.lineWidth = snake.radius * 2;
            ctx.lineCap = "round";
            ctx.beginPath();
            snake.history.forEach((pt, i) => i === 0 ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y));
            ctx.stroke();

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>

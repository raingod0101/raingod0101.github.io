<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raingod Pro | Media Perfect</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #f2f2f7; --danger: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: #000; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; -webkit-user-select: none; }
        #app { width: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; height: 100vh; position: relative; }
        
        /* Header */
        .header { height: 60px; padding: 0 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        
        /* Messages */
        .msg-row { display: flex; flex-direction: column; width: 100%; margin-bottom: 5px; }
        .msg-row.me { align-items: flex-end; }
        .msg-row.other { align-items: flex-start; }
        
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; word-break: break-all; max-width: 80%; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; }
        .me .bubble { background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }
        
        /* Media Elements */
        .chat-img { max-width: 100%; border-radius: 10px; display: block; cursor: zoom-in; }
        .audio-player { width: 200px; height: 35px; margin-top: 5px; }
        .file-btn { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 10px; text-decoration: none; color: inherit; font-size: 13px; margin-top: 5px; border: 1px solid rgba(0,0,0,0.1); }
        .me .file-btn { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.3); }
        
        /* Lightbox (圖片放大層) */
        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; cursor: zoom-out; }
        #lightbox img { max-width: 95%; max-height: 80%; border-radius: 5px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #download-link { margin-top: 15px; color: white; text-decoration: none; background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 20px; font-size: 14px; display: none; cursor: pointer; }

        /* Input Area */
        .input-area { padding: 10px 15px 35px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; background: #fff; }
        input[type="text"] { flex: 1; padding: 12px 16px; border: none; background: #f2f2f7; border-radius: 25px; outline: none; font-size: 16px; }
        .hidden { display: none !important; }
        .btn-sm { padding: 6px 12px; border-radius: 8px; border: 1px solid #ddd; background: none; font-size: 12px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="app">
    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
        <a id="download-link" href="#" onclick="event.stopPropagation();">⬇ 保存圖片到裝置</a>
    </div>

    <div id="login-view" style="padding: 40px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 15px;">
        <h2 style="color: var(--me-bg); font-size: 32px; margin: 0;">Raingod Pro</h2>
        <input type="text" id="room-input" placeholder="房號 (必填)">
        <input type="text" id="nick-input" placeholder="你的暱稱">
        <button onclick="handleJoin()" style="padding:16px; background:var(--me-bg); color:white; border:none; border-radius:15px; font-weight:bold; cursor:pointer;">進入 / 建立房間</button>
        <p id="status" style="color:var(--danger); font-size:12px;"></p>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <div><b id="room-title"></b> <small id="online-text"></small></div>
            <div style="display:flex; gap:8px;">
                <button id="del-btn" class="btn-sm hidden" style="color:var(--danger); border-color:var(--danger);" onclick="destroyRoom()">銷毀房間</button>
                <button class="btn-sm" onclick="location.reload()">退出</button>
            </div>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="file" id="file-selector" class="hidden" onchange="sendFile(this)">
            <button onclick="document.getElementById('file-selector').click()" style="font-size:26px; border:none; background:none; cursor:pointer;">📎</button>
            <input type="text" id="msg-input" placeholder="訊息..." onkeypress="if(event.key==='Enter') doSend()">
            <button id="send-btn" onclick="doSend()" style="color:var(--me-bg); font-weight:bold; border:none; background:none; cursor:pointer;">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false; };

    const firebaseConfig = { apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk", databaseURL: "https://chat-73802-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);

    let currentRoom = ""; 
    let myNick = "";

    window.handleJoin = async function() {
        const rInput = document.getElementById('room-input').value.trim().toUpperCase();
        const nInput = document.getElementById('nick-input').value.trim() || "訪客";
        if(!rInput) return;

        const roomRef = ref(db, `rooms/${rInput}`);
        const roomSnap = await get(roomRef);

        if (roomSnap.exists()) {
            startSession(rInput, nInput);
        } else {
            const ownerSnap = await get(ref(db, `owners/${uid}`));
            if (ownerSnap.exists()) {
                const checkRoom = await get(ref(db, `rooms/${ownerSnap.val()}`));
                if (checkRoom.exists()) {
                    document.getElementById('status').innerText = `你已開過房：${ownerSnap.val()}，請先銷毀。`;
                    return;
                }
            }
            await set(ref(db, `rooms/${rInput}/meta`), { owner: uid, ts: serverTimestamp() });
            await set(ref(db, `owners/${uid}`), rInput);
            startSession(rInput, nInput);
        }
    };

    function startSession(r, n) {
        currentRoom = r; myNick = n;
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = r;
        const userRef = ref(db, `rooms/${currentRoom}/users/${uid}`);
        set(userRef, true); onDisconnect(userRef).remove();
        initChat();
    }

    window.doSend = () => {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        const safeText = inp.value.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        push(ref(db, `rooms/${currentRoom}/msgs`), { type: 'text', content: safeText, uid: uid, name: myNick, ts: serverTimestamp() });
        inp.value = "";
    };

    window.sendFile = (el) => {
        const file = el.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            let type = 'file';
            if(file.type.startsWith('image/')) type = 'image';
            if(file.type.startsWith('audio/') || file.name.endsWith('.mp3')) type = 'audio';
            
            // 存入副檔名與正確的 MIME Type
            push(ref(db, `rooms/${currentRoom}/msgs`), { 
                type: type, 
                content: e.target.result, // Data URL
                fileName: file.name, 
                mime: file.type, 
                uid: uid, name: myNick, ts: serverTimestamp() 
            });
        };
        reader.readAsDataURL(file);
    };

    // 關鍵修正：Data URL 轉 Blob 以支援下載
    function dataURLtoBlob(dataurl) {
        var arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
            bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
        while(n--){ u8arr[n] = bstr.charCodeAt(n); }
        return new Blob([u8arr], {type:mime});
    }

    // 放大圖片函式 (新增 Data URL 轉 Blob 下載邏輯)
    window.zoomImg = (src, fileName, mime) => {
        document.getElementById('lightbox-img').src = src;
        const link = document.getElementById('download-link');
        link.style.display = 'inline-block';
        
        // 核心：將 Data URL 轉成 Blob 連結，這樣 download 屬性才有效
        const blob = dataURLtoBlob(src);
        const blobUrl = URL.createObjectURL(blob);
        link.href = blobUrl;
        link.download = fileName || 'image.png'; // 強制使用原本檔名
        
        document.getElementById('lightbox').style.display = 'flex';
    };

    window.recall = (id) => {
        if(confirm("收回此訊息？")) remove(ref(db, `rooms/${currentRoom}/msgs/${id}`));
    };

    window.destroyRoom = async () => {
        if(confirm("⚠ 你是房主，確定要銷毀房間並【抹除你的創房紀錄】嗎？")) {
            const updates = {};
            updates[`/rooms/${currentRoom}`] = null;
            updates[`/owners/${uid}`] = null;
            update(ref(db), updates).then(() => {
                alert("銷毀成功！");
                location.reload();
            }).catch(e => alert("失敗：" + e.message));
        }
    };

    function initChat() {
        onValue(ref(db, `rooms/${currentRoom}/users`), s => document.getElementById('online-text').innerText = `(${s.size || 1}人)`);
        onValue(ref(db, `rooms/${currentRoom}/meta`), s => {
            if(!s.exists()) { alert("房間已被銷毀"); location.reload(); return; }
            if(s.val().owner === uid) document.getElementById('del-btn').classList.remove('hidden');
        });
        onValue(ref(db, `rooms/${currentRoom}/msgs`), snap => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(child => {
                const d = child.val(); if(!d.uid) return;
                const isMe = d.uid === uid;
                let media = "";
                
                if(d.type === 'image') {
                    // 傳送 Data URL、檔名、MIME 給 zoomImg
                    media = `<img src="${d.content}" class="chat-img" onclick="event.stopPropagation(); zoomImg('${d.content}', '${d.fileName}', '${d.mime}')">`;
                } else if(d.type === 'audio') {
                    // 自動偵測 MP3
                    media = `<audio controls controlsList="nodownload" class="audio-player" src="${d.content}"></audio>`;
                } else if(d.type === 'file') {
                    // 關鍵修正：將 Data URL 轉成真正的 Blob 連結，確保檔名正確
                    const uniqueId = `file-${child.key}`;
                    media = `<div class="file-btn" onclick="triggerBlobDownload('${d.content}', '${d.fileName}', '${d.mime}')">
                                📄 ${d.fileName}<br><b>[點擊下載檔案]</b>
                             </div>`;
                } else {
                    media = `<div style="white-space:pre-wrap;font-family:monospace;">${d.content}</div>`;
                }

                const div = document.createElement('div');
                div.className = `msg-row ${isMe ? 'me' : 'other'}`;
                div.innerHTML = `<div style="font-size:10px;color:#999;margin-bottom:3px;padding:0 5px;">${d.name}</div>
                                 <div class="bubble" onclick="${isMe ? `recall('${child.key}')` : ''}">${media}</div>`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    // 關鍵修正：在前端即時轉換 Blob 以進行檔案下載 (確保檔名與副檔名正確)
    window.triggerBlobDownload = (dataurl, fileName, mime) => {
        const blob = dataURLtoBlob(dataurl);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName; // 使用資料庫存儲的正確檔名
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        URL.revokeObjectURL(url);
        document.body.removeChild(a);
    };
</script>
</body>
</html>

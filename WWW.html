<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raingod Pro | Final Media Fix</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #f2f2f7; --danger: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: #000; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; -webkit-user-select: none; }
        #app { width: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; height: 100vh; position: relative; }
        .header { height: 60px; padding: 0 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        .msg-row { display: flex; flex-direction: column; width: 100%; margin-bottom: 5px; }
        .msg-row.me { align-items: flex-end; }
        .msg-row.other { align-items: flex-start; }
        .bubble { padding: 12px; border-radius: 18px; font-size: 15px; word-break: break-all; max-width: 85%; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .me .bubble { background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }
        .chat-img { max-width: 100%; border-radius: 10px; display: block; margin-bottom: 5px; }
        .file-card { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 5px; min-width: 150px; }
        .me .file-card { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.3); }
        .dl-btn { background: var(--me-bg); color: white; border: none; padding: 5px; border-radius: 5px; font-size: 12px; cursor: pointer; text-align: center; }
        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #lightbox img { max-width: 95%; max-height: 80%; object-fit: contain; }
        .input-area { padding: 10px 15px 35px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; background: #fff; }
        input[type="text"] { flex: 1; padding: 12px 16px; border: none; background: #f2f2f7; border-radius: 25px; outline: none; font-size: 16px; }
        .hidden { display: none !important; }
        .btn-sm { padding: 6px 12px; border-radius: 8px; border: 1px solid #ddd; background: none; font-size: 12px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="app">
    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lb-img">
        <div style="margin-top:20px; display:flex; gap:15px;">
            <button class="dl-btn" id="lb-dl" style="padding:10px 20px;">下載此圖片</button>
            <button class="dl-btn" style="padding:10px 20px; background:#666;">關閉</button>
        </div>
    </div>

    <div id="login-view" style="padding: 40px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 15px;">
        <h2 style="color: var(--me-bg); font-size: 30px;">Raingod Pro</h2>
        <input type="text" id="room-input" placeholder="房號">
        <input type="text" id="nick-input" placeholder="暱稱">
        <button onclick="handleJoin()" style="padding:16px; background:var(--me-bg); color:white; border:none; border-radius:15px; font-weight:bold;">進入房間</button>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <div><b id="room-title"></b> <small id="online-text"></small></div>
            <button id="del-btn" class="btn-sm hidden" style="color:var(--danger);" onclick="destroyRoom()">銷毀房間</button>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="file" id="file-selector" class="hidden" onchange="sendFile(this)">
            <button onclick="document.getElementById('file-selector').click()" style="font-size:24px; border:none; background:none;">📎</button>
            <input type="text" id="msg-input" placeholder="輸入訊息..." onkeypress="if(event.key==='Enter') doSend()">
            <button onclick="doSend()" style="color:var(--me-bg); font-weight:bold; border:none; background:none;">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk", databaseURL: "https://chat-73802-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);
    let currentRoom = "", myNick = "";

    window.handleJoin = async () => {
        const r = document.getElementById('room-input').value.trim().toUpperCase();
        const n = document.getElementById('nick-input').value.trim() || "訪客";
        if(!r) return;
        const roomRef = ref(db, `rooms/${r}`);
        const snap = await get(roomRef);
        if(!snap.exists()){
            const oSnap = await get(ref(db, `owners/${uid}`));
            if(oSnap.exists()){ alert("你已有房："+oSnap.val()); return; }
            await set(ref(db, `rooms/${r}/meta`), { owner: uid });
            await set(ref(db, `owners/${uid}`), r);
        }
        currentRoom = r; myNick = n;
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = r;
        initChat();
    };

    window.sendFile = (el) => {
        const file = el.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            push(ref(db, `rooms/${currentRoom}/msgs`), {
                type: file.type.split('/')[0] === 'image' ? 'image' : (file.name.endsWith('.mp3') ? 'audio' : 'file'),
                content: e.target.result,
                fileName: file.name,
                mime: file.type || 'application/octet-stream',
                uid: uid, name: myNick, ts: serverTimestamp()
            });
        };
        reader.readAsDataURL(file);
    };

    // 核心下載函式：將 DataURL 轉成實體 Blob
    window.downloadFile = (dataUrl, fileName, mime) => {
        const parts = dataUrl.split(',');
        const byteString = atob(parts[1]);
        const ab = new ArrayBuffer(byteString.length);
        const ia = new Uint8Array(ab);
        for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
        const blob = new Blob([ab], { type: mime });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = fileName;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(url);
    };

    window.doSend = () => {
        const inp = document.getElementById('msg-input'); if(!inp.value.trim()) return;
        push(ref(db, `rooms/${currentRoom}/msgs`), { type:'text', content: inp.value, uid: uid, name: myNick, ts: serverTimestamp() });
        inp.value = "";
    };

    window.destroyRoom = async () => {
        if(confirm("確定銷毀房間？")){
            const up = {}; up[`/rooms/${currentRoom}`] = null; up[`/owners/${uid}`] = null;
            await update(ref(db), up); location.reload();
        }
    };

    function initChat() {
        onValue(ref(db, `rooms/${currentRoom}/meta`), s => {
            if(!s.exists()){ alert("房間已銷毀"); location.reload(); }
            if(s.val().owner === uid) document.getElementById('del-btn').classList.remove('hidden');
        });
        onValue(ref(db, `rooms/${currentRoom}/msgs`), snap => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(child => {
                const d = child.val(); const isMe = d.uid === uid;
                let body = "";
                if(d.type === 'image'){
                    body = `<img src="${d.content}" class="chat-img" onclick="event.stopPropagation(); showLB('${d.content}','${d.fileName}','${d.mime}')">`;
                } else if(d.type === 'audio'){
                    body = `<div class="file-card">🎵 ${d.fileName}<audio controls src="${d.content}" style="width:100%; height:30px;"></audio>
                            <button class="dl-btn" onclick="downloadFile('${d.content}','${d.fileName}','${d.mime}')">下載音檔</button></div>`;
                } else if(d.type === 'file'){
                    body = `<div class="file-card">📄 ${d.fileName}<button class="dl-btn" onclick="downloadFile('${d.content}','${d.fileName}','${d.mime}')">下載檔案</button></div>`;
                } else {
                    body = `<div>${d.content}</div>`;
                }
                const div = document.createElement('div');
                div.className = `msg-row ${isMe?'me':'other'}`;
                div.innerHTML = `<small style="color:#999; margin:0 5px;">${d.name}</small>
                                 <div class="bubble" onclick="${isMe?`if(confirm('收回？'))remove(ref(db,'rooms/${currentRoom}/msgs/${child.key}'))`:''}">${body}</div>`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.showLB = (src, name, mime) => {
        document.getElementById('lb-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
        document.getElementById('lb-dl').onclick = (e) => { e.stopPropagation(); downloadFile(src, name, mime); };
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raingod 聊天室 | 終極核心版</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #e9e9eb; --danger: #ff3b30; --header-h: 60px; }
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); height: 100vh; }
        .hidden { display: none !important; }
        
        /* 導覽列往上移並優化 */
        .header { height: var(--header-h); padding: 0 15px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; z-index: 100; position: sticky; top: 0; }
        .header b { font-size: 18px; color: #000; font-weight: 800; }

        #chat-box { flex: 1; overflow-y: auto; padding: 10px 15px; display: flex; flex-direction: column; gap: 10px; background: #fff; }
        
        /* 訊息氣泡與日期 */
        .date-divider { text-align: center; font-size: 11px; color: #aaa; margin: 15px 0; font-weight: bold; }
        .msg-wrapper { display: flex; flex-direction: column; width: 100%; margin-bottom: 5px; }
        .msg-wrapper.me { align-items: flex-end; }
        .msg-wrapper.other { align-items: flex-start; }
        .msg-name { font-size: 11px; color: #8e8e93; margin-bottom: 2px; padding: 0 8px; }
        
        .bubble-container { display: flex; align-items: flex-end; gap: 5px; max-width: 85%; }
        .me .bubble-container { flex-direction: row-reverse; }

        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .me .bubble { background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }
        
        .time-info { font-size: 9px; color: #bbb; display: flex; flex-direction: column; align-items: flex-end; min-width: 35px; }
        .read-status { color: var(--me-bg); font-weight: bold; margin-bottom: 2px; }

        .bubble img { max-width: 100%; border-radius: 12px; display: block; cursor: zoom-in; }

        /* 下方輸入區 */
        .input-area { padding: 10px 15px 30px; border-top: 1px solid #eee; display: flex; gap: 8px; align-items: center; background: #fff; }
        #msg-input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 16px; }
        .btn-icon { background: #f0f0f0; border: none; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; font-size: 20px; flex-shrink: 0; }
        .btn-send { background: var(--me-bg); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        #photo-modal { display: none; position: fixed; z-index: 999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        #modal-img { max-width: 98%; max-height: 98%; }
        #loading-toast { position: fixed; top: 40%; background: rgba(0,0,0,0.8); color: white; padding: 12px 25px; border-radius: 25px; z-index: 1000; display: none; }
    </style>
</head>
<body>

<div id="loading-toast">處理中...</div>
<div id="photo-modal" onclick="this.style.display='none'"><img id="modal-img"></div>

<div id="app">
    <div id="login-view" style="padding: 50px 20px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center;">
        <h2 style="font-size: 28px; color: var(--me-bg);">Raingod Chat</h2>
        <p style="color: #888; margin-bottom: 30px;">一機一房 | 原圖傳輸 | 限50則</p>
        <input type="text" id="room-input" placeholder="房號 (例: 123)" style="width: 85%; padding: 15px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px;">
        <input type="text" id="nick-input" placeholder="暱稱" style="width: 85%; padding: 15px; margin-bottom: 30px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px;">
        <button onclick="handleJoin()" style="width: 90%; padding: 16px; background: var(--me-bg); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 18px;">進入</button>
        <p id="my-uid" style="font-size: 10px; color: #ccc; margin-top: 20px;"></p>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <b id="room-title">ROOM</b>
            <div style="display: flex; gap: 8px; align-items: center;">
                <input type="text" id="rename-box" style="width:50px; font-size:10px; border:1px solid #ddd;" onchange="updateName(this.value)">
                <button id="owner-btn" class="hidden" onclick="destroyRoom()" style="color:var(--danger); border:none; background:none; font-weight:bold; font-size:12px;">銷毀</button>
                <button onclick="location.reload()" style="color:#aaa; border:none; background:none; font-size:12px;">登出</button>
            </div>
        </div>
        
        <div id="chat-box"></div>

        <div class="input-area">
            <input type="file" id="img-input" class="hidden" accept="image/*" onchange="sendImg(this)">
            <button class="btn-icon" onclick="document.getElementById('img-input').click()">📷</button>
            <input type="text" id="msg-input" placeholder="輸入訊息..." onkeypress="if(event.key==='Enter') doSend()">
            <button class="btn-send" onclick="doSend()">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, onDisconnect, serverTimestamp, get, update, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk",
        authDomain: "chat-73802.firebaseapp.com",
        databaseURL: "https://chat-73802-default-rtdb.firebaseio.com",
        projectId: "chat-73802",
        storageBucket: "chat-73802.firebasestorage.app",
        messagingSenderId: "274628413625",
        appId: "1:274628413625:web:77499e0bdeab18104bf368",
        measurementId: "G-BP7YV746WV"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- 修改這裡：你的專屬 UID ---
    const MY_ADMIN_ID = "u6g07qsm"; 

    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);
    document.getElementById('my-uid').innerText = "DEVICE ID: " + uid;

    let roomID = ""; let myName = ""; let lastTime = 0;

    window.handleJoin = async function() {
        roomID = document.getElementById('room-input').value.trim().toUpperCase();
        myName = document.getElementById('nick-input').value.trim() || "User";
        if(!roomID) return;

        // 檢查是否創多房 (管理員除外)
        if(uid !== MY_ADMIN_ID) {
            const allSnap = await get(ref(db, `rooms`));
            if(allSnap.exists()){
                const data = allSnap.val();
                for(let r in data){
                    if(data[r].meta?.owner === uid && r !== roomID) return alert("你已在別處創房: " + r);
                }
            }
        }

        const roomRef = ref(db, `rooms/${roomID}`);
        const snap = await get(roomRef);
        if(!snap.exists()) await set(ref(db, `rooms/${roomID}/meta`), { owner: uid });

        if((await get(ref(db, `rooms/${roomID}/meta`))).val()?.owner === uid) {
            document.getElementById('owner-btn').classList.remove('hidden');
        }

        set(ref(db, `rooms/${roomID}/users/${uid}`), { name: myName });
        onDisconnect(ref(db, `rooms/${roomID}/users/${uid}`)).remove();

        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = roomID;
        document.getElementById('rename-box').value = myName;
        startChat();
    };

    function startChat() {
        const q = query(ref(db, `rooms/${roomID}/msgs`), limitToLast(50));
        let lastDate = "";
        onValue(q, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = ""; lastDate = "";
            snap.forEach(c => {
                const d = c.val();
                const isMe = d.uid === uid;
                const dt = new Date(d.ts);
                const dStr = dt.toLocaleDateString();
                const tStr = dt.getHours().toString().padStart(2,'0') + ":" + dt.getMinutes().toString().padStart(2,'0');

                if(dStr !== lastDate) {
                    const div = document.createElement('div');
                    div.className = "date-divider"; div.innerText = dStr;
                    box.appendChild(div); lastDate = dStr;
                }

                const wrap = document.createElement('div');
                wrap.className = `msg-wrapper ${isMe ? 'me' : 'other'}`;
                let con = d.type === 'image' ? `<img src="${d.text}" onclick="showImg('${c.key}')" id="img-${c.key}">` : d.text;
                wrap.innerHTML = `<div class="msg-name">${d.name}</div><div class="bubble-container"><div class="bubble">${con}</div><div class="time-info">${isMe?'<span class="read-status">已讀</span>':''}<span>${tStr}</span></div></div>`;
                box.appendChild(wrap);
            });
            box.scrollTop = box.scrollHeight;
        });
        onValue(ref(db, `rooms/${roomID}/meta`), s => { if(!s.exists()) location.reload(); });
    }

    async function sendCore(payload) {
        if(uid !== MY_ADMIN_ID && Date.now() - lastTime < 3000) return alert("太快了 (3s冷卻)");
        lastTime = Date.now();
        const mRef = ref(db, `rooms/${roomID}/msgs`);
        await push(mRef, payload);
        const s = await get(mRef);
        if(s.exists() && Object.keys(s.val()).length > 50) {
            remove(ref(db, `rooms/${roomID}/msgs/${Object.keys(s.val()).sort()[0]}`));
        }
    }

    window.doSend = () => {
        const i = document.getElementById('msg-input');
        if(!i.value.trim()) return;
        sendCore({ uid, name: myName, text: i.value, type: 'text', ts: Date.now() });
        i.value = "";
    };

    window.sendImg = (inp) => {
        const f = inp.files[0];
        if(!f || f.size > 10 * 1024 * 1024) return alert("限10MB");
        document.getElementById('loading-toast').style.display = 'block';
        const r = new FileReader();
        r.onload = (e) => {
            sendCore({ uid, name: myName, text: e.target.result, type: 'image', ts: Date.now() })
            .then(() => document.getElementById('loading-toast').style.display='none');
        };
        r.readAsDataURL(f);
        inp.value = "";
    };

    window.showImg = (k) => {
        document.getElementById('modal-img').src = document.getElementById('img-'+k).src;
        document.getElementById('photo-modal').style.display = 'flex';
    };

    window.updateName = (v) => { if(v.trim()) update(ref(db, `rooms/${roomID}/users/${uid}`), {name: v}); };
    window.destroyRoom = () => { if(confirm("銷毀？")) remove(ref(db, `rooms/${roomID}`)); };
</script>
</body>
</html>

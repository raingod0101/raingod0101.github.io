<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>多人蛇：終極穩定版</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        .ui-container { position: absolute; top: 20px; left: 20px; right: 20px; pointer-events: none; z-index: 10; }
        #score-board { font-size: 24px; color: #00ff88; font-weight: bold; }
        .leaderboard { position: absolute; top: 0; right: 0; background: rgba(0,0,0,0.7); padding: 12px; border-radius: 8px; border: 1px solid #444; min-width: 150px; }
        .lb-item { font-size: 14px; display: flex; justify-content: space-between; margin: 4px 0; }
        .is-me { color: #00ff88; font-weight: bold; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .menu-box { background: #1a1a1a; padding: 30px; border-radius: 15px; text-align: center; border: 2px solid #00ff88; width: 300px; }
        input[type="text"] { padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #444; width: 100%; margin-bottom: 20px; text-align: center; background: #222; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; font-size: 18px; background: #00ff88; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="menu-box">
            <h2 id="status-title">多人大冒險</h2>
            <p id="death-stat" style="color:#00ff88; display:none;">上次分數: <span id="final-score">0</span></p>
            <input type="text" id="playerNameInput" maxlength="15" placeholder="你的暱稱">
            <button id="startBtn">開始狩獵</button>
        </div>
    </div>

    <div class="ui-container">
        <div id="score-board">SCORE: 0</div>
        <div class="leaderboard"><div id="lb-list"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const config = { databaseURL: "https://game-24b43-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        
        // 使用更穩定的 ID
        const myId = Math.random().toString(36).substring(2, 11);
        const myRef = db.ref(`snakes/${myId}`);
        const allRef = db.ref("snakes");
        const foodRef = db.ref("foods");

        // 強制在網頁關閉或重新整理時刪除資料 (解決幽靈蛇)
        myRef.onDisconnect().remove();

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const WORLD = 3000;
        
        let isAlive = false;
        let others = {};
        let foods = {};
        let me = { x: WORLD/2, y: WORLD/2, score: 0, history: [], name: "" };

        // 啟動按鈕
        const overlay = document.getElementById("overlay");
        const nameInput = document.getElementById("playerNameInput");
        const startBtn = document.getElementById("startBtn");

        startBtn.onclick = () => {
            let n = nameInput.value.trim() || "無名蛇";
            // 檢查重複名
            if (Object.values(others).some(s => s.n === n)) n += "_" + Math.floor(Math.random()*99);
            
            me = {
                x: Math.random()*(WORLD-400)+200, 
                y: Math.random()*(WORLD-400)+200,
                angle: Math.random()*Math.PI*2, 
                speed: 6,
                history: [], 
                len: 30, 
                score: 0,
                color: `hsl(${Math.random()*360}, 100%, 50%)`,
                name: n,
                protected: true
            };
            
            // 確保先同步再開始畫 (解決看不到自己的問題)
            myRef.set({ n: me.name, c: me.color, x: me.x, y: me.y, s: 0, p: true }).then(() => {
                isAlive = true;
                overlay.style.display = "none";
                setTimeout(() => me.protected = false, 3000);
            });
        };

        function die() {
            if(!isAlive) return;
            isAlive = false;
            myRef.remove(); // 死亡立即刪除
            
            document.getElementById("status-title").innerText = "你被吃掉了！";
            document.getElementById("final-score").innerText = Math.floor(me.score);
            document.getElementById("death-stat").style.display = "block";
            overlay.style.display = "flex";
        }

        // 監聽 Firebase
        allRef.on("value", snap => { others = snap.val() || {}; });
        foodRef.on("value", snap => { foods = snap.val() || {}; });

        let targetAngle = 0;
        window.addEventListener("mousemove", e => {
            if(isAlive) targetAngle = Math.atan2(e.clientY - window.innerHeight/2, e.clientX - window.innerWidth/2);
        });

        function update() {
            if(!isAlive) return;

            let diff = targetAngle - me.angle;
            while(diff < -Math.PI) diff += Math.PI*2;
            while(diff > Math.PI) diff -= Math.PI*2;
            me.angle += diff * 0.15;
            
            me.x += Math.cos(me.angle) * me.speed;
            me.y += Math.sin(me.angle) * me.speed;

            // 邊界檢查
            if (me.x<0 || me.x>WORLD || me.y<0 || me.y>WORLD) { die(); return; }

            // 碰撞檢測 (修正看不到自己導致的 undefined 錯誤)
            if(!me.protected) {
                for(let id in others) {
                    if(id === myId) continue;
                    const o = others[id];
                    if(!o.h) continue;
                    const thick = Math.min(50, 18 + (o.s||0)/80);
                    for(let i=0; i<o.h.length; i++) {
                        if(Math.hypot(me.x - o.h[i].x, me.y - o.h[i].y) < thick/2 + 5) {
                            die(); return;
                        }
                    }
                }
            }

            me.history.unshift({x: Math.round(me.x), y: Math.round(me.y)});
            if(me.history.length > me.len) me.history.pop();

            // 吃食物
            for(let fId in foods) {
                let f = foods[fId];
                if(Math.hypot(me.x - f.x, me.y - f.y) < 30) {
                    foodRef.child(fId).remove();
                    me.score += f.v || 1;
                    me.len += 0.5;
                    document.getElementById("score-board").innerText = "SCORE: " + Math.floor(me.score);
                }
            }

            // 同步到雲端
            myRef.update({
                x: Math.round(me.x), y: Math.round(me.y),
                s: me.score, h: me.history.filter((_,i)=>i%2===0),
                p: me.protected
            });
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            let zoom = Math.min(window.innerWidth, window.innerHeight) / 1000;

            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.scale(zoom, zoom);
            ctx.translate(-me.x, -me.y);

            // 背景與邊界
            ctx.fillStyle = "#0a0a0a"; ctx.fillRect(0,0, WORLD, WORLD);
            ctx.strokeStyle = "#ff0044"; ctx.lineWidth = 10; ctx.strokeRect(0,0, WORLD, WORLD);

            // 畫食物
            for(let fId in foods) {
                let f = foods[fId];
                ctx.fillStyle = f.c;
                ctx.beginPath(); ctx.arc(f.x, f.y, 8, 0, Math.PI*2); ctx.fill();
            }

            // 畫蛇的通用函式
            const drawSnake = (data, isMe) => {
                const hist = isMe ? me.history : data.h;
                if(!hist || hist.length < 2) return;
                
                const thick = Math.min(50, 18 + (data.s||0)/80);
                ctx.save();
                if(data.p) ctx.globalAlpha = 0.3;
                
                ctx.beginPath();
                ctx.strokeStyle = isMe ? me.color : data.c;
                ctx.lineWidth = thick;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
                ctx.moveTo(hist[0].x, hist[0].y);
                hist.forEach(p => ctx.lineTo(p.x, p.y));
                ctx.stroke();

                // 畫名字 (解決 undefined 問題)
                ctx.globalAlpha = 1;
                ctx.fillStyle = "#fff";
                ctx.font = "bold 20px Arial";
                ctx.textAlign = "center";
                ctx.fillText(data.n || (isMe ? me.name : "未知"), hist[0].x, hist[0].y - thick);
                ctx.restore();
            };

            for(let id in others) if(id !== myId) drawSnake(others[id], false);
            if(isAlive) drawSnake(me, true);

            ctx.restore();
            
            // 排行榜更新
            const sorted = Object.values(others).sort((a,b)=>b.s-a.s).slice(0,5);
            document.getElementById("lb-list").innerHTML = sorted.map(s => 
                `<div class="lb-item"><span>${s.n||'Loading'}</span><span>${Math.floor(s.s||0)}</span></div>`
            ).join('');

            requestAnimationFrame(draw);
        }

        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.onresize();
        setInterval(update, 1000/60);
        draw();
    </script>
</body>
</html>

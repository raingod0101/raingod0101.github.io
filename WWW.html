<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raingod Ultra Chat</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; background: #e5e5ea; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 95%; max-width: 500px; background: white; display: flex; flex-direction: column; height: 96vh; margin-top: 2vh; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .hidden { display: none !important; }
        
        .header { height: 60px; padding: 0 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        
        .bubble { padding: 12px 16px; border-radius: 18px; font-size: 15px; max-width: 100%; word-break: break-all; position: relative; }
        .me .bubble { background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }

        /* 多媒體樣式 */
        .chat-img { max-width: 100%; border-radius: 10px; cursor: zoom-in; margin-top: 5px; }
        .chat-audio { width: 100%; height: 35px; margin-top: 5px; }
        .download-btn { display: inline-block; margin-top: 8px; padding: 6px 12px; background: rgba(0,0,0,0.1); border-radius: 5px; text-decoration: none; color: inherit; font-size: 12px; font-weight: bold; border: 1px solid #ccc; }
        .me .download-btn { background: rgba(255,255,255,0.2); border-color: #fff; }

        /* 程式碼預覽樣式 */
        pre { background: #2d2d2d; color: #ccc; padding: 10px; border-radius: 8px; overflow-x: auto; font-family: monospace; font-size: 13px; margin: 5px 0; }

        .input-area { padding: 10px 15px 30px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border: none; background: #f2f2f7; border-radius: 20px; outline: none; }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="app">
    <div id="login-view" style="padding: 40px; text-align: center; flex:1; display:flex; flex-direction:column; justify-content:center;">
        <h2 style="color: var(--me-bg);">Raingod Ultra</h2>
        <input type="text" id="room-input" placeholder="房號">
        <input type="text" id="nick-input" placeholder="暱稱" style="margin:10px 0;">
        <button onclick="handleJoin()" style="padding:15px; background:var(--me-bg); color:white; border:none; border-radius:12px; font-weight:bold;">進入房間</button>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <b id="room-title">ROOM</b>
            <button onclick="location.reload()" style="border:none; background:none; color:#666;">退出</button>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="file" id="file-selector" class="hidden" onchange="sendFile(this)">
            <button onclick="document.getElementById('file-selector').click()" style="font-size:24px; border:none; background:none;">📎</button>
            <input type="text" id="msg-input" placeholder="訊息或程式碼..." onkeypress="if(event.key==='Enter') doSend()">
            <button onclick="doSend()" style="color:var(--me-bg); font-weight:bold; border:none; background:none;">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // 禁止 F12 和常用檢查工具
    document.onkeydown = (e) => {
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74))) return false;
    };

    const firebaseConfig = { apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk", databaseURL: "https://chat-73802-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);
    let roomID = ""; let myName = ""; let msgLog = [];

    window.handleJoin = async () => {
        roomID = document.getElementById('room-input').value.trim().toUpperCase();
        myName = document.getElementById('nick-input').value.trim() || "User";
        if(!roomID) return;
        const snap = await get(ref(db, `rooms/${roomID}`));
        if(!snap.exists()) {
            await update(ref(db), { [`rooms/${roomID}/meta`]: { owner: uid }, [`owners/${uid}`]: roomID });
        }
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = roomID;
        onValue(ref(db, `rooms/${roomID}/msgs`), renderMsgs);
    };

    window.doSend = () => {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        
        // 防刷限制：3秒內只能傳1則
        const now = Date.now();
        if(msgLog.length > 0 && now - msgLog[msgLog.length-1] < 3000) return alert("傳太快了！");
        msgLog.push(now);

        // 偵測是否為程式碼 (簡單判斷是否包含常見括號或關鍵字)
        const isCode = /[{};[\]]/.test(inp.value) || inp.value.includes('function') || inp.value.includes('var ');
        push(ref(db, `rooms/${roomID}/msgs`), { 
            type: isCode ? 'code' : 'text', 
            content: inp.value, uid, name: myName, ts: serverTimestamp() 
        });
        inp.value = "";
    };

    window.sendFile = (el) => {
        const file = el.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            let type = 'file';
            if(file.type.startsWith('image/')) type = 'image';
            if(file.type.startsWith('audio/')) type = 'audio';
            push(ref(db, `rooms/${roomID}/msgs`), { 
                type, content: e.target.result, fileName: file.name, uid, name: myName, ts: serverTimestamp() 
            });
        };
        reader.readAsDataURL(file);
    };

    function renderMsgs(snap) {
        const box = document.getElementById('chat-box'); box.innerHTML = "";
        snap.forEach(c => {
            const d = c.val(); if(!d) return;
            const isMe = d.uid === uid;
            let html = "";
            
            if(d.type === 'image') html = `<img src="${d.content}" class="chat-img" onclick="window.open('${d.content}')">`;
            else if(d.type === 'audio') html = `<audio controls class="chat-audio"><source src="${d.content}"></audio>`;
            else if(d.type === 'file') html = `📁 ${d.fileName}<br><a href="${d.content}" download="${d.fileName}" class="download-btn">點此下載檔案</a>`;
            else if(d.type === 'code') html = `<pre><code>${d.content.replace(/</g, "&lt;")}</code></pre>`;
            else html = d.content;

            const row = document.createElement('div');
            row.className = `msg-row ${isMe ? 'me' : 'other'}`;
            row.innerHTML = `<div style="font-size:10px;color:#888;margin-bottom:2px;">${d.name}</div>
                             <div class="bubble">${html}</div>`;
            box.appendChild(row);
        });
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>

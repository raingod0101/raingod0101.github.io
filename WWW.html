<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raingod Pro | 極致權限版</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #f2f2f7; --danger: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: #000; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; height: 100vh; }
        .header { height: 60px; padding: 0 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        
        .msg-row { display: flex; flex-direction: column; width: 100%; }
        .msg-row.me { align-items: flex-end; }
        .msg-row.other { align-items: flex-start; }
        
        .bubble { padding: 12px 16px; border-radius: 18px; font-size: 15px; word-break: break-all; max-width: 75%; position: relative; cursor: pointer; }
        .me .bubble { background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }

        .chat-img { max-width: 100%; border-radius: 8px; margin-bottom: 5px; display: block; }
        audio { width: 200px; margin-top: 5px; }
        .file-box { display: block; background: rgba(0,0,0,0.1); padding: 8px; border-radius: 8px; text-decoration: none; color: inherit; font-size: 12px; margin-top: 5px; }
        
        .input-area { padding: 10px 15px 30px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border: none; background: #f2f2f7; border-radius: 20px; outline: none; }
        .hidden { display: none !important; }
        .btn-sm { padding: 5px 10px; border-radius: 5px; border: 1px solid #ddd; background: none; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="app">
    <div id="login-view" style="padding: 40px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center;">
        <h2 style="color: var(--me-bg);">Raingod Pro</h2>
        <input type="text" id="room-input" placeholder="房號">
        <input type="text" id="nick-input" placeholder="暱稱" style="margin: 10px 0;">
        <button onclick="handleJoin()" style="padding:15px; background:var(--me-bg); color:white; border:none; border-radius:10px; font-weight:bold;">進入/建立房間</button>
        <p id="status" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <div><b id="room-title"></b> <small id="online-text"></small></div>
            <div style="display:flex; gap:5px;">
                <button id="del-btn" class="btn-sm hidden" style="color:red; border-color:red;" onclick="destroyRoom()">銷毀房間</button>
                <button class="btn-sm" onclick="location.reload()">離開</button>
            </div>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="file" id="file-selector" class="hidden" onchange="sendFile(this)">
            <button onclick="document.getElementById('file-selector').click()" style="font-size:24px; border:none; background:none;">📎</button>
            <input type="text" id="msg-input" placeholder="訊息..." onkeypress="if(event.key==='Enter') doSend()">
            <button onclick="doSend()" style="color:var(--me-bg); font-weight:bold; border:none; background:none;">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // 防 F12
    document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false; };

    const firebaseConfig = { apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk", databaseURL: "https://chat-73802-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);

    let currentRoom = ""; 
    let myNick = "";

    // 進入/建立房間邏輯
    window.handleJoin = async function() {
        const rInput = document.getElementById('room-input').value.trim().toUpperCase();
        const nInput = document.getElementById('nick-input').value.trim() || "訪客";
        if(!rInput) return;

        const roomRef = ref(db, `rooms/${rInput}`);
        const roomSnap = await get(roomRef);

        if (roomSnap.exists()) {
            // 房間存在 -> 無條件進入
            startSession(rInput, nInput);
        } else {
            // 房間不存在 -> 檢查此裝置是否已創過房
            const ownerRef = ref(db, `owners/${uid}`);
            const ownerSnap = await get(ownerRef);
            
            if (ownerSnap.exists()) {
                // 檢查他創的房是否還活著
                const oldRoomSnap = await get(ref(db, `rooms/${ownerSnap.val()}`));
                if (oldRoomSnap.exists()) {
                    document.getElementById('status').innerText = `你已擁有房間: ${ownerSnap.val()}，一人限創一房。`;
                    return;
                }
            }

            // 准許創房
            const updates = {};
            updates[`rooms/${rInput}/meta`] = { owner: uid, ts: serverTimestamp() };
            updates[`owners/${uid}`] = rInput;
            await update(ref(db), updates);
            startSession(rInput, nInput);
        }
    };

    function startSession(r, n) {
        currentRoom = r;
        myNick = n;
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = r;
        
        const userRef = ref(db, `rooms/${currentRoom}/users/${uid}`);
        set(userRef, true);
        onDisconnect(userRef).remove();
        initChat();
    }

    // 傳送訊息
    window.doSend = () => {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        // 強制轉碼防止程式碼預覽
        const content = inp.value.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        push(ref(db, `rooms/${currentRoom}/msgs`), {
            type: 'text', content: content, uid: uid, name: myNick, ts: serverTimestamp()
        });
        inp.value = "";
    };

    // 傳送檔案
    window.sendFile = (el) => {
        const file = el.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            let type = 'file';
            if(file.type.startsWith('image/')) type = 'image';
            if(file.type.startsWith('audio/')) type = 'audio';
            push(ref(db, `rooms/${currentRoom}/msgs`), {
                type: type, content: e.target.result, fileName: file.name, uid: uid, name: myNick, ts: serverTimestamp()
            });
        };
        reader.readAsDataURL(file);
    };

    // 收回功能 (修復版)
    window.recall = (msgId) => {
        if(confirm("確定要收回這則訊息嗎？")) {
            remove(ref(db, `rooms/${currentRoom}/msgs/${msgId}`));
        }
    };

    // 銷毀功能 (Owner版)
    window.destroyRoom = async () => {
        if(confirm("⚠ 確定要銷毀整個房間？此動作不可逆！")) {
            const updates = {};
            updates[`rooms/${currentRoom}`] = null;
            updates[`owners/${uid}`] = null;
            await update(ref(db), updates);
            location.reload();
        }
    };

    function initChat() {
        // 監聽在線人數
        onValue(ref(db, `rooms/${currentRoom}/users`), s => {
            document.getElementById('online-text').innerText = `(${s.size || 1}人)`;
        });

        // 監聽房間狀態與權限
        onValue(ref(db, `rooms/${currentRoom}/meta`), s => {
            if(!s.exists()) { alert("房間已不存在"); location.reload(); return; }
            if(s.val().owner === uid) document.getElementById('del-btn').classList.remove('hidden');
        });

        // 監聽訊息
        onValue(ref(db, `rooms/${currentRoom}/msgs`), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(child => {
                const d = child.val();
                const isMe = d.uid === uid;
                const time = d.ts ? new Date(d.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "";
                
                let inner = "";
                if(d.type === 'image') inner = `<img src="${d.content}" class="chat-img" onclick="window.open('${d.content}')">`;
                else if(d.type === 'audio') inner = `<audio controls src="${d.content}"></audio>`;
                else if(d.type === 'file') inner = `<a href="${d.content}" download="${d.fileName}" class="file-box">📄 ${d.fileName}<br><b>點擊下載</b></a>`;
                else inner = `<div style="white-space:pre-wrap;">${d.content}</div>`;

                const row = document.createElement('div');
                row.className = `msg-row ${isMe ? 'me' : 'other'}`;
                row.innerHTML = `
                    <div style="font-size:10px; color:#999; margin-bottom:2px;">${d.name}</div>
                    <div style="display:flex; align-items:flex-end; gap:5px; ${isMe?'flex-direction:row-reverse':''}">
                        <div class="bubble" onclick="${isMe ? `recall('${child.key}')` : ''}">${inner}</div>
                        <span style="font-size:9px; color:#ccc;">${time}</span>
                    </div>
                `;
                box.appendChild(row);
            });
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>

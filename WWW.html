<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極速連線蛇 V3 - 高頻同步版</title>
    <style>
        body { margin: 0; background: #000; color: #0f8; font-family: monospace; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        .ui { position: absolute; top: 10px; left: 10px; pointer-events: none; z-index: 100; background: rgba(0,0,0,0.5); padding: 10px; }
    </style>
</head>
<body>

    <div class="ui">
        <div>分數: <span id="score">0</span></div>
        <div id="status">連線中...</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://game-24b43-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const WORLD_SIZE = 3000;
        const myId = Math.random().toString(36).substring(2, 9);
        const myRef = db.ref(`players/${myId}`);
        const playersRef = db.ref("players");

        let score = 0;
        let others = {}; // 存放其他玩家的本地實例

        // --- 自己的蛇資料 ---
        let snake = {
            x: Math.random() * 2000 + 500,
            y: Math.random() * 2000 + 500,
            angle: 0,
            speed: 5,
            history: [],
            length: 20,
            color: `hsl(${Math.random() * 360}, 100%, 50%)`,
            name: localStorage.getItem("snakePlayerName") || "Player"
        };

        // --- 監聽玩家加入與離開 (最快同步方式) ---
        playersRef.on("child_added", (snap) => {
            if (snap.key !== myId) others[snap.key] = snap.val();
        });
        playersRef.on("child_changed", (snap) => {
            if (snap.key !== myId) others[snap.key] = snap.val();
        });
        playersRef.on("child_removed", (snap) => {
            delete others[snap.key];
        });
        myRef.onDisconnect().remove();

        // --- 操控與更新 ---
        window.addEventListener("mousemove", e => {
            const dx = e.clientX - window.innerWidth / 2;
            const dy = e.clientY - window.innerHeight / 2;
            snake.angle = Math.atan2(dy, dx);
        });
        window.addEventListener("touchmove", e => {
            const dx = e.touches[0].clientX - window.innerWidth / 2;
            const dy = e.touches[0].clientY - window.innerHeight / 2;
            snake.angle = Math.atan2(dy, dx);
        }, { passive: false });

        function update() {
            // 自己的移動
            snake.x += Math.cos(snake.angle) * snake.speed;
            snake.y += Math.sin(snake.angle) * snake.speed;
            
            snake.history.unshift({x: snake.x, y: snake.y});
            if (snake.history.length > snake.length) snake.history.pop();

            // 邊界判定
            if (snake.x < 0 || snake.x > WORLD_SIZE || snake.y < 0 || snake.y > WORLD_SIZE) {
                myRef.remove();
                alert("Game Over!");
                location.reload();
            }

            // 這裡極其重要：只上傳最核心的座標與當前軌跡樣本
            // 不要在 history 裡放幾百個點，我們只傳前 15 個點來顯示頭部流暢度
            myRef.set({
                x: Math.round(snake.x),
                y: Math.round(snake.y),
                a: snake.angle,
                c: snake.color,
                h: snake.history.slice(0, 15), // 只傳最新的一小段，減少 90% 流量
                n: snake.name
            });
        }

        function draw() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const camX = canvas.width / 2 - snake.x;
            const camY = canvas.height / 2 - snake.y;
            ctx.save();
            ctx.translate(camX, camY);

            // 畫邊界
            ctx.strokeStyle = "#222";
            ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

            // 畫其他玩家 (直接從記憶體中的 others 讀取)
            for (let id in others) {
                const p = others[id];
                if (!p.h) continue;
                ctx.beginPath();
                ctx.lineWidth = 20;
                ctx.lineCap = "round";
                ctx.strokeStyle = p.c;
                ctx.moveTo(p.h[0].x, p.h[0].y);
                p.h.forEach(pt => ctx.lineTo(pt.x, pt.y));
                ctx.stroke();
                ctx.fillStyle = "#fff";
                ctx.fillText(p.n, p.x, p.y - 20);
            }

            // 畫自己
            ctx.beginPath();
            ctx.lineWidth = 20;
            ctx.lineCap = "round";
            ctx.strokeStyle = snake.color;
            ctx.moveTo(snake.history[0].x, snake.history[0].y);
            snake.history.forEach(pt => ctx.lineTo(pt.x, pt.y));
            ctx.stroke();

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        loop();
        document.getElementById("status").innerText = "連線成功：ID " + myId;
    </script>
</body>
</html>

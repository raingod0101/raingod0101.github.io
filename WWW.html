<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>多人蛇：修正重複與刪除版</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        
        .ui-container { position: absolute; top: 20px; left: 20px; right: 20px; pointer-events: none; z-index: 10; }
        #score-board { font-size: 24px; color: #00ff88; font-weight: bold; }
        .leaderboard { 
            position: absolute; top: 0; right: 0; background: rgba(0,0,0,0.7); 
            padding: 12px; border-radius: 8px; border: 1px solid #444; min-width: 150px; 
        }
        .lb-item { font-size: 14px; display: flex; justify-content: space-between; margin: 4px 0; }
        .is-me { color: #00ff88; font-weight: bold; }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .menu-box { 
            background: #1a1a1a; padding: 30px; border-radius: 15px; text-align: center; 
            border: 2px solid #00ff88; width: 300px;
        }
        #final-score-display { font-size: 18px; color: #00ff88; margin-bottom: 15px; display: none; }
        
        input[type="text"] { 
            padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #444; 
            width: 100%; margin-bottom: 20px; text-align: center; background: #222; color: #fff;
            box-sizing: border-box;
        }
        
        button { 
            width: 100%; padding: 12px; font-size: 18px; background: #00ff88; color: #000; 
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        #joystick-base {
            position: absolute; bottom: 60px; left: 60px; width: 100px; height: 100px;
            background: rgba(255,255,255,0.1); border-radius: 50%; display: none; z-index: 200;
        }
        #joystick-stick {
            position: absolute; top: 25px; left: 25px; width: 50px; height: 50px;
            background: rgba(255,255,255,0.3); border-radius: 50%;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="menu-box">
            <h1 id="status-title">SLITHER</h1>
            <div id="final-score-display">SCORE: <span id="final-score">0</span></div>
            <input type="text" id="playerNameInput" maxlength="15" placeholder="輸入名字 (限15字)">
            <button id="startBtn">進入遊戲</button>
        </div>
    </div>

    <div id="joystick-base"><div id="joystick-stick"></div></div>
    
    <div class="ui-container">
        <div id="score-board">SCORE: 0</div>
        <div class="leaderboard"><div id="lb-list"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const config = { databaseURL: "https://game-24b43-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        
        const myId = Math.random().toString(36).substr(2, 9);
        const myRef = db.ref(`snakes/${myId}`);
        const foodRef = db.ref("foods");
        const allSnakesRef = db.ref("snakes");

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const WORLD = 3000;
        const isTouch = 'ontouchstart' in window;
        
        let isAlive = false;
        let isLeader = false;
        let others = {};
        let foods = {};
        let me = { x: WORLD/2, y: WORLD/2, score: 0 };

        // 1. 處理重複名字檢查
        function getUniqueName(targetName) {
            let nameExists = Object.values(others).some(s => s.n === targetName);
            if (nameExists) {
                return targetName + "_" + Math.floor(Math.random() * 100);
            }
            return targetName;
        }

        const overlay = document.getElementById("overlay");
        const nameInput = document.getElementById("playerNameInput");
        const startBtn = document.getElementById("startBtn");

        startBtn.onclick = () => {
            let inputName = nameInput.value.trim() || "Snake";
            // 檢查重複並截斷名字
            let finalName = getUniqueName(inputName.substring(0, 15));
            
            me = {
                x: Math.random()*(WORLD-400)+200, 
                y: Math.random()*(WORLD-400)+200,
                angle: Math.random()*Math.PI*2, 
                speed: 6,
                history: [], 
                len: 30, 
                score: 0,
                color: `hsl(${Math.random()*360}, 100%, 50%)`,
                name: finalName,
                protected: true
            };
            
            isAlive = true;
            overlay.style.display = "none";
            setTimeout(() => me.protected = false, 3000);
        };

        // 2. 強化死亡刪除邏輯
        function die() {
            if(!isAlive) return;
            isAlive = false;
            
            // 立即執行 Firebase 刪除指令並斷開連結
            myRef.remove().then(() => {
                console.log("Player removed from DB successfully.");
            }).catch(e => {
                // 如果失敗則強制使用 set(null)
                myRef.set(null);
            });

            // 結算畫面
            document.getElementById("status-title").innerText = "DIED";
            document.getElementById("final-score").innerText = Math.floor(me.score);
            document.getElementById("final-score-display").style.display = "block";
            startBtn.innerText = "重新加入";
            overlay.style.display = "flex";
        }

        // Firebase 數據監聽
        allSnakesRef.on("value", snap => {
            const data = snap.val() || {};
            others = data;
            isLeader = (Object.keys(data).sort()[0] === myId);
            
            const sorted = Object.keys(data)
                .map(id => ({id, n:data[id].n, s:data[id].s||0}))
                .sort((a,b) => b.s - a.s).slice(0,5);
            document.getElementById("lb-list").innerHTML = sorted.map(p => 
                `<div class="lb-item ${p.id===myId?'is-me':''}"><span>${p.n}</span><span>${Math.floor(p.s)}</span></div>`
            ).join('');
        });
        foodRef.on("value", snap => { foods = snap.val() || {}; });

        // 以下為遊戲控制與繪製邏輯 (保持穩定版本)
        let joystick = { active: false, base: {x:0, y:0} };
        let targetAngle = 0;

        if(isTouch) {
            const jBase = document.getElementById("joystick-base");
            const jStick = document.getElementById("joystick-stick");
            jBase.style.display = "block";
            window.addEventListener("touchstart", e => {
                if(!isAlive) return;
                const t = e.touches[0];
                if(t.clientX < window.innerWidth/2) {
                    joystick.active = true;
                    joystick.base = {x: t.clientX, y: t.clientY};
                    jBase.style.left = (t.clientX - 50) + "px";
                    jBase.style.top = (t.clientY - 50) + "px";
                }
            });
            window.addEventListener("touchmove", e => {
                if(!joystick.active || !isAlive) return;
                const t = e.touches[0];
                const dx = t.clientX - joystick.base.x;
                const dy = t.clientY - joystick.base.y;
                targetAngle = Math.atan2(dy, dx);
                jStick.style.transform = `translate(${Math.min(40, Math.abs(dx)) * Math.sign(dx)}px, ${Math.min(40, Math.abs(dy)) * Math.sign(dy)}px)`;
            });
            window.addEventListener("touchend", () => {
                joystick.active = false;
                jStick.style.transform = `translate(0px, 0px)`;
            });
        }

        window.addEventListener("mousemove", e => {
            if(!isTouch && isAlive) targetAngle = Math.atan2(e.clientY - window.innerHeight/2, e.clientX - window.innerWidth/2);
        });

        function update() {
            if(!isAlive) return; // 死亡後絕對不執行 update

            let diff = targetAngle - me.angle;
            while(diff < -Math.PI) diff += Math.PI*2;
            while(diff > Math.PI) diff -= Math.PI*2;
            me.angle += diff * 0.2;
            me.x += Math.cos(me.angle) * me.speed;
            me.y += Math.sin(me.angle) * me.speed;

            if (me.x<0 || me.x>WORLD || me.y<0 || me.y>WORLD) die();

            // 碰撞檢測
            if(!me.protected) {
                for(let id in others) {
                    if(id === myId) continue;
                    let body = others[id].h || [];
                    let oThick = Math.min(50, 18 + (others[id].s||0) / 80);
                    for(let i=0; i<body.length-1; i++) {
                        let d = Math.hypot(me.x - body[i].x, me.y - body[i].y);
                        if(d < (oThick/2 + 5)) { die(); return; }
                    }
                }
            }

            me.history.unshift({x: Math.round(me.x), y: Math.round(me.y)});
            if(me.history.length > me.len) me.history.pop();

            // 吃食物
            for(let fId in foods) {
                let f = foods[fId];
                if(Math.hypot(me.x - f.x, me.y - f.y) < 30) {
                    foodRef.child(fId).remove();
                    me.score += f.v || 1;
                    me.len += (f.v || 1) * 0.4;
                    document.getElementById("score-board").innerText = "SCORE: " + Math.floor(me.score);
                }
            }

            // 同步
            if(Date.now() % 50 < 30) {
                myRef.set({ x:Math.round(me.x), y:Math.round(me.y), c:me.color, n:me.name, s:me.score, h:me.history.filter((_,i)=>i%2===0), p:me.protected });
            }
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            let zoom = Math.min(window.innerWidth, window.innerHeight) / 1000;

            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.scale(zoom, zoom);
            ctx.translate(-me.x, -me.y);

            // 繪製地圖邊界
            ctx.strokeStyle = "#ff0044"; ctx.lineWidth = 10; ctx.strokeRect(0,0, WORLD, WORLD);

            // 畫食物
            for(let fId in foods) {
                let f = foods[fId];
                ctx.fillStyle = f.c;
                ctx.beginPath(); ctx.arc(f.x, f.y, 6+(f.v||1), 0, Math.PI*2); ctx.fill();
            }

            // 畫蛇函式
            const renderSnake = (s, history, isMe) => {
                if(!history || history.length < 2) return;
                let thick = Math.min(50, 18 + (s.s||0) / 80);
                ctx.save();
                if(s.p) ctx.globalAlpha = 0.3;
                ctx.beginPath();
                ctx.strokeStyle = s.c; ctx.lineWidth = thick; ctx.lineCap = "round";
                ctx.moveTo(history[0].x, history[0].y);
                for(let p of history) ctx.lineTo(p.x, p.y);
                ctx.stroke();
                
                ctx.fillStyle = "#fff";
                ctx.font = "bold 20px Arial"; ctx.textAlign = "center";
                ctx.fillText(s.n, history[0].x, history[0].y - thick);
                ctx.restore();
            };

            for(let id in others) if(id !== myId) renderSnake(others[id], others[id].h, false);
            if(isAlive) renderSnake(me, me.history, true);

            ctx.restore();
            requestAnimationFrame(draw);
        }

        // 食物生成 (房長邏輯)
        setInterval(() => {
            if (isAlive && isLeader && Object.keys(foods).length < 60) {
                foodRef.push({
                    x: Math.random()*WORLD, y: Math.random()*WORLD,
                    c: `hsl(${Math.random()*360},100%,50%)`, v: Math.floor(Math.random()*5)+1
                });
            }
        }, 1000);

        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.onresize();
        setInterval(update, 1000/60);
        draw();
    </script>
</body>
</html>

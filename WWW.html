<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>多人蛇 - 防穿透極速版</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        .ui-left { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; }
        #score { font-size: 28px; font-weight: bold; color: #00ff88; }
        .ui-right { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border: 1px solid #444; min-width: 140px; }
        .leader { font-size: 12px; color: #ffcc00; }
    </style>
</head>
<body>

    <div class="ui-left">
        <div id="score">SCORE: 0</div>
        <div id="fps" style="font-size: 10px; color: #444;">SYNCING...</div>
    </div>

    <div class="ui-right">
        <div style="text-align:center; font-weight:bold; color:#ffcc00; font-size:14px; margin-bottom:5px;">排行榜</div>
        <div id="leaderboard"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const config = { databaseURL: "https://game-24b43-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        const myId = Math.random().toString(36).substr(2, 9);
        const myRef = db.ref(`snakes/${myId}`);
        const foodRef = db.ref("foods");

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const WORLD = 3000;
        let isAlive = true;
        let others = {};
        let foods = {};
        let isLeader = false;

        // 本地玩家設定
        let me = {
            x: Math.random()*(WORLD-400)+200, y: Math.random()*(WORLD-400)+200,
            angle: Math.random()*Math.PI*2, speed: 6,
            history: [], len: 25, score: 0,
            color: `hsl(${Math.random()*360}, 100%, 50%)`,
            name: localStorage.getItem("snName") || "Player",
            protected: true
        };
        setTimeout(() => me.protected = false, 3000);

        // --- 防穿透：計算點到線段的最短距離 ---
        function distToSegment(px, py, x1, y1, x2, y2) {
            const l2 = (x2-x1)**2 + (y2-y1)**2;
            if (l2 === 0) return Math.hypot(px-x1, py-y1);
            let t = ((px-x1)*(x2-x1) + (py-y1)*(y2-y1)) / l2;
            t = Math.max(0, Math.min(1, t));
            return Math.hypot(px - (x1 + t*(x2-x1)), py - (y1 + t*(y2-y1)));
        }

        // --- 數據監聽 ---
        db.ref("snakes").on("value", snap => {
            const data = snap.val() || {};
            const now = Date.now();
            const ids = Object.keys(data).sort();
            isLeader = (ids[0] === myId);
            
            for (let id in data) {
                if (id === myId) continue;
                if (data[id].t && now - data[id].t > 5000) { delete others[id]; continue; }
                
                if (!others[id]) {
                    others[id] = data[id];
                } else {
                    // 平滑補間同步
                    others[id].targetX = data[id].x;
                    others[id].targetY = data[id].y;
                    others[id].n = data[id].n;
                    others[id].s = data[id].s;
                    others[id].h = data[id].h; // 更新身體
                    others[id].p = data[id].p;
                }
            }
            for (let id in others) if (!data[id]) delete others[id];
            updateLeaderboard(data);
        });

        foodRef.on("value", snap => { foods = snap.val() || {}; });

        function updateLeaderboard(all) {
            const list = Object.keys(all).map(id => ({id, n:all[id].n, s:all[id].s||0}))
                .sort((a,b)=>b.s-a.s).slice(0,5);
            document.getElementById("leaderboard").innerHTML = list.map((p,i)=>
                `<div style="font-size:12px; color:${p.id===myId?'#0f0':'#ccc'}">${i+1}. ${p.n}: ${p.s}</div>`
            ).join('');
        }

        // --- 核心更新 ---
        function die() {
            if (!isAlive) return;
            isAlive = false;
            me.history.forEach((pos, i) => {
                if (i % 4 === 0) foodRef.push({ x: pos.x, y: pos.y, c: me.color, exp: Date.now() + 30000 });
            });
            myRef.remove();
            alert("遊戲結束！分數: " + me.score);
            location.reload();
        }

        function update() {
            if (!isAlive) return;

            // 轉向
            let diff = targetAngle - me.angle;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            me.angle += diff * 0.25;

            me.x += Math.cos(me.angle) * me.speed;
            me.y += Math.sin(me.angle) * me.speed;

            if (me.x < 0 || me.x > WORLD || me.y < 0 || me.y > WORLD) die();

            // 線段碰撞偵測 (防止穿透別人的身體)
            if (!me.protected) {
                for (let id in others) {
                    let body = others[id].h;
                    if (!body || body.length < 2) continue;
                    for (let i = 0; i < body.length - 1; i++) {
                        // 檢查頭部到對方身體每一段線的距離
                        if (distToSegment(me.x, me.y, body[i].x, body[i].y, body[i+1].x, body[i+1].y) < 15) {
                            die(); return;
                        }
                    }
                }
            }

            me.history.unshift({x: Math.round(me.x), y: Math.round(me.y)});
            if (me.history.length > me.len) me.history.pop();

            // 吃食物
            for (let fId in foods) {
                let f = foods[fId];
                if (Math.hypot(me.x - f.x, me.y - f.y) < 25) {
                    foodRef.child(fId).remove();
                    me.len += 4; me.score += 10;
                    document.getElementById("score").innerText = "SCORE: " + me.score;
                }
            }

            // 極速同步 (每 40ms 同步一次)
            if (Date.now() % 40 < 20) {
                myRef.set({
                    x: Math.round(me.x), y: Math.round(me.y), a: me.angle,
                    l: me.len, c: me.color, n: me.name, s: me.score,
                    h: me.history.filter((_,i)=>i%2===0), p: me.protected, t: Date.now()
                });
            }
        }

        function draw() {
            if (!isAlive) return;
            ctx.fillStyle = "#080808";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const camX = canvas.width/2 - me.x;
            const camY = canvas.height/2 - me.y;
            ctx.save();
            ctx.translate(camX, camY);

            // 背景地圖
            ctx.strokeStyle = "#151515"; ctx.lineWidth = 2;
            for(let i=0; i<=WORLD; i+=100){
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,WORLD); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(WORLD,i); ctx.stroke();
            }

            // 食物
            for (let fId in foods) {
                let f = foods[fId];
                ctx.fillStyle = f.c;
                ctx.beginPath(); ctx.arc(f.x, f.y, 8, 0, Math.PI*2); ctx.fill();
            }

            // 繪製其他玩家 (加上位置補間避免抖動)
            for (let id in others) {
                let p = others[id];
                if (p.targetX !== undefined) {
                    p.x = p.x + (p.targetX - p.x) * 0.4;
                    p.y = p.y + (p.targetY - p.y) * 0.4;
                }
                drawSnake(p.h || [], p.c, p.n, p.p);
            }

            // 繪製自己
            drawSnake(me.history, me.color, me.name, me.protected);

            ctx.restore();
        }

        function drawSnake(history, color, name, isProtected) {
            if (history.length < 2) return;
            ctx.save();
            ctx.strokeStyle = color;
            ctx.lineWidth = 22;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            if (isProtected) ctx.globalAlpha = 0.4;

            ctx.beginPath();
            ctx.moveTo(history[0].x, history[0].y);
            for(let i=1; i<history.length; i++) ctx.lineTo(history[i].x, history[i].y);
            ctx.stroke();

            // 名字與保護圈
            ctx.globalAlpha = 1;
            ctx.fillStyle = "#fff"; ctx.font = "bold 14px Arial";
            ctx.fillText(name, history[0].x - 20, history[0].y - 35);
            if (isProtected) {
                ctx.beginPath(); ctx.arc(history[0].x, history[0].y, 40, 0, Math.PI*2);
                ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 2; ctx.stroke();
            }
            ctx.restore();
        }

        // --- 自動管理 ---
        setInterval(() => {
            if (!isAlive || !isLeader) return;
            const keys = Object.keys(foods);
            if (keys.length > 150) { foodRef.remove(); return; }
            if (keys.length < 60) {
                foodRef.push({
                    x: Math.round(Math.random()*(WORLD-100)+50),
                    y: Math.round(Math.random()*(WORLD-100)+50),
                    c: `hsl(${Math.random()*360}, 100%, 50%)`,
                    exp: Date.now() + 60000
                });
            }
            // 清理過期食物
            const now = Date.now();
            keys.forEach(k => { if(foods[k].exp && foods[k].exp < now) foodRef.child(k).remove(); });
        }, 1500);

        let targetAngle = me.angle;
        window.addEventListener("mousemove", e => { targetAngle = Math.atan2(e.clientY - window.innerHeight/2, e.clientX - window.innerWidth/2); });
        window.addEventListener("touchmove", e => { e.preventDefault(); const t = e.touches[0]; targetAngle = Math.atan2(t.clientY - window.innerHeight/2, t.clientX - window.innerWidth/2); }, {passive:false});
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        myRef.onDisconnect().remove();
        window.addEventListener("resize", () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        loop();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raingod Pro | Owner Auto-Clear</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #f2f2f7; --danger: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: #000; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; -webkit-user-select: none; }
        #app { width: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; height: 100vh; }
        .header { height: 60px; padding: 0 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        .msg-row { display: flex; flex-direction: column; width: 100%; }
        .msg-row.me { align-items: flex-end; }
        .msg-row.other { align-items: flex-start; }
        .bubble { padding: 12px 16px; border-radius: 18px; font-size: 15px; word-break: break-all; max-width: 80%; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .me .bubble { background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }
        .chat-img { max-width: 100%; border-radius: 10px; display: block; margin-bottom: 5px; }
        .file-btn { display: block; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 10px; text-decoration: none; color: inherit; font-size: 13px; margin-top: 5px; border: 1px solid rgba(0,0,0,0.1); }
        .input-area { padding: 10px 15px 35px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; background: #fff; }
        input[type="text"] { flex: 1; padding: 12px 16px; border: none; background: #f2f2f7; border-radius: 25px; outline: none; font-size: 16px; }
        .hidden { display: none !important; }
        .btn-sm { padding: 6px 12px; border-radius: 8px; border: 1px solid #ddd; background: none; font-size: 12px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="app">
    <div id="login-view" style="padding: 40px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 15px;">
        <h2 style="color: var(--me-bg); font-size: 30px; margin: 0;">Raingod Pro</h2>
        <input type="text" id="room-input" placeholder="輸入房號">
        <input type="text" id="nick-input" placeholder="你的暱稱">
        <button onclick="handleJoin()" style="padding:16px; background:var(--me-bg); color:white; border:none; border-radius:15px; font-weight:bold; cursor:pointer;">進入 / 建立房間</button>
        <p id="status" style="color:var(--danger); font-size:12px;"></p>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <div><b id="room-title"></b> <small id="online-text" style="color:var(--me-bg)"></small></div>
            <div style="display:flex; gap:8px;">
                <button id="del-btn" class="btn-sm hidden" style="color:var(--danger); border-color:var(--danger);" onclick="destroyRoom()">銷毀房間</button>
                <button class="btn-sm" onclick="location.reload()">退出</button>
            </div>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="file" id="file-selector" class="hidden" onchange="sendFile(this)">
            <button onclick="document.getElementById('file-selector').click()" style="font-size:26px; border:none; background:none; cursor:pointer;">📎</button>
            <input type="text" id="msg-input" placeholder="說點什麼..." onkeypress="if(event.key==='Enter') doSend()">
            <button id="send-btn" onclick="doSend()" style="color:var(--me-bg); font-weight:bold; border:none; background:none; cursor:pointer;">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // 禁用 F12
    document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false; };

    const firebaseConfig = { apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk", databaseURL: "https://chat-73802-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);

    let currentRoom = ""; 
    let myNick = "";
    let isCooldown = false;

    window.handleJoin = async function() {
        const rInput = document.getElementById('room-input').value.trim().toUpperCase();
        const nInput = document.getElementById('nick-input').value.trim() || "訪客";
        if(!rInput) return;

        const roomRef = ref(db, `rooms/${rInput}`);
        const roomSnap = await get(roomRef);

        if (roomSnap.exists()) {
            startSession(rInput, nInput); // 房號存在直接進
        } else {
            // 一裝置限一房檢查
            const ownerSnap = await get(ref(db, `owners/${uid}`));
            if (ownerSnap.exists()) {
                const activeRoom = await get(ref(db, `rooms/${ownerSnap.val()}`));
                if (activeRoom.exists()) {
                    document.getElementById('status').innerText = `你已擁有房：${ownerSnap.val()}，請先銷毀。`;
                    return;
                }
            }
            // 創房
            await set(ref(db, `rooms/${rInput}/meta`), { owner: uid, ts: serverTimestamp() });
            await set(ref(db, `owners/${uid}`), rInput);
            startSession(rInput, nInput);
        }
    };

    function startSession(r, n) {
        currentRoom = r; myNick = n;
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = r;
        const userRef = ref(db, `rooms/${currentRoom}/users/${uid}`);
        set(userRef, true); onDisconnect(userRef).remove();
        initChat();
    }

    window.doSend = () => {
        if(isCooldown) return;
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        isCooldown = true;
        setTimeout(() => isCooldown = false, 1500); // 1.5秒冷卻

        const safeText = inp.value.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        push(ref(db, `rooms/${currentRoom}/msgs`), {
            type: 'text', content: safeText, uid: uid, name: myNick, ts: serverTimestamp()
        });
        inp.value = "";
    };

    window.sendFile = (el) => {
        const file = el.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            let type = file.type.startsWith('image/') ? 'image' : (file.type.startsWith('audio/') ? 'audio' : 'file');
            push(ref(db, `rooms/${currentRoom}/msgs`), {
                type: type, content: e.target.result, fileName: file.name, uid: uid, name: myNick, ts: serverTimestamp()
            });
        };
        reader.readAsDataURL(file);
    };

    window.recall = (id) => {
        if(confirm("收回此訊息？")) remove(ref(db, `rooms/${currentRoom}/msgs/${id}`));
    };

    // 關鍵修正：銷毀時同步刪除 rooms 與 owners
    window.destroyRoom = async () => {
        if(confirm("⚠ 你是房主，確定要永久銷毀此房間並清空你的創房紀錄？")) {
            const updates = {};
            // 同時將房間內容與 Owner 紀錄設為 null (刪除)
            updates[`rooms/${currentRoom}`] = null;
            updates[`owners/${uid}`] = null;
            
            try {
                await update(ref(db), updates);
                alert("房間已徹底刪除，創房紀錄已清除。");
                location.reload();
            } catch (err) {
                alert("刪除失敗，請檢查權限。");
            }
        }
    };

    function initChat() {
        onValue(ref(db, `rooms/${currentRoom}/users`), s => document.getElementById('online-text').innerText = `(${s.size || 1}人)`);
        
        onValue(ref(db, `rooms/${currentRoom}/meta`), s => {
            if(!s.exists()) { alert("房間已不存在"); location.reload(); return; }
            if(s.val().owner === uid) document.getElementById('del-btn').classList.remove('hidden');
        });

        onValue(ref(db, `rooms/${currentRoom}/msgs`), (snap) => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(child => {
                const d = child.val(); if(!d || !d.uid) return;
                const isMe = d.uid === uid;
                let html = "";
                if(d.type === 'image') {
                    html = `<img src="${d.content}" class="chat-img" onclick="window.open('${d.content}')">
                            <a href="${d.content}" download="${d.fileName || 'img.png'}" style="font-size:10px; color:inherit; opacity:0.6;">⬇ 下載圖片</a>`;
                } else if(d.type === 'audio') {
                    html = `<audio controls src="${d.content}" style="width:190px; height:35px;"></audio>`;
                } else if(d.type === 'file') {
                    html = `<a href="${d.content}" download="${d.fileName}" class="file-btn">📄 ${d.fileName}<br><b>[點擊下載]</b></a>`;
                } else {
                    html = `<div style="white-space:pre-wrap; font-family:monospace;">${d.content}</div>`;
                }

                const div = document.createElement('div');
                div.className = `msg-row ${isMe ? 'me' : 'other'}`;
                div.innerHTML = `
                    <div style="font-size:10px; color:#999; margin-bottom:3px; padding:0 5px;">${d.name}</div>
                    <div style="display:flex; align-items:flex-end; gap:6px; ${isMe?'flex-direction:row-reverse':''}">
                        <div class="bubble" onclick="${isMe ? `recall('${child.key}')` : ''}">${html}</div>
                    </div>`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天室 | Raingod</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #e9e9eb; --danger: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* 導覽列適配：將 App 整體下移並微縮高度 */
        #app { 
            width: 100%; max-width: 500px; background: white; 
            display: flex; flex-direction: column; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1); 
            height: calc(100vh - 60px); /* 扣除導覽列高度 */
            margin-top: 60px; /* 這裡預留導覽列空間 */
        }
        
        .hidden { display: none !important; }
        
        /* 頂部導覽 */
        .header { padding: 12px 15px; background: #fff; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .header b { font-size: 16px; color: #333; }

        /* 聊天區域 */
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        
        /* 訊息氣泡 */
        .msg-wrapper { display: flex; flex-direction: column; width: 100%; position: relative; }
        .msg-wrapper.me { align-items: flex-end; }
        .msg-wrapper.other { align-items: flex-start; }
        .msg-name { font-size: 11px; color: #8e8e93; margin-bottom: 2px; padding: 0 5px; }
        
        .bubble { padding: 10px 14px; border-radius: 18px; max-width: 75%; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .me .bubble { background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }
        
        /* 時間與已讀狀態 */
        .msg-status { font-size: 10px; color: #aaa; margin-top: 2px; display: flex; gap: 5px; }
        .me .msg-status { flex-direction: row-reverse; }

        .bubble img { max-width: 100%; border-radius: 10px; display: block; cursor: zoom-in; margin-top: 2px; }

        /* 輸入區域 */
        .input-area { padding: 10px 15px; border-top: 1px solid #eee; display: flex; gap: 8px; align-items: center; background: #fff; }
        #msg-input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 16px; }
        .btn-circle { background: #f0f0f0; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-send { background: var(--me-bg); color: white; border: none; padding: 8px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        /* 大圖檢視器 */
        #photo-modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        #modal-img { max-width: 95%; max-height: 95%; object-fit: contain; }

        #loading-toast { position: fixed; top: 15%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 30px; z-index: 3000; display: none; font-size: 13px; }
    </style>
</head>
<body>

<div id="nav_bar"></div>
<script src="menu.js"></script>

<div id="loading-toast">處理中...</div>

<div id="photo-modal" onclick="this.style.display='none'">
    <img id="modal-img">
</div>

<div id="app">
    <div id="login-view" style="padding: 40px 20px; text-align: center; flex: 1;">
        <h2 style="margin-bottom: 30px;">Raingod聊天室</h2>
        <input type="text" id="room-input" placeholder="輸入房號" style="width: 80%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px;">
        <input type="text" id="nick-input" placeholder="您的暱稱" style="width: 80%; padding: 12px; margin-bottom: 25px; border: 1px solid #ddd; border-radius: 10px;">
        <button onclick="handleJoin()" style="width: 85%; padding: 12px; background: var(--me-bg); color: white; border: none; border-radius: 10px; font-weight: bold;">進入房間</button>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <b id="room-title">房號</b>
            <div style="display: flex; gap: 8px; align-items: center;">
                <input type="text" id="rename-input" style="width:60px; font-size:11px;" onchange="updateNickname(this.value)">
                <button id="owner-btn" class="hidden" onclick="destroyRoom()" style="color:var(--danger); background:none; border:none; font-size:12px; font-weight:bold;">銷毀房間</button>
                <button onclick="location.reload()" style="background:none; border:none; color:#8e8e93; font-size:12px;">離開</button>
            </div>
        </div>
        
        <div id="chat-box"></div>

        <div class="input-area">
            <input type="file" id="img-input" class="hidden" accept="image/*" onchange="sendLargeImage(this)">
            <button class="btn-circle" onclick="document.getElementById('img-input').click()">📷</button>
            <input type="text" id="msg-input" placeholder="3秒限傳一則..." onkeypress="if(event.key==='Enter') doSend()">
            <button class="btn-send" onclick="doSend()">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, onDisconnect, serverTimestamp, get, update, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk",
        authDomain: "chat-73802.firebaseapp.com",
        databaseURL: "https://chat-73802-default-rtdb.firebaseio.com",
        projectId: "chat-73802",
        storageBucket: "chat-73802.firebasestorage.app",
        messagingSenderId: "274628413625",
        appId: "1:274628413625:web:77499e0bdeab18104bf368",
        measurementId: "G-BP7YV746WV"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);
    let roomID = ""; let myName = "";
    let lastSendTime = 0; // 訊息冷卻時間計時器

    window.handleJoin = async function() {
        roomID = document.getElementById('room-input').value.trim().toUpperCase();
        myName = document.getElementById('nick-input').value.trim() || "匿名";
        if(!roomID) return alert("請輸入房號");

        const roomRef = ref(db, `rooms/${roomID}`);
        const snap = await get(roomRef);
        
        // 限制 3: 一個裝置只能創一個房號 (檢查 global owners 名單)
        const globalOwnersRef = ref(db, `system/owners/${uid}`);
        const ownerSnap = await get(globalOwnersRef);

        if(!snap.exists()) {
            if(ownerSnap.exists() && ownerSnap.val() !== roomID) {
                return alert("你已經在其他地方創過房了，請銷毀舊房後再試。");
            }
            await set(ref(db, `rooms/${roomID}/meta`), { owner: uid });
            await set(globalOwnersRef, roomID); // 紀錄該 uid 擁有的房號
        }
        
        const metaSnap = await get(ref(db, `rooms/${roomID}/meta`));
        if(metaSnap.val()?.owner === uid) document.getElementById('owner-btn').classList.remove('hidden');

        // 登入狀態
        const userRef = ref(db, `rooms/${roomID}/users/${uid}`);
        set(userRef, { name: myName, online: true });
        onDisconnect(userRef).remove();

        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = "房號: " + roomID;
        document.getElementById('rename-input').value = myName;
        startChat();
    };

    function startChat() {
        // 只監聽最後 50 條訊息 (限制 6)
        const msgsRef = query(ref(db, `rooms/${roomID}/msgs`), limitToLast(50));
        
        onValue(msgsRef, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(child => {
                const d = child.val();
                const isMe = d.uid === uid;
                const wrapper = document.createElement('div');
                wrapper.className = `msg-wrapper ${isMe ? 'me' : 'other'}`;
                
                let content = d.type === 'image' 
                    ? `<img src="${d.text}" onclick="openViewer('${child.key}')" id="img-${child.key}">` 
                    : d.text;
                
                // 時間格式化 (限制 5)
                const dateObj = new Date(d.ts);
                const timeStr = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
                const dateStr = `${dateObj.getMonth()+1}/${dateObj.getDate()}`;

                wrapper.innerHTML = `
                    <div class="msg-name">${d.name}</div>
                    <div class="bubble">${content}</div>
                    <div class="msg-status">
                        <span>${dateStr} ${timeStr}</span>
                        ${isMe ? '<span>已讀</span>' : ''} 
                    </div>
                `;
                box.appendChild(wrapper);
            });
            box.scrollTop = box.scrollHeight;
        });

        onValue(ref(db, `rooms/${roomID}/meta`), (s) => { 
            if(!s.exists() && roomID !== "") {
                alert("房間已被銷毀");
                location.reload();
            }
        });
    }

    // 檢查冷卻時間 (限制 3)
    function checkCD() {
        const now = Date.now();
        if (now - lastSendTime < 3000) {
            alert("說太快了！請等 3 秒再發送。");
            return false;
        }
        lastSendTime = now;
        return true;
    }

    window.doSend = async function() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim() || !checkCD()) return;

        // 推送訊息
        await push(ref(db, `rooms/${roomID}/msgs`), {
            uid, name: myName, text: inp.value, type: 'text', ts: serverTimestamp()
        });
        inp.value = "";
        cleanupMsgs(); // 自動清理超過 50 條的訊息
    };

    window.sendLargeImage = function(input) {
        const file = input.files[0];
        if (!file || !checkCD()) return;
        if (file.size > 10 * 1024 * 1024) return alert("檔案太大了 (上限 10MB)");

        document.getElementById('loading-toast').style.display = 'block';
        const reader = new FileReader();
        reader.onload = function(e) {
            push(ref(db, `rooms/${roomID}/msgs`), {
                uid, name: myName, text: e.target.result, type: 'image', ts: serverTimestamp()
            }).then(() => {
                document.getElementById('loading-toast').style.display = 'none';
                cleanupMsgs();
            });
        };
        reader.readAsDataURL(file);
        input.value = "";
    };

    // 自動清理舊訊息 (限制 6)
    async function cleanupMsgs() {
        const msgRef = ref(db, `rooms/${roomID}/msgs`);
        const snap = await get(msgRef);
        if (snap.numChildren() > 50) {
            let count = 0;
            const target = snap.numChildren() - 50;
            snap.forEach(child => {
                if (count < target) {
                    remove(ref(db, `rooms/${roomID}/msgs/${child.key}`));
                }
                count++;
            });
        }
    }

    window.openViewer = function(key) {
        document.getElementById('modal-img').src = document.getElementById('img-' + key).src;
        document.getElementById('photo-modal').style.display = 'flex';
    };

    window.updateNickname = function(val) {
        if(!val.trim()) return;
        myName = val;
        update(ref(db, `rooms/${roomID}/users/${uid}`), { name: val });
    };

    window.destroyRoom = async function() {
        if(confirm("銷毀後您才可以創建新房間，確定嗎？")) {
            await remove(ref(db, `system/owners/${uid}`)); // 釋放房主配額
            await remove(ref(db, `rooms/${roomID}`));
        }
    };
</script>
</body>
</html>

<html lang="zh-TW">
<head>

    <title>RAINGOD | 雨神特工</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #00050a; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; color: #fff; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; display: block; }
        .glass-panel {
            background: rgba(0, 210, 255, 0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 210, 255, 0.25);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        #lobby-container {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            z-index: 100; overflow-y: auto; padding: 16px;
        }
        .title { font-size: 2.2rem; color: #00d2ff; text-shadow: 0 0 24px #00d2ff; margin-bottom: 8px; }
        .resource-bar { font-size: 1rem; color: #ffd700; margin-bottom: 12px; }
        .resource-bar span { margin-right: 16px; }
        .lobby-section { width: 100%; max-width: 680px; margin-bottom: 12px; }
        .lobby-section h3 { color: #00d2ff; margin: 0 0 6px 0; font-size: 1rem; }
        #upgrade-list, #tech-list { max-height: 180px; overflow-y: auto; padding: 4px; }
        .talent-row, .skill-row { padding: 6px 8px; margin: 3px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .main-btn {
            padding: 12px 40px; font-size: 1.2rem; color: #000; background: #00d2ff;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            box-shadow: 0 0 20px rgba(0,210,255,0.5); transition: 0.25s; margin-top: 10px;
        }
        .main-btn:hover { transform: scale(1.04); box-shadow: 0 0 32px rgba(0,210,255,0.75); }
        .main-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .main-btn.small { padding: 6px 14px; font-size: 0.85rem; margin-top: 4px; }
        #battle-hud { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; display: none; z-index: 50; padding: 12px; box-sizing: border-box; }
        #battle-hud .clickable { pointer-events: auto; }
        .xp-bar-bg { width: 100%; max-width: 400px; height: 8px; background: rgba(255,255,255,0.12); border-radius: 4px; overflow: hidden; }
        #xp-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00d2ff, #00ffcc); transition: width 0.2s; }
        .stat-text { color: #fff; font-size: 0.9rem; margin-top: 4px; }
        .hp-bar-bg { width: 180px; height: 10px; background: rgba(0,0,0,0.6); border-radius: 5px; overflow: hidden; border: 1px solid #00d2ff; }
        #hp-bar-fill { width: 100%; height: 100%; background: linear-gradient(90deg,#c00,#f84); transition: width 0.15s; }
        #skill-strip { margin-top: 6px; font-size: 0.75rem; color: rgba(255,255,255,0.85); max-width: 420px; }
        #levelup-modal, #evo-modal, #pause-panel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 200;
            display: none; align-items: center; justify-content: center; pointer-events: auto;
        }
        #levelup-modal.show, #evo-modal.show, #pause-panel.show { display: flex; }
        .modal-panel {
            background: linear-gradient(180deg, rgba(0,35,55,0.96), rgba(0,18,35,0.98));
            border: 2px solid #00d2ff; border-radius: 16px; padding: 20px; max-width: 460px; width: 92%;
        }
        .modal-panel h2 { color: #00d2ff; margin-top: 0; font-size: 1.2rem; }
        .choice-btn {
            display: block; width: 100%; padding: 10px 12px; margin: 6px 0; text-align: left;
            background: rgba(0,210,255,0.12); border: 1px solid #00d2ff; border-radius: 8px;
            color: #fff; cursor: pointer; font-size: 0.95rem; transition: 0.2s;
        }
        #test-panel {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 250;
            align-items: center; justify-content: center; padding: 18px; overflow-y: auto;
        }
        #test-panel.show { display: flex; }
        #test-panel .modal-panel { max-width: 780px; width: 100%; }
        .test-row { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
        .test-row label { flex: 1 1 180px; font-size: 0.92rem; color: #fff; }
        #test-active-list, #test-passive-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px; margin-top: 10px; }
        #test-active-list label, #test-passive-list label { display: flex; align-items: center; gap: 6px; padding: 8px 10px; border: 1px solid rgba(0,210,255,0.22); border-radius: 10px; background: rgba(255,255,255,0.04); cursor: pointer; }
        #test-active-list input, #test-passive-list input { transform: scale(1.1); }
        .skin-collection { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .skin-card { width: 128px; border: 1px solid rgba(0,210,255,0.18); border-radius: 12px; padding: 8px; background: rgba(255,255,255,0.04); text-align:center; }
        .skin-card img { width: 100%; height: 100px; object-fit: contain; border-radius: 10px; }
        .skin-card .status { margin-top: 6px; font-size: 0.82rem; color: #ccc; }
        #lottery-overlay { position: fixed; inset: 0; display:none; align-items:center; justify-content:center; z-index:400; pointer-events:none; }
        #lottery-overlay.show { display:flex; pointer-events:auto; }
        #lottery-overlay .panel { width:360px; max-width:90%; padding:18px; border-radius:12px; text-align:center; background:linear-gradient(180deg, rgba(0,0,0,0.75), rgba(0,0,0,0.9)); border:1px solid rgba(255,255,255,0.06); box-shadow:0 12px 40px rgba(0,0,0,0.6); }
        #lottery-overlay .panel h3 { margin:6px 0 10px 0; color:#ffd54f; font-size:1.1rem; }
        #lottery-overlay .panel img { max-width:160px; max-height:160px; display:block; margin:6px auto; }
        .choice-btn:hover { background: rgba(0,210,255,0.28); }
        .choice-btn.evo { border-color: #ff0; background: rgba(255,255,0,0.12); color: #ffd700; }
        #gameover-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 150; align-items: center; justify-content: center; }
        #gameover-panel.show { display: flex; flex-direction: column; }
        #gameover-panel h2 { color: #f44; }
        #gameover-panel .reward { color: #ffd700; font-size: 1.15rem; margin: 8px 0; }
    </style>
</head>

/**

 * RAINGOD | LAB — 噠噠特攻 超完整腳本 (Ultra Complete Script)
 * ═══════════════════════════════════════════════════════════════════════════════
 * 模組: 存檔 | 輸入 | 常數 | 技能表 | 裝備 | 特工寵物 | 科技配件 | 實體類 | 戰鬥邏輯 | 引擎
 * ═══════════════════════════════════════════════════════════════════════════════
 */
(function() {
'use strict';

// ─── 常數 ─────────────────────────────────────────────────────────────────────
const MAP_RADIUS = 3200;
const MAX_STAGES = 100;
const STAGES = (function buildStages(n) {
    const arr = [];
    const baseHp = 800;
    for (let i = 1; i <= n; i++) {
        const spawnCd = Math.max(10, 90 - Math.floor((i - 1) * 0.75));
        const bossHp = Math.round(baseHp * Math.pow(1.1, i - 1));
        arr.push({ name: i + '. 關卡', spawnCd: spawnCd, bossHp: bossHp, bossAt: 90 });
    }
    return arr;
})(MAX_STAGES);

function shuffleArr(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}
function pickFromPool(pool, n) {
    return shuffleArr(pool).slice(0, Math.min(n, pool.length));
}
/** 1 星最多 3 發，每升 1 星 +1～2 發；EVO 可再 +evoExtra */
function skillProjCount(star1Design, stars, evo, evoExtra = 0) {
    const base = Math.min(3, star1Design);
    let n = base + Math.floor(Math.max(0, (stars || 1) - 1) * 1.35);
    if (evo) n += evoExtra;
    return Math.max(1, Math.floor(n));
}
function skillLevelDamageMult(stars, evo) {
    const s = stars || 1;
    return (1 + (s - 1) * 0.22) * (evo ? 2.6 : 1);
}
function skillLevelCdBonus(skillId, stars) {
    // 流光飛刃 (kunai) 冷卻成長大幅下調 (5 -> 1.8)，防止高等級鬼畜發射
    const bonusPerStar = (skillId === 'kunai') ? 1.8 : 5;
    return Math.max(0, ((stars || 1) - 1) * bonusPerStar);
}

function drawSkinImageFit(ctx, img, maxW, maxH) {

const Input = {
    keys: {},
    mouseX: 0,
    mouseY: 0,
    mouseActive: false,
    joystick: { active:false, id:null, baseX: 90, baseY: 0, x:0, y:0, dx:0, dy:0, maxRadius: 90 },
    init() {
        window.onkeydown = e => {
            const key = e.key.toLowerCase();
            this.keys[key] = true;
            if (e.key === 'Escape') GameEngine.togglePause();
            if (e.key === 'Control') this.keys.control = true;
            this.checkTestCombo();
        };
        window.onkeyup = e => {
            const key = e.key.toLowerCase();
            this.keys[key] = false;
            if (e.key === 'Control') this.keys.control = false;
            this.checkTestCombo();
        };
        window.addEventListener('mousemove', e => {
            this.mouseX = e.clientX;
            this.mouseY = e.clientY;
            this.mouseActive = true;
        });
        window.addEventListener('mouseleave', () => {
            this.mouseActive = false;
        });

        // 更新搖桿位置（會使用儲存的設定）
        const updateJoystickPos = () => {
            try {
                const s = (SaveSystem && SaveSystem.currentData && SaveSystem.currentData.joystickSettings) || {};
                this.joystick.baseX = typeof s.baseX === 'number' ? s.baseX : 90;
                const yOffset = typeof s.baseYOffset === 'number' ? s.baseYOffset : 100;
                this.joystick.baseY = window.innerHeight - yOffset;
                this.joystick.maxRadius = typeof s.maxRadius === 'number' ? s.maxRadius : 90;
            } catch (e) {
                this.joystick.baseX = 90;
                this.joystick.baseY = window.innerHeight - 100;
                this.joystick.maxRadius = 90;
            }
        };
        window.addEventListener('resize', updateJoystickPos);
        updateJoystickPos();

        // 虛擬搖桿 (手機觸控) - 左下角固定
        const handleTouchStart = (e) => {
            const t = e.changedTouches[0];
            if (!t) return;
            
            // 搖桿預設或儲存在設定中
            const joyX = this.joystick.baseX, joyY = this.joystick.baseY;
            const dist = Math.hypot(t.clientX - joyX, t.clientY - joyY);
            
            // 只有在搖桿區域內(半徑140)觸碰才激活
            if (dist > 140) return;
            
            this.joystick.active = true;
            this.joystick.id = t.identifier;
            this.joystick.baseX = joyX;
            this.joystick.baseY = joyY;
            this.joystick.x = t.clientX;
            this.joystick.y = t.clientY;
            this.joystick.dx = 0;
            this.joystick.dy = 0;
            this.mouseActive = false;
            e.preventDefault();
        };
        const handleTouchMove = (e) => {
            if (!this.joystick.active) return;
            for (const t of e.changedTouches) {
                if (t.identifier !== this.joystick.id) continue;
                this.joystick.x = t.clientX;
                this.joystick.y = t.clientY;
                const vx = t.clientX - this.joystick.baseX;
                const vy = t.clientY - this.joystick.baseY;
                const dist = Math.hypot(vx, vy);
                const max = this.joystick.maxRadius;
                const clamped = Math.min(dist, max);
                const nx = dist ? vx / dist : 0;
                const ny = dist ? vy / dist : 0;
                this.joystick.dx = nx * (clamped / max);
                this.joystick.dy = ny * (clamped / max);
                e.preventDefault();
                break;
            }
        };
        const handleTouchEnd = (e) => {
            if (!this.joystick.active) return;
            for (const t of e.changedTouches) {
                if (t.identifier !== this.joystick.id) continue;
                this.joystick.active = false;
                this.joystick.id = null;
                this.joystick.dx = 0;
                this.joystick.dy = 0;
                break;
            }
        };
        window.addEventListener('touchstart', handleTouchStart, { passive: false });
        window.addEventListener('touchmove', handleTouchMove, { passive: false });
        window.addEventListener('touchend', handleTouchEnd, { passive: false });
        window.addEventListener('touchcancel', handleTouchEnd, { passive: false });
    },
    checkTestCombo() {
        const combo = ['r', 'a', 'i', 'n', 'control'].every(k => !!this.keys[k]);
        if (combo && !this._testComboActive) {
            this._testComboActive = true;
            GameEngine.toggleTestMode();
        }
        if (!combo) {
            this._testComboActive = false;
        }
    }
};

// ─── 經驗球 (菱形高級造型) ─────────────────────────────────────────────────────
class ExpOrb {
    constructor(x, y, value = 10) {
        this.x = x; this.y = y; this.value = value; this.r = 6;
        this.vx = 0; this.vy = 0;
    }
    update(dt, player) {
        const dx = player.x - this.x;
        const dy = player.y - this.y;
        const dist = Math.hypot(dx, dy);
        const magnet = player.magnetDist + (BattleSkills.hasPassive('magnet') ? 90 : 0);
        if (dist < magnet) {
            const force = 0.25 + (BattleSkills.hasPassive('expBook') ? 0.4 : 0);
            const nx = dist ? dx / dist : 0;
            const ny = dist ? dy / dist : 0;
            this.vx += nx * force * dt;
            this.vy += ny * force * dt;
            const speed = Math.min(16, Math.hypot(this.vx, this.vy));
            if (speed > 0) {
                this.vx = this.vx / Math.hypot(this.vx, this.vy) * speed;
                this.vy = this.vy / Math.hypot(this.vx, this.vy) * speed;
            }
        }
        this.x += this.vx * dt;
        this.y += this.vy * dt;
    }
    draw(ctx, cam) {
        ctx.save();
        ctx.translate(this.x, this.y);
        const glow = BattleSkills.hasPassive('expBook') ? '#b2ff59' : '#00ffcc';
        ctx.fillStyle = glow;
        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
        ctx.shadowColor = glow;
        ctx.shadowBlur = BattleSkills.hasPassive('expBook') ? 10 : 5;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        for (let i = 0; i < 4; i++) {
            const a = Math.PI/2 * i - Math.PI/4;
            const x = Math.cos(a) * this.r, y = Math.sin(a) * this.r;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        if (BattleSkills.hasPassive('magnet')) {
            ctx.strokeStyle = 'rgba(80,220,255,0.35)';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.arc(0, 0, this.r + 6, 0, Math.PI * 2);
            ctx.stroke();
        }
        ctx.restore();
    }
}

// ─── 投射物 (鎖敵、造型：刀型/六角/菱形，無圓形) ──────────────────────────────
class Projectile {
    constructor(x, y, vx, vy, dmg, color, opts = {}) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.dmg = dmg; this.color = color || '#00d2ff'; this.isDead = false;
        this.homing = opts.homing || false; this.r = opts.r || 5; this.life = opts.life || 400;
        this.bounceLeft = opts.bounce !== undefined ? opts.bounce : 0;
        this.shape = opts.shape || 'diamond';
        this.skillId = opts.skillId || null;
        this.lockTarget = opts.lockTarget || null;
        this.isPuddle = opts.isPuddle || false;
        this.gravityPull = opts.gravityPull || 0;
        this.returning = false;
        this.burn = opts.burn || false;
        this.burnDmg = opts.burnDmg || 0;
        this.pierceLeft = opts.pierceLeft != null ? opts.pierceLeft : (BattleSkills.hasPassive('pierce') ? 1 : 0);
        this.hostile = !!opts.hostile;
    }
    update(dt, player, enemies) {
        if (!this.isPuddle) {
            this.x += this.vx * dt; this.y += this.vy * dt;
        }
        this.life--;
        if (this.life <= 0) { this.isDead = true; return; }

        // 重力吸附邏輯
        if (this.gravityPull > 0) {
            enemies.forEach(e => {
                const d = Math.hypot(e.x - this.x, e.y - this.y);
                if (d < this.r * 4 && !e.isDead) {
                    const pull = this.gravityPull * dt;
                    e.x += (this.x - e.x) / d * pull;
                    e.y += (this.y - e.y) / d * pull;
                }
            });
        }

        if (this.hostile && player) {
            if (this.homing) {
                const ang = Math.atan2(player.y - this.y, player.x - this.x);
                const sp = Math.max(Math.hypot(this.vx, this.vy) * 1.1, 18);
                this.vx = Math.cos(ang) * sp;
                this.vy = Math.sin(ang) * sp;
            }
            if (Math.hypot(this.x - player.x, this.y - player.y) < player.r + this.r + 6) {
                player.takeDamage(this.dmg);
                GameEngine.spawnParticles(this.x, this.y, this.color, 14, 2.5);
                GameEngine.shake(6, 0.2);
                this.isDead = true;
            }
            if (Math.abs(this.x - player.x) > 5000 || Math.abs(this.y - player.y) > 5000) this.isDead = true;
            return;
        }
        if (this.homing) {
            let t = this.lockTarget && !this.lockTarget.isDead ? this.lockTarget : null;
            if (!t && enemies.length) {
                let best = null, bestD = 1e9;
                for (const e of enemies) {
                    if (e.isDead) continue;
                    const d = Math.hypot(e.x - this.x, this.y - this.y);
                    if (d < bestD) { bestD = d; best = e; }
                }
                t = best;
            }
            if (t) {
                const ang = Math.atan2(t.y - this.y, t.x - this.x);
                const sp = Math.max(Math.hypot(this.vx, this.vy) * 1.06, 14);
                this.vx = Math.cos(ang) * sp;
                this.vy = Math.sin(ang) * sp;
            }
        }
        if (this.bounceLeft > 0) {
            const dist = Math.hypot(this.x - player.x, this.y - player.y);
            if (dist > MAP_RADIUS) {
                const ang = Math.atan2(this.y - player.y, this.x - player.x);
                this.vx = -Math.cos(ang) * Math.hypot(this.vx, this.vy);
                this.vy = -Math.sin(ang) * Math.hypot(this.vx, this.vy);
                this.bounceLeft--;
            }
        }
        for (const e of enemies) {
            if (e.isDead) continue;
            if (Math.hypot(this.x - e.x, this.y - e.y) < e.r + this.r) {
                let dmg = this.dmg;
                if (e instanceof Boss && e.shield) dmg *= 0.5;
                e.hp -= (this.isPuddle ? dmg * dt / 60 : dmg);

                // 觸發物理擊退
                if (this.knockback > 0) {
                    const ang = Math.atan2(e.y - (player ? player.y : this.y), e.x - (player ? player.x : this.x));
                    const kbMult = (e instanceof Boss ? 0.2 : 1);
                    e.kx += Math.cos(ang) * this.knockback * kbMult;
                    e.ky += Math.sin(ang) * this.knockback * kbMult;
                }

                if (player && player.lifesteal) {
                    player.hp = Math.min(player.maxHp, player.hp + dmg * player.lifesteal);
                }
                GameEngine.spawnParticles(this.x, this.y, this.color, 10, 2);
                if (this.burn) {
                    e.burnTime = 90;
                    e.burnDmg = this.burnDmg || (dmg * 0.18);
                }
                if (e instanceof Boss) GameEngine.shake(4, 0.15);
                else GameEngine.shake(2, 0.08);
                if (this.pierceLeft > 0) {
                    this.pierceLeft--;
                } else {
                    this.isDead = true;
                }
                return;
            }
        }
        if (Math.abs(this.x - player.x) > 5000 || Math.abs(this.y - player.y) > 5000) this.isDead = true;
    }
    draw(ctx, cam) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(Math.atan2(this.vy, this.vx));
        // 通用拖尾
        const speed = Math.hypot(this.vx, this.vy);
        if (speed > 0.1) {
            const tailLen = Math.min(40, speed * 2.2);
            ctx.strokeStyle = this.color;
            ctx.lineWidth = Math.max(1, this.r * 0.4);
            ctx.globalAlpha = 0.35;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(-tailLen, 0);
            ctx.stroke();
            ctx.globalAlpha = 1;
        }
        const r = this.r;
        if (this.shape === 'blade') {
            ctx.fillStyle = this.color;
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.moveTo(r * 2, 0);
            ctx.lineTo(-r * 1.2, r * 0.8);
            ctx.lineTo(-r * 0.6, 0);
            ctx.lineTo(-r * 1.2, -r * 0.8);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
        } else if (this.shape === 'hex') {
            const grad = ctx.createRadialGradient(0, 0, r*0.2, 0, 0, r*1.1);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(0.25, this.color);
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const a = Math.PI/3 * i;
                const x = Math.cos(a) * r, y = Math.sin(a) * r;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
        } else if (this.shape === 'lightning') {
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 2.5;
            ctx.shadowColor = this.color;
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.moveTo(r, 0);
            ctx.lineTo(-r*0.5, r*0.5);
            ctx.lineTo(0, 0);
            ctx.lineTo(-r*0.5, -r*0.5);
            ctx.lineTo(-r, 0);
            ctx.stroke();
            ctx.shadowBlur = 0;
        } else {
            const grad = ctx.createRadialGradient(0, 0, r*0.1, 0, 0, r*1.0);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(0.3, this.color);
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.strokeStyle = 'rgba(255,255,255,0.35)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(r, 0);
            ctx.lineTo(0, r);
            ctx.lineTo(-r, 0);
            ctx.lineTo(0, -r);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
        }
        ctx.restore();
    }
}

// ─── 敵人 (MELEE / SHOOTER / FAST / TANK / FLY / ELITE) ─────────────────────────
class Enemy {
    constructor(x, y, type = 'MELEE', stageIndex = 1, timeFactor = 1) {
        this.x = x; this.y = y;
        const stats = {
            MELEE:  { r:22, hp:90,  speed:2.1, dmg:0.5,  exp:10, color:'#4b9b4b', eye:'#fff' },
            SHOOTER:{ r:20, hp:70,  speed:1.1, dmg:0.4,  exp:13, color:'#b95cff', eye:'#ffea00' },
            FAST:   { r:18, hp:65,  speed:3.4, dmg:0.35, exp:9,  color:'#2acbff', eye:'#fff' },
            TANK:   { r:30, hp:230, speed:0.95,dmg:1.3,  exp:26, color:'#6d4c41', eye:'#ffbba0' },
            FLY:    { r:18, hp:80,  speed:2.6, dmg:0.45, exp:14, color:'#f06292', eye:'#fff' },
            ELITE:  { r:30, hp:360, speed:2.3, dmg:1.8,  exp:40, color:'#ff9100', eye:'#fff' }
        };
        const s = stats[type] || stats.MELEE;
        const stageMul = 1 + (stageIndex - 1) * 0.28;
        const timeMul = 1 + (timeFactor * 0.4);
        this.r = s.r;
        this.hp = s.hp * stageMul * timeMul * 1.08 * 2;
        this.maxHp = this.hp;
        this.speed = s.speed * (1 + (stageIndex - 1) * 0.03);
        this.dmg = s.dmg * stageMul * (1 + timeFactor * 0.25) * (1 + (stageIndex - 1) * 0.03);
        this.expValue = Math.round(s.exp * stageMul * (0.8 + timeFactor * 0.4));
        this.color = s.color;
        this.eyeColor = s.eye;
        this.type = type;
        this.isDead = false;
        this.burnTime = 0;
        this.burnDmg = 0;
        this.frozenTime = 0;
    }
    update(dt, player) {
        if (this.frozenTime > 0) {
            this.frozenTime = Math.max(0, this.frozenTime - dt);
            if (this.burnTime > 0) {
                this.burnTime = Math.max(0, this.burnTime - dt);
                this.hp = Math.max(0, this.hp - (this.burnDmg || 0) * dt / 60);
            }
            return;
        }
        // 擊退物理更新
        if (Math.abs(this.kx) > 0.1 || Math.abs(this.ky) > 0.1) {
            this.x += this.kx * dt;
            this.y += this.ky * dt;
            this.kx *= 0.85;
            this.ky *= 0.85;
        }

        const ang = Math.atan2(player.y - this.y, player.x - this.x);
        this.x += Math.cos(ang) * this.speed * dt;
        this.y += Math.sin(ang) * this.speed * dt;
        if (this.burnTime > 0) {
            this.burnTime = Math.max(0, this.burnTime - dt);
            this.hp = Math.max(0, this.hp - (this.burnDmg || 0) * dt / 60);
        }
        if (Math.hypot(player.x - this.x, player.y - this.y) < player.r + this.r + 8)
            player.takeDamage(this.dmg * dt);
    }
    draw(ctx, cam) {
        const barW = this.r * 2.4, barH = 4;
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(this.x - barW/2, this.y - this.r - barH - 6, barW, barH);
        ctx.fillStyle = this.hp > this.maxHp * 0.5 ? '#9ccc65' : this.hp > this.maxHp * 0.25 ? '#ffca28' : '#ef5350';
        ctx.fillRect(this.x - barW/2, this.y - this.r - barH - 6, barW * (this.hp / this.maxHp), barH);
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // 純色幾何圖形小怪
        ctx.fillStyle = this.color;
        
        if (this.type === 'MELEE') {
            // 正方形 - 近戰
            ctx.fillRect(-this.r, -this.r, this.r*2, this.r*2);
        } else if (this.type === 'SHOOTER') {
            // 五邊形 - 遠程
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                const a = (Math.PI*2/5)*i - Math.PI/2;
                const x = Math.cos(a) * this.r;
                const y = Math.sin(a) * this.r;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();
        } else if (this.type === 'FAST') {
            // 等邊三角形 - 快速
            ctx.beginPath();
            for (let i = 0; i < 3; i++) {
                const a = (Math.PI*2/3)*i - Math.PI/2;
                const x = Math.cos(a) * this.r;
                const y = Math.sin(a) * this.r;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();
        } else if (this.type === 'TANK') {
            // 八邊形 - 坦克
            ctx.beginPath();
            for (let i = 0; i < 8; i++) {
                const a = (Math.PI*2/8)*i;
                const x = Math.cos(a) * this.r;
                const y = Math.sin(a) * this.r;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();
        } else if (this.type === 'FLY') {
            // 六邊形 - 飛行
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const a = (Math.PI*2/6)*i;
                const x = Math.cos(a) * this.r;
                const y = Math.sin(a) * this.r;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();
        } else {
            // ELITE - 星形
            ctx.beginPath();
            for (let i = 0; i < 10; i++) {
                const a = (Math.PI*2/10)*i;
                const r = i%2 === 0 ? this.r*1.3 : this.r*0.5;
                const x = Math.cos(a) * r;
                const y = Math.sin(a) * r;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();
        }
        
        ctx.restore();
    }
}

// ─── BOSS (血量依關卡) ────────────────────────────────────────────────────────
class Boss {
    constructor(x, y, hp = 900, index = 1, timeFactor = 1) {
        this.x = x; this.y = y; this.r = 58;
        const stageMul = 1 + (index - 1) * 0.28;
        const tf = Math.max(1, timeFactor);
        // 再次削減 Boss 血量與傷害，防止秒殺
        this.maxHp = hp * stageMul * 1.4 * tf;
        this.hp = this.maxHp;
        this.speed = (2.8 + (index - 1) * 0.12) * (0.9 + tf * 0.15);
        this.baseDmg = (1.2 + (index - 1) * 0.15) * tf;
        this.kx = 0; this.ky = 0;
        this.isDead = false;
        this.index = index;
        this.timeFactor = tf;
        this.enraged = false;
        this.skillTimer = 0;
        this.shield = true;
        this.shieldTime = 200;
        this.chargeAlpha = 0;
        this.skillName = '';
        this.skillColor = '#ffffff';
        this.burnTime = 0;
        this.burnDmg = 0;
        this.skillTextTimer = 0;
        this.frozenTime = 0;
        this.warningAngle = 0;
        this.warningLine = null;
        this.warningTimer = 0;
        this.pendingAttackRoll = null;
    }
    update(dt, player, projectiles) {
        if (this.frozenTime > 0) {
            this.frozenTime = Math.max(0, this.frozenTime - dt);
            if (this.burnTime > 0) {
                this.burnTime = Math.max(0, this.burnTime - dt);
                this.hp = Math.max(0, this.hp - (this.burnDmg || 0) * dt / 60);
            }
            return;
        }
        if (this.shieldTime > 0) {
            this.shieldTime -= dt;
            if (this.shieldTime <= 0) this.shield = false;
        }
        if (this.burnTime > 0) {
            this.burnTime = Math.max(0, this.burnTime - dt);
            this.hp = Math.max(0, this.hp - (this.burnDmg || 0) * dt / 60);
        }
        if (!this.enraged && this.hp <= this.maxHp * 0.4) {
            this.enraged = true;
            this.speed *= 1.45;
            this.baseDmg *= 1.35;
            this.skillName = '狂暴化！';
            this.skillColor = '#ff5252';
            this.skillTextTimer = 90;
            GameEngine.showAlert('BOSS 進入狂暴！');
            GameEngine.shake(10, 0.35);
        }
        const ang = Math.atan2(player.y - this.y, player.x - this.x);
        const moveSpd = this.speed * (this.enraged ? 1.15 : 1);
        this.x += Math.cos(ang) * moveSpd * dt;
        this.y += Math.sin(ang) * moveSpd * dt;
        if (Math.hypot(player.x - this.x, player.y - this.y) < player.r + this.r)
            player.takeDamage(this.baseDmg * dt * (this.enraged ? 1.5 : 1.15));
        this.skillTimer += dt;
        let skillInterval = Math.max(16, 38 - (this.index - 1) * 2);
        if (this.enraged) skillInterval *= 0.65;
        const chargeStart = Math.max(0, skillInterval - 18);
        const charge = Math.max(0, Math.min(1, (this.skillTimer - chargeStart) / 18));
        if (charge > 0) {
            this.chargeAlpha = charge;
            if (this.skillTextTimer <= 0) {
                this.skillName = 'BOSS 技能即將啟動';
                this.skillColor = '#ffcc00';
                this.skillTextTimer = 24;
            }
        }
        if (this.skillTextTimer > 0) this.skillTextTimer = Math.max(0, this.skillTextTimer - dt);
        
        // 預警紅線邏輯
        if (this.warningTimer > 0) {
            this.warningTimer -= dt;
            return; // 預警期間停止移動與攻擊
        }

        if (this.skillTimer > skillInterval) {
            if (this.warningTimer <= 0 && !this.warningLine) {
                this.warningAngle = Math.atan2(player.y - this.y, player.x - this.x);
                this.warningLine = {
                    tx: this.x + Math.cos(this.warningAngle) * 420,
                    ty: this.y + Math.sin(this.warningAngle) * 420
                };
                this.warningTimer = 60; // 1秒預警 (60幀)
                return;
            }
            this.skillTimer = 0; this.chargeAlpha = 0; this.warningTimer = 0; this.warningLine = null;
            const roll = Math.random();
            const hitDmg = (18 + this.index * 3.2) * this.timeFactor * (this.enraged ? 1.35 : 1);
            const aimAng = this.warningAngle || Math.atan2(player.y - this.y, player.x - this.x);
            const bossProj = (vx, vy, dmg, color, extra) => new Projectile(this.x, this.y, vx, vy, dmg, color, Object.assign({
                hostile: true, life: 420, skillId: 'boss_atk'
            }, extra));
            if (roll < 0.34) {
                const count = this.enraged ? 28 : 22;
                for (let i = 0; i < count; i++) {
                    const a = Math.PI * 2 * i / count;
                    const sp = 12 + this.index * 0.5;
                    projectiles.push(bossProj(Math.cos(a) * sp, Math.sin(a) * sp, hitDmg * 1.1, '#ff8a65', { r: 10, shape: 'hex', skillId: 'boss_burst' }));
                }
                const fan = this.enraged ? 9 : 7;
                for (let i = 0; i < fan; i++) {
                    const off = aimAng + (i - (fan - 1) / 2) * 0.14;
                    const sp = 18 + this.index * 0.55;
                    projectiles.push(bossProj(Math.cos(off) * sp, Math.sin(off) * sp, hitDmg * 1.35, '#ff5722', { r: 11, shape: 'lightning', skillId: 'boss_burst_aim' }));
                }
                this.skillName = '放射彈幕！';
                this.skillColor = '#ff8a65';
                this.skillTextTimer = 72;
                GameEngine.showAlert('BOSS：放射彈幕！');
                GameEngine.shake(6, 0.22);
                GameEngine.spawnParticles(this.x, this.y, '#ff8a65', 18, 3);
            } else if (roll < 0.67) {
                const sp = 20 + this.index * 0.6;
                const beams = this.enraged ? 7 : 5;
                for (let i = 0; i < beams; i++) {
                    const off = aimAng + (i - (beams - 1) / 2) * 0.09;
                    projectiles.push(bossProj(Math.cos(off) * sp, Math.sin(off) * sp, hitDmg * 1.5, '#ffeb3b', { r: 12, shape: 'lightning', skillId: 'boss_laser', life: 480 }));
                }
                this.skillName = '能量狙擊！';
                this.skillColor = '#ffeb3b';
                this.skillTextTimer = 72;
                GameEngine.showAlert('BOSS：能量狙擊！');
                GameEngine.shake(6, 0.22);
                GameEngine.spawnParticles(this.x, this.y, '#ffeb3b', 14, 3);
            } else if (roll < 0.85) {
                const rainCount = this.enraged ? 14 : 10;
                for (let i = 0; i < rainCount; i++) {
                    const baseAng = aimAng + (Math.random() - 0.5) * 1.2;
                    const sp = 14 + this.index * 0.45;
                    projectiles.push(bossProj(Math.cos(baseAng) * sp, Math.sin(baseAng) * sp, hitDmg * 1.25, '#ff7043', {
                        r: 11, shape: 'diamond', homing: true, skillId: 'boss_fire', life: 500
                    }));
                }
                this.skillName = '追蹤火雨！';
                this.skillColor = '#ff7043';
                this.skillTextTimer = 72;
                GameEngine.showAlert('BOSS：追蹤火雨！');
                GameEngine.shake(6, 0.22);
                GameEngine.spawnParticles(this.x, this.y, '#ff7043', 16, 3);
            } else {
                const rings = this.enraged ? 3 : 2;
                for (let w = 0; w < rings; w++) {
                    const count = 10 + w * 4;
                    const ringR = 55 + w * 45;
                    for (let i = 0; i < count; i++) {
                        const a = Math.PI * 2 * i / count;
                        const ox = player.x + Math.cos(a) * ringR;
                        const oy = player.y + Math.sin(a) * ringR;
                        const sp = 11 + w * 2;
                        projectiles.push(new Projectile(ox, oy, Math.cos(a) * sp, Math.sin(a) * sp, hitDmg * 1.25, '#e040fb', {
                            hostile: true, r: 11, shape: 'hex', skillId: 'boss_ring', life: 400
                        }));
                    }
                }
                this.skillName = '壓制光環！';
                this.skillColor = '#e040fb';
                this.skillTextTimer = 72;
                GameEngine.showAlert('BOSS：壓制光環！');
                GameEngine.shake(7, 0.25);
                GameEngine.spawnParticles(player.x, player.y, '#e040fb', 20, 3);
            }
        }
    }
    draw(ctx, cam) {
        const barW = this.r * 2, barH = 6;
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(this.x - barW/2, this.y - this.r - barH - 10, barW, barH);
        ctx.fillStyle = this.hp > this.maxHp * 0.5 ? '#c5e1a5' : this.hp > this.maxHp * 0.25 ? '#ffe082' : '#ef9a9a';
        ctx.fillRect(this.x - barW/2, this.y - this.r - barH - 10, barW * (this.hp / this.maxHp), barH);
        ctx.save();
        
        // 繪製紅線預警
        if (this.warningTimer > 0 && this.warningLine) {
            ctx.strokeStyle = 'rgba(255, 0, 0, 0.7)';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 5]);
            ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.warningLine.tx, this.warningLine.ty); ctx.stroke();
            ctx.setLineDash([]);
        }

        ctx.translate(this.x, this.y);
        const phase = (this.index % 4);
        const colors = [
            ['#ffe0b2', '#ff6e40', '#1b0000', '#ffb74d'],
            ['#e1f5fe', '#4fc3f7', '#00101a', '#4fc3f7'],
            ['#f3e5f5', '#ba68c8', '#1a001f', '#ba68c8'],
            ['#c8e6c9', '#81c784', '#00210b', '#81c784']
        ];
        const pal = colors[phase];
        const outerGrad = ctx.createRadialGradient(0, -this.r*0.2, this.r*0.4, 0, 0, this.r*1.5);
        outerGrad.addColorStop(0, pal[0]);
        outerGrad.addColorStop(0.35, pal[1]);
        outerGrad.addColorStop(1, pal[2]);
        ctx.fillStyle = outerGrad;
        ctx.strokeStyle = pal[3];
        ctx.lineWidth = 4;
        ctx.shadowColor = '#ff6d00';
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.ellipse(0, 0, this.r * 1.25, this.r * 1.05, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.shadowBlur = 0;
        // 裝甲裂痕核心
        ctx.strokeStyle = '#ffcc80';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-this.r * 0.9, -this.r * 0.2);
        ctx.lineTo(this.r * 0.9, -this.r * 0.2);
        ctx.moveTo(-this.r * 0.6, 0);
        ctx.lineTo(this.r * 0.6, 0);
        ctx.moveTo(0, -this.r * 0.9);
        ctx.lineTo(0, this.r * 0.9);
        ctx.stroke();
        ctx.fillStyle = '#fff3e0';
        ctx.beginPath();
        ctx.arc(0, 0, this.r * 0.3, 0, Math.PI * 2);
        ctx.fill();
        // 外圍魔法陣
        ctx.strokeStyle = 'rgba(255,110,64,0.9)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, this.r * 1.7, 0, Math.PI * 2);
        ctx.stroke();
        for (let i = 0; i < 6; i++) {
            const ang = (Math.PI * 2 / 6) * i;
            const x = Math.cos(ang) * this.r * 1.7;
            const y = Math.sin(ang) * this.r * 1.7;
            ctx.beginPath();
            ctx.arc(x, y, this.r * 0.14, 0, Math.PI * 2);
            ctx.stroke();
        }
        // 護盾特效
        if (this.shield) {
            const alpha = Math.max(0, Math.min(1, this.shieldTime / 120));
            ctx.strokeStyle = `rgba(80,220,255,${alpha})`;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(0, 0, this.r * 2.2, 0, Math.PI * 2);
            ctx.stroke();
        }
        if (this.chargeAlpha > 0) {
            ctx.strokeStyle = `rgba(255,80,80,${this.chargeAlpha * 0.85})`;
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.arc(0, 0, this.r * 2.8 + Math.sin(Date.now()/120) * 6, 0, Math.PI * 2);
            ctx.stroke();
            ctx.strokeStyle = `rgba(255,200,80,${this.chargeAlpha * 0.55})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, this.r * 3.4 + Math.cos(Date.now()/140) * 4, 0, Math.PI * 2);
            ctx.stroke();
        }
        if (this.skillTextTimer > 0 && this.skillName) {
            ctx.font = '18px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = this.skillColor;
            ctx.strokeStyle = 'rgba(0,0,0,0.7)';
            ctx.lineWidth = 5;
            ctx.strokeText(this.skillName, 0, -this.r - 24);
            ctx.fillText(this.skillName, 0, -this.r - 24);
        }
        ctx.shadowBlur = 0;
        ctx.restore();
    }
}

// ─── 玩家 (高級刀鋒造型，永遠畫面中央) ────────────────────────────────────────
class Player {
    constructor() { this.reset(); }
    reset() {
        this.x = 0; this.y = 0;
        this.hp = 100; this.maxHp = 100; this.xp = 0; this.xpToNext = 100; this.lv = 1;
        this.speed = 4; this.r = 20; this.magnetDist = 160;
        this.regenTimer = 0;
        this.applyTalents();
        this.equipAtk = 0;
        this.critRate = 0;
        this.petDmg = 0;
        this.skin = SaveSystem.currentData.skin || 'default';
        this.skinAttackTimer = 0;
        this.domainActive = 0;
        this.domainCooldown = 0;
        this.domainWarning = 0;
        this.domainRadius = GOJO_DOMAIN_RADIUS;
    }
    applyTalents() {
        const t = SaveSystem.currentData.talents;
        this.equipAtk = (t.ATK || 0) * 6;
        this.maxHp += (t.HP || 0) * 22;
        this.hp = this.maxHp;
        const speedLevel = Math.min(t.SPD || 0, 10);
        this.speed += speedLevel * 0.4;
        const recLevel = Math.min(t.REC || 0, 10);
        this.regenPerSec = recLevel * 1.2;
    }
    update(dt, projectiles, enemies) {
        const canMove = !GameEngine.pendingLevelUp && !GameEngine.pendingEvo;
        let dx = 0, dy = 0;
        if (canMove) {
            if (Input.keys['w']) dy -= 1;
            if (Input.keys['s']) dy += 1;
            if (Input.keys['a']) dx -= 1;
            if (Input.keys['d']) dx += 1;
            if (navigator.getGamepads) {
                const gp = navigator.getGamepads()[0];
                if (gp) {
                    const ax = gp.axes[0] || 0;
                    const ay = gp.axes[1] || 0;
                    const deadZone = 0.2;
                    if (Math.abs(ax) > deadZone || Math.abs(ay) > deadZone) {
                        dx += ax;
                        dy += ay;
                    }
                }
            }
            if (Input.joystick && Input.joystick.active) {
                dx += Input.joystick.dx;
                dy += Input.joystick.dy;
            }
            if (!Input.joystick.active && Input.mouseActive && dx === 0 && dy === 0) {
                const cx = window.innerWidth / 2;
                const cy = window.innerHeight / 2;
                const vx = Input.mouseX - cx;
                const vy = Input.mouseY - cy;
                const dist = Math.hypot(vx, vy);
                if (dist > 40) {
                    dx += vx / dist;
                    dy += vy / dist;
                }
            }
        }
        const len = Math.hypot(dx, dy);
        if (len > 0 && canMove) {
            let speedBase = this.speed;
            if (BattleSkills.hasPassive('runShoe')) speedBase += 1.5;
            const sp = speedBase * dt;
            this.x += dx / len * sp;
            this.y += dy / len * sp;
        }
        const dist = Math.hypot(this.x, this.y);
        if (dist > MAP_RADIUS) {
            this.x *= MAP_RADIUS / dist;
            this.y *= MAP_RADIUS / dist;
        }
        if (this.regenPerSec) this.hp = Math.min(this.maxHp, this.hp + this.regenPerSec * dt / 60);
        if (BattleSkills.hasPassive('drink')) this.hp = Math.min(this.maxHp, this.hp + 0.12 * dt / 60);
        if (BattleSkills.hasPassive('fastRegen')) this.hp = Math.min(this.maxHp, this.hp + 0.24 * dt / 60);
        this.regenTimer += dt;
        if (this.regenTimer > 180) { // 3 seconds no damage
            this.hp = Math.min(this.maxHp, this.hp + this.maxHp * 0.012 * (dt / 60));
        }
        const gs = BattleSkills.getActive('gojoDomain');
        if (this.skin === 'gojo' && gs) {
            if (this.domainCooldown > 0) this.domainCooldown = Math.max(0, this.domainCooldown - dt);
            if (this.domainActive > 0) {
                this.domainActive = Math.max(0, this.domainActive - dt);
                this.applyDomainFreeze(enemies, GameEngine.bosses);
            } else if (this.domainWarning > 0) {
                this.domainWarning = Math.max(0, this.domainWarning - dt);
                if (this.domainWarning <= 0) {
                    this.triggerGojoDomain(gs.stars, gs.evo);
                }
            } else if (this.domainCooldown <= 0) {
                this.domainWarning = GOJO_DOMAIN_WARN;
                this.domainRadius = GOJO_DOMAIN_RADIUS + gs.stars * 18 + (gs.evo ? 50 : 0);
                GameEngine.showAlert('領域展開準備中… 3 秒');
            }
        } else if (this.skin && this.skin !== 'default') {
            this.skinAttackTimer += dt;
            if (this.skinAttackTimer >= 40) {
                this.skinAttackTimer = 0;
                this.fireSkinAttack(projectiles, enemies);
            }
        }
    }
    triggerGojoDomain(bonusStars = 0, evo = false) {
        this.domainWarning = 0;
        this.domainActive = GOJO_DOMAIN_DURATION;
        this.domainCooldown = GOJO_DOMAIN_COOLDOWN;
        this.domainRadius = GOJO_DOMAIN_RADIUS + bonusStars * 18 + (evo ? 50 : 0);
        GameEngine.showAlert('領域展開！範圍內時停 5 秒');
        GameEngine.shake(8, 0.3);
        GameEngine.spawnParticles(this.x, this.y, '#7e57c2', 28, 4);
        GameEngine.spawnParticles(this.x, this.y, '#e1bee7', 16, 3);
    }
    applyDomainFreeze(enemies, bosses) {
        const r = this.domainRadius || GOJO_DOMAIN_RADIUS;
        for (const e of enemies) {
            if (e.isDead) continue;
            if (Math.hypot(e.x - this.x, e.y - this.y) <= r) {
                e.frozenTime = Math.max(e.frozenTime || 0, this.domainActive);
            }
        }
        for (const b of bosses || []) {
            if (b.isDead) continue;
            if (Math.hypot(b.x - this.x, b.y - this.y) <= r) {
                b.frozenTime = Math.max(b.frozenTime || 0, this.domainActive);
            }
        }
    }
    fireSkinAttack(projectiles, enemies) {
        if (!projectiles) return;
        const speed = 10;
        if (this.skin === 'CD') {
            // 雨神雨降技能：從上方落下連續雨彈
            for (let i = 0; i < 2; i++) {
                const offsetX = (Math.random() - 0.5) * 260;
                const startX = this.x + offsetX;
                const startY = this.y - 420 - Math.random() * 80;
                const targetY = this.y + 40 + Math.random() * 80;
                const ang = Math.atan2(targetY - startY, this.x - startX + (Math.random() - 0.5) * 60);
                projectiles.push(new Projectile(startX, startY, Math.cos(ang) * speed, Math.sin(ang) * speed, 18, '#4dd0e1', {
                    r: 8, shape:'hex', skillId:'rainGod', life: 260, bounce: 0
                }));
            }
            GameEngine.spawnParticles(this.x, this.y - 60, '#4dd0e1', 10, 2);
            return;
        }
        if (this.skin === 'meowl') {
            // 貓頭鷹技能：發射追蹤羽刃，附帶灼燒
            const sorted = enemies.filter(e => !e.isDead).sort((a, b) => Math.hypot(a.x - this.x, a.y - this.y) - Math.hypot(b.x - this.x, b.y - this.y));
            const target = sorted[0] || null;
            const baseAng = target ? Math.atan2(target.y - this.y, target.x - this.x) : Math.random() * Math.PI * 2;
            for (let i = 0; i < 2; i++) {
                const ang = baseAng + (i - 0.5) * 0.35;
                projectiles.push(new Projectile(this.x, this.y, Math.cos(ang) * speed, Math.sin(ang) * speed, 16, '#d500f9', {
                    r: 8, shape:'lightning', life: 260, burn: true, burnDmg: 1.4, homing: true, lockTarget: target || undefined, skillId:'owlStrike'
                }));
            }
            GameEngine.spawnParticles(this.x, this.y, '#ff80ab', 8, 2);
            return;
        }
    }
    takeDamage(amt) {
        let def = 1;
        if (BattleSkills.hasPassive('dmgReduct')) def *= 0.85;
        if (BattleSkills.hasPassive('exoskeleton')) def *= 0.88;
        this.hp = Math.max(0, this.hp - amt * def);
        this.regenTimer = 0; // reset out-of-combat regen
        GameEngine.shake(3, 0.12);
        if (this.hp <= 0) GameEngine.gameOver();
    }
    addXp(value) {
        this.xp += value;
        if (BattleSkills.hasPassive('expBook')) {
            GameEngine.spawnParticles(this.x, this.y, '#80d8ff', 14, 2);
        }
        if (this.xp >= this.xpToNext) {
            this.xp -= this.xpToNext;
            this.lv++;
            this.xpToNext = Math.floor(100 + this.lv * 22);
            GameEngine.queueLevelUp();
        }
    }
    draw(ctx, cam) {
        ctx.save();
        ctx.translate(this.x, this.y);
        if (this.domainWarning > 0) {
            const r = this.domainRadius || GOJO_DOMAIN_RADIUS;
            const prog = 1 - this.domainWarning / GOJO_DOMAIN_WARN;
            const warnR = r * (0.35 + prog * 0.65);
            const alpha = 0.25 + prog * 0.45;
            ctx.strokeStyle = 'rgba(225,190,255,' + alpha + ')';
            ctx.lineWidth = 4;
            ctx.setLineDash([6, 6]);
            ctx.beginPath();
            ctx.arc(0, 0, warnR, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = 'rgba(126,87,194,' + (alpha * 0.35) + ')';
            ctx.beginPath();
            ctx.arc(0, 0, warnR, 0, Math.PI * 2);
            ctx.fill();
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.fillText('領域展開', 0, -warnR - 12);
        }
        if (this.domainActive > 0) {
            const r = this.domainRadius || GOJO_DOMAIN_RADIUS;
            const pulse = 0.55 + Math.sin(Date.now() / 120) * 0.12;
            ctx.strokeStyle = 'rgba(187,134,252,' + pulse + ')';
            ctx.lineWidth = 3;
            ctx.setLineDash([10, 8]);
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            const grad = ctx.createRadialGradient(0, 0, r * 0.2, 0, 0, r);
            grad.addColorStop(0, 'rgba(126,87,194,0.18)');
            grad.addColorStop(1, 'rgba(126,87,194,0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fill();
        }
        const skinCfg = PLAYER_SKINS[this.skin];
        const skinImg = SkinImages[this.skin];
        if (skinImg && skinImg.complete) {
            const maxW = (skinCfg && skinCfg.imgMaxW) || 72;
            const maxH = (skinCfg && skinCfg.imgMaxH) || 72;
            drawSkinImageFit(ctx, skinImg, maxW, maxH);
            ctx.restore();
            return;
        }
        ctx.strokeStyle = '#00d2ff';
        ctx.lineWidth = 2.5;
        ctx.shadowColor = '#00d2ff';
        ctx.shadowBlur = 14;
        ctx.fillStyle = '#00d2ff';
        ctx.beginPath();
        ctx.moveTo(0, -22);
        ctx.lineTo(18, 8);
        ctx.lineTo(8, 22);
        ctx.lineTo(-8, 22);
        ctx.lineTo(-18, 8);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        if (BattleSkills.hasPassive('magnet')) {
            ctx.strokeStyle = 'rgba(80,220,255,0.45)';
            ctx.lineWidth = 3;
            ctx.setLineDash([8, 8]);
            ctx.beginPath();
            ctx.arc(0, 0, this.r + 28, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        if (BattleSkills.hasPassive('expBook')) {
            ctx.strokeStyle = 'rgba(120,240,255,0.45)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, this.r + 34, 0, Math.PI * 2);
            ctx.stroke();
            for (let i = 0; i < 4; i++) {
                const ang = Math.PI * 2 * i / 4 + Date.now() / 220;
                ctx.fillStyle = 'rgba(120,240,255,0.16)';
                ctx.beginPath();
                ctx.arc(Math.cos(ang) * (this.r + 22), Math.sin(ang) * (this.r + 22), 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        if (BattleSkills.hasPassive('drink') || BattleSkills.hasPassive('fastRegen')) {
            const regenAlpha = BattleSkills.hasPassive('fastRegen') ? 0.45 : 0.3;
            ctx.strokeStyle = `rgba(255,120,120,${regenAlpha})`;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(0, 0, this.r + 20 + Math.sin(Date.now()/120) * 4, 0, Math.PI * 2);
            ctx.stroke();
        }
        if (BattleSkills.hasPassive('fireAura')) {
            ctx.strokeStyle = 'rgba(255,130,50,0.45)';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(0, 0, this.r + 16, 0, Math.PI * 2);
            ctx.stroke();
        }
        if (BattleSkills.hasPassive('lifesteal')) {
            ctx.strokeStyle = 'rgba(120,255,140,0.45)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, this.r + 10, 0, Math.PI * 2);
            ctx.stroke();
        }
        if (BattleSkills.hasPassive('critBoost')) {
            ctx.strokeStyle = 'rgba(255,255,255,0.55)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, this.r + 22, 0, Math.PI * 2);
            ctx.stroke();
        }
        ctx.shadowBlur = 0;
        ctx.restore();
    }
}

// ─── 局內技能 (6 主動 + 6 被動，每局重置、可升級疊加) ───────────────────────────
const BattleSkills = {
    active: [], passive: [], maxActive: Infinity, maxPassive: Infinity,
    addActive(id) {
        const ex = this.active.find(a => a.id === id);
        if (ex) {
            if (ex.stars < 5) {
                ex.stars++;
                if (GameEngine.onSkillLeveled) GameEngine.onSkillLeveled(id, ex.stars);
            }
            this.unlockActive(id);
            return true;
        }
        this.active.push({ id, stars: 1, evo: false });
        if (GameEngine.onSkillLeveled) GameEngine.onSkillLeveled(id, 1);
        this.unlockActive(id);
        return true;
    },
    addPassive(id) {
        if (this.passive.some(p => p.id === id)) return;
        this.passive.push({ id });
        this.unlockPassive(id);
    },
    hasPassive(id) { return this.passive.some(p => p.id === id); },
    unlockActive(id) {
        const data = SaveSystem.currentData;
        if (!data.unlockedSkills) data.unlockedSkills = { active:['kunai'], passive: [] };
        if (!Array.isArray(data.unlockedSkills.active)) data.unlockedSkills.active = ['kunai'];
        if (!data.unlockedSkills.active.includes(id)) {
            data.unlockedSkills.active.push(id);
            SaveSystem.save();
        }
    },
    unlockPassive(id) {
        const data = SaveSystem.currentData;
        if (!data.unlockedSkills) data.unlockedSkills = { active:['kunai'], passive: [] };
        if (!Array.isArray(data.unlockedSkills.passive)) data.unlockedSkills.passive = [];
        if (!data.unlockedSkills.passive.includes(id)) {
            data.unlockedSkills.passive.push(id);
            SaveSystem.save();
        }
    },
    getActive(id) { return this.active.find(a => a.id === id); },
    canEvo(activeId) {
        const a = this.getActive(activeId);
        if (!a || a.stars < 5 || a.evo) return null;
        const conf = ACTIVE_SKILLS[activeId];
        if (!conf || !this.hasPassive(conf.passiveEvo)) return null;
        return conf.evoName;
    },
    doEvo(activeId) { const a = this.getActive(activeId); if (a) a.evo = true; },
    reset() { this.active = []; this.passive = []; }
};

// ─── 武器發射邏輯（1 星每輪最多 3 發，升級 +1，EVO 再加）────────────────────
function fireWeapon(skillId, player, projectiles, enemies, stats) {
    const a = BattleSkills.getActive(skillId);
    if (!a) return;
    const baseDmg = 25 + a.stars * 20 + (stats.atk || 0) + (player.equipAtk || 0);
    // 平衡流光飛刃傷害
    const mult = (skillId === 'kunai' ? 0.55 : 1.15);
    const dmg = baseDmg * skillLevelDamageMult(a.stars, a.evo) * mult;
    const crit = ((player.critRate || 0) + (stats.crit || 0)) > Math.random() ? 2 : 1;
    const finalDmg = dmg * crit * (1 + (stats.burst || 0)) * (GameEngine.skillBuff || 1);
    const spd = 10 + (stats.range ? 2 : 0);

    if (skillId === 'kunai') {
        const count = skillProjCount(1, a.stars, a.evo, 2);
        const sorted = [...enemies].filter(e => !e.isDead).sort((a, b) =>
            Math.hypot(a.x - player.x, a.y - player.y) - Math.hypot(b.x - player.x, b.y - player.y));
        for (let i = 0; i < count; i++) {
            const target = sorted[0] || null;
            const ang = target ? Math.atan2(target.y - player.y, target.x - player.x) : (Math.PI * 2 * i / Math.max(count, 1));
            const proj = new Projectile(player.x, player.y, Math.cos(ang)*spd*1.2, Math.sin(ang)*spd*1.2, finalDmg, a.evo ? '#00ffcc' : '#00d2ff', {
                homing: true, r: a.evo ? 8 : 6, shape: 'blade', lockTarget: target || undefined, skillId
            });
            projectiles.push(proj);
        }
        return;
    }
    // 其他技能重構：燃燒瓶改為地面區域
    if (skillId === 'burnBottle') {
        const count = skillProjCount(1, a.stars, a.evo, 1);
        for (let i = 0; i < count; i++) {
            const ang = Math.random() * Math.PI * 2;
            const dist = 80 + Math.random() * 150;
            const tx = player.x + Math.cos(ang) * dist;
            const ty = player.y + Math.sin(ang) * dist;
            projectiles.push(new Projectile(tx, ty, 0, 0, finalDmg * 0.4, '#ff5722', {
                r: a.evo ? 60 : 40, shape: 'orb', skillId, life: 240, isPuddle: true, burn: true, burnDmg: finalDmg * 0.6
            }));
        }
        return;
    }
    // 力場與護盾加入強大的擊退
    if (skillId === 'forcefield') {
        const r = 70 + a.stars * 20 + (a.evo ? 40 : 0);
        projectiles.push(new Projectile(player.x, player.y, 0, 0, finalDmg * 0.6, '#4dd0e1', {
            r: r, shape: 'orb', skillId, life: 30, followPlayer: true, knockback: 25 + a.stars * 5
        }));
        return;
    }
    if (skillId === 'guardian') {
        const count = skillProjCount(2, a.stars, a.evo, 1);
        for (let i = 0; i < count; i++) {
            const ang = (Date.now() / 150) + Math.PI * 2 * i / count;
            projectiles.push(new Projectile(player.x + Math.cos(ang) * 60, player.y + Math.sin(ang) * 60, 0, 0, finalDmg * 0.8, '#81c784', {
                r: a.evo ? 16 : 12, shape: 'hex', skillId, life: 2, followPlayer: true, knockback: 12 + a.stars * 3
            }));
        }
        return;
    }
    if (skillId === 'aegisDome') {
        const r = 70 + a.stars * 10 + (a.evo ? 20 : 0);
        projectiles.push(new Projectile(player.x, player.y, 0, 0, finalDmg * 0.6, '#29b6f6', {
            r: r, shape: 'orb', skillId, life: 36 + a.stars * 6, followPlayer: true, knockback: 22 + a.stars * 4
        }));
        return;
    }
    if (skillId === 'mirrorBarrier') {
        const count = 3 + Math.min(3, a.stars);
        for (let i = 0; i < count; i++) {
            const ang = (Date.now() / 240) + Math.PI * 2 * i / count;
            projectiles.push(new Projectile(player.x + Math.cos(ang) * 58, player.y + Math.sin(ang) * 58, 0, 0, finalDmg * 0.5, '#00838f', {
                r: a.evo ? 11 : 9, shape: 'diamond', skillId, life: 400, followPlayer: true, knockback: 18 + a.stars * 3
            }));
        }
        return;
    }
    if (skillId === 'regenField') {
        const count = 2 + Math.min(3, a.stars);
        for (let i = 0; i < count; i++) {
            const ang = Math.PI * 2 * i / count + (Date.now() / 360);
            projectiles.push(new Projectile(player.x + Math.cos(ang) * 44, player.y + Math.sin(ang) * 44, 0, 0, finalDmg * 0.45, '#a5d6a7', {
                r: a.evo ? 11 : 8, shape: 'hex', skillId, life: 420, followPlayer: true, knockback: 12 + a.stars * 2
            }));
        }
        return;
    }
    if (skillId === 'thornsShell') {
        const count = 3 + Math.min(3, a.stars);
        for (let i = 0; i < count; i++) {
            const ang = Math.PI * 2 * i / count;
            projectiles.push(new Projectile(player.x + Math.cos(ang) * 52, player.y + Math.sin(ang) * 52, 0, 0, finalDmg * 0.7, '#7b1fa2', {
                r: a.evo ? 12 : 9, shape: 'hex', skillId, life: 380, followPlayer: true, knockback: 20 + a.stars * 3
            }));
        }
        return;
    }
    if (skillId === 'football') {
        const ang = (Date.now() / 200 + projectiles.length) % (Math.PI * 2);
        projectiles.push(new Projectile(player.x, player.y, Math.cos(ang)*(spd*0.85), Math.sin(ang)*(spd*0.85), finalDmg * 1.15, '#0f8', { bounce: 6, r: a.evo ? 14 : 9, shape: 'hex', skillId }));
        return;
    }
    if (skillId === 'shardStorm') {
        const shards = skillProjCount(3, a.stars, a.evo, 4);
        for (let i = 0; i < shards; i++) {
            const ang = Math.PI * 2 * i / shards + (a.evo ? 0.09 : 0);
            projectiles.push(new Projectile(player.x, player.y, Math.cos(ang) * spd * 1.1, Math.sin(ang) * spd * 1.1, finalDmg * 0.95, '#8d6e63', { r: 7, shape:'hex', skillId, life: 320 }));
        }
        return;
    }
    if (skillId === 'archon') {
        const count = skillProjCount(3, a.stars, a.evo, 3);
        for (let i = 0; i < count; i++) {
            const ang = Math.PI * 2 * i / count + (a.evo ? 0.08 : 0);
            projectiles.push(new Projectile(player.x, player.y, Math.cos(ang) * spd * 1.4, Math.sin(ang) * spd * 1.4, finalDmg * 1.35, '#d1c4e9', { r: 10, shape: 'lightning', skillId, life: 340 }));
        }
        return;
    }
    if (skillId === 'vortex') {
        const parts = skillProjCount(3, a.stars, a.evo, 3);
        for (let i = 0; i < parts; i++) {
            const ang = Math.PI * 2 * i / parts;
            const px = player.x + Math.cos(ang) * (50 + a.stars * 3);
            const py = player.y + Math.sin(ang) * (50 + a.stars * 3);
            projectiles.push(new Projectile(px, py, -Math.sin(ang) * spd * 0.4, Math.cos(ang) * spd * 0.4, finalDmg * 0.9, '#536dfe', { r: 8, shape:'orb', skillId, life: 280 }));
        }
        return;
    }
    if (skillId === 'laserGrid') {
        const target = enemies.sort((a,b)=>Math.hypot(a.x-player.x,a.y-player.y)-Math.hypot(b.x-player.x,b.y-player.y))[0];
        const baseAng = target ? Math.atan2(target.y-player.y,target.x-player.x) : Math.random() * Math.PI*2;
        const beams = skillProjCount(3, a.stars, a.evo, 2);
        for (let i = 0; i < beams; i++) {
            const ang = baseAng + (i - (beams - 1) / 2) * 0.25;
            projectiles.push(new Projectile(player.x, player.y, Math.cos(ang) * spd * 1.6, Math.sin(ang) * spd * 1.6, finalDmg * 1.4, '#7c4dff', { r: 6, shape:'lightning', skillId, life: 380 }));
        }
        return;
    }
    if (skillId === 'ripple') {
        const total = skillProjCount(3, a.stars, a.evo, 2);
        const radius = 70 + (a.stars - 1) * 12;
        for (let i = 0; i < total; i++) {
            const ang = Math.PI * 2 * i / total;
            const px = player.x + Math.cos(ang) * radius;
            const py = player.y + Math.sin(ang) * radius;
            projectiles.push(new Projectile(px, py, Math.cos(ang) * spd * 0.9, Math.sin(ang) * spd * 0.9, finalDmg * 0.7, '#64b5f6', { r: 6, shape:'diamond', skillId, life: 260 }));
        }
        return;
    }
    if (skillId === 'spikeMine') {
        const mineCount = skillProjCount(3, a.stars, a.evo, 2);
        for (let i = 0; i < mineCount; i++) {
            const ang = Math.PI * 2 * i / mineCount;
            const px = player.x + Math.cos(ang) * 90;
            const py = player.y + Math.sin(ang) * 90;
            projectiles.push(new Projectile(px, py, 0, 0, finalDmg * 0.95, '#8bc34a', { r: a.evo ? 12 : 8, shape:'hex', skillId, life: 320 }));
        }
        return;
    }
    if (skillId === 'thunderNova') {
        const bolts = skillProjCount(3, a.stars, a.evo, 4);
        for (let i = 0; i < bolts; i++) {
            const ang = Math.PI * 2 * i / bolts;
            projectiles.push(new Projectile(player.x, player.y, Math.cos(ang) * spd * 1.2, Math.sin(ang) * spd * 1.2, finalDmg * 0.95, '#ffe082', { r: 7, shape:'lightning', skillId, life: 280 }));
        }
        return;
    }
    if (skillId === 'shieldWall') {
        const wall = skillProjCount(3, a.stars, a.evo, 2);
        for (let i = 0; i < wall; i++) {
            const ang = Math.PI * 2 * i / wall;
            projectiles.push(new Projectile(player.x + Math.cos(ang) * 65, player.y + Math.sin(ang) * 65, Math.cos(ang) * spd * 0.8, Math.sin(ang) * spd * 0.8, finalDmg * 1.05, '#81c784', { r: a.evo ? 12 : 10, shape:'diamond', skillId, life: 380 }));
        }
        return;
    }
    if (skillId === 'novaBlast') {
        projectiles.push(new Projectile(player.x, player.y, Math.cos(Math.random()*Math.PI*2) * spd * 1.3, Math.sin(Math.random()*Math.PI*2) * spd * 1.3, finalDmg * 1.5, '#ffcc80', { r: a.evo ? 14 : 10, shape:'orb', skillId, life: 420 }));
        return;
    }
    if (skillId === 'lightning' || skillId === 'revolver' || skillId === 'destruction') {
        const sorted = [...enemies].filter(e => !e.isDead).sort((a, b) =>
            Math.hypot(a.x - player.x, a.y - player.y) - Math.hypot(b.x - player.x, b.y - player.y));
        const target = sorted[0];

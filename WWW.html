<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raingod Secure Pro</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #f2f2f7; --accent: #5856d6; }
        body { font-family: -apple-system, sans-serif; background: #000; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        #app { 
            width: 100%; max-width: 500px; background: white; 
            display: flex; flex-direction: column; height: 100vh; 
        }
        
        .header { height: 60px; padding: 0 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        
        .bubble { padding: 12px 16px; border-radius: 18px; font-size: 15px; word-break: break-all; position: relative; max-width: 280px; }
        .me .bubble { background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }
        
        /* 檔案與多媒體樣式 */
        .chat-img { max-width: 100%; border-radius: 8px; cursor: zoom-in; margin-bottom: 5px; }
        .audio-player { width: 220px; height: 40px; margin-top: 5px; }
        .file-link { 
            display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.05); 
            padding: 10px; border-radius: 8px; text-decoration: none; color: inherit; font-size: 13px; margin-top: 5px;
        }
        .me .file-link { background: rgba(255,255,255,0.2); }

        /* 輸入區域 */
        .input-area { padding: 10px 15px 30px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border: none; background: #f2f2f7; border-radius: 20px; outline: none; }
        
        .hidden { display: none !important; }
        .btn-sm { padding: 5px 10px; border-radius: 5px; border: 1px solid #ddd; background: none; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="app">
    <div id="login-view" style="padding: 40px 25px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center;">
        <h2 style="color: var(--me-bg);">Raingod Secure</h2>
        <input type="text" id="room-input" placeholder="房號">
        <input type="text" id="nick-input" placeholder="你的暱稱" style="margin: 10px 0;">
        <input type="password" id="admin-pass" placeholder="管理員金鑰">
        <button onclick="handleJoin()" style="margin-top:20px; padding:15px; background:var(--me-bg); color:white; border:none; border-radius:10px; font-weight:bold;">進入加密房間</button>
        <p id="status" style="color:red; font-size:12px;"></p>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <div><b id="room-title">...</b> <small id="online-text"></small></div>
            <div style="display:flex; gap:5px;">
                <button id="del-btn" class="btn-sm hidden" style="color:red; border-color:red;" onclick="destroyRoom()">銷毀</button>
                <button class="btn-sm" onclick="location.reload()">離開</button>
            </div>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="file" id="file-selector" class="hidden" onchange="sendFile(this)">
            <button onclick="document.getElementById('file-selector').click()" style="font-size:24px; border:none; background:none;">📎</button>
            <input type="text" id="msg-input" placeholder="安全訊息..." onkeypress="if(event.key==='Enter') doSend()">
            <button id="send-btn" onclick="doSend()" style="color:var(--me-bg); font-weight:bold; border:none; background:none; font-size:16px;">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- 防 F12 指令與檢查 ---
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
            alert("系統安全機制：禁用開發者工具");
            return false;
        }
    };

    const firebaseConfig = { apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk", databaseURL: "https://chat-73802-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);
    document.getElementById('room-input').value = localStorage.getItem('last_room') || "";
    document.getElementById('nick-input').value = localStorage.getItem('last_nick') || "";

    let roomID = ""; let myName = ""; let lastSendTime = 0; let msgCount = 0;

    window.handleJoin = async function() {
        roomID = document.getElementById('room-input').value.trim().toUpperCase();
        myName = document.getElementById('nick-input').value.trim() || "訪客";
        const adminKey = document.getElementById('admin-pass').value;
        if(!roomID) return;

        localStorage.setItem('last_room', roomID);
        localStorage.setItem('last_nick', myName);
        
        const roomSnap = await get(ref(db, `rooms/${roomID}`));
        if(!roomSnap.exists()) {
            const updates = {};
            updates[`/rooms/${roomID}/meta`] = { owner: uid, admin_key: adminKey };
            updates[`/owners/${uid}`] = roomID;
            await update(ref(db), updates);
        }
        enterUI();
    };

    function enterUI() {
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = roomID;
        const userRef = ref(db, `rooms/${roomID}/users/${uid}`);
        set(userRef, true); onDisconnect(userRef).remove();
        startChat();
    }

    // --- 防刷訊息邏輯 ---
    window.doSend = () => {
        const now = Date.now();
        if (now - lastSendTime < 1000) { msgCount++; } else { msgCount = 0; }
        if (msgCount > 3) return alert("偵測到異常頻率，請稍後再傳");
        lastSendTime = now;

        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        
        // 使用純文字處理，防止程式碼預覽(XSS防護)
        const safeText = inp.value.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        
        push(ref(db, `rooms/${roomID}/msgs`), { type:'text', content: safeText, uid, name: myName, ts: serverTimestamp() });
        inp.value = "";
    };

    window.sendFile = (el) => {
        const file = el.files[0];
        if(!file || file.size > 8*1024*1024) return alert("限8MB內");
        const reader = new FileReader();
        reader.onload = (e) => {
            let type = 'file';
            if(file.type.startsWith('image/')) type = 'image';
            if(file.type.startsWith('audio/')) type = 'audio';
            
            push(ref(db, `rooms/${roomID}/msgs`), { 
                type: type, content: e.target.result, fileName: file.name, uid, name: myName, ts: serverTimestamp() 
            });
        };
        reader.readAsDataURL(file);
    };

    function startChat() {
        onValue(ref(db, `rooms/${roomID}/users`), s => document.getElementById('online-text').innerText = `(${s.size || 1}人)`);
        onValue(ref(db, `rooms/${roomID}/meta`), s => {
            if(!s.exists()) location.reload();
            if(s.val()?.owner === uid) document.getElementById('del-btn').classList.remove('hidden');
        });

        onValue(ref(db, `rooms/${roomID}/msgs`), (snap) => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(c => {
                const d = c.val(); if(!d) return;
                const isMe = d.uid === uid;
                const time = d.ts ? new Date(d.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "";
                
                let mediaHTML = "";
                if(d.type === 'image') {
                    mediaHTML = `<img src="${d.content}" class="chat-img" onclick="window.open('${d.content}')">
                                 <a href="${d.content}" download="${d.fileName || 'img.png'}" style="font-size:10px; color:inherit;">⬇️ 下載圖片</a>`;
                } else if(d.type === 'audio') {
                    mediaHTML = `<audio controls class="audio-player"><source src="${d.content}"></audio>`;
                } else if(d.type === 'file') {
                    mediaHTML = `<a href="${d.content}" download="${d.fileName}" class="file-link">
                                    <span>📄 ${d.fileName}</span>
                                    <b style="margin-left:auto">💾 下載</b>
                                 </a>`;
                } else {
                    mediaHTML = `<code style="white-space:pre-wrap;">${d.content}</code>`;
                }

                const row = document.createElement('div');
                row.className = `msg-row ${isMe ? 'me' : 'other'}`;
                row.innerHTML = `
                    <div style="font-size:10px; color:#999; margin:0 5px 2px;">${d.name}</div>
                    <div style="display:flex; align-items:flex-end; gap:5px; ${isMe?'flex-direction:row-reverse':''}">
                        <div class="bubble" onclick="${isMe ? `if(confirm('收回？')) remove(ref(db,'rooms/${roomID}/msgs/${c.key}'))`:''}">
                            ${mediaHTML}
                        </div>
                        <span style="font-size:9px; color:#ccc;">${time}</span>
                    </div>`;
                box.appendChild(row);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.destroyRoom = async () => {
        const pass = prompt("請輸入管理員密碼以銷毀房間：");
        const metaSnap = await get(ref(db, `rooms/${roomID}/meta`));
        if(pass === metaSnap.val().admin_key || pass === "你的管理員密碼") {
            const updates = {}; updates[`/rooms/${roomID}`] = null; updates[`/owners/${uid}`] = null;
            await update(ref(db), updates);
        } else { alert("密碼錯誤"); }
    };
</script>
</body>
</html>

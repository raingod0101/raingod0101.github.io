<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raingod Chat | 智慧進入版</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #e9e9eb; --danger: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; height: 100vh; }
        .hidden { display: none !important; }
        .header { height: 60px; padding: 0 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #fff; }
        .msg-row { display: flex; flex-direction: column; width: 100%; }
        .msg-row.me { align-items: flex-end; }
        .msg-row.other { align-items: flex-start; }
        .bubble-group { display: flex; align-items: flex-end; gap: 6px; max-width: 85%; }
        .me .bubble-group { flex-direction: row-reverse; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; word-break: break-all; cursor: pointer; }
        .me .bubble { background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }
        .info-tag { font-size: 9px; color: #aaa; display: flex; flex-direction: column; min-width: 45px; }
        .me .info-tag { align-items: flex-end; }
        .input-area { padding: 10px 15px 30px; border-top: 1px solid #eee; display: flex; gap: 8px; align-items: center; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 10px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-view" style="padding: 40px 25px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center;">
        <h2 style="color: var(--me-bg);">Raingod Pro</h2>
        <input type="text" id="room-input" placeholder="房號">
        <input type="text" id="nick-input" placeholder="暱稱" style="margin: 10px 0;">
        <input type="password" id="admin-pass" placeholder="管理員密碼">
        <button onclick="handleJoin()" style="margin-top:20px; padding:15px; background:var(--me-bg); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">進入房間</button>
        <p id="status" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <b id="room-title">ROOM</b>
            <button id="del-btn" class="hidden" onclick="destroyRoom()" style="color:red; border:none; background:none; font-weight:bold; cursor:pointer;">銷毀</button>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="file" id="file-selector" class="hidden" onchange="sendFile(this)">
            <button onclick="document.getElementById('file-selector').click()" style="background:none; border:none; font-size:20px; cursor:pointer;">📎</button>
            <input type="text" id="msg-input" placeholder="訊息..." onkeypress="if(event.key==='Enter') doSend()">
            <button onclick="doSend()" style="color:var(--me-bg); font-weight:bold; border:none; background:none; cursor:pointer;">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk",
        databaseURL: "https://chat-73802-default-rtdb.firebaseio.com",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);

    let roomID = ""; let myName = "";
    let msgLog = [];

    window.handleJoin = async function() {
        roomID = document.getElementById('room-input').value.trim().toUpperCase();
        myName = document.getElementById('nick-input').value.trim() || "User";
        const pass = document.getElementById('admin-pass').value;
        const status = document.getElementById('status');
        if(!roomID) return;

        // 【第一步】先檢查房間是否存在
        const roomRef = ref(db, `rooms/${roomID}`);
        const roomSnap = await get(roomRef);

        if (roomSnap.exists()) {
            // 房號存在 -> 直接放行進入
            enterUI();
        } else {
            // 房號不存在 -> 進入創房邏輯
            const ownerSnap = await get(ref(db, `owners/${uid}`));
            
            // 如果你手上有別的房，且密碼不對
            if (ownerSnap.exists() && pass !== "你的超級密碼") {
                status.innerText = `你已擁有房號: ${ownerSnap.val()}，請先銷毀。`;
                return;
            }

            // 執行「原子性寫入」：同時創房 + 佔位
            const updates = {};
            updates[`/rooms/${roomID}/meta`] = { owner: uid, admin_key: pass };
            updates[`/owners/${uid}`] = roomID;

            try {
                await update(ref(db), updates);
                enterUI();
            } catch (e) {
                status.innerText = "創房失敗：權限遭攔截。";
            }
        }
    };

    function enterUI() {
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = "房號: " + roomID;
        
        const userRef = ref(db, `rooms/${roomID}/users/${uid}`);
        set(userRef, true);
        onDisconnect(userRef).remove();
        
        startChat();
    }

    async function sendCore(payload) {
        const now = Date.now();
        msgLog = msgLog.filter(t => now - t < 30000);
        if (msgLog.length >= 10) return alert("太快了！30秒內限10則。");
        msgLog.push(now);
        push(ref(db, `rooms/${roomID}/msgs`), { ...payload, uid, name: myName, ts: serverTimestamp() });
    }

    window.doSend = () => {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        sendCore({ type: 'text', content: inp.value });
        inp.value = "";
    };

    window.sendFile = (el) => {
        const file = el.files[0];
        if(!file || file.size > 5 * 1024 * 1024) return alert("限 5MB 以下");
        const reader = new FileReader();
        reader.onload = (e) => sendCore({ type: 'file', content: e.target.result, fileName: file.name });
        reader.readAsDataURL(file);
        el.value = "";
    };

    window.recallMsg = (id) => {
        if(confirm("收回訊息？")) remove(ref(db, `rooms/${roomID}/msgs/${id}`));
    };

    function startChat() {
        onValue(ref(db, `rooms/${roomID}/users`), s => {
            window.onlineCount = s.size || 1;
        });

        onValue(ref(db, `rooms/${roomID}/meta`), s => {
            if(!s.exists()) location.reload();
            if(s.val()?.owner === uid) document.getElementById('del-btn').classList.remove('hidden');
        });

        onValue(ref(db, `rooms/${roomID}/msgs`), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                const isMe = d.uid === uid;
                const time = d.ts ? new Date(d.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "";
                const row = document.createElement('div');
                row.className = `msg-row ${isMe ? 'me' : 'other'}`;
                let html = d.type === 'text' ? d.content : `<a href="${d.content}" download="${d.fileName}" style="color:inherit;text-decoration:none;">📁 ${d.fileName}</a>`;
                row.innerHTML = `
                    <div style="font-size:10px; color:#888; margin-bottom:2px;">${d.name}</div>
                    <div class="bubble-group">
                        <div class="bubble" onclick="${isMe ? `recallMsg('${c.key}')` : ''}">${html}</div>
                        <div class="info-tag">
                            ${isMe ? `<span style="color:#007aff; font-weight:bold;">已讀 ${window.onlineCount-1}</span>` : ''}
                            <span>${time}</span>
                        </div>
                    </div>`;
                box.appendChild(row);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.destroyRoom = async () => {
        if(confirm("確定銷毀？")) {
            const updates = {};
            updates[`/rooms/${roomID}`] = null;
            updates[`/owners/${uid}`] = null;
            await update(ref(db), updates);
            location.reload();
        }
    };
</script>
</body>
</html>

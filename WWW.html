
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>爆炸 | Raingod</title>
    <style>
        :root { 
            --neon: #00f2ff; --pink: #ff007b; --gold: #ffcc00; --purple: #bc13fe; 
            --bg: #020205; --white: #ffffff; --emerald: #00ff88; --orange: #ff6600;
        }
        html, body { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background: var(--bg); font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; 
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }
        #nav_bar { height: 60px; background: #0a0a14; border-bottom: 1px solid #333; z-index: 100; }
        #game-container { 
            flex-grow: 1; position: relative; overflow: hidden; 
            cursor: crosshair; touch-action: none; 
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* UI Overlay */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 15px; box-sizing: border-box; z-index: 10; }
        .stat-group { display: flex; flex-direction: column; gap: 8px; pointer-events: auto; }
        .panel { background: rgba(0, 0, 0, 0.85); border: 1px solid #222; border-left: 4px solid var(--neon); padding: 8px 15px; backdrop-filter: blur(5px); }
        .label { color: #666; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }
        .value { color: #fff; font-size: 20px; font-weight: 900; }
        
        .ctrl-btn { padding: 10px 15px; background: #111; color: #fff; border: 1px solid var(--pink); cursor: pointer; pointer-events: auto; font-weight: bold; font-size: 13px; }
        .ctrl-btn:active { background: var(--pink); color: #000; }

        #shop-window { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 90%; max-width: 450px; height: 70vh; 
            overflow-y: auto; background: rgba(5, 5, 10, 0.98); 
            border: 2px solid var(--neon); padding: 20px; display: none; 
            pointer-events: auto; z-index: 100; touch-action: auto;
        }
        .upgrade-card { background: #0a0a0f; margin-bottom: 10px; padding: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .up-name { color: var(--neon); font-size: 13px; font-weight: bold; }
        .btn-buy { background: var(--gold); border: none; padding: 8px 10px; font-weight: 900; min-width: 70px; cursor: pointer; }
        .btn-buy:disabled { background: #333; color: #666; cursor: not-allowed; }

        #combo-wrap { position: absolute; bottom: 20px; left: 20px; }
        .combo-n { font-size: 50px; color: #fff; line-height: 0.7; font-style: italic; font-weight: 900; opacity: 0.4; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); }
    </style>
</head>
<body>
<link rel="stylesheet" href="menu.css">

<div id="nav_bar"></div>

<script src="menu.js"></script>
    <div id="game-container">
        <canvas id="canvas"></canvas>
        <div id="hud">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div class="stat-group">
                    <div class="panel"><div class="label">CREDITS</div><div class="value">$ <span id="money-display">0</span></div></div>
                    <div class="panel" style="border-left-color: var(--pink);"><div class="label">POWER</div><div class="value">ATK <span id="damage-display">1</span></div></div>
                    <div class="panel" style="border-left-color: var(--gold);"><div class="label">Ω RANK</div><div class="value">x <span id="prestige-display">1</span></div></div>
                </div>
                <div class="stat-group">
                    <button class="ctrl-btn" onclick="toggleShop()">SHOP</button>
                    <button id="prestige-btn" class="ctrl-btn" style="border-color: var(--gold); display:none;" onclick="doPrestige()">ASCEND</button>
                </div>
            </div>
            <div id="combo-wrap">
                <div class="label" style="color:var(--neon)">CHAIN STREAK</div>
                <div class="combo-n" id="combo-display">0</div>
            </div>
        </div>
        
        <div id="shop-window">
            <h2 style="color:#fff; border-bottom: 2px solid var(--neon); padding-bottom:10px;">UPGRADES</h2>
            <div id="shop-content"></div>
            <button onclick="toggleShop()" style="width:100%; margin-top:20px; padding:12px; background:#222; color:#fff; border:none; cursor:pointer;">CLOSE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');

        const MOB_TYPES = {
    // --- [Tier 1: Basic] ---
    NANO:      { name: '納米碎片', color: '#555555', hp: 1, reward: 5, size: 20, behavior: 'normal' },
    COMMON:    { name: 'Drone', color: '#00f2ff', hp: 5, reward: 15, size: 30, behavior: 'normal' },
    BIT:       { name: '位元蟲', color: '#00ff44', hp: 15, reward: 50, size: 25, behavior: 'normal' },
    CORE:      { name: '核心單元', color: '#ffffff', hp: 40, reward: 150, size: 35, behavior: 'normal' },
    
    // --- [Tier 2: Advanced] ---
    ELITE:     { name: 'Hunter', color: '#ff007b', hp: 120, reward: 600, size: 45, behavior: 'fast' },
    SCOUT:     { name: '偵查者', color: '#ffff00', hp: 250, reward: 1500, size: 40, behavior: 'fast' },
    VOID:      { name: 'Void', color: '#bc13fe', hp: 1000, reward: 5000, size: 55, behavior: 'sine' },
    GHOST:     { name: '幽靈程序', color: '#888888', hp: 2500, reward: 12000, size: 50, behavior: 'sine' },

    // --- [Tier 3: Elemental] ---
    PHANTOM:   { name: '魅影', color: '#7000ff', hp: 8000, reward: 40000, size: 52, behavior: 'wobble' },
    FLAME:     { name: '烈焰', color: '#ff4400', hp: 20000, reward: 100000, size: 60, behavior: 'jitter' },
    MAGMA:     { name: 'Magma', color: '#ff6600', hp: 50000, reward: 250000, size: 65, behavior: 'jitter' },
    STORM:     { name: '風暴', color: '#00ccff', hp: 150000, reward: 750000, size: 70, behavior: 'vortex' },

    // --- [Tier 4: Celestial] ---
    TYT:       { name: 'TYT-巨頭', color: '#ff0000', hp: 500000, reward: 2500000, size: 100, behavior: 'sine' },
    SOLAR:     { name: 'Solar', color: '#ffcc00', hp: 2000000, reward: 10000000, size: 85, behavior: 'pulse' },
    NEBULA:    { name: '星雲', color: '#ff00ff', hp: 10000000, reward: 50000000, size: 95, behavior: 'teleport' },
    BLACKHOLE: { name: '黑洞', color: '#111111', hp: 50000000, reward: 300000000, size: 120, behavior: 'vortex' },

    // --- [Tier 5: Godly] ---
    CHRONOS:   { name: '時空主宰', color: '#ffff00', hp: 250000000, reward: 1500000000, size: 130, behavior: 'chaos' },
    ETERNAL:   { name: '永恆之巔', color: '#00ffff', hp: 1000000000, reward: 8000000000, size: 140, behavior: 'pulse' },
    INFINITY:  { name: '無限意志', color: '#ff0055', hp: 5000000000, reward: 40000000000, size: 145, behavior: 'chaos' },
    ZENITH:    { name: '絕對頂點', color: '#ffffff', hp: 50000000000, reward: 500000000000, size: 200, behavior: 'chaos' }
};

        const SAVE_KEY = 'raingod_eternal_save_data';
        let gameData = {
            money: 0, totalEarned: 0, prestige: 1,
            upgrades: {
                damage: { lv: 1, cost: 50, mult: 1.45, name: "量子核心", desc: "增加每次點擊的破壞力" },
                range: { lv: 1, cost: 200, mult: 1.6, name: "共振距離", desc: "引發更遠的連鎖爆炸" },
                luck: { lv: 1, cost: 1000, mult: 2.3, name: "命運干涉", desc: "提高稀有怪出現機率" }
            },
        };

        let width, height, combo = 0;
        let cubes = [], particles = [], floaters = [];

        function init() {
            width = canvas.width = container.clientWidth;
            height = canvas.height = container.clientHeight;
            loadGame(); 
            refreshUI();
        }

        function saveGame() {
            localStorage.setItem(SAVE_KEY, JSON.stringify(gameData));
        }

        function loadGame() {
            const localData = localStorage.getItem(SAVE_KEY);
            if (localData) {
                try {
                    gameData = { ...gameData, ...JSON.parse(localData) };
                } catch(e) { console.error(e); }
            }
        }

        class Cube {
            constructor() {
                // 在 Mob 類的 constructor 內
const roll = Math.random();
// 幸運值加成修正：使用 Math.sqrt 防止 luck 過高時稀有怪滿地跑
// 假設 luck.lv 為 100，luck 則約為 0.5。sqrt(0.5) 約為 0.7
const luckEffect = Math.sqrt(gameData.upgrades.luck.lv * 0.005); 

// --- 判定邏輯 (由稀有到普通) ---

// 1. 神級 (極稀有：萬分之一到十萬分之一)
if (roll < 0.00001 + luckEffect * 0.00005)      this.type = MOB_TYPES.ZENITH;
else if (roll < 0.00005 + luckEffect * 0.0002)   this.type = MOB_TYPES.INFINITY;
else if (roll < 0.0002 + luckEffect * 0.0008)    this.type = MOB_TYPES.ETERNAL;
else if (roll < 0.0006 + luckEffect * 0.002)     this.type = MOB_TYPES.CHRONOS;

// 2. 宇宙級 (稀有：千分之幾)
else if (roll < 0.002 + luckEffect * 0.005)      this.type = MOB_TYPES.BLACKHOLE;
else if (roll < 0.006 + luckEffect * 0.01)       this.type = MOB_TYPES.NEBULA;
else if (roll < 0.015 + luckEffect * 0.02)       this.type = MOB_TYPES.SOLAR;
else if (roll < 0.03 + luckEffect * 0.03)        this.type = MOB_TYPES.TYT;

// 3. 元素級 (中等：5% - 15%)
else if (roll < 0.06 + luckEffect * 0.05)        this.type = MOB_TYPES.STORM;
else if (roll < 0.10 + luckEffect * 0.06)        this.type = MOB_TYPES.MAGMA;
else if (roll < 0.15 + luckEffect * 0.07)        this.type = MOB_TYPES.FLAME;
else if (roll < 0.22 + luckEffect * 0.08)        this.type = MOB_TYPES.PHANTOM;

// 4. 進階級 (常見：20% - 40%)
else if (roll < 0.30 + luckEffect * 0.1)         this.type = MOB_TYPES.GHOST;
else if (roll < 0.40 + luckEffect * 0.1)         this.type = MOB_TYPES.VOID;
else if (roll < 0.52 + luckEffect * 0.1)         this.type = MOB_TYPES.SCOUT;
else if (roll < 0.65 + luckEffect * 0.1)         this.type = MOB_TYPES.ELITE;

// 5. 基礎級 (保底)
else if (roll < 0.78)                            this.type = MOB_TYPES.CORE;
else if (roll < 0.88)                            this.type = MOB_TYPES.BIT;
else if (roll < 0.96)                            this.type = MOB_TYPES.COMMON;
else                                             this.type = MOB_TYPES.NANO;
                this.x = Math.random() * (width - 60) + 30;
                this.y = Math.random() * (height - 60) + 30;
                this.size = this.type.size;
                const hpScale = Math.pow(1.25, (gameData.upgrades.damage.lv - 1) / 4);
                this.hp = this.type.hp * gameData.prestige * hpScale;
                this.maxHp = this.hp;
                this.color = this.type.color;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.tick = 0;
                this.dead = false;
            }

            update() {
                this.tick += 0.05;
                // 在開始計算前，確保透明度是正常的 (防止殘留效果)
                ctx.globalAlpha = 1;

                switch(this.type.behavior) {
                    case 'fast': 
                        this.x += this.vx * 3; this.y += this.vy * 3; 
                        break;
                    case 'sine': 
                        this.x += this.vx; this.y += Math.sin(this.tick) * 5; 
                        break;
                    case 'jitter': 
                        // 劇烈震動 (Magma)
                        this.x += this.vx + (Math.random()-0.5)*8; 
                        this.y += this.vy + (Math.random()-0.5)*8; 
                        break;
                    case 'wobble': 
                        // 輕微上下震動 (魅影)
                        this.x += this.vx;
                        this.y += this.vy + Math.sin(this.tick * 4) * 3;
                        break;
                    case 'pulse': 
                        // 縮放動作 (Solar, Eternal)
                        this.size = this.type.size + Math.sin(this.tick * 2) * 10; 
                        this.x += this.vx; this.y += this.vy; 
                        break;
                    case 'vortex': 
                        // 旋轉移動 (Storm, Galaxy)
                        this.x += this.vx + Math.cos(this.tick) * 4;
                        this.y += this.vy + Math.sin(this.tick) * 4;
                        break;
                    case 'teleport': 
                        if(Math.random() < 0.01) { this.x = Math.random()*width; this.y = Math.random()*height; } 
                        this.x += this.vx; this.y += this.vy; 
                        break;
                    case 'chaos': 
                        this.vx += (Math.random()-0.5)*0.5; this.vy += (Math.random()-0.5)*0.5; 
                        this.x += this.vx; this.y += this.vy; 
                        break;
                    default: 
                        this.x += this.vx; this.y += this.vy;
                }
                
                // 邊界判定 (保持不變)
                if(this.x < 20 || this.x > width - 20) this.vx *= -1;
                if(this.y < 20 || this.y > height - 20) this.vy *= -1;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
                let p = this.hp / this.maxHp;
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#111'; ctx.fillRect(-20, -this.size/2 - 12, 40, 5);
                ctx.fillStyle = this.color; ctx.fillRect(-20, -this.size/2 - 12, 40 * p, 5);
                ctx.restore();
            }

            explode() {
                combo++;
                let reward = this.type.reward * gameData.prestige;
                gameData.money += reward;
                gameData.totalEarned += reward;
                spawnEffect(this.x, this.y, this.color);
                spawnText(this.x, this.y, `+$${Math.floor(reward).toLocaleString()}`, this.color);

                let range = 110 + (gameData.upgrades.range.lv * 18);
                cubes.forEach(c => {
                    if(!c.dead && Math.hypot(this.x - c.x, this.y - c.y) < range) {
                        setTimeout(() => c.takeDamage(getAtkPower() * 0.6), 80);
                    }
                });
                if(gameData.totalEarned > 5000000) document.getElementById('prestige-btn').style.display = 'block';
                refreshUI(); saveGame();
            }

            takeDamage(dmg) {
                if(this.dead) return;
                this.hp -= dmg;
                if(this.hp <= 0) { this.dead = true; this.explode(); }
            }
        }

        function getAtkPower() { return Math.pow(1.55, gameData.upgrades.damage.lv - 1) * gameData.prestige; }

        function refreshUI() {
            document.getElementById('money-display').innerText = Math.floor(gameData.money).toLocaleString();
            document.getElementById('damage-display').innerText = Math.floor(getAtkPower()).toLocaleString();
            document.getElementById('prestige-display').innerText = gameData.prestige;
            document.getElementById('combo-display').innerText = combo;
        }

        function spawnEffect(x, y, color) {
            for(let i=0; i<12; i++) {
                particles.push({ x, y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life:1, color });
            }
        }

        function spawnText(x, y, txt, color) {
            floaters.push({ x, y, txt, color, life:1.2, vy:-1.5 });
        }

        function toggleShop() {
            const s = document.getElementById('shop-window');
            s.style.display = s.style.display === 'block' ? 'none' : 'block';
            if(s.style.display === 'block') {
                const cont = document.getElementById('shop-content');
                cont.innerHTML = '';
                for(let k in gameData.upgrades) {
                    const up = gameData.upgrades[k];
                    const cost = Math.floor(up.cost * Math.pow(up.mult, up.lv-1));
                    cont.innerHTML += `<div class="upgrade-card">
                        <div><div class="up-name">${up.name} [LV.${up.lv}]</div><small style="color:#666">${up.desc}</small></div>
                        <button class="btn-buy" onclick="buy('${k}', ${cost})" ${gameData.money < cost ? 'disabled' : ''}>$${cost.toLocaleString()}</button>
                    </div>`;
                }
            }
        }

        window.buy = (k, cost) => {
            if(gameData.money >= cost) {
                gameData.money -= cost;
                gameData.upgrades[k].lv++;
                refreshUI(); saveGame();
                toggleShop(); toggleShop();
            }
        }

        function doPrestige() {
            gameData.prestige++;
            gameData.money = 0; gameData.totalEarned = 0;
            for (let k in gameData.upgrades) gameData.upgrades[k].lv = 1;
            document.getElementById('prestige-btn').style.display = 'none';
            refreshUI(); saveGame();
        }

        function loop() {
            ctx.fillStyle = 'rgba(2, 2, 5, 0.3)';
            ctx.fillRect(0, 0, width, height);
            if(cubes.length < 20) cubes.push(new Cube());
            cubes = cubes.filter(c => !c.dead);
            cubes.forEach(c => { c.update(); c.draw(); });
            particles = particles.filter(p => (p.life -= 0.03) > 0);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, 2, 2);
            });
            floaters = floaters.filter(f => (f.life -= 0.02) > 0);
            floaters.forEach(f => {
                f.y += f.vy; ctx.fillStyle = f.color; ctx.globalAlpha = f.life;
                ctx.font = "bold 14px Segoe UI"; ctx.fillText(f.txt, f.x, f.y);
            });
            ctx.globalAlpha = 1;
            requestAnimationFrame(loop);
        }

        function handleAction(ex, ey) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = ex - rect.left;
            const mouseY = ey - rect.top;
            let hit = false;
            for (let i = cubes.length - 1; i >= 0; i--) {
                const c = cubes[i];
                if(Math.hypot(mouseX - c.x, mouseY - c.y) < (c.size/1.5) + 30) {
                    c.takeDamage(getAtkPower());
                    hit = true; break;
                }
            }
            if(!hit) combo = 0;
            refreshUI();
        }

        // 專門處理遊戲畫布的點擊
        canvas.addEventListener('mousedown', (e) => handleAction(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            const touch = e.touches[0];
            handleAction(touch.clientX, touch.clientY);
        }, { passive: false });

        window.onload = init;
        loop();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雨神聊天室 | Raingod</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #f2f2f7; --danger: #ff3b30; --text-gray: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: #000; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; -webkit-user-select: none; }
        #app { width: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; height: 100vh; position: relative; }
        .header { height: 60px; padding: 0 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; background: #fff; z-index: 10; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        .msg-row { display: flex; flex-direction: column; width: 100%; }
        .msg-row.me { align-items: flex-end; }
        .msg-row.other { align-items: flex-start; }
        .bubble { padding: 12px; border-radius: 18px; font-size: 15px; word-break: break-all; max-width: 85%; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .me .bubble { background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }
        .file-card { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); min-width: 200px; }
        .dl-btn { background: var(--me-bg); color: white; border: none; padding: 8px; border-radius: 8px; font-size: 12px; cursor: pointer; width: 100%; margin-top: 8px; }
        .input-area { padding: 10px 15px 35px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; background: #fff; }
        input[type="text"] { flex: 1; padding: 12px 16px; border: none; background: #f2f2f7; border-radius: 25px; outline: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div id="app">
    <div id="login-view" style="padding: 40px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 15px;">
        <h2>雨神聊天室</h2>
        <input type="text" id="room-input" placeholder="房號">
        <input type="text" id="nick-input" placeholder="暱稱">
        <button onclick="handleJoin()" style="padding:15px; background:#007aff; color:white; border:none; border-radius:15px;">進入房間</button>
    </div>
    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <b id="room-title"></b>
            <button onclick="location.reload()">退出</button>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="file" id="file-selector" class="hidden" onchange="sendFile(this)">
            <button onclick="document.getElementById('file-selector').click()">📎</button>
            <input type="text" id="msg-input" placeholder="訊息...">
            <button onclick="doSend()">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const app = initializeApp({ databaseURL: "https://chat-73802-default-rtdb.firebaseio.com" });
    const db = getDatabase(app);
    let currentRoom = "", myNick = "", uid = 'u' + Math.random().toString(36).substr(2, 7);

    window.handleJoin = async () => {
        currentRoom = document.getElementById('room-input').value.trim().toUpperCase();
        myNick = document.getElementById('nick-input').value.trim() || "訪客";
        if(!currentRoom) return;
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = currentRoom;
        initChat();
    };

    window.sendFile = (el) => {
        const file = el.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            push(ref(db, `rooms/${currentRoom}/msgs`), { 
                type: 'file', 
                content: e.target.result, 
                fileName: file.name, 
                uid, name: myNick, ts: serverTimestamp() 
            });
        };
        reader.readAsDataURL(file);
    };

    window.doSend = () => {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        push(ref(db, `rooms/${currentRoom}/msgs`), { type:'text', content: inp.value, uid, name: myNick, ts: serverTimestamp() });
        inp.value = "";
    };

    window.downloadFile = (dataUrl, fileName) => {
        const a = document.createElement('a'); a.href = dataUrl; a.download = fileName; a.click();
    };

    function initChat() {
        onValue(ref(db, `rooms/${currentRoom}/msgs`), snap => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(child => {
                const d = child.val();
                let body = d.type === 'text' ? `<div>${d.content}</div>` : 
                           `<div class="file-card">📁 ${d.fileName}<button class="dl-btn" onclick="downloadFile('${d.content}','${d.fileName}')">下載/查看</button></div>`;
                const div = document.createElement('div');
                div.className = `msg-row ${d.uid === uid ? 'me' : 'other'}`;
                div.innerHTML = `<div class="bubble">${body}</div>`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Raingod 聊天室測試</title>
</head>
<body>
    <h2>Raingod 雲端資料庫測試</h2>
    
    <input type="text" id="msgInput" placeholder="隨便打個字...">
    <button onclick="sendToFirebase()">點我傳送到 Firebase</button>

    <p>狀態：<span id="status">等待輸入...</span></p>

    <script type="module">
        // 1. 引入 Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 2. 你的專案身分證 (記得去 Firebase 專案設定拿完整的，這裡只放關鍵部分)
        const firebaseConfig = {
            databaseURL: "https://raingod010101-default-rtdb.asia-southeast1.firebasedatabase.app/",
            // 請在這裡補上你從 Firebase 拿到的其他資料 (apiKey, projectId 等)
            apiKey: "你的API金鑰",
            projectId: "raingod010101",
        };

        // 3. 初始化
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 4. 傳送函式
        window.sendToFirebase = function() {
            const text = document.getElementById('msgInput').value;
            if (!text) return alert("請輸入文字");

            const chatRef = ref(db, 'test_message');
            const newMessageRef = push(chatRef);
            
            set(newMessageRef, {
                content: text,
                time: new Date().toLocaleString()
            }).then(() => {
                document.getElementById('status').innerText = "發送成功！快去看 Firebase 後台！";
                document.getElementById('msgInput').value = "";
            }).catch((error) => {
                document.getElementById('status').innerText = "失敗：" + error.message;
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>解壓縮 | Raingod</title>
    <!-- 引入 Bootstrap 5 與 JSZip -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { background-color: #f4f7f6; padding: 40px 20px; font-family: system-ui, -apple-system, sans-serif; }
        .upload-card { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 30px; max-width: 800px; margin: auto; }
        .drop-zone { border: 2px dashed #cbd5e0; border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; background: #fafafa; }
        .drop-zone:hover { border-color: #6366f1; background: #f0f4ff; }
        #file-list { margin-top: 20px; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #edf2f7; }
        .file-item:last-child { border-bottom: none; }
        .badge-folder { background-color: #e2e8f0; color: #475569; }
    </style>
</head>
<body>

<div class="upload-card">
    <h3 class="mb-4 text-center">📦 解壓縮工具</h3>
    
    <!-- 檔案上傳區域 -->
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('zip-input').click()">
        <p class="mb-0 text-secondary">點擊或拖放 <strong>.zip</strong> 檔案到此處</p>
        <input type="file" id="zip-input" accept=".zip" style="display: none">
    </div>

    <!-- 狀態顯示 -->
    <div id="status" class="mt-3 text-center text-primary" style="display: none;">正在處理中...</div>

    <!-- 檔案清單 -->
    <div id="file-list-container" style="display: none;">
        <hr>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">檔案清單</h5>
            <button class="btn btn-sm btn-primary" onclick="extractAll()">全部解壓縮</button>
        </div>
        <div id="file-list" class="list-group">
            <!-- 檔案會生成在這裡 -->
        </div>
    </div>
</div>

<script>
    const zipInput = document.getElementById('zip-input');
    const fileListContainer = document.getElementById('file-list-container');
    const fileList = document.getElementById('file-list');
    const status = document.getElementById('status');
    let currentZip = null;

    // 監聽檔案上傳
    zipInput.onchange = async function(e) {
        const file = e.target.files[0];
        if (!file) return;
        handleFile(file);
    };

    async function handleFile(file) {
        status.style.display = 'block';
        fileList.innerHTML = '';
        
        try {
            const jszip = new JSZip();
            // 讀取壓縮檔
            currentZip = await jszip.loadAsync(file);
            
            fileListContainer.style.display = 'block';
            
            // 遍歷壓縮檔內的每個檔案
            currentZip.forEach((relativePath, zipEntry) => {
                const isFolder = zipEntry.dir;
                const div = document.createElement('div');
                div.className = 'file-item';
                
                div.innerHTML = `
                    <span>
                        <span class="badge ${isFolder ? 'badge-folder' : 'bg-info'} me-2">
                            ${isFolder ? '資料夾' : '檔案'}
                        </span>
                        ${relativePath}
                    </span>
                    ${!isFolder ? `<button class="btn btn-outline-success btn-sm" onclick="extractSingle('${relativePath}')">下載</button>` : ''}
                `;
                fileList.appendChild(div);
            });
            
            status.innerText = "讀取完成！";
        } catch (err) {
            console.error(err);
            alert("讀取壓縮檔失敗，請確認是否為正確的 ZIP 格式。");
        } finally {
            status.style.display = 'none';
        }
    }

    // 解壓縮單個檔案並觸發瀏覽器下載
    async function extractSingle(filename) {
        const fileData = await currentZip.file(filename).async("blob");
        const link = document.createElement('a');
        link.href = URL.createObjectURL(fileData);
        link.download = filename.split('/').pop(); // 只取檔名
        link.click();
    }

    // 全部解壓縮 (依序下載)
    async function extractAll() {
        const files = Object.keys(currentZip.files);
        for (let name of files) {
            if (!currentZip.files[name].dir) {
                await extractSingle(name);
            }
        }
    }

    // 支援拖放功能
    const dropZone = document.getElementById('drop-zone');
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = '#6366f1'; };
    dropZone.ondragleave = () => { dropZone.style.borderColor = '#cbd5e0'; };
    dropZone.ondrop = (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file && file.name.endsWith('.zip')) {
            handleFile(file);
        } else {
            alert("請拖放 ZIP 檔案");
        }
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>質因數分解 | Raingod</title>
    <link rel="stylesheet" href="menu.css">
</head>
<body>
    <div id="nav_bar"></div>
    <div class="container">
        <div class="card">
            <h1>質因數分解</h1>
            <p>輸入一個數字，我們將為您解析它的靈魂成分。</p>
            <div style="margin-top:20px;">
                <input type="number" id="numInput" placeholder="請輸入整數...">
                <button onclick="factorize()">開始分解</button>
            </div>
            <h2 id="result" style="margin-top:30px; color:#007aff;"></h2>
        </div>
    </div>
    <script src="loadMenu.js"></script>
    <script>
        function factorize() {
            let n = document.getElementById('numInput').value;
            if(!n || n < 2) return alert("請輸入大於 1 的數字");
            let res = [];
            let d = 2;
            while (n >= d*d) {
                if (n % d === 0) { res.push(d); n /= d; }
                else d++;
            }
            res.push(n);
            document.getElementById('result').innerText = "結果: " + res.join(' × ');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Neon Snake | Raingod</title>
    <link rel="stylesheet" href="menu.css">
    <style>
        body { background: #050505; color: white; text-align: center; overflow: hidden; }
        .game-wrapper { position: relative; display: inline-block; margin-top: 20px; border: 2px solid #007aff; border-radius: 20px; padding: 5px; box-shadow: 0 0 50px rgba(0,122,255,0.3); }
        canvas { background: #000; border-radius: 15px; display: block; }
        .ui-overlay { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-family: monospace; font-size: 1.2rem; pointer-events: none; }
    </style>
</head>
<body>
    <div id="nav_bar"></div>
    <div class="game-wrapper">
        <div class="ui-overlay">
            <div>SCORE: <span id="score">0</span></div>
            <div>HIGH: <span id="high">0</span></div>
        </div>
        <canvas id="snakeCanvas" width="400" height="400"></canvas>
    </div>
    <script src="loadMenu.js"></script>
    <script>
        const canvas = document.getElementById('snakeCanvas'), ctx = canvas.getContext('2d');
        let snake = [{x:10, y:10}], food = {x:5, y:5}, dx = 0, dy = 0, score = 0, hi = localStorage.getItem('s_hi')||0;
        document.getElementById('high').innerText = hi;

        function main() {
            setTimeout(function onTick() {
                update(); draw(); main();
            }, 130); // 速度放慢至 130ms，更有操控感
        }

        function update() {
            if (dx===0 && dy===0) return;
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if (head.x<0||head.x>19||head.y<0||head.y>19||snake.some(s=>s.x===head.x&&s.y===head.y)) return reset();
            snake.unshift(head);
            if (head.x===food.x && head.y===food.y) {
                score+=10; document.getElementById('score').innerText = score;
                food = {x:Math.floor(Math.random()*20), y:Math.floor(Math.random()*20)};
            } else snake.pop();
        }

        function draw() {
            ctx.fillStyle = 'black'; ctx.fillRect(0,0,400,400);
            // 繪製食物 (發光紅心)
            ctx.shadowBlur = 15; ctx.shadowColor = '#ff3b30'; ctx.fillStyle = '#ff3b30';
            ctx.beginPath(); ctx.arc(food.x*20+10, food.y*20+10, 7, 0, Math.PI*2); ctx.fill();
            // 繪製蛇 (漸層藍)
            snake.forEach((s, i) => {
                ctx.shadowBlur = i===0 ? 20 : 5; ctx.shadowColor = '#007aff';
                ctx.fillStyle = i===0 ? '#ffffff' : '#007aff';
                ctx.beginPath(); ctx.roundRect(s.x*20+2, s.y*20+2, 16, 16, 5); ctx.fill();
            });
            ctx.shadowBlur = 0;
        }

        function reset() {
            if(score > hi) localStorage.setItem('s_hi', score);
            alert("Game Over! Score: " + score);
            location.reload();
        }

        window.onkeydown = e => {
            if(e.key==='ArrowUp'&&dy!==1){dx=0;dy=-1}
            if(e.key==='ArrowDown'&&dy!==-1){dx=0;dy=1}
            if(e.key==='ArrowLeft'&&dx!==1){dx=-1;dy=0}
            if(e.key==='ArrowRight'&&dx!==-1){dx=1;dy=0}
        };
        main();
    </script>
</body>
</html>

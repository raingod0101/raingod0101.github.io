<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raingod Access Portal</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --neon-green: #00ff41;
            --bg-dark: #0a0a0a;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-shadow: 0 0 5px var(--neon-green);
        }

        #user-card {
            border: 1px solid var(--neon-green);
            padding: 20px;
            margin-top: 20px;
            display: none; /* 登入後才顯示 */
            text-align: center;
            background: rgba(0, 255, 65, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        #user-card img {
            border-radius: 50%;
            border: 2px solid var(--neon-green);
            width: 80px;
            margin-bottom: 10px;
        }

        .status-text {
            font-size: 0.8rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* 自定義登入按鈕容器 */
        #login-btn-wrapper {
            border: 1px solid var(--neon-green);
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="status-text">SYSTEM STATUS: RESTRICTED ACCESS</div>
    <h1>IDENTIFY YOURSELF</h1>

    <div id="login-btn-wrapper">
        <div id="g_id_onload"
             data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin"
             data-type="standard"
             data-size="large"
             data-theme="dark"
             data-text="signin_with"
             data-shape="rectangular"
             data-logo_alignment="left">
        </div>
    </div>

    <div id="user-card">
        <img id="user-pic" src="" alt="User profile">
        <h3 id="user-name"></h3>
        <p id="user-email"></p>
        <button onclick="logout()" style="background:transparent; color:red; border:1px solid red; cursor:pointer;">DISCONNECT</button>
    </div>

    <script>
        // 解析 Google 傳回的 JWT Token (前端解碼)
        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            return JSON.parse(jsonPayload);
        }

        // 登入成功的回調函數
        function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
            
            // 解碼取得使用者資料
            const userData = parseJwt(response.credential);
            console.log(userData);

            // 更新 UI
            document.getElementById('login-btn-wrapper').style.display = 'none';
            document.getElementById('user-card').style.display = 'block';
            
            document.getElementById('user-name').innerText = `USER: ${userData.name}`;
            document.getElementById('user-email').innerText = `ID: ${userData.email}`;
            document.getElementById('user-pic').src = userData.picture;
            
            // 你可以把資料存在 localStorage，讓頁面重整後依然保持登入
            localStorage.setItem('raingod_user', JSON.stringify(userData));
        }

        function logout() {
            localStorage.removeItem('raingod_user');
            location.reload(); // 簡單暴力地重整頁面來登出
        }

        // 頁面載入時檢查是否已登入
        window.onload = function() {
            const savedUser = localStorage.getItem('raingod_user');
            if (savedUser) {
                const userData = JSON.parse(savedUser);
                document.getElementById('login-btn-wrapper').style.display = 'none';
                document.getElementById('user-card').style.display = 'block';
                document.getElementById('user-name').innerText = `USER: ${userData.name}`;
                document.getElementById('user-email').innerText = `ID: ${userData.email}`;
                document.getElementById('user-pic').src = userData.picture;
            }
        };
    </script>
</body>
</html>

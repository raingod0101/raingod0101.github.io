<!DOCTYPE html>
<html>
<head>
    <title>貪吃蛇 | Raingod Game</title>
    <link rel="stylesheet" href="menu.css">
    <style>
        canvas { background: #000; display: block; margin: 20px auto; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div id="nav_bar"></div>
    <div class="container" style="text-align:center;">
        <h1>極簡貪吃蛇</h1>
        <canvas id="snakeGame" width="400" height="400"></canvas>
        <p>使用方向鍵控制方向</p>
    </div>
    <script src="loadMenu.js"></script>
    <script>
        const canvas = document.getElementById('snakeGame');
        const ctx = canvas.getContext('2d');
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0, dy = 0;
        setInterval(() => {
            ctx.fillStyle = 'black'; ctx.fillRect(0,0,400,400);
            snake.forEach(p => { ctx.fillStyle = '#007aff'; ctx.fillRect(p.x*20, p.y*20, 18, 18); });
            ctx.fillStyle = '#ff3b30'; ctx.fillRect(food.x*20, food.y*20, 18, 18);
            let head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if(head.x === food.x && head.y === food.y) { food = {x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)}; }
            else snake.pop();
        }, 100);
        document.onkeydown = e => {
            if(e.key==='ArrowUp') {dx=0; dy=-1}
            if(e.key==='ArrowDown') {dx=0; dy=1}
            if(e.key==='ArrowLeft') {dx=-1; dy=0}
            if(e.key==='ArrowRight') {dx=1; dy=0}
        };
    </script>
</body>
</html>

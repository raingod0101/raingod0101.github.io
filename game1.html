<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Neon Snake Pro | Raingod Studio</title>
    <link rel="stylesheet" href="menu.css">
    <style>
        body {
            background: #0a0a0c; /* 深色背景襯托霓虹 */
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            margin-top: 30px;
            padding: 10px;
            background: linear-gradient(145deg, #1a1a1c, #0a0a0c);
            border-radius: 20px;
            box-shadow: 0 20px 80px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,122,255,0.2);
            border: 1px solid rgba(255,255,255,0.05);
        }

        canvas {
            display: block;
            border-radius: 12px;
            background: #000;
        }

        .stats-panel {
            display: flex;
            justify-content: space-between;
            width: 420px;
            margin-bottom: 15px;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 12px;
            border-left: 4px solid #007aff;
        }

        .score-val {
            font-weight: 700;
            font-size: 1.2rem;
            color: #007aff;
            text-shadow: 0 0 10px rgba(0,122,255,0.5);
        }

        /* 遊戲結束覆蓋層 */
        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0,0,0,0.85);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid #ff3b30;
            z-index: 100;
        }

        h2 { color: #ff3b30; margin-bottom: 10px; }
        .restart-btn {
            background: #ff3b30;
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .restart-btn:hover { transform: scale(1.1); background: #ff5e57; }
    </style>
</head>
<body>

    <div id="nav_bar"></div>

    <div class="container" style="display:flex; flex-direction:column; align-items:center;">
        <div class="stats-panel">
            <div class="stat-box">Score: <span id="score" class="score-val">0</span></div>
            <div class="stat-box">High: <span id="high-score" class="score-val">0</span></div>
        </div>

        <div class="game-container">
            <canvas id="snakeCanvas" width="400" height="400"></canvas>
            <div id="game-over">
                <h2>GAME OVER</h2>
                <p style="color:white; margin-bottom:20px;">這波操作不行啊！再試一次？</p>
                <button class="restart-btn" onclick="resetGame()">RESTART</button>
            </div>
        </div>
        
        <p style="margin-top:20px; color:#86868b;">使用方向鍵操控，吃到方塊增加能量</p>
    </div>

    <script src="loadMenu.js"></script>
    <script>
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highEl = document.getElementById('high-score');
        const gameOverEl = document.getElementById('game-over');

        const gridSize = 20;
        const tileCount = 20;

        let score = 0;
        let highScore = localStorage.getItem('snakeHigh') || 0;
        highEl.innerText = highScore;

        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 0;
        let dy = 0;
        let gameActive = true;

        function draw() {
            if (!gameActive) return;

            // 背景清空
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 繪製網格輔助線 (極淡)
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            for(let i=0; i<canvas.width; i+=gridSize) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,400); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(400,i); ctx.stroke();
            }

            // 繪製食物 (發光效果)
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff3b30';
            ctx.fillStyle = '#ff3b30';
            ctx.beginPath();
            ctx.roundRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4, 5);
            ctx.fill();

            // 繪製蛇
            snake.forEach((segment, index) => {
                const isHead = index === 0;
                ctx.shadowBlur = isHead ? 20 : 10;
                ctx.shadowColor = isHead ? '#007aff' : 'rgba(0,122,255,0.5)';
                ctx.fillStyle = isHead ? '#007aff' : '#5ac8fa';
                
                ctx.beginPath();
                ctx.roundRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2, 6);
                ctx.fill();
            });
            ctx.shadowBlur = 0; // 重置陰影

            // 移動邏輯
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            if (dx !== 0 || dy !== 0) {
                // 碰撞檢測 (牆壁或自己)
                if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || 
                    snake.some(s => s.x === head.x && s.y === head.y)) {
                    endGame();
                    return;
                }

                snake.unshift(head);

                // 吃到食物
                if (head.x === food.x && head.y === food.y) {
                    score += 10;
                    scoreEl.innerText = score;
                    generateFood();
                } else {
                    snake.pop();
                }
            }
        }

        function generateFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // 確保食物不長在蛇身上
            if (snake.some(s => s.x === food.x && s.y === food.y)) generateFood();
        }

        function endGame() {
            gameActive = false;
            gameOverEl.style.display = 'block';
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHigh', highScore);
                highEl.innerText = highScore;
            }
        }

        function resetGame() {
            score = 0;
            scoreEl.innerText = 0;
            snake = [{x: 10, y: 10}];
            dx = 0; dy = 0;
            gameActive = true;
            gameOverEl.style.display = 'none';
        }

        window.addEventListener('keydown', e => {
            switch(e.key) {
                case 'ArrowUp': if(dy!==1){dx=0; dy=-1;} break;
                case 'ArrowDown': if(dy!==-1){dx=0; dy=1;} break;
                case 'ArrowLeft': if(dx!==1){dx=-1; dy=0;} break;
                case 'ArrowRight': if(dx!==-1){dx=1; dy=0;} break;
            }
        });

        setInterval(draw, 90); // 速度控制
    </script>
</body>
</html>

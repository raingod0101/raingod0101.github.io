<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Viewer | Raingod</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --text-color: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        button {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 8px 20px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        button.active {
            background: var(--neon-purple);
            border-color: var(--neon-purple);
            color: white;
            box-shadow: 0 0 15px var(--neon-purple);
        }

        /* PDF 顯示區域 */
        .viewer-container {
            flex-grow: 1;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%);
        }

        iframe {
            width: 95%;
            height: 100%;
            border: 2px solid var(--neon-blue);
            background-color: #333;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
        }
    </style>
</head>
<body>
<link rel="stylesheet" href="menu.css">

<div id="nav_bar"></div>

<script src="menu.js"></script>
<nav>
    <button id="defaultBtn" onclick="switchPDF('下冊第三章補充資料_260410_132501_compressed.pdf', this)" class="active">補充資料</button>
    <button onclick="switchPDF('CH 3(學生版)2026翰林_260417_132236_compressed.pdf', this)">筆記</button>
</nav>

<div class="viewer-container">
    <iframe id="pdfFrame" src="下冊第三章補充資料_260410_132501_compressed.pdf" frameborder="0"></iframe>
</div>

<script>
    function switchPDF(fileName, btn) {
        const frame = document.getElementById('pdfFrame');
        const encodedPath = encodeURI(fileName);

        // 偵測是否為行動裝置 (手機或平板)
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        if (isMobile) {
            // 手機版直接在新分頁開啟，以使用系統原生閱讀器觀看完整頁數
            window.open(encodedPath, '_blank');
        } else {
            // 電腦版維持原本在 iframe 切換
            frame.src = encodedPath;
        }

        // 更新按鈕樣式 (無論手機或電腦都更新 UI 反饋)
        const buttons = document.querySelectorAll('button');
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        console.log("Terminal loading: " + encodedPath);
    }

    // 確保頁面載入時正確編碼初始 PDF
    window.onload = function() {
        const frame = document.getElementById('pdfFrame');
        const initialSrc = frame.getAttribute('src');
        frame.src = encodeURI(initialSrc);
    };
</script>

</body>
</html>

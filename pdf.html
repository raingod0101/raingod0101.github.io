<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Viewer | Raingod</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --text-color: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        

        button {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 12px 25px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }

        button:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        /* 內容提示區 */
        .viewer-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%);
            text-align: center;
            padding: 20px;
        }

        .status-text {
            color: var(--neon-blue);
            font-size: 1.2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 5px var(--neon-blue);
        }
    </style>
</head>
<body>
<link rel="stylesheet" href="menu.css">

<div id="nav_bar"></div>

<script src="menu.js"></script>

<nav>
    <button onclick="openPDF('下冊第三章補充資料_260410_132501_compressed.pdf')">開啟補充資料</button>
    <button onclick="openPDF('CH 3(學生版)2026翰林_260417_132236_compressed.pdf')">開啟筆記內容</button>
</nav>

<div class="viewer-container">
    <div class="status-text">SYSTEM READY</div>
    <p>請點擊上方按鈕以讀取 PDF 檔案</p>
</div>

<script>
    function openPDF(fileName) {
        // 使用 encodeURI 處理中文路徑
        const encodedPath = encodeURI(fileName);
        
        // 直接在新分頁開啟連結
        window.open(encodedPath, '_blank');
        
        console.log("Terminal redirecting to: " + encodedPath);
    }
</script>

</body>
</html>

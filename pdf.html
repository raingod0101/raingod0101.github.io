<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pdf | Raingod</title>
    <style>
        /* 基础样式复位 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            height: 100vh; /* 撑满全屏 */
        }

        /* 导航栏样式 */
        .navbar {
            background-color: #2c3e50;
            color: white;
            padding: 0 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .navbar-brand {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .navbar-menu {
            display: flex;
            list-style: none;
        }

        .navbar-menu li {
            margin-left: 20px;
        }

        .navbar-menu a {
            color: #ecf0f1;
            text-decoration: none;
            transition: color 0.3s;
        }

        .navbar-menu a:hover {
            color: #3498db;
        }

        /* 主体内容区域：为导航栏留出 60px 的间距 */
        .main-content {
            margin-top: 60px;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .pdf-header {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* PDF 查看器容器 */
        .viewer-container {
            flex: 1; /* 自动撑满剩余空间 */
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        iframe, object {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            .navbar-brand { font-size: 1rem; }
            .navbar-menu li { margin-left: 10px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<link rel="stylesheet" href="menu.css">

<div id="nav_bar"></div>

<script src="menu.js"></script>
        <div class="viewer-container">
            <iframe src="f1.pdf">
                <p>您的浏览器不支持 PDF 预览，请 <a href="f1.pdf">点击下载</a></p>
            </iframe>
        </div>
    </div>

</body>
</html>

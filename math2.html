<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日悖論機率計算器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h2 { color: #1a73e8; }
        input {
            width: 80%;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }
        button {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }
        button:hover { background-color: #1557b0; }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
        }
        .highlight { color: #d93025; font-size: 1.5rem; }
    </style>
</head>
<body>
<link rel="stylesheet" href="menu.css">

<div id="nav_bar"></div>

<script src="menu.js"></script>
<div class="container">
    <h2>生日機率計算器</h2>
    <p>輸入人數，計算至少有兩個人<br>生日在同一天的機率：</p>
    
    <input type="number" id="peopleInput" placeholder="請輸入人數 (例如: 23)" min="1" max="365">
    <br>
    <button onclick="calculateProbability()">開始計算</button>

    <div id="result">
        機率為：<br>
        <span id="probValue" class="highlight">0</span> %
    </div>
</div>

<script>
    function calculateProbability() {
        const n = parseInt(document.getElementById('peopleInput').value);
        const resultDiv = document.getElementById('result');
        const probSpan = document.getElementById('probValue');

        if (isNaN(n) || n <= 0) {
            alert("請輸入有效的人數！");
            return;
        }

        if (n > 365) {
            probSpan.innerText = "100";
            resultDiv.style.display = "block";
            return;
        }

        // 計算邏輯：1 - (所有人生日都不同的機率)
        // P(不同) = (365/365) * (364/365) * (363/365) * ... * ((365-n+1)/365)
        let pDifferent = 1.0;
        for (let i = 0; i < n; i++) {
            pDifferent *= (365 - i) / 365;
        }

        const pSame = (1 - pDifferent) * 100;
        
        // 顯示結果，取小數點後兩位
        probSpan.innerText = pSame.toFixed(2);
        resultDiv.style.display = "block";
        resultDiv.style.backgroundColor = pSame > 50 ? "#fff0f0" : "#f0f7ff";
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <!-- 加入這行：強制手機版不縮放，點擊反應最快 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>爆炸 | Raingod</title>
    <style>
        :root { 
            --neon: #00f2ff; --pink: #ff007b; --gold: #ffcc00; --purple: #bc13fe; 
            --bg: #020205; --white: #ffffff; --emerald: #00ff88; --orange: #ff6600;
        }

        html, body { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background: var(--bg); font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column;
            /* 防止手機長按選取文字 */
            user-select: none; -webkit-user-select: none;
        }

        #top-nav { 
            height: 60px; min-height: 60px;
            background: #0a0a14; border-bottom: 1px solid #333; 
            display: flex; align-items: center; padding: 0 20px;
            color: white; z-index: 100;
        }

        #game-container { 
            flex-grow: 1; 
            position: relative; overflow: hidden; 
            cursor: crosshair;
            /* 重要：禁用手機默認觸控行為（如滾動、縮放） */
            touch-action: none; 
            -webkit-tap-highlight-color: transparent;
        }
        
        canvas { display: block; }

        /* UI 面板優化 */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 15px; box-sizing: border-box; z-index: 10; }
        .stat-group { display: flex; flex-direction: column; gap: 8px; pointer-events: auto; }
        .panel { background: rgba(0, 0, 0, 0.85); border: 1px solid #222; border-left: 4px solid var(--neon); padding: 8px 15px; backdrop-filter: blur(5px); }
        .label { color: #666; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }
        .value { color: #fff; font-size: 18px; font-weight: 900; }
        
        .ctrl-btn { padding: 10px 18px; background: #111; color: #fff; border: 1px solid var(--pink); cursor: pointer; pointer-events: auto; font-weight: bold; font-size: 14px; }

        /* 商店手機版自適應 */
        #shop-window { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 90%; max-width: 450px; height: 75vh; overflow-y: auto; 
            background: rgba(5, 5, 10, 0.98); border: 2px solid var(--neon); padding: 20px; 
            display: none; pointer-events: auto; z-index: 100; 
        }
        .upgrade-card { background: #0a0a0f; margin-bottom: 10px; padding: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .btn-buy { background: var(--gold); border: none; padding: 8px; font-weight: 900; cursor: pointer; min-width: 70px; font-size: 12px; }

        #combo-wrap { position: absolute; bottom: 20px; left: 20px; }
        .combo-n { font-size: 50px; color: #fff; line-height: 0.7; font-style: italic; font-weight: 900; opacity: 0.4; }

        @media (min-width: 800px) {
            .value { font-size: 24px; }
            .combo-n { font-size: 80px; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="canvas"></canvas>

        <div id="hud">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div class="stat-group">
                    <div class="panel"><div class="label">CREDITS</div><div class="value">$ <span id="money-display">0</span></div></div>
                    <div class="panel" style="border-left-color: var(--pink);"><div class="label">POWER</div><div class="value">ATK <span id="damage-display">1</span></div></div>
                    <div class="panel" style="border-left-color: var(--gold);"><div class="label">Ω RANK</div><div class="value">x <span id="prestige-display">1</span></div></div>
                </div>
                <div class="stat-group">
                    <button class="ctrl-btn" onclick="toggleShop()">SHOP</button>
                    <button id="prestige-btn" class="ctrl-btn" style="border-color: var(--gold); display:none;" onclick="doPrestige()">ASCEND</button>
                </div>
            </div>

            <div id="combo-wrap">
                <div class="label" style="color:var(--neon)">CHAIN</div>
                <div class="combo-n" id="combo-display">0</div>
            </div>
        </div>

        <div id="shop-window">
            <h2 style="color:#fff; border-bottom: 2px solid var(--neon); padding-bottom:10px; font-size: 18px;">UPGRADES</h2>
            <div id="shop-content"></div>
            <button onclick="toggleShop()" style="width:100%; margin-top:20px; padding:12px; background:#222; color:#fff; border:none;">CLOSE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');

        const MOB_TYPES = {
            COMMON:  { name: 'Drone', color: '#00f2ff', hp: 2, reward: 10, chance: 1, size: 30, behavior: 'normal' },
            ELITE:   { name: 'Hunter', color: '#ff007b', hp: 60, reward: 450, chance: 0.15, size: 45, behavior: 'fast' },
            VOID:    { name: 'Void', color: '#bc13fe', hp: 600, reward: 3000, chance: 0.05, size: 55, behavior: 'sine' },
            MAGMA:   { name: 'Magma', color: '#ff6600', hp: 3000, reward: 20000, chance: 0.015, size: 65, behavior: 'jitter' },
            SOLAR:   { name: 'Solar', color: '#ffcc00', hp: 25000, reward: 180000, chance: 0.005, size: 85, behavior: 'pulse' },
            OMEGA:   { name: 'Omega', color: '#ffffff', hp: 150000, reward: 1200000, chance: 0.001, size: 110, behavior: 'teleport' },
            RAINGOD: { name: 'RAINGOD', color: '#00ff88', hp: 1000000, reward: 10000000, chance: 0.0001, size: 150, behavior: 'chaos' }
        };

        const SAVE_KEY = 'raingod_eternal_save_data';
        let gameData = {
            money: 0, totalEarned: 0, prestige: 1,
            upgrades: {
                damage: { lv: 1, cost: 50, mult: 1.45, name: "量子核心", desc: "增加點擊力" },
                range: { lv: 1, cost: 200, mult: 1.6, name: "共振距離", desc: "連鎖爆炸範圍" },
                luck: { lv: 1, cost: 1000, mult: 2.3, name: "命運干涉", desc: "稀有怪機率" }
            },
        };

        let width, height, combo = 0;
        let cubes = [], particles = [], floaters = [];

        function init() {
            width = canvas.width = container.clientWidth;
            height = canvas.height = container.clientHeight;
            loadGame();
            refreshUI();
        }

        // --- 存檔與讀取 ---
        function saveGame() {
            localStorage.setItem(SAVE_KEY, JSON.stringify(gameData));
        }

        function loadGame() {
            const localData = localStorage.getItem(SAVE_KEY);
            if (localData) {
                try {
                    const parsed = JSON.parse(localData);
                    gameData = { ...gameData, ...parsed };
                } catch(e) { console.error(e); }
            }
        }

        class Cube {
            constructor() {
                const roll = Math.random();
                const luck = gameData.upgrades.luck.lv * 0.005;
                if (roll < 0.0001 + luck/100) this.type = MOB_TYPES.RAINGOD;
                else if (roll < 0.001 + luck/50) this.type = MOB_TYPES.OMEGA;
                else if (roll < 0.005 + luck/20) this.type = MOB_TYPES.SOLAR;
                else if (roll < 0.02 + luck/10) this.type = MOB_TYPES.MAGMA;
                else if (roll < 0.06 + luck/5) this.type = MOB_TYPES.VOID;
                else if (roll < 0.18 + luck) this.type = MOB_TYPES.ELITE;
                else this.type = MOB_TYPES.COMMON;

                this.x = Math.random() * (width - 60) + 30;
                this.y = Math.random() * (height - 60) + 30;
                this.size = this.type.size;
                const hpScale = Math.pow(1.25, (gameData.upgrades.damage.lv - 1) / 4);
                this.hp = this.type.hp * gameData.prestige * hpScale;
                this.maxHp = this.hp;
                this.color = this.type.color;
                this.vx = (Math.random() - 0.5) * 2.5;
                this.vy = (Math.random() - 0.5) * 2.5;
                this.tick = 0;
                this.dead = false;
            }

            update() {
                this.tick += 0.05;
                switch(this.type.behavior) {
                    case 'fast': this.x += this.vx * 2.5; this.y += this.vy * 2.5; break;
                    case 'sine': this.x += this.vx; this.y += Math.sin(this.tick) * 4; break;
                    case 'jitter': this.x += this.vx + (Math.random()-0.5)*6; this.y += this.vy + (Math.random()-0.5)*6; break;
                    case 'pulse': this.size = this.type.size + Math.sin(this.tick * 2) * 8; this.x += this.vx; this.y += this.vy; break;
                    case 'teleport': if(Math.random() < 0.01) { this.x = Math.random()*width; this.y = Math.random()*height; } this.x += this.vx; this.y += this.vy; break;
                    case 'chaos': this.vx += (Math.random()-0.5)*0.4; this.vy += (Math.random()-0.5)*0.4; this.x += this.vx; this.y += this.vy; break;
                    default: this.x += this.vx; this.y += this.vy;
                }
                if(this.x < 15 || this.x > width - 15) this.vx *= -1;
                if(this.y < 15 || this.y > height - 15) this.vy *= -1;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
                let p = Math.max(0, this.hp / this.maxHp);
                ctx.fillStyle = '#111'; ctx.fillRect(-15, -this.size/2 - 10, 30, 4);
                ctx.fillStyle = this.color; ctx.fillRect(-15, -this.size/2 - 10, 30 * p, 4);
                ctx.restore();
            }

            takeDamage(dmg) {
                if(this.dead) return;
                this.hp -= dmg;
                if(this.hp <= 0) { this.dead = true; this.explode(); }
            }

            explode() {
                combo++;
                let reward = this.type.reward * gameData.prestige;
                gameData.money += reward;
                gameData.totalEarned += reward;
                spawnEffect(this.x, this.y, this.color);
                spawnText(this.x, this.y, `+$${Math.floor(reward).toLocaleString()}`, this.color);

                let range = 100 + (gameData.upgrades.range.lv * 15);
                cubes.forEach(c => {
                    if(!c.dead && Math.hypot(this.x - c.x, this.y - c.y) < range) {
                        setTimeout(() => c.takeDamage(getAtkPower() * 0.5), 70);
                    }
                });

                if(gameData.totalEarned > 5000000) document.getElementById('prestige-btn').style.display = 'block';
                refreshUI(); saveGame();
            }
        }

        function getAtkPower() { return Math.pow(1.55, gameData.upgrades.damage.lv - 1) * gameData.prestige; }

        function refreshUI() {
            document.getElementById('money-display').innerText = Math.floor(gameData.money).toLocaleString();
            document.getElementById('damage-display').innerText = Math.floor(getAtkPower()).toLocaleString();
            document.getElementById('prestige-display').innerText = gameData.prestige;
            document.getElementById('combo-display').innerText = combo;
        }

        function spawnEffect(x, y, color) {
            for(let i=0; i<12; i++) {
                particles.push({ x, y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life:1, color });
            }
        }

        function spawnText(x, y, txt, color) {
            floaters.push({ x, y, txt, color, life:1.0, vy:-1.5 });
        }

        function toggleShop() {
            const s = document.getElementById('shop-window');
            s.style.display = s.style.display === 'block' ? 'none' : 'block';
            if(s.style.display === 'block') {
                const cont = document.getElementById('shop-content');
                cont.innerHTML = '';
                for(let k in gameData.upgrades) {
                    const up = gameData.upgrades[k];
                    const cost = Math.floor(up.cost * Math.pow(up.mult, up.lv-1));
                    cont.innerHTML += `<div class="upgrade-card">
                        <div style="max-width:60%"><b>${up.name}</b><br><small style="color:#777">LV.${up.lv} - ${up.desc}</small></div>
                        <button class="btn-buy" onclick="buy('${k}', ${cost})" ${gameData.money < cost ? 'disabled' : ''}>$${cost.toLocaleString()}</button>
                    </div>`;
                }
            }
        }

        window.buy = (k, cost) => {
            if(gameData.money >= cost) {
                gameData.money -= cost;
                gameData.upgrades[k].lv++;
                refreshUI(); saveGame();
                toggleShop(); toggleShop();
            }
        }

        function doPrestige() {
            gameData.prestige++;
            gameData.money = 0; gameData.totalEarned = 0;
            for (let k in gameData.upgrades) gameData.upgrades[k].lv = 1;
            document.getElementById('prestige-btn').style.display = 'none';
            refreshUI(); saveGame();
        }

        function loop() {
            ctx.fillStyle = 'rgba(2, 2, 5, 0.4)';
            ctx.fillRect(0, 0, width, height);

            if(cubes.length < 20) cubes.push(new Cube());
            cubes = cubes.filter(c => !c.dead);
            cubes.forEach(c => { c.update(); c.draw(); });

            particles = particles.filter(p => (p.life -= 0.03) > 0);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, 2, 2);
            });

            floaters = floaters.filter(f => (f.life -= 0.025) > 0);
            floaters.forEach(f => {
                f.y += f.vy; ctx.fillStyle = f.color; ctx.globalAlpha = f.life;
                ctx.font = "bold 14px Segoe UI"; ctx.fillText(f.txt, f.x, f.y);
            });
            ctx.globalAlpha = 1;
            requestAnimationFrame(loop);
        }

        // --- 核心：點擊與觸控優化 ---
        function handleAction(e) {
            // 防止手機端雙擊縮放
            if(e.cancelable) e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            
            if(e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            const mouseX = clientX - rect.left;
            const mouseY = clientY - rect.top;

            let hit = false;
            // 手機版增加判定寬度 (tolerance)
            const tolerance = 25; 

            for (let i = cubes.length - 1; i >= 0; i--) {
                const c = cubes[i];
                const dist = Math.hypot(mouseX - c.x, mouseY - c.y);
                if(dist < (c.size / 1.5) + tolerance) {
                    c.takeDamage(getAtkPower());
                    hit = true;
                    break;
                }
            }
            if(!hit) combo = 0;
            refreshUI();
        }

        // 監聽觸摸與滑鼠
        container.addEventListener('touchstart', handleAction, {passive: false});
        container.addEventListener('mousedown', handleAction);

        window.onresize = init;
        init();
        loop();
    </script>
</body>
</html>

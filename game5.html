<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>爆炸 | RAINGOD</title>
    <style>
        :root { --neon: #00f2ff; --pink: #ff007b; --gold: #ffcc00; --purple: #bc13fe; --void: #1a0033; --bg: #020205; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; cursor: crosshair; user-select: none; }
        canvas { display: block; }

        /* UI Overlay */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 20px; box-sizing: border-box; }
        .stat-group { display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .panel { background: rgba(0, 0, 0, 0.9); border: 1px solid #222; border-left: 4px solid var(--neon); padding: 10px 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .label { color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .value { color: #fff; font-size: 24px; font-weight: 900; }
        
        /* 商店按鈕 */
        .ctrl-btn { padding: 12px 25px; background: #111; color: #fff; border: 1px solid var(--pink); cursor: pointer; pointer-events: auto; transition: 0.2s; font-weight: bold; margin-bottom: 5px; text-align: left; position: relative; overflow: hidden; }
        .ctrl-btn:hover { background: var(--pink); color: #000; box-shadow: 0 0 20px var(--pink); }

        #shop-window { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 480px; height: 80vh; overflow-y: auto; background: rgba(5, 5, 10, 0.98); border: 1px solid var(--neon); padding: 25px; display: none; pointer-events: auto; z-index: 100; box-shadow: 0 0 100px rgba(0,0,0,1); }
        .upgrade-card { background: #0a0a0f; margin-bottom: 10px; padding: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .up-name { color: var(--neon); font-size: 14px; font-weight: bold; margin: 0; }
        .up-desc { color: #555; font-size: 11px; margin: 4px 0 0 0; }
        .btn-buy { background: var(--gold); border: none; padding: 8px 12px; font-weight: 900; cursor: pointer; min-width: 90px; }
        .btn-buy:disabled { background: #222; color: #444; }

        /* 轉生 UI */
        #prestige-alert { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); text-align: center; color: var(--gold); display: none; pointer-events: auto; }

        #combo-wrap { position: absolute; bottom: 30px; left: 30px; }
        .combo-n { font-size: 80px; color: #fff; line-height: 0.7; font-style: italic; font-weight: 900; opacity: 0.5; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="hud">
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div class="stat-group">
                <div class="panel"><div class="label">CREDITS</div><div class="value">$ <span id="money-display">0</span></div></div>
                <div class="panel" style="border-left-color: var(--pink);"><div class="label">POWER</div><div class="value">ATK <span id="damage-display">1</span></div></div>
                <div class="panel" style="border-left-color: var(--gold);"><div class="label">DIVINE MULT</div><div class="value">x <span id="prestige-display">1</span></div></div>
            </div>
            <div class="stat-group">
                <button class="ctrl-btn" onclick="toggleShop()">OPEN TERMINAL</button>
                <button id="prestige-btn" class="ctrl-btn" style="border-color: var(--gold); display:none;" onclick="doPrestige()">DIVINE ASCENSION</button>
            </div>
        </div>

        <div id="combo-wrap">
            <div class="label" style="color:var(--neon)">CHAIN STREAK</div>
            <div class="combo-n" id="combo-display">0</div>
        </div>
    </div>

    <div id="shop-window">
        <h2 style="color:#fff; margin:0 0 15px 0; border-bottom: 1px solid var(--neon); padding-bottom:10px;">ETERNAL UPGRADES</h2>
        <div id="shop-content"></div>
        <button onclick="toggleShop()" style="width:100%; margin-top:15px; padding:10px; background:#222; color:#fff; border:none; cursor:pointer;">CLOSE</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // --- 安全與數據核心 ---
        const SALT_A = "RG_INF_99";
        const SALT_B = "ANTI_CHEAT_ACTIVE";
        
        let gameData = {
            money: 0,
            totalEarned: 0,
            prestige: 1,
            upgrades: {
                damage: { lv: 1, cost: 50, mult: 1.45, name: "量子疊加點擊", desc: "每次點擊威力呈指數增長" },
                range: { lv: 1, cost: 200, mult: 1.6, name: "虛空爆炸半徑", desc: "引發更遠距離的死亡連鎖" },
                luck: { lv: 1, cost: 500, mult: 2.1, name: "命運干擾儀", desc: "提高神級方塊出現機率" },
                crit: { lv: 1, cost: 1000, mult: 1.8, name: "精密拆解", desc: "增加獲得 Credits 的基礎倍率" }
            }
        };

        function getHash(obj) {
            let str = JSON.stringify(obj) + SALT_A + (obj.money * 3).toString() + SALT_B;
            let h = 0;
            for (let i = 0; i < str.length; i++) {
                h = ((h << 5) - h) + str.charCodeAt(i);
                h |= 0;
            }
            return h.toString(36);
        }

        function saveGame() {
            const wrapper = {
                data: gameData,
                sig: getHash(gameData),
                ts: Date.now()
            };
            localStorage.setItem('raingod_eternal_v1', btoa(unescape(encodeURIComponent(JSON.stringify(wrapper)))));
        }

        function loadGame() {
            try {
                const raw = localStorage.getItem('raingod_eternal_v1');
                if (!raw) return;
                const wrapper = JSON.parse(decodeURIComponent(escape(atob(raw))));
                if (getHash(wrapper.data) === wrapper.sig) {
                    gameData = wrapper.data;
                } else {
                    alert("⚠️ 檢測到存檔竄改！數據已重置以維護公平性。");
                    gameData.money = 0;
                    saveGame();
                }
            } catch (e) { console.log("New era begins."); }
            refreshUI();
        }

        // --- 遊戲邏輯 ---
        const MOB_TYPES = {
            COMMON: { color: '#00f2ff', hp: 2, reward: 10, chance: 1, size: 30 },
            ELITE:  { color: '#ff007b', hp: 50, reward: 250, chance: 0.1, size: 45 },
            DIVINE: { color: '#ffcc00', hp: 1000, reward: 10000, chance: 0.01, size: 60 },
            OMEGA:  { color: '#ffffff', hp: 100000, reward: 1000000, chance: 0.001, size: 100 }
        };

        let width, height, combo = 0;
        let cubes = [], particles = [], floaters = [];
        let lastClickTime = 0;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            loadGame();
        }
        window.onresize = init;

        class Cube {
            constructor() {
                const rand = Math.random();
                const luckBonus = gameData.upgrades.luck.lv * 0.002;
                if (rand < 0.001 + luckBonus) this.type = MOB_TYPES.OMEGA;
                else if (rand < 0.01 + luckBonus) this.type = MOB_TYPES.DIVINE;
                else if (rand < 0.1 + luckBonus) this.type = MOB_TYPES.ELITE;
                else this.type = MOB_TYPES.COMMON;

                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = this.type.size;
                
                // 血量隨時間與強度無限成長
                const scaling = Math.pow(1.15, gameData.upgrades.damage.lv / 5);
                this.hp = this.type.hp * scaling * gameData.prestige;
                this.maxHp = this.hp;
                this.color = this.type.color;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.dead = false;
            }

            draw() {
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.strokeRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                
                // 血量條
                let percent = this.hp / this.maxHp;
                ctx.fillStyle = '#111'; ctx.fillRect(this.x - 20, this.y - this.size, 40, 4);
                ctx.fillStyle = this.color; ctx.fillRect(this.x - 20, this.y - this.size, 40 * percent, 4);
                ctx.shadowBlur = 0;
            }

            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.x < 0 || this.x > width) this.vx *= -1;
                if(this.y < 0 || this.y > height) this.vy *= -1;
            }

            takeDamage(dmg) {
                if (this.dead) return;
                this.hp -= dmg;
                if (this.hp <= 0) {
                    this.dead = true;
                    this.explode();
                }
            }

            explode() {
                combo++;
                let baseReward = this.type.reward * (1 + gameData.upgrades.crit.lv * 0.5) * gameData.prestige;
                gameData.money += baseReward;
                gameData.totalEarned += baseReward;
                
                spawnEffect(this.x, this.y, this.color, 20);
                spawnText(this.x, this.y, `+$${Math.floor(baseReward)}`, this.color);
                
                // 連鎖
                let range = 100 + (gameData.upgrades.range.lv * 15);
                cubes.forEach(c => {
                    if (!c.dead && Math.hypot(this.x - c.x, this.y - c.y) < range) {
                        setTimeout(() => c.takeDamage(getAtkPower() * 0.5), 50);
                    }
                });

                if (gameData.totalEarned > 1000000 * gameData.prestige) {
                    document.getElementById('prestige-btn').style.display = 'block';
                }
                
                saveGame();
                refreshUI();
            }
        }

        function getAtkPower() {
            return (Math.pow(1.5, gameData.upgrades.damage.lv - 1)) * gameData.prestige;
        }

        function refreshUI() {
            document.getElementById('money-display').innerText = Math.floor(gameData.money).toLocaleString();
            document.getElementById('damage-display').innerText = Math.floor(getAtkPower()).toLocaleString();
            document.getElementById('prestige-display').innerText = gameData.prestige;
            document.getElementById('combo-display').innerText = combo;
        }

        function toggleShop() {
            const s = document.getElementById('shop-window');
            s.style.display = s.style.display === 'block' ? 'none' : 'block';
            if(s.style.display === 'block') renderShop();
        }

        function renderShop() {
            const cont = document.getElementById('shop-content');
            cont.innerHTML = '';
            for (let key in gameData.upgrades) {
                const up = gameData.upgrades[key];
                const cost = Math.floor(up.cost * Math.pow(up.mult, up.lv - 1));
                cont.innerHTML += `
                    <div class="upgrade-card">
                        <div><p class="up-name">${up.name} (LV.${up.lv})</p><p class="up-desc">${up.desc}</p></div>
                        <button class="btn-buy" onclick="buy('${key}', ${cost})" ${gameData.money < cost ? 'disabled' : ''}>$${cost.toLocaleString()}</button>
                    </div>
                `;
            }
        }

        window.buy = (key, cost) => {
            if (gameData.money >= cost) {
                gameData.money -= cost;
                gameData.upgrades[key].lv++;
                saveGame(); refreshUI(); renderShop();
            }
        };

        window.doPrestige = () => {
            if (confirm("進行神性轉生？這將重置所有金幣與升級，但你的『神性倍率』將大幅提升！")) {
                gameData.prestige += 1;
                gameData.money = 0;
                gameData.totalEarned = 0;
                for(let k in gameData.upgrades) gameData.upgrades[k].lv = 1;
                document.getElementById('prestige-btn').style.display = 'none';
                saveGame();
                location.reload();
            }
        };

        function spawnEffect(x, y, color, count) {
            for(let i=0; i<count; i++) {
                particles.push({ x, y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life:1, color });
            }
        }

        function spawnText(x, y, txt, color) {
            floaters.push({ x, y, txt, color, life:1, vy:-2 });
        }

        function loop() {
            ctx.fillStyle = 'rgba(2, 2, 5, 0.3)';
            ctx.fillRect(0, 0, width, height);

            if (cubes.length < 20) cubes.push(new Cube());
            cubes = cubes.filter(c => !c.dead);
            cubes.forEach(c => { c.update(); c.draw(); });

            particles = particles.filter(p => (p.life -= 0.02) > 0);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, 3, 3);
            });

            floaters = floaters.filter(f => (f.life -= 0.015) > 0);
            floaters.forEach(f => {
                f.y += f.vy; ctx.fillStyle = f.color; ctx.globalAlpha = f.life;
                ctx.font = 'bold 16px Arial'; ctx.fillText(f.txt, f.x, f.y);
            });

            ctx.globalAlpha = 1;
            requestAnimationFrame(loop);
        }

        canvas.addEventListener('mousedown', (e) => {
                const now = Date.now();
                if (now - lastClickTime < 5) return; // 防連點外掛 (每秒最多33次)
                lastClickTime = now;

            let hit = false;
            cubes.forEach(c => {
                if (Math.hypot(e.clientX - c.x, e.clientY - c.y) < c.size + 10) {
                    c.takeDamage(getAtkPower());
                    hit = true;
                }
            });
            if (!hit) combo = 0;
        });

        init();
        loop();
    </script>
</body>
</html>

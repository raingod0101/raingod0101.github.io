<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房號聊天室系統</title>
    <style>
        :root { --primary: #007aff; --bg: #f5f5f7; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        #app { width: 100%; max-width: 500px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* 介面切換 */
        .hidden { display: none; }
        .p-20 { padding: 20px; }

        /* 輸入框與按鈕 */
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-main:hover { background: #0056b3; }
        .btn-exit { background: #ff3b30; color: white; margin-top: 10px; }

        /* 聊天區域 */
        #chat-header { background: #eee; padding: 15px; border-bottom: 1px solid #ddd; }
        #chat-box { height: 400px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #fff; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; word-wrap: break-word; position: relative; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; }
        .msg.other { align-self: flex-start; background: #e9e9eb; color: black; }
        .msg-info { font-size: 10px; margin-bottom: 4px; opacity: 0.7; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-screen" class="p-20">
        <h2>進入或建立聊天室</h2>
        <p style="font-size: 13px; color: #666;">輸入房號即可進入。若房號不存在將自動建立。</p>
        <input type="text" id="room-id" placeholder="輸入房號 (英文數字)">
        <input type="text" id="user-nickname" placeholder="你的初始暱稱">
        <button class="btn-main" onclick="joinRoom()">進入房間</button>
    </div>

    <div id="chat-screen" class="hidden">
        <div id="chat-header">
            <div style="font-weight: bold;">房號：<span id="display-room-id"></span></div>
            <div style="margin-top: 5px; display: flex; gap: 5px; align-items: center;">
                暱稱：<input type="text" id="change-nickname" style="margin:0; padding:5px;" onchange="updateMyNickname(this.value)">
            </div>
        </div>
        
        <div id="chat-box"></div>

        <div class="p-20" style="border-top: 1px solid #eee;">
            <input type="text" id="message-input" placeholder="輸入訊息..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="btn-main" onclick="sendMessage()">傳送</button>
            <button class="btn-exit" onclick="leaveRoom()">離開房間</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- 1. 請在此填入你的 Firebase 配置 ---
    const firebaseConfig = {
        apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk",
        authDomain: "chat-73802.firebaseapp.com",
        databaseURL: "https://chat-73802-default-rtdb.firebaseio.com",
        projectId: "chat-73802",
        storageBucket: "chat-73802.firebasestorage.app",
        messagingSenderId: "274628413625",
        appId: "1:274628413625:web:77499e0bdeab18104bf368",
        measurementId: "G-BP7YV746WV"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- 2. 裝置唯一標識 (確保一機一人) ---
    let deviceId = localStorage.getItem('chat_uid');
    if (!deviceId) {
        deviceId = 'dev_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('chat_uid', deviceId);
    }

    let currentRoom = null;
    let myNickname = "";

    // --- 3. 進入房間邏輯 ---
    window.joinRoom = function() {
        const roomId = document.getElementById('room-id').value.trim().toUpperCase();
        const nickname = document.getElementById('user-nickname').value.trim() || "匿名者";

        if (!roomId) return alert("請輸入房號");

        currentRoom = roomId;
        myNickname = nickname;

        // 設定使用者在該房間的狀態
        const userRef = ref(db, `rooms/${roomId}/users/${deviceId}`);
        set(userRef, { nickname: nickname });

        // 離線自動刪除（核心：當裝置中斷連線，自動從房間移除）
        onDisconnect(userRef).remove();

        // UI 切換
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('chat-screen').classList.remove('hidden');
        document.getElementById('display-room-id').innerText = roomId;
        document.getElementById('change-nickname').value = nickname;

        startListening();
    };

    // --- 4. 監聽訊息與自動清理 ---
    function startListening() {
        // 監聽訊息列表
        onValue(ref(db, `rooms/${currentRoom}/messages`), (snapshot) => {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = "";
            snapshot.forEach((child) => {
                const data = child.val();
                const isMe = data.uid === deviceId;
                const msgDiv = document.createElement('div');
                msgDiv.className = `msg ${isMe ? 'me' : 'other'}`;
                msgDiv.innerHTML = `<div class="msg-info">${data.name}</div>${data.text}`;
                chatBox.appendChild(msgDiv);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    // --- 5. 傳送訊息 ---
    window.sendMessage = function() {
        const input = document.getElementById('message-input');
        if (!input.value.trim()) return;

        push(ref(db, `rooms/${currentRoom}/messages`), {
            uid: deviceId,
            name: myNickname,
            text: input.value,
            time: serverTimestamp()
        });
        input.value = "";
    };

    // --- 6. 隨時更改暱稱 ---
    window.updateMyNickname = function(newName) {
        if (!newName.trim()) return;
        myNickname = newName;
        set(ref(db, `rooms/${currentRoom}/users/${deviceId}/nickname`), newName);
    };

    // --- 7. 離開房間 ---
    window.leaveRoom = function() {
        // 移除自己在房間的紀錄
        remove(ref(db, `rooms/${currentRoom}/users/${deviceId}`)).then(() => {
            // 重新整理頁面回到登入畫面
            location.reload();
        });
    };
</script>

</body>
</html>

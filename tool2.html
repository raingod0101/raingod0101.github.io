<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天室 | Raingod</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #e9e9eb; --danger: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); height: 100vh; }
        .hidden { display: none !important; }
        
        /* 頂部導覽 */
        .header { padding: 15px; background: #fff; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .header b { font-size: 18px; color: #333; }

        /* 聊天區域 */
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        
        /* 訊息氣泡核心 */
        .msg-wrapper { display: flex; flex-direction: column; width: 100%; }
        .msg-wrapper.me { align-items: flex-end; }
        .msg-wrapper.other { align-items: flex-start; }
        .msg-name { font-size: 11px; color: #8e8e93; margin-bottom: 3px; padding: 0 5px; }
        
        .bubble { padding: 10px 14px; border-radius: 18px; max-width: 80%; font-size: 15px; line-height: 1.4; word-wrap: break-word; position: relative; }
        .me .bubble { background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }
        
        /* 圖片樣式 */
        .bubble img { max-width: 100%; border-radius: 10px; display: block; cursor: zoom-in; margin-top: 2px; }

        /* 輸入區域 */
        .input-area { padding: 10px 15px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; background: #fff; }
        #msg-input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 16px; }
        .btn-circle { background: #f0f0f0; border: none; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-send { background: var(--me-bg); color: white; border: none; padding: 8px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; flex-shrink: 0; }

        /* 大圖檢視器 (Lightbox) */
        #photo-modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        #modal-img { max-width: 98%; max-height: 98%; object-fit: contain; cursor: zoom-out; }

        /* 進度提示 */
        #loading-toast { position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 10px; z-index: 2000; display: none; }
    </style>
</head>
<body>
<link rel="stylesheet" href="menu.css">

<div id="nav_bar"></div>

<script src="menu.js"></script>
<div id="loading-toast">檔案處理中，請稍候...</div>

<div id="photo-modal" onclick="this.style.display='none'">
    <img id="modal-img">
</div>

<div id="app">
    <div id="login-view" style="padding: 50px 20px; text-align: center; flex: 1;">
        <h2 style="margin-bottom: 40px;">Raingod聊天室</h2>
        <input type="text" id="room-input" placeholder="輸入房號 (例: SECRET)" style="width: 85%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px;">
        <input type="text" id="nick-input" placeholder="您的暱稱" style="width: 85%; padding: 15px; margin-bottom: 30px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px;">
        <button onclick="handleJoin()" style="width: 90%; padding: 15px; background: var(--me-bg); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px;">進入 / 建立房間</button>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <b id="room-title">房號</b>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="text" id="rename-input" style="width:70px; font-size:12px; border:1px solid #eee; border-radius:5px;" onchange="updateNickname(this.value)">
                <button id="owner-btn" class="hidden" onclick="destroyRoom()" style="color:var(--danger); background:none; border:none; cursor:pointer; font-weight:bold;">銷毀</button>
                <button onclick="location.reload()" style="background:none; border:none; color:#8e8e93; cursor:pointer;">離開</button>
            </div>
        </div>
        
        <div id="chat-box"></div>

        <div class="input-area">
            <input type="file" id="img-input" class="hidden" accept="image/*" onchange="sendLargeImage(this)">
            <button class="btn-circle" onclick="document.getElementById('img-input').click()">📷</button>
            <input type="text" id="msg-input" placeholder="輸入訊息..." onkeypress="if(event.key==='Enter') doSend()">
            <button class="btn-send" onclick="doSend()">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, onDisconnect, serverTimestamp, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- Firebase 配置 ---
    const firebaseConfig = {
        apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk",
        authDomain: "chat-73802.firebaseapp.com",
        databaseURL: "https://chat-73802-default-rtdb.firebaseio.com",
        projectId: "chat-73802",
        storageBucket: "chat-73802.firebasestorage.app",
        messagingSenderId: "274628413625",
        appId: "1:274628413625:web:77499e0bdeab18104bf368",
        measurementId: "G-BP7YV746WV"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 唯一裝置 ID (一機一人)
    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);
    let roomID = ""; let myName = "";

    window.handleJoin = async function() {
        roomID = document.getElementById('room-input').value.trim().toUpperCase();
        myName = document.getElementById('nick-input').value.trim() || "匿名";
        if(!roomID) return alert("請輸入房號");

        const roomRef = ref(db, `rooms/${roomID}`);
        const snap = await get(roomRef);
        
        // 房不存在，設為房主
        if(!snap.exists()) await set(ref(db, `rooms/${roomID}/meta`), { owner: uid });
        
        const metaSnap = await get(ref(db, `rooms/${roomID}/meta`));
        if(metaSnap.val()?.owner === uid) document.getElementById('owner-btn').classList.remove('hidden');

        // 登入狀態與自動清理
        const userRef = ref(db, `rooms/${roomID}/users/${uid}`);
        set(userRef, { name: myName });
        onDisconnect(userRef).remove();

        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = roomID;
        document.getElementById('rename-input').value = myName;
        startChat();
    };

    function startChat() {
        onValue(ref(db, `rooms/${roomID}/msgs`), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(child => {
                const d = child.val();
                const isMe = d.uid === uid;
                const wrapper = document.createElement('div');
                wrapper.className = `msg-wrapper ${isMe ? 'me' : 'other'}`;
                
                let content = d.type === 'image' 
                    ? `<img src="${d.text}" onclick="openViewer('${child.key}')" id="img-${child.key}">` 
                    : d.text;
                
                wrapper.innerHTML = `
                    <div class="msg-name">${d.name}</div>
                    <div class="bubble">${content}</div>
                `;
                box.appendChild(wrapper);
            });
            box.scrollTop = box.scrollHeight;
        });

        onValue(ref(db, `rooms/${roomID}/meta`), (s) => { 
            if(!s.exists() && roomID !== "") {
                alert("房間已被銷毀");
                location.reload();
            }
        });
    }

    // 文字傳送
    window.doSend = function() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        push(ref(db, `rooms/${roomID}/msgs`), {
            uid, name: myName, text: inp.value, type: 'text', ts: serverTimestamp()
        });
        inp.value = "";
    };

    // 10MB 原圖傳送 (Base64)
    window.sendLargeImage = function(input) {
        const file = input.files[0];
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) return alert("檔案太大囉 (限制10MB內)");

        document.getElementById('loading-toast').style.display = 'block';

        const reader = new FileReader();
        reader.onload = function(e) {
            push(ref(db, `rooms/${roomID}/msgs`), {
                uid, name: myName, text: e.target.result, type: 'image', ts: serverTimestamp()
            }).then(() => {
                document.getElementById('loading-toast').style.display = 'none';
            });
        };
        reader.readAsDataURL(file);
        input.value = "";
    };

    // 查看大圖
    window.openViewer = function(key) {
        const src = document.getElementById('img-' + key).src;
        document.getElementById('modal-img').src = src;
        document.getElementById('photo-modal').style.display = 'flex';
    };

    // 修改暱稱
    window.updateNickname = function(val) {
        if(!val.trim()) return;
        myName = val;
        update(ref(db, `rooms/${roomID}/users/${uid}`), { name: val });
    };

    // 銷毀房間
    window.destroyRoom = function() {
        if(confirm("確定銷毀房間？所有紀錄將清空。")) remove(ref(db, `rooms/${roomID}`));
    };
</script>
</body>
</html>

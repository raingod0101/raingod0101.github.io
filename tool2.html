<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raingod Chat | 終極租約版</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #e9e9eb; --danger: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); height: 100vh; }
        .hidden { display: none !important; }
        .header { height: 60px; padding: 0 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #fff; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; max-width: 80%; word-wrap: break-word; }
        .me { align-self: flex-end; background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other { align-self: flex-start; background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }
        .input-area { padding: 10px 15px 30px; border-top: 1px solid #eee; display: flex; gap: 8px; background: #fff; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; outline: none; }
        .btn-main { background: var(--me-bg); color: white; border: none; border-radius: 10px; padding: 12px; font-weight: bold; cursor: pointer; }
        #status { color: var(--danger); font-size: 12px; margin-top: 15px; min-height: 1.2em; }
    </style>
</head>
<body>
<link rel="stylesheet" href="menu.css">

<div id="nav_bar"></div>

<script src="menu.js"></script>
<div id="app">
    <div id="login-view" style="padding: 40px 25px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center;">
        <h2 style="color: var(--me-bg); margin-bottom: 5px;">Raingod</h2>
        <p style="color: #999; font-size: 13px; margin-bottom: 30px;">一機一房制 (銷毀後可再創)</p>
        <input type="text" id="room-input" placeholder="房號 (例: SECRET)">
        <input type="text" id="nick-input" placeholder="您的暱稱" style="margin: 10px 0;">
        <input type="password" id="admin-pass" placeholder="管理員密碼 (創多房才填)" style="margin-bottom: 20px;">
        <button onclick="handleJoin()" class="btn-main" style="width:100%;">進入 / 建立聊天室</button>
        <p id="status"></p>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <b id="room-title">ROOM</b>
            <div>
                <button id="del-btn" class="hidden" onclick="destroyRoom()" style="color:var(--danger); border:none; background:none; font-weight:bold; margin-right:10px; cursor:pointer;">銷毀</button>
                <button onclick="location.reload()" style="color:#999; border:none; background:none; cursor:pointer;">退出</button>
            </div>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="輸入訊息..." style="flex:1;" onkeypress="if(event.key==='Enter') doSend()">
            <button onclick="doSend()" style="background:var(--me-bg); color:white; border:none; border-radius:10px; padding:0 15px; cursor:pointer;">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- Firebase 配置 ---
    const firebaseConfig = {
        apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk",
        authDomain: "chat-73802.firebaseapp.com",
        databaseURL: "https://chat-73802-default-rtdb.firebaseio.com",
        projectId: "chat-73802"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 取得或生成裝置 UID
    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);

    let roomID = ""; let myName = "";

    window.handleJoin = async function() {
        roomID = document.getElementById('room-input').value.trim().toUpperCase();
        myName = document.getElementById('nick-input').value.trim() || "User";
        const pass = document.getElementById('admin-pass').value;
        const status = document.getElementById('status');

        if(!roomID) return;
        status.innerText = "驗證中...";

        // 1. 優先檢查房間是否存在
        const roomRef = ref(db, `rooms/${roomID}`);
        const snap = await get(roomRef);

        if (snap.exists()) {
            enterRoom();
        } else {
            // 2. 房間不存在，檢查是否已佔房
            const ownerSnap = await get(ref(db, `owners/${uid}`));
            
            // 這裡的密碼要跟後端 Rules 設定的一致
            if(ownerSnap.exists() && pass !== "你的超級密碼") {
                status.innerText = `你已創過房: ${ownerSnap.val()}，請先銷毀。`;
                return;
            }

            try {
                // 3. 執行創房 (帶上密碼與 owner 資訊)
                await set(ref(db, `rooms/${roomID}/meta`), { owner: uid, admin_key: pass });
                // 4. 創房成功後，同步寫入佔位紀錄
                await set(ref(db, `owners/${uid}`), roomID);
                enterRoom();
            } catch (e) {
                status.innerText = "失敗！密碼錯誤或你已被限制創房。";
                console.error(e);
            }
        }
    };

    async function enterRoom() {
        const metaSnap = await get(ref(db, `rooms/${roomID}/meta`));
        if(metaSnap.val()?.owner === uid) {
            document.getElementById('del-btn').classList.remove('hidden');
        }

        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = "房號: " + roomID;
        startChat();
    }

    function startChat() {
        onValue(ref(db, `rooms/${roomID}/msgs`), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                const div = document.createElement('div');
                div.className = `bubble ${d.uid === uid ? 'me' : 'other'}`;
                div.innerText = `${d.name}: ${d.text}`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
        // 監聽房主是否刪房
        onValue(ref(db, `rooms/${roomID}/meta`), s => { if(!s.exists()) location.reload(); });
    }

    window.doSend = () => {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        push(ref(db, `rooms/${roomID}/msgs`), { uid, name: myName, text: inp.value });
        inp.value = "";
    };

    window.destroyRoom = async () => {
        if(confirm("確定銷毀房間？這將同時清空訊息與你的創房紀錄。")) {
            try {
                // 同時刪除房間與佔位紀錄 (順序重要)
                await remove(ref(db, `rooms/${roomID}`));
                await remove(ref(db, `owners/${uid}`));
                location.reload();
            } catch (e) {
                alert("銷毀失敗，請確認 Firebase Rules 已更新。");
            }
        }
    };
</script>
</body>
</html>

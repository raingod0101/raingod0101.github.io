<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raingod 聊天室 | 專業版</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #e9e9eb; --danger: #ff3b30; --header-h: 60px; }
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); height: 100vh; position: relative; }
        .hidden { display: none !important; }
        
        /* 頂部導覽 */
        .header { height: var(--header-h); padding: 0 15px; background: #fff; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .header b { font-size: 18px; color: #333; }

        /* 聊天區域 */
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #fff; }
        
        /* 日期分割線 */
        .date-divider { text-align: center; font-size: 11px; color: #aaa; margin: 10px 0; font-weight: bold; }

        /* 訊息氣泡 */
        .msg-wrapper { display: flex; flex-direction: column; width: 100%; }
        .msg-wrapper.me { align-items: flex-end; }
        .msg-wrapper.other { align-items: flex-start; }
        .msg-info { font-size: 10px; color: #8e8e93; margin-bottom: 2px; display: flex; gap: 5px; }
        
        .bubble-container { display: flex; align-items: flex-end; gap: 5px; max-width: 85%; }
        .me .bubble-container { flex-direction: row-reverse; }

        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .me .bubble { background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }
        
        .time-tag { font-size: 9px; color: #aaa; min-width: 35px; }
        .read-status { font-size: 9px; color: var(--me-bg); font-weight: bold; }

        .bubble img { max-width: 100%; border-radius: 10px; display: block; cursor: zoom-in; }

        /* 輸入區域 */
        .input-area { padding: 10px 15px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; background: #fff; padding-bottom: 20px; }
        #msg-input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 16px; }
        .btn-circle { background: #f0f0f0; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-send { background: var(--me-bg); color: white; border: none; padding: 8px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; flex-shrink: 0; }

        #photo-modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        #modal-img { max-width: 98%; max-height: 98%; object-fit: contain; }
        #loading-toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 10px; z-index: 2000; display: none; }
    </style>
</head>
<body>

<div id="loading-toast">處理中...</div>
<div id="photo-modal" onclick="this.style.display='none'"><img id="modal-img"></div>

<div id="app">
    <div id="login-view" style="padding: 40px 20px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center;">
        <h1 style="color:var(--me-bg)">Raingod</h1>
        <p style="color:#666; font-size: 14px;">一機一房 | 限制50則訊息</p>
        <input type="text" id="room-input" placeholder="輸入房號" style="width: 85%; padding: 15px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 12px;">
        <input type="text" id="nick-input" placeholder="您的暱稱" style="width: 85%; padding: 15px; margin-bottom: 25px; border: 1px solid #ddd; border-radius: 12px;">
        <button onclick="handleJoin()" style="width: 90%; padding: 15px; background: var(--me-bg); color: white; border: none; border-radius: 12px; font-weight: bold;">登入聊天室</button>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <b id="room-title">ROOM</b>
            <div style="display: flex; gap: 8px; align-items: center;">
                <input type="text" id="rename-input" style="width:60px; font-size:11px; border:1px solid #eee;" onchange="updateNickname(this.value)" title="更改暱稱">
                <button id="owner-btn" class="hidden" onclick="destroyRoom()" style="color:var(--danger); border:none; background:none; font-weight:bold; font-size:12px;">銷毀</button>
                <button onclick="location.reload()" style="color:#888; border:none; background:none; font-size:12px;">切換</button>
            </div>
        </div>
        
        <div id="chat-box"></div>

        <div class="input-area">
            <input type="file" id="img-input" class="hidden" accept="image/*" onchange="sendLargeImage(this)">
            <button class="btn-circle" onclick="document.getElementById('img-input').click()">📷</button>
            <input type="text" id="msg-input" placeholder="新訊息..." onkeypress="if(event.key==='Enter') doSend()">
            <button class="btn-send" onclick="doSend()">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, onDisconnect, serverTimestamp, get, update, query, limitToLast, orderByKey } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk",
        authDomain: "chat-73802.firebaseapp.com",
        databaseURL: "https://chat-73802-default-rtdb.firebaseio.com",
        projectId: "chat-73802",
        storageBucket: "chat-73802.firebasestorage.app",
        messagingSenderId: "274628413625",
        appId: "1:274628413625:web:77499e0bdeab18104bf368",
        measurementId: "G-BP7YV746WV"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);
    
    let roomID = ""; 
    let myName = "";
    let lastSendTime = 0; // 冷卻計時器

    window.handleJoin = async function() {
        roomID = document.getElementById('room-input').value.trim().toUpperCase();
        myName = document.getElementById('nick-input').value.trim() || "User";
        if(!roomID) return alert("請輸入房號");

        const roomsRef = ref(db, `rooms`);
        const allRoomsSnap = await get(roomsRef);
        
        // 限制：一個裝置只能創一個房號
        let existingOwnedRoom = null;
        if(allRoomsSnap.exists()){
            const data = allRoomsSnap.val();
            for(let rid in data){
                if(data[rid].meta && data[rid].meta.owner === uid){
                    existingOwnedRoom = rid;
                    break;
                }
            }
        }

        const roomRef = ref(db, `rooms/${roomID}`);
        const snap = await get(roomRef);

        if(!snap.exists()) {
            if(existingOwnedRoom && existingOwnedRoom !== roomID) {
                return alert(`你已經創過房間了 (${existingOwnedRoom})，無法再創新的！`);
            }
            await set(ref(db, `rooms/${roomID}/meta`), { owner: uid });
        }
        
        const metaSnap = await get(ref(db, `rooms/${roomID}/meta`));
        if(metaSnap.val()?.owner === uid) document.getElementById('owner-btn').classList.remove('hidden');

        set(ref(db, `rooms/${roomID}/users/${uid}`), { name: myName, active: true });
        onDisconnect(ref(db, `rooms/${roomID}/users/${uid}`)).remove();

        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = "房號: " + roomID;
        document.getElementById('rename-input').value = myName;
        startChat();
    };

    function startChat() {
        const msgRef = query(ref(db, `rooms/${roomID}/msgs`), limitToLast(50));
        let lastDateString = "";

        onValue(msgRef, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            lastDateString = "";

            snap.forEach(child => {
                const d = child.val();
                const isMe = d.uid === uid;
                const dObj = new Date(d.ts);
                const dateStr = dObj.toLocaleDateString();
                const timeStr = dObj.getHours().toString().padStart(2,'0') + ":" + dObj.getMinutes().toString().padStart(2,'0');

                if(dateStr !== lastDateString){
                    const div = document.createElement('div');
                    div.className = "date-divider";
                    div.innerText = dateStr;
                    box.appendChild(div);
                    lastDateString = dateStr;
                }

                const wrapper = document.createElement('div');
                wrapper.className = `msg-wrapper ${isMe ? 'me' : 'other'}`;
                let content = d.type === 'image' ? `<img src="${d.text}" onclick="openViewer('${child.key}')" id="img-${child.key}">` : d.text;
                
                wrapper.innerHTML = `
                    <div class="msg-name">${d.name}</div>
                    <div class="bubble-container">
                        <div class="bubble">${content}</div>
                        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:2px;">
                            ${isMe ? '<span class="read-status">已讀</span>' : ''}
                            <span class="time-tag">${timeStr}</span>
                        </div>
                    </div>
                `;
                box.appendChild(wrapper);
            });
            box.scrollTop = box.scrollHeight;
        });

        onValue(ref(db, `rooms/${roomID}/meta`), (s) => { if(!s.exists()) location.reload(); });
    }

    // 傳送邏輯
    async function performPush(payload) {
        // 3秒冷卻檢查
        const now = Date.now();
        if(now - lastSendTime < 3000) {
            alert("說話太快了，請休息 3 秒！");
            return;
        }
        lastSendTime = now;

        const msgsRef = ref(db, `rooms/${roomID}/msgs`);
        await push(msgsRef, payload);

        // 限制 50 條：超過則刪除最舊的
        const snap = await get(msgsRef);
        if(snap.exists() && Object.keys(snap.val()).length > 50) {
            const keys = Object.keys(snap.val()).sort();
            remove(ref(db, `rooms/${roomID}/msgs/${keys[0]}`));
        }
    }

    window.doSend = function() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        performPush({ uid, name: myName, text: inp.value, type: 'text', ts: Date.now() });
        inp.value = "";
    };

    window.sendLargeImage = function(input) {
        const file = input.files[0];
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) return alert("檔案太大 (限10MB)");

        document.getElementById('loading-toast').style.display = 'block';
        const reader = new FileReader();
        reader.onload = function(e) {
            performPush({ uid, name: myName, text: e.target.result, type: 'image', ts: Date.now() })
            .then(() => document.getElementById('loading-toast').style.display = 'none');
        };
        reader.readAsDataURL(file);
        input.value = "";
    };

    window.openViewer = function(key) {
        document.getElementById('modal-img').src = document.getElementById('img-' + key).src;
        document.getElementById('photo-modal').style.display = 'flex';
    };

    window.updateNickname = function(val) {
        if(!val.trim()) return;
        myName = val;
        update(ref(db, `rooms/${roomID}/users/${uid}`), { name: val });
    };

    window.destroyRoom = function() {
        if(confirm("銷毀房間將清除所有紀錄！")) remove(ref(db, `rooms/${roomID}`));
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雨神聊天室 | Raingod</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #e9e9eb; --danger: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        #app { width: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; height: 100vh; }
        .hidden { display: none !important; }
        
        .header { height: 65px; padding: 0 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; background: #fff; }
        .room-info b { font-size: 18px; display: block; }
        .room-info span { font-size: 11px; color: var(--me-bg); font-weight: bold; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 14px; background: #fff; }
        .msg-row { display: flex; flex-direction: column; width: 100%; }
        .msg-row.me { align-items: flex-end; }
        .msg-row.other { align-items: flex-start; }
        
        .bubble-group { display: flex; align-items: flex-end; gap: 6px; max-width: 85%; }
        .me .bubble-group { flex-direction: row-reverse; }
        
        /* 氣泡樣式與長按動畫反饋 */
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; word-break: break-all; cursor: pointer; user-select: none; -webkit-user-select: none; transition: opacity 0.2s; }
        .bubble:active { opacity: 0.7; }
        .me .bubble { background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }
        
        .chat-img { max-width: 200px; max-height: 280px; border-radius: 12px; display: block; margin: 4px 0; pointer-events: none; } /* 讓點擊事件穿透到氣泡 */
        .info-tag { font-size: 9px; color: #aaa; display: flex; flex-direction: column; min-width: 45px; }
        .me .info-tag { align-items: flex-end; }

        .input-area { padding: 10px 15px 35px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; background: #fff; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 16px; }
        .btn-sm { padding: 5px 10px; border-radius: 6px; font-size: 12px; border: 1px solid #ddd; background: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-view" style="padding: 40px 25px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center;">
        <h1 style="color: var(--me-bg);">Raingod聊天室</h1>
        <input type="text" id="room-input" placeholder="房號">
        <input type="text" id="nick-input" placeholder="暱稱" style="margin: 10px 0;">
        <input type="password" id="admin-pass" placeholder="管理員密碼">
        <button onclick="handleJoin()" style="margin-top:20px; padding:15px; background:var(--me-bg); color:white; border:none; border-radius:10px; font-weight:bold;">進入聊天室</button>
        <p id="status" style="color:red; font-size:12px;"></p>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <div class="room-info"><b id="room-title">ROOM</b><span id="online-text">在線: 1 人</span></div>
            <div style="display:flex; gap:5px;">
                <button id="del-btn" class="btn-sm hidden" style="color:red; border-color:red;" onclick="destroyRoom()">銷毀</button>
                <button class="btn-sm" onclick="leaveRoom()">退出</button>
            </div>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="file" id="file-selector" class="hidden" accept="image/*" onchange="sendFile(this)">
            <button onclick="document.getElementById('file-selector').click()" style="font-size:24px; border:none; background:none;"上傳⬆</button>
            <input type="text" id="msg-input" placeholder="訊息...">
            <button onclick="doSend()" style="color:var(--me-bg); font-weight:bold; border:none; background:none; font-size:16px;">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk", databaseURL: "https://chat-73802-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);

    let roomID = ""; let myName = ""; let msgLog = [];

    // --- 核心功能：長按判斷 ---
    let pressTimer;
    window.startPress = (id, isMe) => {
        if(!isMe) return;
        pressTimer = setTimeout(() => {
            if(confirm("確定收回這則訊息？")) {
                remove(ref(db, `rooms/${roomID}/msgs/${id}`));
            }
        }, 600); // 0.6 秒算長按
    };
    window.cancelPress = () => clearTimeout(pressTimer);

    window.handleJoin = async function() {
        roomID = document.getElementById('room-input').value.trim().toUpperCase();
        myName = document.getElementById('nick-input').value.trim() || "User";
        if(!roomID) return;
        const roomSnap = await get(ref(db, `rooms/${roomID}`));
        if (!roomSnap.exists()) {
            const ownerSnap = await get(ref(db, `owners/${uid}`));
            if (ownerSnap.exists() && document.getElementById('admin-pass').value !== "你的超級密碼") {
                document.getElementById('status').innerText = `你已擁有房號: ${ownerSnap.val()}`; return;
            }
            const updates = {};
            updates[`/rooms/${roomID}/meta`] = { owner: uid, admin_key: document.getElementById('admin-pass').value };
            updates[`/owners/${uid}`] = roomID;
            await update(ref(db), updates);
        }
        enterUI();
    };

    function enterUI() {
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = roomID;
        const userRef = ref(db, `rooms/${roomID}/users/${uid}`);
        set(userRef, true); onDisconnect(userRef).remove();
        startChat();
    }

    window.leaveRoom = () => confirm("確定離開？") && location.reload();
    window.destroyRoom = async () => {
        if(confirm("⚠ 銷毀將清空所有內容！")) {
            const updates = {}; updates[`/rooms/${roomID}`] = null; updates[`/owners/${uid}`] = null;
            await update(ref(db), updates); location.reload();
        }
    };

    window.doSend = () => {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        const now = Date.now();
        msgLog = msgLog.filter(t => now - t < 30000);
        if(msgLog.length >= 10) return alert("太快了！");
        msgLog.push(now);
        push(ref(db, `rooms/${roomID}/msgs`), { type:'text', content: inp.value, uid, name: myName, ts: serverTimestamp() });
        inp.value = "";
    };

    window.sendFile = (el) => {
        const file = el.files[0];
        if(!file || file.size > 5*1024*1024) return alert("限 5MB");
        const reader = new FileReader();
        reader.onload = (e) => {
            const isImg = file.type.startsWith('image/');
            push(ref(db, `rooms/${roomID}/msgs`), { type: isImg?'image':'file', content: e.target.result, fileName: file.name, uid, name: myName, ts: serverTimestamp() });
        };
        reader.readAsDataURL(file);
    };

    function startChat() {
        onValue(ref(db, `rooms/${roomID}/users`), s => document.getElementById('online-text').innerText = `在線: ${s.size || 1} 人`);
        onValue(ref(db, `rooms/${roomID}/meta`), s => {
            if(!s.exists()) location.reload();
            if(s.val()?.owner === uid) document.getElementById('del-btn').classList.remove('hidden');
        });
        onValue(ref(db, `rooms/${roomID}/msgs`), (snap) => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(c => {
                const d = c.val(); const isMe = d.uid === uid;
                const time = d.ts ? new Date(d.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "";
                let content = d.type === 'image' ? `<img src="${d.content}" class="chat-img">` : (d.type==='file'?`📁 ${d.fileName}`: d.content);
                
                const row = document.createElement('div');
                row.className = `msg-row ${isMe ? 'me' : 'other'}`;
                // 加入手機長按監聽
                row.innerHTML = `
                    <div style="font-size:10px; color:#888; margin-bottom:2px;">${d.name}</div>
                    <div class="bubble-group">
                        <div class="bubble" 
                             onmousedown="startPress('${c.key}', ${isMe})" onmouseup="cancelPress()" onmouseleave="cancelPress()"
                             ontouchstart="startPress('${c.key}', ${isMe})" ontouchend="cancelPress()"
                             oncontextmenu="event.preventDefault()">
                            ${content}
                        </div>
                        <div class="info-tag">
                            ${isMe ? `<span style="color:#007aff; font-weight:bold;">已讀</span>` : ''}
                            <span>${time}</span>
                        </div>
                    </div>`;
                box.appendChild(row);
            });
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>

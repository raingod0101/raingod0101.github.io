<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雨神聊天室 | Raingod</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #e9e9eb; --danger: #ff3b30; --text-gray: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; height: 100vh; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        
        /* Header 優化 */
        .header { height: 65px; padding: 0 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; background: #fff; }
        .room-info b { font-size: 18px; color: #333; display: block; }
        .room-info span { font-size: 11px; color: var(--me-bg); font-weight: bold; }
        
        .nav-btns { display: flex; gap: 8px; }
        .btn-sm { padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; border: 1px solid #ddd; background: none; transition: 0.2s; }
        .btn-sm:active { transform: scale(0.95); opacity: 0.7; }
        .btn-destory { color: var(--danger); border-color: var(--danger); }
        .btn-leave { color: #666; }

        /* Chat Area */
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 14px; background: #fff; }
        .msg-row { display: flex; flex-direction: column; width: 100%; }
        .msg-row.me { align-items: flex-end; }
        .msg-row.other { align-items: flex-start; }
        
        .bubble-group { display: flex; align-items: flex-end; gap: 6px; max-width: 85%; }
        .me .bubble-group { flex-direction: row-reverse; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; word-break: break-all; cursor: pointer; position: relative; }
        .me .bubble { background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }
        
        .chat-img { max-width: 220px; max-height: 300px; border-radius: 12px; display: block; margin: 4px 0; border: 1px solid #eee; }
        .info-tag { font-size: 9px; color: #aaa; display: flex; flex-direction: column; min-width: 45px; }
        .me .info-tag { align-items: flex-end; }

        /* Input Area */
        .input-area { padding: 10px 15px 35px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; background: #fff; }
        input[type="text"] { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 22px; outline: none; font-size: 15px; }
        .btn-icon { font-size: 22px; background: none; border: none; cursor: pointer; padding: 0; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-view" style="padding: 40px 25px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center;">
        <h1 style="color: var(--me-bg); margin-bottom: 5px;">Raingod聊天室</h1>
        <p style="color: #999; font-size: 13px; margin-bottom: 30px;">隱私、快速、檔案分享</p>
        <input type="text" id="room-input" placeholder="房號 (必填)" style="margin-bottom:10px; padding:12px; border:1px solid #ddd; border-radius:10px;">
        <input type="text" id="nick-input" placeholder="暱稱" style="margin-bottom:10px; padding:12px; border:1px solid #ddd; border-radius:10px;">
        <input type="password" id="admin-pass" placeholder="管理員密碼 (選填)" style="margin-bottom:20px; padding:12px; border:1px solid #ddd; border-radius:10px;">
        <button onclick="handleJoin()" style="padding:15px; background:var(--me-bg); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer; font-size:16px;">進入聊天室</button>
        <p id="status" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <div class="room-info">
                <b id="room-title">ROOM</b>
                <span id="online-text">在線: 1 人</span>
            </div>
            <div class="nav-btns">
                <button id="del-btn" class="btn-sm btn-destory hidden" onclick="destroyRoom()">銷毀房間</button>
                <button class="btn-sm btn-leave" onclick="leaveRoom()">退出離開</button>
            </div>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="file" id="file-selector" class="hidden" accept="image/*, .pdf, .txt, .zip" onchange="sendFile(this)">
            <button class="btn-icon" onclick="document.getElementById('file-selector').click()">📎</button>
            <input type="text" id="msg-input" placeholder="輸入訊息..." onkeypress="if(event.key==='Enter') doSend()">
            <button onclick="doSend()" style="color:var(--me-bg); font-weight:bold; border:none; background:none; font-size:16px; cursor:pointer;">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk",
        databaseURL: "https://chat-73802-default-rtdb.firebaseio.com",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);

    let roomID = ""; let myName = ""; let msgLog = [];

    // 【加入/建立】
    window.handleJoin = async function() {
        roomID = document.getElementById('room-input').value.trim().toUpperCase();
        myName = document.getElementById('nick-input').value.trim() || "User";
        const pass = document.getElementById('admin-pass').value;
        if(!roomID) return;

        const roomRef = ref(db, `rooms/${roomID}`);
        const roomSnap = await get(roomRef);

        if (roomSnap.exists()) {
            enterUI();
        } else {
            const ownerSnap = await get(ref(db, `owners/${uid}`));
            if (ownerSnap.exists() && pass !== "你的超級密碼") {
                document.getElementById('status').innerText = `你已擁有房號: ${ownerSnap.val()}，請先銷毀。`;
                return;
            }
            const updates = {};
            updates[`/rooms/${roomID}/meta`] = { owner: uid, admin_key: pass };
            updates[`/owners/${uid}`] = roomID;
            try { await update(ref(db), updates); enterUI(); } catch (e) { alert("創房失敗"); }
        }
    };

    function enterUI() {
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = roomID;
        
        const userRef = ref(db, `rooms/${roomID}/users/${uid}`);
        set(userRef, true);
        onDisconnect(userRef).remove();
        startChat();
    }

    // 【離開房間】只回首頁，不砍資料
    window.leaveRoom = async () => {
        if(confirm("確定離開？房間將會保留。")) {
            await remove(ref(db, `rooms/${roomID}/users/${uid}`));
            location.reload();
        }
    };

    // 【銷毀房間】全毀
    window.destroyRoom = async () => {
        if(confirm("⚠ 注意：這將永久刪除房間所有訊息與紀錄！確定？")) {
            const updates = {};
            updates[`/rooms/${roomID}`] = null;
            updates[`/owners/${uid}`] = null;
            await update(ref(db), updates);
            location.reload();
        }
    };

    // 【傳送與檔案】
    async function sendCore(payload) {
        const now = Date.now();
        msgLog = msgLog.filter(t => now - t < 30000);
        if (msgLog.length >= 10) return alert("太快了！30秒內限10則。");
        msgLog.push(now);
        push(ref(db, `rooms/${roomID}/msgs`), { ...payload, uid, name: myName, ts: serverTimestamp() });
    }

    window.doSend = () => {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        sendCore({ type: 'text', content: inp.value });
        inp.value = "";
    };

    window.sendFile = (el) => {
        const file = el.files[0];
        if(!file || file.size > 5 * 1024 * 1024) return alert("檔案限 5MB 以下");
        const reader = new FileReader();
        reader.onload = (e) => {
            const isImg = file.type.startsWith('image/');
            sendCore({ type: isImg ? 'image' : 'file', content: e.target.result, fileName: file.name });
        };
        reader.readAsDataURL(file);
        el.value = "";
    };

    window.recallMsg = (id) => {
        if(confirm("收回此訊息？")) remove(ref(db, `rooms/${roomID}/msgs/${id}`));
    };

    function startChat() {
        // 在線人數監聽
        onValue(ref(db, `rooms/${roomID}/users`), s => {
            window.onlineCount = s.size || 1;
            document.getElementById('online-text').innerText = `在線: ${window.onlineCount} 人`;
        });

        // 房主權限與房間狀態監聽
        onValue(ref(db, `rooms/${roomID}/meta`), s => {
            if(!s.exists()) { location.reload(); return; }
            if(s.val()?.owner === uid) document.getElementById('del-btn').classList.remove('hidden');
        });

        // 訊息監聽
        onValue(ref(db, `rooms/${roomID}/msgs`), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                const isMe = d.uid === uid;
                const time = d.ts ? new Date(d.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "";
                
                let contentHTML = "";
                if (d.type === 'image') {
                    contentHTML = `<img src="${d.content}" class="chat-img" onclick="window.open('${d.content}')">`;
                } else if (d.type === 'file') {
                    contentHTML = `<div onclick="window.open('${d.content}')" style="text-decoration:underline; cursor:pointer;">📁 ${d.fileName}</div>`;
                } else {
                    contentHTML = d.content;
                }

                const row = document.createElement('div');
                row.className = `msg-row ${isMe ? 'me' : 'other'}`;
                row.innerHTML = `
                    <div style="font-size:10px; color:#888; margin-bottom:2px; padding:0 5px;">${d.name}</div>
                    <div class="bubble-group">
                        <div class="bubble" onclick="${isMe ? `recallMsg('${c.key}')` : ''}">${contentHTML}</div>
                        <div class="info-tag">
                            ${isMe ? `<span style="color:#007aff; font-weight:bold;">已讀 ${window.onlineCount-1}</span>` : ''}
                            <span>${time}</span>
                        </div>
                    </div>`;
                box.appendChild(row);
            });
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>

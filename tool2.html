<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raingod Pro | 穩定快取版</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #f2f2f7; --bg-main: #e5e5ea; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-main); margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* App 容器置中且預留邊距 */
        #app { 
            width: 94%; max-width: 500px; background: white; 
            display: flex; flex-direction: column; height: 96vh; 
            margin-top: 2vh; border-radius: 24px; overflow: hidden;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }
        
        .header { height: 60px; padding: 0 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .hidden { display: none !important; }

        /* 聊天室內容 */
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        .msg-row { display: flex; flex-direction: column; width: 100%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-row.me { align-items: flex-end; }
        .msg-row.other { align-items: flex-start; }
        
        .name-tag { font-size: 11px; color: #8e8e93; margin-bottom: 3px; padding: 0 5px; }
        .bubble-group { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
        .me .bubble-group { flex-direction: row-reverse; }

        .bubble { padding: 12px 16px; border-radius: 20px; font-size: 15px; word-break: break-all; line-height: 1.4; user-select: none; }
        .me .bubble { background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }
        
        .chat-img { max-width: 100%; border-radius: 12px; display: block; margin-bottom: 5px; pointer-events: none; }
        .info-tag { font-size: 10px; color: #aeaeb2; display: flex; flex-direction: column; min-width: 45px; }
        .me .info-tag { align-items: flex-end; }

        /* 輸入框 */
        .input-area { padding: 10px 15px 30px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; background: #fff; }
        input[type="text"] { flex: 1; padding: 12px 18px; border: none; background: #f2f2f7; border-radius: 25px; outline: none; font-size: 16px; }
    </style>
</head>
<body>
<link rel="stylesheet" href="menu.css">

<div id="nav_bar"></div>

<script src="menu.js"></script>
<div id="app">
    <div id="login-view" style="padding: 40px 25px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center;">
        <h2 style="color: var(--me-bg); margin-bottom: 5px;">Raingod Pro</h2>
        <p style="color: #999; font-size: 12px; margin-bottom: 25px;">輸入房號即刻開始</p>
        <input type="text" id="room-input" placeholder="房號 (例如: TEST)">
        <input type="text" id="nick-input" placeholder="你的暱稱" style="margin: 12px 0;">
        <input type="password" id="admin-pass" placeholder="管理員密碼 (可不填)">
        <button onclick="handleJoin()" style="margin-top:25px; padding:16px; background:var(--me-bg); color:white; border:none; border-radius:15px; font-weight:bold; cursor:pointer; font-size:16px;">進入聊天室</button>
        <p id="status" style="color:red; font-size:12px; margin-top:15px;"></p>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <div><b id="room-title">...</b> <small id="online-text" style="color:var(--me-bg)"></small></div>
            <div style="display:flex; gap:10px;">
                <button id="del-btn" class="hidden" style="color:red; border:none; background:none; font-size:13px; font-weight:bold;" onclick="destroyRoom()">銷毀</button>
                <button style="border:none; background:none; font-size:13px; color:#666;" onclick="location.reload()">退出</button>
            </div>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="file" id="file-selector" class="hidden" onchange="sendFile(this)">
            <button onclick="document.getElementById('file-selector').click()" style="font-size:26px; border:none; background:none; cursor:pointer;">📎</button>
            <input type="text" id="msg-input" placeholder="輸入訊息..." onkeypress="if(event.key==='Enter') doSend()">
            <button onclick="doSend()" style="color:var(--me-bg); font-weight:bold; border:none; background:none; font-size:17px; cursor:pointer;">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk", databaseURL: "https://chat-73802-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    // 初始化 UID 與快取資料
    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);
    
    // 自動填入上次進入的房號與暱稱
    document.getElementById('room-input').value = localStorage.getItem('last_room') || "";
    document.getElementById('nick-input').value = localStorage.getItem('last_nick') || "";

    let roomID = ""; let myName = ""; let pressTimer;

    // 長按收回邏輯
    window.startPress = (id, isMe) => { if(isMe) pressTimer = setTimeout(() => confirm("收回訊息？") && remove(ref(db, `rooms/${roomID}/msgs/${id}`)), 700); };
    window.cancelPress = () => clearTimeout(pressTimer);

    window.handleJoin = async function() {
        roomID = document.getElementById('room-input').value.trim().toUpperCase();
        myName = document.getElementById('nick-input').value.trim() || "訪客";
        if(!roomID) return;

        // 儲存快取
        localStorage.setItem('last_room', roomID);
        localStorage.setItem('last_nick', myName);
        
        const roomRef = ref(db, `rooms/${roomID}`);
        const snap = await get(roomRef);
        
        // 如果房間不存在，嘗試建立
        if(!snap.exists()) {
            try {
                const updates = {};
                updates[`/rooms/${roomID}/meta`] = { owner: uid, admin_key: document.getElementById('admin-pass').value };
                updates[`/owners/${uid}`] = roomID;
                await update(ref(db), updates);
            } catch(e) { 
                document.getElementById('status').innerText = "進入失敗，可能房號已被佔用。";
                return;
            }
        }
        enterUI();
    };

    function enterUI() {
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = roomID;
        
        const userRef = ref(db, `rooms/${roomID}/users/${uid}`);
        set(userRef, true); 
        onDisconnect(userRef).remove();
        startChat();
    }

    window.doSend = () => {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        push(ref(db, `rooms/${roomID}/msgs`), { type:'text', content: inp.value, uid, name: myName, ts: serverTimestamp() });
        inp.value = "";
    };

    window.sendFile = (el) => {
        const file = el.files[0];
        if(!file || file.size > 5*1024*1024) return alert("限5MB內");
        const reader = new FileReader();
        reader.onload = (e) => {
            push(ref(db, `rooms/${roomID}/msgs`), { 
                type: file.type.startsWith('image/') ? 'image' : 'file', 
                content: e.target.result, 
                fileName: file.name, uid, name: myName, ts: serverTimestamp() 
            });
        };
        reader.readAsDataURL(file);
        el.value = "";
    };

    function startChat() {
        let onlineCount = 1;
        onValue(ref(db, `rooms/${roomID}/users`), s => {
            onlineCount = s.size || 1;
            document.getElementById('online-text').innerText = `(${onlineCount}人在線)`;
        });

        onValue(ref(db, `rooms/${roomID}/meta`), s => {
            if(!s.exists()) location.reload();
            if(s.val()?.owner === uid) document.getElementById('del-btn').classList.remove('hidden');
        });

        // 訊息渲染：加入更強大的 undefined 防護
        onValue(ref(db, `rooms/${roomID}/msgs`), (snap) => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(c => {
                const d = c.val(); 
                if(!d || !d.uid) return; // 沒 UID 的資料直接跳過，解決 undefined

                const isMe = d.uid === uid;
                const time = d.ts ? new Date(d.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "";
                const senderName = d.name || "神秘人";

                let displayHTML = "";
                if(d.type === 'image') displayHTML = `<img src="${d.content}" class="chat-img" onclick="window.open('${d.content}')">`;
                else if(d.type === 'file') displayHTML = `<div onclick="window.open('${d.content}')" style="text-decoration:underline; cursor:pointer;">📁 ${d.fileName || '檔案'}</div>`;
                else displayHTML = d.content || "";

                const row = document.createElement('div');
                row.className = `msg-row ${isMe ? 'me' : 'other'}`;
                row.innerHTML = `
                    <div class="name-tag">${senderName}</div>
                    <div class="bubble-group">
                        <div class="bubble" 
                             onmousedown="startPress('${c.key}', ${isMe})" onmouseup="cancelPress()" onmouseleave="cancelPress()"
                             ontouchstart="startPress('${c.key}', ${isMe})" ontouchend="cancelPress()"
                             oncontextmenu="event.preventDefault()">
                            ${displayHTML}
                        </div>
                        <div class="info-tag">
                            ${isMe ? `<span style="color:var(--me-bg); font-weight:bold;">已讀 ${onlineCount-1}</span>` : ''}
                            <span>${time}</span>
                        </div>
                    </div>`;
                box.appendChild(row);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.destroyRoom = async () => {
        if(confirm("確定銷毀？")) {
            const updates = {}; updates[`/rooms/${roomID}`] = null; updates[`/owners/${uid}`] = null;
            await update(ref(db), updates);
        }
    };
</script>
</body>
</html>

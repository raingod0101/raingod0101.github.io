<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raingod | 雨神聊天室</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #f2f2f7; --danger: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: #e5e5ea; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* 畫面置中與邊邊預留 */
        #app { 
            width: 92%; 
            max-width: 500px; 
            background: white; 
            display: flex; 
            flex-direction: column; 
            height: 96vh; 
            margin-top: 2vh;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .header { height: 60px; padding: 0 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        
        /* 聊天區域 */
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 16px; background: #fff; }
        .msg-row { display: flex; flex-direction: column; width: 100%; }
        .msg-row.me { align-items: flex-end; }
        .msg-row.other { align-items: flex-start; }
        
        .name-tag { font-size: 11px; color: #8e8e93; margin-bottom: 4px; padding: 0 8px; }
        
        /* 解決重疊的關鍵：使用 Flex 分離內容與時間 */
        .bubble-group { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
        .me .bubble-group { flex-direction: row-reverse; }

        .bubble { 
            padding: 12px 16px; 
            border-radius: 18px; 
            font-size: 15px; 
            word-break: break-all; 
            line-height: 1.4;
            user-select: none;
            -webkit-user-select: none;
        }
        .me .bubble { background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }
        
        /* 圖片不要重疊 */
        .chat-img { 
            max-width: 100%; 
            border-radius: 10px; 
            display: block; 
            margin-bottom: 4px;
            pointer-events: none; 
        }

        .info-tag { font-size: 10px; color: #aeaeb2; display: flex; flex-direction: column; min-width: 40px; }
        .me .info-tag { align-items: flex-end; }

        /* 輸入區域 */
        .input-area { padding: 12px 15px 30px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 10px 15px; border: 1px solid #efeff4; background: #f2f2f7; border-radius: 20px; outline: none; font-size: 16px; }
        .btn-icon { font-size: 24px; border: none; background: none; cursor: pointer; padding: 0; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-view" style="padding: 40px 20px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center;">
        <h2 style="color: var(--me-bg);">Raingod聊天室</h2>
        <input type="text" id="room-input" placeholder="輸入房號">
        <input type="text" id="nick-input" placeholder="你的暱稱" style="margin: 10px 0;">
        <input type="password" id="admin-pass" placeholder="管理員密碼">
        <button onclick="handleJoin()" style="margin-top:20px; padding:15px; background:var(--me-bg); color:white; border:none; border-radius:12px; font-weight:bold;">進入房間</button>
        <p id="status" style="color:red; font-size:12px;"></p>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <div><b id="room-title">ROOM</b> <small id="online-text" style="color:var(--me-bg)"></small></div>
            <div style="display:flex; gap:8px;">
                <button id="del-btn" class="hidden" style="color:red; border:none; background:none; font-size:12px;" onclick="destroyRoom()">銷毀</button>
                <button style="border:none; background:none; font-size:12px; color:#666;" onclick="location.reload()">離開</button>
            </div>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="file" id="file-selector" class="hidden" onchange="sendFile(this)">
            <button class="btn-icon" onclick="document.getElementById('file-selector').click()">📎</button>
            <input type="text" id="msg-input" placeholder="說點什麼..." onkeypress="if(event.key==='Enter') doSend()">
            <button onclick="doSend()" style="color:var(--me-bg); font-weight:bold; border:none; background:none; font-size:16px;">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk", databaseURL: "https://chat-73802-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);
    let roomID = ""; let myName = ""; let msgLog = []; let pressTimer;

    // --- 長按收回邏輯 ---
    window.startPress = (id, isMe) => {
        if(!isMe) return;
        pressTimer = setTimeout(() => {
            if(confirm("收回這則訊息？")) remove(ref(db, `rooms/${roomID}/msgs/${id}`));
        }, 700);
    };
    window.cancelPress = () => clearTimeout(pressTimer);

    window.handleJoin = async function() {
        roomID = document.getElementById('room-input').value.trim().toUpperCase();
        myName = document.getElementById('nick-input').value.trim() || "訪客";
        if(!roomID) return;
        
        const roomRef = ref(db, `rooms/${roomID}`);
        const snap = await get(roomRef);
        if(!snap.exists()) {
            const updates = {};
            updates[`/rooms/${roomID}/meta`] = { owner: uid, admin_key: document.getElementById('admin-pass').value };
            updates[`/owners/${uid}`] = roomID;
            await update(ref(db), updates);
        }
        enterUI();
    };

    function enterUI() {
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = roomID;
        const userRef = ref(db, `rooms/${roomID}/users/${uid}`);
        set(userRef, true); onDisconnect(userRef).remove();
        startChat();
    }

    window.doSend = () => {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        const now = Date.now();
        msgLog = msgLog.filter(t => now - t < 30000);
        if(msgLog.length >= 10) return alert("太快了，休息一下");
        msgLog.push(now);
        push(ref(db, `rooms/${roomID}/msgs`), { type:'text', content: inp.value, uid, name: myName, ts: serverTimestamp() });
        inp.value = "";
    };

    window.sendFile = (el) => {
        const file = el.files[0];
        if(!file || file.size > 5*1024*1024) return alert("檔案太大(限5MB)");
        const reader = new FileReader();
        reader.onload = (e) => {
            const isImg = file.type.startsWith('image/');
            push(ref(db, `rooms/${roomID}/msgs`), { 
                type: isImg?'image':'file', 
                content: e.target.result, 
                fileName: file.name || "檔案", 
                uid, name: myName, ts: serverTimestamp() 
            });
        };
        reader.readAsDataURL(file);
        el.value = "";
    };

    function startChat() {
        let onlineCount = 1;
        onValue(ref(db, `rooms/${roomID}/users`), s => {
            onlineCount = s.size || 1;
            document.getElementById('online-text').innerText = `(${onlineCount}人)`;
        });

        onValue(ref(db, `rooms/${roomID}/meta`), s => {
            if(!s.exists()) location.reload();
            if(s.val()?.owner === uid) document.getElementById('del-btn').classList.remove('hidden');
        });

        onValue(ref(db, `rooms/${roomID}/msgs`), (snap) => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(c => {
                const d = c.val(); 
                if(!d) return; // 安全檢查
                
                const isMe = d.uid === uid;
                const time = d.ts ? new Date(d.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "";
                
                // 修正內容讀取，防止 undefined
                let displayContent = "";
                if(d.type === 'image') {
                    displayContent = `<img src="${d.content || ''}" class="chat-img">`;
                } else if(d.type === 'file') {
                    displayContent = `<div style="text-decoration:underline">📁 ${d.fileName || '未知檔案'}</div>`;
                } else {
                    displayContent = d.content || "(無內容)";
                }

                const row = document.createElement('div');
                row.className = `msg-row ${isMe ? 'me' : 'other'}`;
                row.innerHTML = `
                    <div class="name-tag">${d.name || '不明'}</div>
                    <div class="bubble-group">
                        <div class="bubble" 
                             onmousedown="startPress('${c.key}', ${isMe})" onmouseup="cancelPress()" onmouseleave="cancelPress()"
                             ontouchstart="startPress('${c.key}', ${isMe})" ontouchend="cancelPress()"
                             oncontextmenu="event.preventDefault()">
                            ${displayContent}
                        </div>
                        <div class="info-tag">
                            ${isMe ? `<span style="color:var(--me-bg); font-weight:bold;">已讀 ${onlineCount-1}</span>` : ''}
                            <span>${time}</span>
                        </div>
                    </div>`;
                box.appendChild(row);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.destroyRoom = async () => {
        if(confirm("銷毀房間？")) {
            const updates = {}; updates[`/rooms/${roomID}`] = null; updates[`/owners/${uid}`] = null;
            await update(ref(db), updates);
        }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raingod | 雨神聊天室</title>
    <style>
        :root { --me-bg: #007aff; --other-bg: #f2f2f7; --gray: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: #e5e5ea; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        #app { 
            width: 92%; max-width: 500px; background: white; height: 94vh; 
            border-radius: 24px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
        }

        /* 登入頁優化 */
        #login-view { padding: 40px 30px; display: flex; flex-direction: column; justify-content: center; height: 100%; text-align: center; }
        .history-box { margin-top: 20px; text-align: left; }
        .history-title { font-size: 12px; color: var(--gray); margin-bottom: 8px; font-weight: bold; }
        .history-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { padding: 6px 12px; background: #f2f2f7; border-radius: 15px; font-size: 13px; color: var(--me-bg); cursor: pointer; border: 1px solid transparent; }
        .tag:active { background: #e5e5ea; }

        .input-group { margin-bottom: 12px; text-align: left; }
        .input-group label { font-size: 12px; color: var(--gray); margin-left: 5px; }
        input { width: 100%; padding: 14px; border: 1px solid #efeff4; background: #f2f2f7; border-radius: 15px; outline: none; box-sizing: border-box; font-size: 16px; margin-top: 5px; }
        
        /* 聊天室 Header */
        .header { height: 65px; padding: 0 18px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        /* 訊息氣泡排版 */
        .msg-row { display: flex; flex-direction: column; width: 100%; margin-bottom: 5px; }
        .msg-row.me { align-items: flex-end; }
        .msg-row.other { align-items: flex-start; }
        .bubble-group { display: flex; align-items: flex-end; gap: 8px; max-width: 82%; }
        .me .bubble-group { flex-direction: row-reverse; }
        .bubble { padding: 10px 16px; border-radius: 18px; font-size: 15px; word-break: break-all; line-height: 1.4; }
        .me .bubble { background: var(--me-bg); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: var(--other-bg); color: black; border-bottom-left-radius: 4px; }
        
        .input-area { padding: 10px 15px 30px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-view">
        <h1 style="color: var(--me-bg); margin-bottom: 30px;">Raingod聊天室</h1>
        
        <div class="input-group">
            <label>房號 (Room ID)</label>
            <input type="text" id="room-input" placeholder="例如: PRO99">
        </div>

        <div class="input-group">
            <label>暱稱 (Nickname)</label>
            <input type="text" id="nick-input" placeholder="你的名字">
        </div>

        <div id="history-section" class="history-box hidden">
            <div class="history-title">最近進入的房間</div>
            <div id="history-tags" class="history-tags"></div>
        </div>

        <button onclick="handleJoin()" style="margin-top:30px; padding:16px; background:var(--me-bg); color:white; border:none; border-radius:15px; font-weight:bold; font-size:16px; cursor:pointer;">開始聊天</button>
        <p id="status" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>

    <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <div><b id="room-title"></b> <small id="online-text" style="color:var(--me-bg)"></small></div>
            <button style="border:none; background:none; color:var(--gray); font-weight:bold;" onclick="location.reload()">離開</button>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="file" id="file-selector" class="hidden" onchange="sendFile(this)">
            <button style="font-size:24px; border:none; background:none; cursor:pointer;" onclick="document.getElementById('file-selector').click()">📎</button>
            <input type="text" id="msg-input" placeholder="輸入訊息..." onkeypress="if(event.key==='Enter') doSend()">
            <button onclick="doSend()" style="color:var(--me-bg); font-weight:bold; border:none; background:none; font-size:16px;">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk", databaseURL: "https://chat-73802-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);
    let roomID = ""; let myName = ""; let pressTimer;

    // --- 讀取最近房間歷史 ---
    function loadHistory() {
        const history = JSON.parse(localStorage.getItem('chat_history') || "[]");
        if(history.length > 0) {
            const container = document.getElementById('history-tags');
            const section = document.getElementById('history-section');
            container.innerHTML = "";
            history.forEach(id => {
                const span = document.createElement('span');
                span.className = "tag";
                span.innerText = id;
                span.onclick = () => document.getElementById('room-input').value = id;
                container.appendChild(span);
            });
            section.classList.remove('hidden');
        }
    }
    loadHistory();

    // --- 儲存新房間到歷史 ---
    function saveToHistory(id) {
        let history = JSON.parse(localStorage.getItem('chat_history') || "[]");
        history = history.filter(item => item !== id); // 移除重複
        history.unshift(id); // 加到最前面
        history = history.slice(0, 5); // 只留最近5個
        localStorage.setItem('chat_history', JSON.stringify(history));
    }

    window.handleJoin = async function() {
        roomID = document.getElementById('room-input').value.trim().toUpperCase();
        myName = document.getElementById('nick-input').value.trim() || "訪客";
        if(!roomID) return;

        const roomRef = ref(db, `rooms/${roomID}`);
        const snap = await get(roomRef);
        
        if(!snap.exists()) {
            // 創房邏輯
            const updates = {};
            updates[`/rooms/${roomID}/meta`] = { owner: uid, createdAt: serverTimestamp() };
            updates[`/owners/${uid}`] = roomID;
            await update(ref(db), updates);
        }

        saveToHistory(roomID); // 進入成功後儲存
        enterUI();
    };

    function enterUI() {
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = roomID;
        set(ref(db, `rooms/${roomID}/users/${uid}`), true);
        onDisconnect(ref(db, `rooms/${roomID}/users/${uid}`)).remove();
        startChat();
    }

    // --- 訊息與傳送功能 (同前版) ---
    window.doSend = () => {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        push(ref(db, `rooms/${roomID}/msgs`), { type:'text', content: inp.value, uid, name: myName, ts: serverTimestamp() });
        inp.value = "";
    };

    window.sendFile = (el) => {
        const file = el.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const isImg = file.type.startsWith('image/');
            push(ref(db, `rooms/${roomID}/msgs`), { 
                type: isImg?'image':'file', content: e.target.result, fileName: file.name, uid, name: myName, ts: serverTimestamp() 
            });
        };
        reader.readAsDataURL(file);
    };

    function startChat() {
        onValue(ref(db, `rooms/${roomID}/users`), s => document.getElementById('online-text').innerText = `(${s.size || 1}人)`);
        onValue(ref(db, `rooms/${roomID}/msgs`), (snap) => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(c => {
                const d = c.val(); if(!d) return;
                const isMe = d.uid === uid;
                const row = document.createElement('div');
                row.className = `msg-row ${isMe ? 'me' : 'other'}`;
                let content = d.type === 'image' ? `<img src="${d.content}" style="max-width:100%; border-radius:10px;">` : (d.type==='file'?`📁 ${d.fileName}`: d.content);
                row.innerHTML = `
                    <div style="font-size:10px; color:#aaa; margin:0 5px 2px;">${d.name}</div>
                    <div class="bubble-group">
                        <div class="bubble">${content}</div>
                        <div style="font-size:9px; color:#ccc;">${d.ts ? new Date(d.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : ""}</div>
                    </div>`;
                box.appendChild(row);
            });
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>

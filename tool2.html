<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私密房號聊天室</title>
    <style>
        :root { --primary: #007aff; --danger: #ff3b30; --bg: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #app { width: 95%; max-width: 450px; background: white; height: 90vh; border-radius: 20px; shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        
        /* 登入介面 */
        .view { padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        .hidden { display: none !important; }
        
        /* 聊天室頂部 */
        .header { background: #fff; padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .header-info h3 { margin: 0; font-size: 18px; color: #333; }
        
        /* 訊息區 */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #f9f9fb; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; font-size: 15px; line-height: 1.4; position: relative; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #e9e9eb; color: #000; border-bottom-left-radius: 4px; }
        .msg-name { font-size: 11px; margin-bottom: 3px; opacity: 0.7; font-weight: bold; }

        /* 輸入區 */
        .input-area { padding: 15px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        button { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-send { background: var(--primary); color: white; flex-shrink: 0; width: 70px; }
        .btn-join { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .btn-danger { background: var(--danger); color: white; font-size: 12px; padding: 5px 10px; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-view" class="view">
        <h2 style="margin-top:0">🚪 進入聊天室</h2>
        <label>房號 (英文數字)</label>
        <input type="text" id="room-input" placeholder="例如: SECRET99">
        <label>您的暱稱</label>
        <input type="text" id="nick-input" placeholder="例如: 王小明">
        <button class="btn-join" onclick="handleJoin()">進入 / 創建房間</button>
    </div>

    <div id="chat-view" class="view hidden" style="padding:0; height:100%;">
        <div class="header">
            <div class="header-info">
                <h3 id="room-title">房間</h3>
                <input type="text" id="rename-input" style="width:80px; font-size:12px; padding:3px; margin:0;" onchange="updateNickname(this.value)" title="點擊修改暱稱">
            </div>
            <div style="display:flex; gap:5px;">
                <button id="owner-btn" class="btn-danger hidden" onclick="destroyRoom()">銷毀</button>
                <button onclick="location.reload()" style="font-size:12px; padding:5px 10px;">離開</button>
            </div>
        </div>

        <div id="chat-box"></div>

        <div class="input-area">
            <input type="text" id="msg-input" style="flex:1" placeholder="輸入訊息..." onkeypress="if(event.key==='Enter') doSend()">
            <button class="btn-send" onclick="doSend()">傳送</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, onDisconnect, serverTimestamp, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- Firebase 配置 ---
    const firebaseConfig = {
        apiKey: "AIzaSyDHb0o6ahdNnvlL3-QQy_yRO_mg4XMqtJk",
        authDomain: "chat-73802.firebaseapp.com",
        databaseURL: "https://chat-73802-default-rtdb.firebaseio.com",
        projectId: "chat-73802",
        storageBucket: "chat-73802.firebasestorage.app",
        messagingSenderId: "274628413625",
        appId: "1:274628413625:web:77499e0bdeab18104bf368",
        measurementId: "G-BP7YV746WV"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 取得裝置唯一 ID (一機一人)
    let uid = localStorage.getItem('chat_uid') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('chat_uid', uid);

    let roomID = "";
    let myName = "";

    // 1. 進入房間
    window.handleJoin = async function() {
        const rIn = document.getElementById('room-input').value.trim().toUpperCase();
        const nIn = document.getElementById('nick-input').value.trim();
        
        if(!rIn || !nIn) return alert("請填寫房號與暱稱");
        roomID = rIn;
        myName = nIn;

        const roomRef = ref(db, `rooms/${roomID}`);
        const snap = await get(roomRef);

        // 如果房間沒人，第一個進去的是房主
        if(!snap.exists()) {
            await set(ref(db, `rooms/${roomID}/meta`), { owner: uid });
        }

        // 檢查房主權限
        const metaSnap = await get(ref(db, `rooms/${roomID}/meta`));
        if(metaSnap.val()?.owner === uid) {
            document.getElementById('owner-btn').classList.remove('hidden');
        }

        // 登入狀態與斷線自動移除
        const myUserRef = ref(db, `rooms/${roomID}/users/${uid}`);
        set(myUserRef, { name: myName });
        onDisconnect(myUserRef).remove();

        // UI 換頁
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('room-title').innerText = "房號: " + roomID;
        document.getElementById('rename-input').value = myName;

        startChat();
    }

    // 2. 開始監聽
    function startChat() {
        // 監聽訊息 (自動限制最新 100 條，防止存太多)
        onValue(ref(db, `rooms/${roomID}/msgs`), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(child => {
                const d = child.val();
                const div = document.createElement('div');
                div.className = `msg ${d.uid === uid ? 'me' : 'other'}`;
                div.innerHTML = `<div class="msg-name">${d.name}</div>${d.text}`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });

        // 監聽房間是否被銷毀
        onValue(ref(db, `rooms/${roomID}/meta`), (snap) => {
            if(!snap.exists() && roomID !== "") {
                alert("房間已被銷毀！");
                location.reload();
            }
        });
    }

    // 3. 傳送訊息
    window.doSend = function() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        push(ref(db, `rooms/${roomID}/msgs`), {
            uid: uid,
            name: myName,
            text: inp.value,
            ts: serverTimestamp()
        });
        inp.value = "";
    }

    // 4. 修改暱稱
    window.updateNickname = function(val) {
        if(!val.trim()) return;
        myName = val;
        set(ref(db, `rooms/${roomID}/users/${uid}/name`), val);
    }

    // 5. 銷毀房間 (房主權限)
    window.destroyRoom = function() {
        if(confirm("確定要銷毀房號 " + roomID + " 嗎？所有紀錄將清空。")) {
            remove(ref(db, `rooms/${roomID}`));
        }
    }
</script>

</body>
</html>

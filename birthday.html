<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>生日快樂！</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 50px 20px;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            gap: 40px;
            font-family: 'Noto Sans TC', sans-serif;
            text-align: center;
            cursor: pointer;

            /* 禁止選取文字與圖片 */
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* 確保圖片也無法被拖曳選取 */
        img {
            -webkit-user-drag: none;
            user-drag: none;
        }

        h1 { color: white; text-shadow: 2px 2px 5px rgba(0,0,0,0.2); font-size: 3rem; }

        .img-holder {
            width: 300px;
            height: 300px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .img-holder img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>
<link rel="stylesheet" href="menu.css">

<div id="nav_bar"></div>

<script src="menu.js"></script>
    <h1>生日快樂！</h1>

    <div class="img-holder"><img src="https://raingod0101.github.io/meowl.png" alt="meowl"></div>
    <div class="img-holder"><img src="https://raingod0101.github.io/CD.png" alt="CD"></div>

    <script>
        document.addEventListener('click', function(e) {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { 
                    x: e.clientX / window.innerWidth, 
                    y: e.clientY / window.innerHeight 
                }
            });
        });
    </script>
</body>
</html>

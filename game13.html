<!DOCTYPE html>
<html>

<head>
    <title>貪吃蛇 | Raingod</title>
    <link rel="icon" href="/icon.ico">
    <link rel="stylesheet" href="/menu_nav.css">
    <link rel="stylesheet" href="/page_theme.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            /* 1. 修改為白色背景，以配合黑色光暈 */
            background: #ffffff;
            font-family: sans-serif;
            overflow-y: hidden;
        }

        /* 2. 新增光暈圖層樣式 */
        #cursor-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 999;
            background: radial-gradient(circle 750px at var(--x, 0) var(--y, 0),
                    rgba(255, 255, 255, 0.15) 0%,
                    transparent 70%);
        }

        canvas {
            display: block;
            cursor: crosshair;
            width: 100vw;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            touch-action: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #deathScreen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #ff444467;
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            font-family: "Poppins", sans-serif;
        }

        #deathScreen button {
            /* 核心：膠囊形狀 */
            padding: 12px 32px;
            border-radius: 50px;
            /* 足夠大的圓角 */

            /* 外觀設定 */
            border: none;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            /* 漸層色 */
            color: white;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;

            /* 動畫過渡 */
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(110, 142, 251, 0.4);
            outline: none;
        }

        /* 懸停效果 (Hover) */
        #deathScreen button:hover {
            transform: translateY(-2px);
            /* 輕微上浮 */
            box-shadow: 0 6px 20px rgba(110, 142, 251, 0.6);
            filter: brightness(1.1);
            /* 稍微變亮 */
        }

        /* 點擊效果 (Active) */
        #deathScreen button:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(110, 142, 251, 0.4);
        }

        #chatContainer {
            position: fixed;
            top: 2cm;
            left: 20px;
            z-index: 100;
            pointer-events: none;
            /* Allows clicking through to the game */
        }

        #chatMessages {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            width: 90vw;
            max-height: 300px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        /* Individual Message Popup */
        .mc-message {
            background: rgba(0, 0, 0, 0.5);
            /* Semi-transparent black like MC */
            color: white;
            padding: 2px 6px;
            margin-bottom: 2px;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            width: fit-content;
            animation: mcFadeOut 8s forwards;
            /* Visible for 8 seconds */
            text-shadow: 1px 1px #000;
        }

        #chatInput {
            pointer-events: auto;
            width: 300px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #555;
            outline: none;
            border-radius: 10px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 20px;
            padding: 5px 15px;
            opacity: 0.25;
            transition: opacity 0.2s;
        }

        #chatContainer:hover #chatInput,
        #chatInput:focus {
            opacity: 1;
        }

        @keyframes mcFadeOut {
            0% {
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        #startDialog {
            display: flex;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #ffffff60;
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            font-family: "Poppins", sans-serif;
        }

        #startDialog input {
            padding: 15px 20px;
            border-radius: 50px;

            border: none;
            background: linear-gradient(135deg, #94adff, #b07cef);
            color: white;
            font-size: 20px;
            font-family: 'Poppins', sans-serif;
            min-width: 200px;
            width: 35%;
            margin-bottom: 10px;
            text-align: center;

            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(110, 142, 251, 0.4);
            outline: none;
        }

        #startDialog input::placeholder {
            color: rgb(204, 204, 204);
        }

        #startDialog button {
            padding: 12px 32px;
            border-radius: 50px;

            border: none;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;

            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(110, 142, 251, 0.4);
            outline: none;
        }

        #startDialog button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(110, 142, 251, 0.6);
            filter: brightness(1.1);
        }

        #startDialog button:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(110, 142, 251, 0.4);
        }

        .leaderboard {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-family: 'Poppins', sans-serif;
            min-width: 150px;
            width: fit-content;
            pointer-events: none;
            /* Allows mouse to click through to the game */
            z-index: 100;
        }

        .lb-title {
            border-bottom: 1px solid #444;
            margin-bottom: 10px;
            padding-bottom: 5px;
            font-weight: bold;
            color: #00ff88;
            text-align: center;
        }

        .lb-item {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin: 4px 0;
        }

        .lb-me {
            color: #00ff88;
            /* Highlight the local player */
            font-weight: bold;
        }
    </style>
</head>

<body>
<link rel="stylesheet" href="menu.css">

<div id="nav_bar"></div>

<script src="menu.js"></script>
    <div id="cursor-overlay"></div>

    <canvas id="gameCanvas"></canvas>

    <div class="ui">
        <h3 id="score">分數: 0</h3>
    </div>

    <div class="leaderboard" id="leaderboard" style="display: none;">
        <div class="lb-title">排行榜</div>
        <div id="lb-list"></div>
    </div>

    <div id="chatContainer">
        <input type="text" id="chatInput" placeholder="說些什麼..." maxlength="50">
        <div id="chatMessages"></div>
    </div>

    <div id="deathScreen">
        <h1 style=" margin-bottom: 10px;">您死了!</h1>
        <p id="finalScore" style="font-size: 24px; margin-bottom: 30px;"></p>
        <button onclick="respawn()">重生</button>
    </div>

    <div id="startDialog">
        <h1>線上貪吃蛇 v1.0</h1>
        <h4>↓ 輸入您的玩家名稱即可開始遊戲! ↓</h4>
        <input maxlength="20" placeholder="您的玩家名稱..." id="playerName" autofocus />
        <button onclick="startGame()">開始遊戲!</button>
    </div>

    <script src="/page_code.js"></script>
    <script src="/game13.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        if (typeof auto_hide_navbar === 'function') auto_hide_navbar(true);

        const overlay = document.getElementById('cursor-overlay');
        window.addEventListener('mousemove', (e) => {
            overlay.style.setProperty('--x', e.clientX + 'px');
            overlay.style.setProperty('--y', e.clientY + 'px');
        });

        let started = false;
        async function startGame() {
            show_loading("正在尋找伺服器...", "應該很快就會完成!");

            await fetch('https://geometricgame-studio-snake-online.hf.space');

            document.getElementById("startDialog").style.display = 'none';
            document.getElementById("cursor-overlay").style.display = 'none';

            let serverState = await checkServerState();
            if (serverState !== "RUNNING") {
                if (serverState === "RUNTIME_ERROR") {
                    show_dialog("伺服器發生問題", "請稍後再試一次");

                    document.getElementById("startDialog").style.display = 'flex';
                    document.getElementById("cursor-overlay").style.display = '';
                }
                else {
                    show_loading("伺服器正在啟動...", "很快就會完成了!\n請耐心等候...");
                    const interval = setInterval(async () => {
                        serverState = await checkServerState(true);

                        close_loading();
                        show_loading("伺服器正在啟動...", "狀態: " + serverState + "\n請耐心等候...");

                        if (serverState === "線上") {
                            clearInterval(interval);
                            startGame();

                            return;
                        }
                    }, 2500);
                }
            }
            else {
                close_loading();

                document.getElementById("leaderboard").style.display = '';

                const game = new ModernSnake('gameCanvas', document.getElementById("playerName").value);
                game.start();
            }
        }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById("playerName").focus();
            }, 100);
        };

        document.getElementById("playerName").addEventListener("keydown", function (e) {
            if (e.key == 'Enter') {
                e.preventDefault();
                startGame();
            }
        }, false);

        document.addEventListener("keydown", function (e) {
            const disabledKeys = ["s", "o", "w"];
            if (disabledKeys.includes(e.key) && (navigator.platform.match("Mac") ? e.metaKey : e.ctrlKey)) {
                e.preventDefault();
            }
            else if (e.key == 'Enter' && started) {
                document.getElementById("chatInput").focus();
            }
        }, false);

        async function checkServerState(translated = false) {
            const response = await fetch('https://huggingface.co/api/spaces/Geometricgame-studio/snake-online');
            const data = await response.json();

            const rawStage = data.runtime.stage;
            const statusMap = {
                "RUNNING_APP_STARTING": "正在啟動...",
                "BUILDING": "正在建構伺服器...",
                "RUNNING": "線上",
                "PAUSED": "休眠中",
                "STOPPED": "離線"
            };

            return translated ? statusMap[rawStage] : rawStage;
        }
    </script>
</body>

</html>

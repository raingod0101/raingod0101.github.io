<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿公的超級看書機</title>
    <style>
        /* 全域大字體與舒適深色背景，保護眼睛 */
        body {
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 頂部超大操作區 */
        .top-bar {
            background-color: #0056b3;
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .title {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        /* 巨型上傳按鈕 */
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn {
            border: 4px solid #ffffff;
            color: #0056b3;
            background-color: #ffffff;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* 提示文字 */
        .tip-text {
            font-size: 22px;
            color: #ffe600;
            margin-top: 10px;
            font-weight: bold;
        }

        /* PDF 顯示區域 */
        .viewer-container {
            flex: 1;
            width: 100%;
            height: calc(100vh - 160px);
            border: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 一開始沒上傳檔案時的巨型提示 */
        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #555;
            padding: 20px;
            text-align: center;
        }

        .welcome-text {
            font-size: 32px;
            margin-bottom: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="upload-btn-wrapper">
            <button class="btn">📂 按這裡選檔案（看報紙、看書）</button>
            <input type="file" id="pdf-upload" accept=".pdf" onchange="loadPDF(this)" />
        </div>
        <div class="tip-text">💡 大提示：進去畫面後，按右下角或右上角的「+」就可以放大喔！</div>
    </div>

    <div id="welcome" class="welcome-screen">
        <p class="welcome-text">
            👴🏻 阿公好！<br>
            請先點選上面的 <b>【按這裡選檔案】</b> 藍色大按鈕，<br>
            選好你想看的 PDF 檔案，字就會跑出來囉！
        </p>
    </div>

    <div id="viewer-container" class="viewer-container" style="display: none;">
        <iframe id="pdf-viewer" src=""></iframe>
    </div>

    <script>
        function loadPDF(input) {
            const file = input.files[0];
            if (file) {
                // 建立檔案的臨時 URL
                const fileURL = URL.createObjectURL(file);
                
                const viewer = document.getElementById('pdf-viewer');
                const container = document.getElementById('viewer-container');
                const welcome = document.getElementById('welcome');

                // 將 PDF 網址丟給 iframe
                viewer.src = fileURL;
                
                // 切換顯示畫面
                welcome.style.display = 'none';
                container.style.display = 'block';
            }
        }
    </script>

</body>
</html>

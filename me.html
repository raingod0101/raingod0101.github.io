<html>
<head>
    <title>開啟</title>
</head>
<body>
    <link rel="stylesheet" href="menu.css">
    <div id="nav_bar"></div>
    <script src="menu.js"></script>

    <!-- 1. 修正 style 裡面的多餘空白 -->
    <!-- 2. 將函數名稱從 open 改為 myOpen (避免衝突) -->
    <button style="font-size:100px;" onclick="myOpen()">開啟</button>

    <script>
        function myOpen() {
            // 3. 網址必須加上 https:// 否則瀏覽器會以為是本地檔案
            window.open('https://gemini.google.com', '_blank');
            window.open('https://github.com', '_blank');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 智能翻譯 | Raingod Studio</title>
    <link rel="stylesheet" href="menu.css">
    <style>
        body { background: #f0f2f5; }
        
        .translation-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .translation-grid { grid-template-columns: 1fr; }
        }

        .editor-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }

        textarea {
            width: 100%;
            height: 250px;
            border: none;
            outline: none;
            font-size: 1.1rem;
            resize: none;
            color: #1d1d1f;
            background: transparent;
        }

        #target-display {
            width: 100%;
            height: 250px;
            font-size: 1.1rem;
            color: #007aff;
            word-wrap: break-word;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .lang-label {
            display: block;
            font-weight: 700;
            color: #86868b;
            margin-bottom: 10px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .translate-btn {
            width: 100%;
            padding: 18px;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 14px rgba(0, 122, 255, 0.3);
        }

        .translate-btn:hover {
            background: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 122, 255, 0.4);
        }

        .translate-btn:disabled {
            background: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* 載入動畫 */
        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="nav_bar"></div>

    <div class="container">
        <header style="text-align:center; margin-bottom:40px;">
            <h1 style="font-size:2.5rem; margin-bottom:10px;">Raingod Translate</h1>
            <p style="color:#86868b;">串接 MyMemory 翻譯引擎，支援多國語言互譯</p>
        </header>

        <div class="translation-grid">
            <div class="editor-box">
                <label class="lang-label">原文 (建議輸入英文或日文)</label>
                <textarea id="sourceText" placeholder="在此輸入文字..."></textarea>
            </div>

            <div class="editor-box" style="background: #f9f9fb;">
                <label class="lang-label">譯文 (繁體中文)</label>
                <div id="target-display">等待輸入...</div>
            </div>
        </div>

        <button id="transBtn" class="translate-btn" onclick="performTranslation()">
            <span id="btnText">立即翻譯</span>
        </button>
        
        <p style="margin-top:20px; font-size:0.8rem; color:#b0b0b0; text-align:center;">
            * 由於是免費 API，請勿於一秒內多次點擊。
        </p>
    </div>

    <script src="loadMenu.js"></script>
    <script>
        async function performTranslation() {
            const sourceText = document.getElementById('sourceText').value;
            const targetDisplay = document.getElementById('target-display');
            const btnText = document.getElementById('btnText');
            const transBtn = document.getElementById('transBtn');

            if (!sourceText.trim()) {
                alert("請先輸入內容！");
                return;
            }

            // UI 狀態切換
            btnText.innerText = "正在翻譯中...";
            transBtn.disabled = true;
            targetDisplay.style.color = "#86868b";
            targetDisplay.innerText = "處理中...";

            try {
                // 使用 MyMemory 免費 API (無需 Key，限制為 1000 字/天)
                // 語法: get?q=文字&langpair=來源語系|目標語系
                // 'autodetect|zh-TW' 表示自動偵測轉繁體中文
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(sourceText)}&langpair=auto|zh-TW`);
                
                if (!response.ok) throw new Error("網路回應不正確");

                const data = await response.json();
                
                if (data.responseData) {
                    targetDisplay.style.color = "#007aff";
                    targetDisplay.innerText = data.responseData.translatedText;
                } else {
                    throw new Error("翻譯失敗");
                }

            } catch (error) {
                console.error("錯誤:", error);
                targetDisplay.style.color = "#ff3b30";
                targetDisplay.innerText = "抱歉，翻譯服務暫時不可用，請稍後再試。";
            } finally {
                btnText.innerText = "立即翻譯";
                transBtn.disabled = false;
            }
        }
    </script>
</body>
</html>

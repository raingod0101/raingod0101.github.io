<!DOCTYPE html>
<html>
<head>
    <title>翻譯工具 | Raingod</title>
    <link rel="stylesheet" href="menu.css">
</head>
<body>
    <div id="nav_bar"></div>
    <div class="container">
        <div class="card" style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div>
                <h3>原文 (自動偵測)</h3>
                <textarea id="source" style="width:100%; height:200px; border-radius:10px; padding:15px; border:1px solid #ddd;"></textarea>
            </div>
            <div>
                <h3>譯文 (繁體中文)</h3>
                <div id="target" style="width:100%; height:200px; background:#f9f9f9; border-radius:10px; padding:15px; border:1px solid #eee; color:#555;">
                    翻譯結果將顯示於此...
                </div>
            </div>
        </div>
        <button style="width:100%;" onclick="translateText()">立即翻譯</button>
    </div>
    <script src="loadMenu.js"></script>
    <script>
        function translateText() {
            const text = document.getElementById('source').value;
            document.getElementById('target').innerText = "正在呼叫 AI 翻譯引擎...\n(這是一個展示介面，請連接 Google API 使用)";
        }
    </script>
</body>
</html>

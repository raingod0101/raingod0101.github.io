
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Raingod</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.05; z-index: 1; word-break: break-all; font-size: 10px; pointer-events: none; }
        
        .content-wrap { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; }

        /* 數據框 */
        .box { border: 1px solid #00ff00; padding: 25px; background: rgba(0, 10, 0, 0.9); width: 420px; box-shadow: 0 0 20px rgba(0, 255, 0, 0.3); }
        .row { display: flex; justify-content: space-between; align-items: baseline; margin: 12px 0; border-bottom: 1px solid #003300; padding-bottom: 8px; }
        
        /* 標籤樣式 */
        .label { color: #008800; font-size: 11px; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; }
        
        /* 數值樣式 */
        .val { color: #1fc4ed; font-size: 24px; font-weight: bold; font-variant-numeric: tabular-nums; }
        
        /* 左側：漲跌價格 (原本 Offset 的位置) */
        .change-main { color: #ff3333; font-size: 32px; text-shadow: 0 0 10px rgba(255,0,0,0.2); }
        
        /* 右側：Offset (移到右邊) */
        .offset-val { color: #eeff00; font-size: 24px; text-shadow: 0 0 15px rgba(238, 255, 0, 0.4); }
        
        .status-bar { display: flex; justify-content: space-between; font-size: 10px; color: #004400; margin-top: 15px; width: 100%; }
        
        h1 { font-size: 20px; margin: 0 0 15px 0; border-left: 5px solid #00ff00; padding-left: 12px; letter-spacing: 2px; }
        
        /* 雙欄佈局專用 */
        .split-row { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; margin-bottom: 20px; border-bottom: 2px solid #005500; padding-bottom: 15px; }
        .col { display: flex; flex-direction: column; }
        .right-align { align-items: flex-end; text-align: right; }
    </style>
</head>
<body>

<div id="bg"></div>

<div class="content-wrap">
    <div class="box">
        <h1>TSMC 2330 Raingod</h1>
        
        <div class="split-row">
            <div class="col">
                <span class="label">Price Change</span>
                <span id="change-price-only" class="val change-main">--</span>
            </div>
            <div class="col right-align">
                <span class="label">Offset (REF: 1960)</span>
                <span id="price-offset" class="val offset-val">---</span>
            </div>
        </div>
        
        <div class="row">
            <span class="label">Market Price</span>
            <span id="price-real" class="val">--</span>
        </div>
        
        <div class="row">
            <span class="label">Percentage</span>
            <span id="change-percent" class="val" style="font-size: 20px;">--</span>
        </div>

        <div class="status-bar">
            <span>NETWORK: <span id="sys-status">ACTIVE</span></span>
            <span id="update-time">--:--:--</span>
        </div>
    </div>
</div>

<script>
// 數字跳動背景邏輯
    const bg = document.getElementById('bg');
    bg.innerText = Array.from({length: 4000}, () => Math.floor(Math.random()*2)).join('');

    // 全域變數用於存儲標題資訊
    let currentStockInfo = "TSMC Loading...";
    let showRaingod = false;

    // 處理標題切換的計時器 (每 5 秒切換一次狀態)
    setInterval(() => {
        showRaingod = !showRaingod;
        if (showRaingod) {
            document.title = "Raingod";
        } else {
            document.title = currentStockInfo;
        }
    }, 5000);

    async function getStock() {
        const sysStatus = document.getElementById('sys-status');
        const offsetEl = document.getElementById('price-offset');
        const changePriceEl = document.getElementById('change-price-only');
        const percentEl = document.getElementById('change-percent');
        
        try {
            const symbol = '2330.TW';
            const cacheBuster = Date.now();
            const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1m&range=1d&_=${cacheBuster}`;
            
            const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
            if (!res.ok) throw new Error('Network Error');
            
            const data = await res.json();
            const result = data.chart.result[0];
            const price = result.meta.regularMarketPrice;
            const prevClose = result.meta.previousClose;
            const diff = price - prevClose;
            const percent = ((diff / prevClose) * 100).toFixed(2);
            
            // 計算 Offset
            const offset = (price - 1960).toFixed(1);
            
            // --- 更新網頁內 UI ---
            offsetEl.innerText = (offset > 0 ? "+" : "") + offset;
            changePriceEl.innerText = (diff >= 0 ? '▲ ' : '▼ ') + Math.abs(diff).toFixed(1);
            changePriceEl.style.color = diff >= 0 ? '#ff3333' : '#33ff33';

            document.getElementById('price-real').innerText = price.toFixed(1);
            percentEl.innerText = (diff >= 0 ? '+' : '') + percent + "%";
            percentEl.style.color = diff >= 0 ? '#ff3333' : '#33ff33';

            const now = new Date();
            document.getElementById('update-time').innerText = now.toTimeString().split(' ')[0];
            
            sysStatus.innerText = "ONLINE";
            sysStatus.style.color = "#00ff00";

            // --- 更新 Title 資訊字串 ---
            // 格式：1050.5 +1.2%(+12.5)
            const sign = diff >= 0 ? '+' : '';
            currentStockInfo = `${price.toFixed(1)} ${sign}${percent}%(${sign}${diff.toFixed(1)})`;
            
            // 如果當前不是在顯示 Raingod，立即更新標題
            if (!showRaingod) {
                document.title = currentStockInfo;
            }

        } catch (e) {
            console.error("Fetch error:", e);
            sysStatus.innerText = "TIMEOUT_RETRY";
            sysStatus.style.color = "#ff0000";
            setTimeout(getStock, 5000);
        }
    }

    // 每 20 秒抓取一次新數據
    setInterval(getStock, 20000);
    getStock();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML編輯器 | Raingod</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --accent-color: #00ff41; /* 經典數位雨綠色 */
            --text-color: #e0e0e0;
            --border-color: #333;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* 頂部工具列 */
        .toolbar {
            height: 40px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid var(--border-color);
            justify-content: space-between;
        }

        .logo {
            color: var(--accent-color);
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* 主容器 */
        .main-container {
            display: flex;
            height: calc(100vh - 40px);
        }

        /* 編輯區架構 */
        .editor-container {
            flex: 1;
            position: relative;
            border-right: 1px solid var(--border-color);
            display: flex;
        }

        /* 行號 */
        #line-numbers {
            width: 40px;
            background: #050505;
            color: #555;
            padding: 10px 5px;
            text-align: right;
            font-size: 14px;
            line-height: 20px;
            user-select: none;
            border-right: 1px solid var(--border-color);
        }

        /* 輸入框與高亮層 */
        .code-area {
            flex: 1;
            position: relative;
            background: var(--bg-color);
        }

        #code-input, #code-highlight {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 10px;
            border: none;
            box-sizing: border-box;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 20px;
            white-space: pre;
            tab-size: 4;
            position: absolute;
            top: 0;
            left: 0;
            outline: none;
        }

        #code-input {
            background: transparent;
            color: transparent;
            caret-color: var(--accent-color);
            z-index: 2;
            resize: none;
        }

        #code-highlight {
            z-index: 1;
            color: var(--text-color);
            pointer-events: none;
            overflow: hidden;
        }

        /* 預覽區 */
        .preview-container {
            flex: 1;
            background: #fff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 按鈕樣式 */
        .btn {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 4px 12px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--accent-color);
            color: #000;
        }

        /* HTML 標籤簡單染色 */
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="logo">HTML編輯器</div>
        <div>
            <button class="btn" onclick="clearCode()">CLEAR</button>
            <button class="btn" onclick="downloadCode()">SAVE .HTML</button>
        </div>
    </div>

    <div class="main-container">
        <div class="editor-container">
            <div id="line-numbers">1</div>
            <div class="code-area">
                <textarea id="code-input" spellcheck="false" placeholder="在此輸入 HTML..."></textarea>
                <div id="code-highlight"></div>
            </div>
        </div>

        <div class="preview-container">
            <iframe id="preview-window"></iframe>
        </div>
    </div>

    <script>
        const input = document.getElementById('code-input');
        const highlight = document.getElementById('code-highlight');
        const lineNumbers = document.getElementById('line-numbers');
        const preview = document.getElementById('preview-window');

        // 預設內容
        const defaultCode = `<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #00ff41; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        h1 { border: 2px solid #00ff41; padding: 20px; text-shadow: 0 0 10px #00ff41; }
    </style>
</head>
<body>
    <h1>SYSTEM ONLINE</h1>
</body>
</html>`;

        // 初始化
        input.value = defaultCode;
        updateEditor();

        // 監聽輸入
        input.addEventListener('input', updateEditor);
        input.addEventListener('scroll', () => {
            highlight.scrollTop = input.scrollTop;
            highlight.scrollLeft = input.scrollLeft;
            lineNumbers.scrollTop = input.scrollTop;
        });

        // 處理 Tab 鍵
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = input.selectionStart;
                const end = input.selectionEnd;
                input.value = input.value.substring(0, start) + "    " + input.value.substring(end);
                input.selectionStart = input.selectionEnd = start + 4;
                updateEditor();
            }
        });

        function updateEditor() {
            const code = input.value;
            
            // 1. 更新預覽
            const previewDoc = preview.contentDocument || preview.contentWindow.document;
            previewDoc.open();
            previewDoc.write(code);
            previewDoc.close();

            // 2. 更新行號
            const lines = code.split('\n').length;
            lineNumbers.innerHTML = Array.from({length: lines}, (_, i) => i + 1).join('<br>');

            // 3. 簡單語法染色 (使用正規表達式)
            let colored = code
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")


            highlight.innerHTML = colored + (code.endsWith('\n') ? ' ' : '');
        }

        function clearCode() {
            if(confirm("確定要清空所有代碼嗎？")) {
                input.value = "";
                updateEditor();
            }
        }

        function downloadCode() {
            const blob = new Blob([input.value], {type: "text/html"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "index.html";
            a.click();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Square Arena Battle Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; font-family: sans-serif; }
        canvas { background: #000; border: 4px solid #fff; cursor: crosshair; }
    </style>
</head>
<body>
    <h2 id="status">拖曳球體來蓄力！</h2>
    <canvas id="gameCanvas" width="600" height="600"></canvas>

<script>
    const { Engine, Render, World, Bodies, Body, Mouse, MouseConstraint, Events } = Matter;
    const engine = Engine.create();
    const render = Render.create({ element: document.body, canvas: document.getElementById('gameCanvas'), engine: engine, options: { width: 600, height: 600, wireframes: false } });

    // 建立牆壁與玩家
    const walls = [
        Bodies.rectangle(300, 0, 600, 20, { isStatic: true }),
        Bodies.rectangle(300, 600, 600, 20, { isStatic: true }),
        Bodies.rectangle(0, 300, 20, 600, { isStatic: true }),
        Bodies.rectangle(600, 300, 20, 600, { isStatic: true })
    ];
    const player = Bodies.circle(300, 300, 20, { restitution: 0.8, render: { fillStyle: '#ff0000' } });
    World.add(engine.world, [...walls, player]);

    // 滑鼠拖曳發射邏輯
    const mouse = Mouse.create(render.canvas);
    let isDragging = false;
    let startPos = { x: 0, y: 0 };

    render.canvas.addEventListener('mousedown', (e) => {
        isDragging = true;
        startPos = { x: e.offsetX, y: e.offsetY };
    });

    render.canvas.addEventListener('mouseup', (e) => {
        if (!isDragging) return;
        const endPos = { x: e.offsetX, y: e.offsetY };
        const force = { x: (startPos.x - endPos.x) * 0.002, y: (startPos.y - endPos.y) * 0.002 };
        Body.applyForce(player, player.position, force);
        isDragging = false;
        document.getElementById('status').innerText = "發射！";
    });

    Engine.run(engine);
    Render.run(render);
</script>
</body>
</html>

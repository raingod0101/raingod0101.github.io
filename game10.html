<!DOCTYPE html>
<html>
<head>
    <title>Square Arena Multiplayer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #222; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; }
        canvas { background: #000; border: 5px solid #fff; cursor: crosshair; }
        #ui { padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <div id="ui"><h2 id="status">等待連接...</h2></div>
    <canvas id="game"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        // --- 1. Firebase 設定 ---
        const firebaseConfig = { databaseURL: "https://game-24b43-default-rtdb.firebaseio.com/" };
        const db = getDatabase(initializeApp(firebaseConfig));

        // --- 2. 物理引擎初始化 ---
        const { Engine, Render, World, Bodies, Body, Events } = Matter;
        const engine = Engine.create();
        const render = Render.create({ element: document.getElementById('game'), engine: engine, options: { width: 600, height: 600, wireframes: false } });
        
        // 牆壁 (Static)
        const wallOptions = { isStatic: true, render: { fillStyle: '#444' } };
        World.add(engine.world, [
            Bodies.rectangle(300, 0, 600, 20, wallOptions),
            Bodies.rectangle(300, 600, 600, 20, wallOptions),
            Bodies.rectangle(0, 300, 20, 600, wallOptions),
            Bodies.rectangle(600, 300, 20, 600, wallOptions)
        ]);

        const player = Bodies.circle(200, 300, 20, { restitution: 0.9, render: { fillStyle: '#ff0000' } });
        const enemy = Bodies.circle(400, 300, 20, { restitution: 0.9, render: { fillStyle: '#0000ff' } });
        World.add(engine.world, [player, enemy]);

        // --- 3. 遊戲互動邏輯 ---
        let canShoot = true;
        document.getElementById('game').addEventListener('mousedown', (e) => {
            if (!canShoot) return;
            const force = { x: (300 - e.offsetX) * 0.001, y: (300 - e.offsetY) * 0.001 };
            update(ref(db, 'action'), { force: force, timestamp: Date.now() });
            canShoot = false;
            document.getElementById('status').innerText = "已發射，等待結算...";
        });

        // --- 4. 監聽網路同步 ---
        onValue(ref(db, 'action'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                Body.applyForce(player, player.position, data.force);
                document.getElementById('status').innerText = "戰鬥中！";
            }
        });

        Engine.run(engine);
        Render.run(render);
    </script>
</body>
</html>

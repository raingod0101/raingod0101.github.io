<!DOCTYPE html>
<html>
<head>
    <title>Square Arena</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #222; color: white; }
        #gameCanvas { border: 4px solid #fff; background: #000; }
    </style>
</head>
<body>
    <h2 id="msg">請等待遊戲初始化...</h2>
    <canvas id="gameCanvas"></canvas>

    <script>
        // 1. 設定 Matter.js
        const { Engine, Render, World, Bodies, Runner } = Matter;
        const engine = Engine.create();
        
        // 2. 獲取 Canvas 元素並明確設定大小
        const canvas = document.getElementById('gameCanvas');
        const render = Render.create({
            element: document.body,
            canvas: canvas,
            engine: engine,
            options: { width: 600, height: 600, wireframes: false }
        });

        // 3. 建立角色 (用圓形代表)
        const player1 = Bodies.circle(200, 300, 20, { render: { fillStyle: '#FF0000' } });
        const player2 = Bodies.circle(400, 300, 20, { render: { fillStyle: '#0000FF' } });
        
        // 建立牆壁
        const ground = Bodies.rectangle(300, 600, 600, 20, { isStatic: true });
        const wallLeft = Bodies.rectangle(0, 300, 20, 600, { isStatic: true });
        const wallRight = Bodies.rectangle(600, 300, 20, 600, { isStatic: true });
        const wallTop = Bodies.rectangle(300, 0, 600, 20, { isStatic: true });

        World.add(engine.world, [player1, player2, ground, wallLeft, wallRight, wallTop]);

        // 4. 啟動渲染
        Engine.run(engine);
        Render.run(render);
        document.getElementById('msg').innerText = "角色已產生！(看到紅藍球了嗎？)";
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Square Arena - Fixed Multi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #222; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; }
        #canvas-container { margin-top: 20px; }
        canvas { background: #000; border: 4px solid #fff; cursor: crosshair; }
        #ui { padding: 10px; text-align: center; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui"><span id="msg">遊戲載入中...</span></div>
    <div id="canvas-container">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        // --- 3. 初始化 Firebase ---
        const firebaseConfig = {
            databaseURL: "https://game-24b43-default-rtdb.firebaseio.com/"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        // --- 4. 初始化物理引擎 ---
        const { Engine, Render, World, Bodies, Body, Events } = Matter;
        const engine = Engine.create();
        
        // 5. 關鍵修正：將 Render 對接到我們建立的 Canvas
        const canvas = document.getElementById('gameCanvas');
        const render = Render.create({
            element: document.getElementById('canvas-container'),
            canvas: canvas,
            engine: engine,
            options: { width: 600, height: 600, wireframes: false }
        });

        // 建立牆壁 (不變)
        const wallOptions = { isStatic: true, render: { fillStyle: '#444' } };
        World.add(engine.world, [
            Bodies.rectangle(300, 0, 600, 20, wallOptions), // 上
            Bodies.rectangle(300, 600, 600, 20, wallOptions), // 下
            Bodies.rectangle(0, 300, 20, 600, wallOptions), // 左
            Bodies.rectangle(600, 300, 20, 600, wallOptions)  // 右
        ]);

        // 6. 核心修正：將角色建立在 Firebase 監聽器之外，確保畫面先顯示
        const player = Bodies.circle(200, 300, 20, { restitution: 0.9, render: { fillStyle: '#ff0000' } });
        const enemy = Bodies.circle(400, 300, 20, { restitution: 0.9, render: { fillStyle: '#0000ff' } });
        World.add(engine.world, [player, enemy]);

        // --- 7. 網路互動邏輯 ---
        let canShoot = true;
        
        canvas.addEventListener('mousedown', (e) => {
            if (!canShoot) return;
            // 計算力道 (就像拉彈弓一樣)
            const force = { x: (player.position.x - e.offsetX) * 0.002, y: (player.position.y - e.offsetY) * 0.002 };
            // 更新 Firebase
            update(ref(db, 'round/p1'), { force: force, timestamp: Date.now() });
            canShoot = false;
            document.getElementById('msg').innerText = "已選定力度，等待結算...";
        });

        // 8. 監聽 Firebase 回傳 (處理發射)
        onValue(ref(db, 'round'), (snapshot) => {
            const data = snapshot.val();
            // 當兩人都發射了
            if (data && data.p1 && data.p2) {
                // 將力道套用到物理引擎
                Body.applyForce(player, player.position, data.p1.force);
                Body.applyForce(enemy, enemy.position, data.p2.force);
                document.getElementById('msg').innerText = "對決中！";
                
                // 每隔幾秒後重置 (這是簡化版回合制)
                setTimeout(() => { canShoot = true; document.getElementById('msg').innerText = "請準備發射..."; }, 3000);
            }
        });

        Engine.run(engine);
        Render.run(render);
        document.getElementById('msg').innerText = "遊戲已初始化，請準備發射...";
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數獨 | Raingod</title>
    <style>
        :root {
            --cell-size: 50px;
            --border-heavy: 3px solid #2c3e50;
            --border-light: 1px solid #bdc3c7;
            --color-fixed: #000000;
            --color-user: #0080FF;
            --color-error: #e74c3c;
            --accent: #3498db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f4f7f6;
            padding: 10px;
            margin: 0;
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 15px; }
        .stats { 
            font-size: 18px; font-weight: bold; color: #2c3e50; 
            background: white; padding: 8px 25px; border-radius: 25px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }

        .controls-top { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; }
        select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }

        .number-pad {
            display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center;
        }
        .num-btn { 
            width: 45px; height: 45px; font-size: 20px; cursor: pointer; 
            border: 1px solid #ddd; background: white; border-radius: 8px; transition: 0.2s; 
        }
        .num-btn.active { background: var(--accent); color: white; transform: scale(1.1); }
        .num-btn.erase { background: #95a5a6; color: white; width: auto; padding: 0 15px; }

        .grid {
            display: grid; grid-template-columns: repeat(9, 1fr);
            width: 95vw; max-width: 450px; aspect-ratio: 1 / 1;
            border: var(--border-heavy); background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .cell {
            width: 100%; height: 100%; border: var(--border-light);
            box-sizing: border-box; display: flex; align-items: center; justify-content: center;
            font-size: clamp(16px, 5vw, 24px); cursor: pointer; position: relative;
        }
        /* 繪製九宮格粗線 */
        .cell:nth-child(3n):not(:nth-child(9n)) { border-right: var(--border-heavy); }
        .cell:nth-child(n+19):nth-child(-n+27), .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: var(--border-heavy); }

        .cell.fixed { color: var(--color-fixed); font-weight: bold; background: #f0f2f4; cursor: default; }
        .cell.user-val { color: var(--color-user); }
        .cell.error { background: #fadbd8 !important; color: var(--color-error); }
        .cell.note { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            font-size: 10px; color: #95a5a6; line-height: 10px; 
        }

        .actions { margin-top: 20px; display: flex; gap: 10px; }
        .main-btn { 
            padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 8px; 
            border: none; background: #27ae60; color: white; font-weight: bold; 
        }
        .reset-btn { background: #e67e22; }
    </style>
</head>
<body>

    <div class="header">
        <h1>數獨 Sudoku</h1>
        <div class="stats">🏆 過關次數：<span id="winCount">0</span></div>
    </div>

    <div class="controls-top">
        <label>難度：</label>
        <select id="difficulty">
            <option value="30">簡單</option>
            <option value="45" selected>中等</option>
            <option value="55">困難</option>
            <option value="64">專家</option>
        </select>
    </div>

    <div class="number-pad">
        <button class="num-btn" data-val="1">1</button>
        <button class="num-btn" data-val="2">2</button>
        <button class="num-btn" data-val="3">3</button>
        <button class="num-btn" data-val="4">4</button>
        <button class="num-btn" data-val="5">5</button>
        <button class="num-btn" data-val="6">6</button>
        <button class="num-btn" data-val="7">7</button>
        <button class="num-btn" data-val="8">8</button>
        <button class="num-btn" data-val="9">9</button>
        <button class="num-btn erase" data-val="0">清除</button>
    </div>

    <div id="grid" class="grid"></div>

    <div class="actions">
        <button class="main-btn" onclick="checkGame()">檢查答案</button>
        <button class="main-btn reset-btn" onclick="confirmNewGame()">換新題目</button>
    </div>

    <script>
        const gridEl = document.getElementById('grid');
        const winCountEl = document.getElementById('winCount');
        const diffSelect = document.getElementById('difficulty');
        const numBtns = document.querySelectorAll('.num-btn');
        
        let selectedNum = null;
        let puzzle = [];    // 題目 (0 表示空位)
        let userState = []; // 玩家填寫狀態 (陣列儲存，支援筆記)
        let winCount = parseInt(localStorage.getItem('sudoku_wins')) || 0;

        // --- 核心演算法 ---

        function generateSudoku() {
            const board = Array(81).fill(0);
            fillBoard(board);
            
            const holes = parseInt(diffSelect.value);
            puzzle = [...board];
            let count = 0;
            while (count < holes) {
                let i = Math.floor(Math.random() * 81);
                if (puzzle[i] !== 0) {
                    puzzle[i] = 0;
                    count++;
                }
            }
        }

        function fillBoard(board) {
            for (let i = 0; i < 81; i++) {
                if (board[i] === 0) {
                    let nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
                    for (let n of nums) {
                        if (isValid(board, i, n)) {
                            board[i] = n;
                            if (fillBoard(board)) return true;
                            board[i] = 0;
                        }
                    }
                    return false;
                }
            }
            return true;
        }

        function isValid(board, idx, val) {
            let r = Math.floor(idx / 9), c = idx % 9;
            for (let i = 0; i < 9; i++) {
                // 行列檢查
                if (board[r * 9 + i] === val) return false;
                if (board[i * 9 + c] === val) return false;
                // 九宮格檢查
                let br = Math.floor(r / 3) * 3 + Math.floor(i / 3);
                let bc = Math.floor(c / 3) * 3 + (i % 3);
                if (board[br * 9 + bc] === val) return false;
            }
            return true;
        }

        // --- 介面與互動 ---

        function initGame() {
            winCountEl.innerText = winCount;
            generateSudoku();
            userState = puzzle.map(v => v === 0 ? [] : [v]);
            renderGrid();
        }

        function renderGrid() {
            gridEl.innerHTML = '';
            for (let i = 0; i < 81; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (puzzle[i] !== 0) {
                    cell.classList.add('fixed');
                    cell.innerText = puzzle[i];
                } else {
                    cell.onclick = () => handleCellClick(i);
                    updateCellUI(cell, userState[i]);
                }
                gridEl.appendChild(cell);
            }
        }

        function handleCellClick(idx) {
            if (selectedNum === null) {
                alert("請先點擊上方數字，再點擊格子填入。");
                return;
            }
            
            if (selectedNum === 0) {
                userState[idx] = [];
            } else {
                let current = userState[idx];
                if (current.includes(selectedNum)) {
                    // 如果已存在該數字，則移除 (取消筆記)
                    userState[idx] = current.filter(n => n !== selectedNum);
                } else {
                    // 加入新數字
                    userState[idx].push(selectedNum);
                    userState[idx].sort((a,b) => a-b);
                }
            }
            updateCellUI(gridEl.children[idx], userState[idx]);
        }

        function updateCellUI(cell, vals) {
            cell.classList.remove('note', 'user-val', 'error');
            if (vals.length === 0) {
                cell.innerText = '';
            } else if (vals.length === 1) {
                cell.innerText = vals[0];
                cell.classList.add('user-val');
            } else {
                cell.innerText = vals.join('');
                cell.classList.add('note');
            }
        }

        // --- 核心檢查邏輯 (支援多解驗證) ---
        function checkGame() {
            const cells = gridEl.children;
            let isFull = true;
            let currentBoard = [];

            // 1. 蒐集目前盤面狀態
            for (let i = 0; i < 81; i++) {
                cells[i].classList.remove('error'); // 清除舊錯誤
                if (puzzle[i] !== 0) {
                    currentBoard.push(puzzle[i]);
                } else if (userState[i].length === 1) {
                    currentBoard.push(userState[i][0]);
                } else {
                    currentBoard.push(0);
                    isFull = false;
                }
            }

            if (!isFull) {
                alert("還沒填完喔！筆記數字不列入計算。");
                return;
            }

            // 2. 驗證規則 (行、列、宮)
            let hasError = false;
            for (let i = 0; i < 81; i++) {
                let val = currentBoard[i];
                // 暫時將自己設為 0 以檢查是否有衝突數字
                let tempBoard = [...currentBoard];
                tempBoard[i] = 0;
                if (!isValid(tempBoard, i, val)) {
                    cells[i].classList.add('error');
                    hasError = true;
                }
            }

            if (!hasError) {
                winCount++;
                localStorage.setItem('sudoku_wins', winCount);
                winCountEl.innerText = winCount;
                alert("恭喜！符合所有邏輯規則，過關！");
                initGame();
            } else {
                alert("盤面有衝突（紅框處），請再檢查一下！");
            }
        }

        function confirmNewGame() {
            if (confirm("確定要重來嗎？進度將不會儲存。")) {
                initGame();
            }
        }

        // 數字鍵盤綁定
        numBtns.forEach(btn => {
            btn.onclick = () => {
                const val = parseInt(btn.dataset.val);
                if (selectedNum === val) {
                    selectedNum = null;
                    btn.classList.remove('active');
                } else {
                    numBtns.forEach(b => b.classList.remove('active'));
                    selectedNum = val;
                    btn.classList.add('active');
                }
            };
        });

        // 初始化
        initGame();
    </script>
</body>
</html>

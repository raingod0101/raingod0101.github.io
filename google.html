<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="icon" href="https://www.google.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #202124;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        a:hover {
            text-decoration: underline;
        }

        header {
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .nav-left a,
        .nav-right a {
            margin-right: 15px;
        }

        .nav-right {
            display: flex;
            align-items: center;
        }

        .nav-right .app-icon-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 8px;
            transition: background-color 0.2s;
        }

        .nav-right .app-icon-link:hover {
            background-color: rgba(60, 64, 67, 0.08);
            text-decoration: none;
        }

        .nav-right svg {
            fill: #5f6368;
            cursor: pointer;
        }

        .sign-in-btn {
            background-color: #1a73e8;
            color: white !important;
            padding: 9px 23px;
            border-radius: 4px;
            font-weight: 500;
            margin-left: 5px;
            text-decoration: none !important;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
            flex: 1;
        }

        .logo {
            margin-bottom: 28px;
        }

        .logo img {
            width: 272px;
            height: 92px;
        }

        .search-wrapper {
            width: 90%;
            max-width: 584px;
            position: relative;
            z-index: 100;
        }

        .search-box-container {
            width: 100%;
            display: flex;
            align-items: center;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            padding: 0 14px;
            height: 46px;
            box-sizing: border-box;
            background: #fff;
            transition: box-shadow 0.1s;
        }

        .search-box-container:hover {
            box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
            border-color: rgba(223, 225, 229, 0);
        }

        .search-box-container.active {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            border-bottom: none;
            box-shadow: 0 4px 6px rgba(32, 33, 36, 0.28);
        }

        .search-bar {
            flex: 1;
            height: 100%;
            border: none;
            outline: none;
            font-size: 16px;
            padding: 0 10px;
            background: transparent;
            color: #202124;
        }

        .search-icon {
            width: 20px;
            height: 20px;
            fill: #9aa0a6;
        }

        .tools {
            display: flex;
            gap: 12px;
            align-items: center;
            padding-right: 4px;
        }

        .tools svg {
            width: 24px;
            height: 24px;
            cursor: pointer;
            fill: #4d5156;
        }

        .dropdown {
            position: absolute;
            top: 46px;
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid #dfe1e5;
            border-top: none;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            box-shadow: 0 4px 6px rgba(32, 33, 36, 0.28);
            display: none;
            padding-bottom: 15px;
        }

        .suggestion-item {
            padding: 8px 20px 8px 14px;
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 16px;
            justify-content: space-between;
        }

        .suggestion-item:hover {
            background-color: #f1f3f4;
        }

        .sugg-left {
            display: flex;
            align-items: center;
            flex: 1;
        }

        .suggestion-text {
            margin-left: 12px;
        }

        .history-icon {
            fill: #70757a;
            width: 20px;
            height: 20px;
        }

        .clear-btn {
            font-size: 13px;
            color: #1a73e8;
            cursor: pointer;
            padding: 5px;
        }

        .clear-btn:hover {
            text-decoration: underline;
        }

        .btn-row {
            margin-top: 28px;
            display: flex;
            justify-content: center;
        }

        .btn {
            background-color: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            color: #3c4043;
            font-size: 14px;
            margin: 0 6px;
            padding: 0 16px;
            line-height: 34px;
            height: 36px;
            cursor: pointer;
        }

        .btn:hover {
            border: 1px solid #dadce0;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.1);
            color: #202124;
        }

        footer {
            background: #f2f2f2;
            font-size: 14px;
            color: #70757a;
        }

        .f-row-1 {
            padding: 15px 30px;
            border-bottom: 1px solid #dadce0;
        }

        .f-row-2 {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            flex-wrap: wrap;
        }

        .f-row-2 div {
            display: flex;
            gap: 25px;
        }
    </style>
</head>

<body>
    <header>
        <div class="nav-left">
            <a href="https://freegeometricgames.com/tools/google">關於 Google</a>
            <a href="">Google 商店</a>
        </div>
        <div class="nav-right">
            <a href="">Gmail</a>
            <a href="">圖片</a>
            <a href="" class="app-icon-link" title="Google 應用程式">
                <svg focusable="false" viewBox="0 0 24 24" width="24" height="24">
                    <path
                        d="M6,8c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S4.9,8,6,8z M12,20c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S10.9,20,12,20z M6,20 c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S4.9,20,6,20z M6,14c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S4.9,14,6,14z M12,14 c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S10.9,14,12,14z M16,6c0,1.1,0.9,2,2,2s2-0.9,2-2s-0.9-2-2-2S16,4.9,16,6z M12,8 c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S10.9,8,12,8z M18,14c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S16.9,14,18,14z M18,20 c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S16.9,20,18,20z">
                    </path>
                </svg>
            </a>
            <a href="" class="sign-in-btn">登入</a>
        </div>
    </header>

    <div class="main-container">
        <div class="logo">
            <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" alt="Google">
        </div>

        <div class="search-wrapper">
            <form id="search-form">
                <div class="search-box-container" id="box">
                    <svg class="search-icon" viewBox="0 0 24 24">
                        <path
                            d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z">
                        </path>
                    </svg>
                    <input type="text" id="input" class="search-bar" autocomplete="off" spellcheck="false" autofocus>
                    <div class="tools">
                        <svg focusable="false" viewBox="0 0 24 24">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z">
                            </path>
                            <path
                                d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z">
                            </path>
                        </svg>
                        <svg aria-hidden="true" focusable="false" viewBox="0 -960 960 960">
                            <path
                                d="M480-320q-50 0-85-35t-35-85q0-50 35-85t85-35q50 0 85 35t35 85q0 50-35 85t-85 35Zm240 160q-33 0-56.5-23.5T640-240q0-33 23.5-56.5T720-320q33 0 56.5 23.5T800-240q0 33-23.5 56.5T720-160Zm-440 40q-66 0-113-47t-47-113v-80h80v80q0 33 23.5 56.5T280-200h200v80H280Zm480-320v-160q0-33-23.5-56.5T680-680H280q-33 0-56.5 23.5T200-600v120h-80v-120q0-66 47-113t113-47h80l40-80h160l40 80h80q66 0 113 47t47 113v160h-80Z">
                            </path>
                        </svg>
                    </div>
                </div>

                <div class="dropdown" id="dropdown">
                    <div class="suggestion-item" id="suggestion-link">
                        <div class="sugg-left">
                            <svg id="sugg-icon" class="search-icon" viewBox="0 0 24 24">
                                <path
                                    d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z">
                                </path>
                            </svg>
                            <span class="suggestion-text" id="fake-result"></span>
                        </div>
                        <span id="clear-history" class="clear-btn" style="display:none">移除</span>
                    </div>
                </div>

                <div class="btn-row">
                    <button type="submit" class="btn">Google 搜尋</button>
                    <button type="button" class="btn" onclick="location.href='/'">好手氣</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <div class="f-row-1">台灣</div>
        <div class="f-row-2">
            <div>
                <a href="">廣告</a>
                <a href="">商業</a>
                <a href="">搜尋服務的運作方式</a>
            </div>
            <div>
                <a href="">隱私權</a>
                <a href="">服務條款</a>
                <a href="">設定</a>
            </div>
        </div>
    </footer>

    <script>
        const input = document.getElementById('input');
        const dropdown = document.getElementById('dropdown');
        const box = document.getElementById('box');
        const fakeResult = document.getElementById('fake-result');
        const form = document.getElementById('search-form');
        const suggestionLink = document.getElementById('suggestion-link');
        const suggIcon = document.getElementById('sugg-icon');
        const clearBtn = document.getElementById('clear-history');

        const HISTORY_KEY = 'google_last_search';

        function executeSearch(query) {
            const q = query.trim();
            if (q.length > 0) {
                localStorage.setItem(HISTORY_KEY, q);
                // 這裡會跳轉到 Bing 進行實際搜尋
                window.location.href = "https://www.bing.com/search?q=" + encodeURIComponent(q);
            }
        }

        function showHistory() {
            const lastSearch = localStorage.getItem(HISTORY_KEY);
            if (lastSearch && input.value === "") {
                dropdown.style.display = 'block';
                box.classList.add('active');
                fakeResult.innerText = lastSearch;
                fakeResult.style.color = '#52188c';
                suggIcon.innerHTML = '<path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>';
                suggIcon.classList.add('history-icon');
                clearBtn.style.display = 'block';
            } else if (input.value === "") {
                dropdown.style.display = 'none';
                box.classList.remove('active');
            }
        }

        input.addEventListener('focus', showHistory);
        input.addEventListener('input', () => {
            const val = input.value;
            clearBtn.style.display = 'none';
            if (val.trim().length > 0) {
                dropdown.style.display = 'block';
                box.classList.add('active');
                fakeResult.innerText = val;
                fakeResult.style.color = 'black';
                suggIcon.innerHTML = '<path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path>';
                suggIcon.classList.remove('history-icon');
            } else {
                showHistory();
            }
        });

        clearBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            localStorage.removeItem(HISTORY_KEY);
            dropdown.style.display = 'none';
            box.classList.remove('active');
        });

        suggestionLink.addEventListener('click', () => executeSearch(fakeResult.innerText));
        form.addEventListener('submit', (e) => { e.preventDefault(); executeSearch(input.value); });

        document.addEventListener('click', (e) => {
            if (!box.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.style.display = 'none';
                box.classList.remove('active');
            }
        });
    </script>
</body>

</html>
